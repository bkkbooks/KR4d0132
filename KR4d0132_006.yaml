  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0132_WYG_006-1a, image: WYG1124/WYG1124-0453c.png}
body:
  text: 跨鼇集巻六宋李新撰七言律詩九支池二首萬里車書自一家新城蜿蜿卧龍蛇路民已别東西日樓鼓初聞早晚衙洗出雲嵓銷虎穴掃開煙瘴離椒花受㕓不惜躬耕去欲與滕公度嵗華際天州縣出要荒始覺承平日月長一望宛無戎甲馬四圍皆是漢封疆清笳沓沓翻新曲寒月低低下乳墻説與逺人知徳意九重深處是成康題小瀛洲紫霞香霧隔氛塵擬囑安期謝海神聞道仙居随處有故教湖景到來新菓成行拾千年子花落休悲二月春咫尺徐生身不到自應船載世間人題永康縣山光閣吹鬢東風可但寒倦飛孤鶴已知還花光弄暖翻承雪雲翼回隂却見山野水曲行林下緑春禽喚出夣中閒欲營老宅南頭住待駐人間耐乆顔題絶勝亭孤鴻落照下滄洲人在雲間選勝幽好夣知君依魏闕此生惟我識荆州卜居支遁應同志載酒山公已絶憂他日澄江浄如練主人端在塞垣秋題朱令德祠全家領項付吳鈎香骨當年誰共收鼎鑊九泉留景進旌幢千騎憶同州唐人鐵券驚何語蜀國壺漿笑舊遊古柏參天僧社冷暮煙風雨使人愁題石子溪亭怪事年來一禿翁懶能揮涕謝途窮歸心豈但杜鵑勸官味正嫌𤣥酒濃柘葉展開蠶命老山花飛盡蝶家空願從春社田塍飲内史而今要治聾趙壹讀書臺臺上看書千載客故基青草白芊綿那由府檄平平起除到柴車特特賢土俗更無堪計吏古風空解惜囊錢五行俱下何人見獨有高名伴漢川觀瀾堂風觀生涼底事雄五湖煙浪一堂中公方觀水那無術客欲工詩正坐窮翻出秋潮真是幻化成蓬嶠本來空筆端造化渾竒特爲掃茅茨半畆宫鈴閣文書得少休故將湖水慁清眸似從天姥逡廵坐擬放仙槎自在流具眼不隨千𣲖轉此身元並一漚浮羌誰戯墨通三昧信是人間萬法儔題舊新明縣孝義驛平生職事馬蹄塵三月鸎花世路新廢邑尚餘當日市旌門已忘昔年陳長江浪拍西山脚喬木隂回太古春惟有柳綿情不惡解將柔逺逐行人令狐秀才書堂剰擷芸香辟蠧魚足音差逺自逃虚春醅已許暮留客凍筆不妨寒著書龜甲屏風雲散漫月窓花影樹扶踈他年子伯無閒暇但遣兒曹訪隠居題嘯竹軒借與江風入茂林低低戞玉伴龍吟琅玕影動分清奏鸞鳳聲寒得至音妙處成文元有節虚中出樂自無心子期一聽終區别流水高山不在吟題南寺吟軒市聲幽鳥㡬相呼指㸃前村認有無初見江山懷子美更因樓閣夣姑蘇慣看渡口飛桃葉細結籬根䕶木奴蹙得錦囊多少句暮歸傾倒九淵珠題質龜軒百歳纔容山鬼知九淵那許季咸窺事明告我肯三瀆謀既協人何兩疑曵尾詎堪從太史刳腸猶歎漏神蓍試看左顧懐恩處莫記巢蓮睡足時相鶴軒别傳眼法定何如不用平平許負書貴客逢軒乗有分道人得玉食無餘鈞天萬舞知新奏華表千年識故居田屋老翁虧鑒戒伴鷄同放不知渠題籌筆驛流馬飛粮下蜀都卧龍曾此寫雄圖金刀有義輕三顧銅爵雖強視一夫鼎足山河終有漢鴈行兄弟亦忠呉當年若盡毫端計魏狗還羞不令無悦老堂厚蔭林烟翠一圍幽幽門館暗生輝行雲轉影月先到流水飄香鶯自歸碧玉已抽雲夢幹芙蕖猶舞漢宫衣山中悦老無庭榭白酒長新橡栗肥上亭書事自笑癡公日據鞍誰令生不近長安此條太樂非清職何物先生祗冷官背日潢汙猶鼎沸隔唇喉舌亦灰乾五漿不饋尋常客却作行人一等看題明逺軒聊能半日止游韁拂拂塵裾未滌黄山揜谿光龍脊㫁谷傳天籟虎風涼亂雲過眼不妨好細徑入村何限長獨酌苦吟清意在可憐禽鳥亦相忘題延賓亭秋葉春風自一村主人髙誼揖公孫未容急去須投轄却恐重來不置門歌徹曉雲歸曲席酒醒殘月照空樽何時下客腰懸印西嚮償君一飯恩西軒夢中得鹿本無心覺後人亡只見金水出吐蕃分黑白地窮全蜀隔幽陰枯腸正伴空城雀白首更為梁甫吟風歴北忩琴自動成文無處問知音同宋長江登江店唐氏山閣白頭記室朱顔令山閣忙來去却遲礙盡江天松不管吹平沙篆鴈應知思傾竹葉疑無分要賦梅花恰是時王粲從軍歸信近貯囊試看幾多詩蓬萊别島已駕神鼇逺翠埃外人休詠北山萊自無失脚劉郎到怕有吹笙子晉來雲散曉風飄鶴氅月明春浪浸瑶臺似聞方士窮真色歸笑長紅越女腮清泉館曉踏髙坡日始懸清泉未見口生煙飛鳬欲到二千里挾筴徒勞三十年綉帶長川初背眼雲根雙劒逺磨天驌驦齒健嘶風去更敢披頭重著鞭黑水館孤宦輪蹄消嵗月誰縁清賞慰蹉跎曾行軒户昔無處見在江山今得多雪色雲容通劒閣鏡光池溜屬天河本來一段真奇絶不肯闗情柰俗何浮春齋煙鼎金顔碧線長是中日日載春陽翠翰結屋驚鼇背綠葉飜波夢水鄉静晝鳥啼三月老路人風送百花香從它流出紅英去化作人間有韻粧遊羅園故山新寄小郫筒春事而今一半空兒女笑從花影外盃盤香在水光中泉分石溜渾罌白病得春醅半頰紅祓禊山陰已陳迹試将青草葄衰翁資州鄧園蒼官𢥠𢥠䕶重崗綠玉寒梢亞短墻春事鳥啼三月老路人風送百花香蜂衙歸去欄干静江面飛來燕予忙簿領堆中催白髪不知閒日許多長巴山飛雲冉冉隔層巒漲水茫茫失舊灣自昔秋風悲宋玉這囘夜雨宿巴山獨行雲嶠雙飛舄誰置壺漿一解顔世事人情隨日改不妨老子解癡頑中秋夜宿穆陵闗覊旅情懐不自禁清霜岐路馬駸駸一年明月最圎夜千里故人常别心幸有酒沽除是醉更無人賞又如陰寒蛩似識風騷意伴我凄凄到曉吟金牛道中龍鱗鳳翼阻騰驤仰首青雲自渺茫漢月滿衣諳客思巴音側耳覺吾鄉金牛有路通秦恵籌筆無功愧蜀王祗笑無成謾來往囘頭慙愧綠衣郎晩過銀山荒溪屈曲中郎篆白鷺叅差玉笋班竿日已移三丈外水雲猶垜兩山間石橋梅蕚餘香冷茅店人家晩夢閒幸自歸心過飛鳥不須循指示刀環江道中項沒黄茒疑虎蹲風揺脱木本浮雲忘機沙溆雙鶬逺小景人家一水分野寺鐘聲昏後寂寒衣砧子夜深聞急求賈傅今宣室誰賦傷讒屈子文谷滿牛羊路覆莎翠編終日倦坡􅀈寺依石角髙低見水遶山根曲折多風入長松零馬尾人藏病事設禽羅方壺海嶠知何處縱得飛騰柰老何興利山居江左風流恐未真南州人物竟成塵全家莫恨癭張醜四國且圖山作隣小漏天光渾失熱綠槐樹盖始知春柴扉晝鑰能髙枕一到華胥勝路人過邠郊歸蜀摩笄綠玉笋抽芽巻地兠羅栁放花蛺蝶團空飛錦繡葡萄上架走龍蛇河源曲曲無千仞土室層層有幾家脱得身歸銀漢近雲津却擬問仙槎過長灘尾劄泥塗賤此身手提鷄肋戀虚名蘆花伴我頭俱白山色迎秋意轉清沙軟馬留金褭印鴈歸灘列水犀兵尚能趂得黄花酒聽取東籬笑語聲往銀山深道亡寺觀暮投宿民居入谷清光寒刮眼逺分蒼樹遶樓臺急鏘環珮谿流迅晩下牛羊雪迹開山影不随雲影轉竹聲長作雨聲來野梅弄色何人愛空抱幽香沒草萊安溪岸草綿綿一葉舟野煙開盡水光浮寺連野竹微茫見溪出寒山自在流愁裏詩情随浩渺鳥邊春夢入鈎輈泉嘶石鼎新茶熟且為山僧更少留登城望江邊山外浮雲雲外城江邉羗角水中聲九分雪髪功名晩一寸氷衘去就輕山與繡屏天刻畫獸編土宇地欹傾早扶藜杖闗頭去要向中州看太平暮春泛舟涪江已把荷衣換釣裘不妨官栁繫漁舟提壺勸酒雖無意杜宇言歸却自由十里江風吹晝夢一川梅雨敵春愁忘機鷗鷺休飛去且為閒人更少留出茂州日落城空鳥少知戰場依舊昔人非雪花籠石商皓首楓葉滿山秦赭衣月入空罍人自恥塵蒙西榻客元稀窮荒石紐那生禹料得當時殛鯀歸又出差還茂州深入不毛何所負不妨老子解癡頑九峯自積十年雪八國猶遺六詔蠻楸帶綠垂蚯蚓直苔衣翠滴鷓鴣斑山前人事如麻麥却憶孤城日日閒
