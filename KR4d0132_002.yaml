body:
  text: 跨鼇集卷二宋李新撰五言古詩楊村四十韻欻行西山隈茄荻風颼颼隂巖有積雪竟日無行輈灘聲下層簷寫出千古愁斷墟燈火光慘月神鬼謳巇岑泣哀猿短笛驅歸牛頑雲籠遠嶠退水拓新州蟾膚纍石拳龍影臥松樛顧惟衰病姿畏作魑魅儔若有負郭田肯抱窮年羞昔懷截犀堅今成繞指柔况復僻陋地可是英俊遊山祠鐘送夜水國笛橫秋薄霧晨欺鬢斜陽獨倚樓眸寒碧冥鴻葉小沙際舟漁師獵魚去數獲惟芒鯫射生持虎歸熟視俱老彪時世賤兩目東家如寇讎長沙卑濕國洛陽年少留太白竄夜郎退之謫潮州才大難為庸不死即長囚官職雖差池志意相夷侔自匪遷逐客而有遷逐憂田塍古丈人來為寒士謀胡不近長安遠土終悠悠回語古丈人兩泪不能收從古長安兒俠氣侵雲浮十九白如瓠危帽鉗輕褠奚奴扶寶帶雜遝驂驊驑飲徹金張家醉留驌驦裘又恐銀瓶欹指撝營糟丘出閣訊花童如何為麥牟已不願學孔何時當夢周杏韀照金龜粉葉誇銀鈎緩急乘一障夜望秋山頭掃清玉門塵澄徹黃河流如彼行道人頗有挾此籌咀嚼蘭蘅芳蕪蘼梗其喉夜光有先容白日無暗投足錢便得已誰卜公與侯歸來揮囊金飽窮泉石幽洗竹十八韻誰倣王郎子庭前種修竹清隂生曉雲遠意近幽谷歲久太昏翳客來為湔沐掠地芟蒙茸揮空除朴樕碧篠惡微瑣孤根賞幽獨惟防高節傷不厭冗材秃露枝借蟬附風幹貽鳳宿筠消螻蟻驚影淺虻蚋哭減裁終瘦骨瀟灑自空腹初勞揀擇手終入窮淡目月浪細搖金秋聲寒戛玉差肩存挺直亂眼憎拳曲洞然大夫心卓爾高士躅春風雨零紅林木霜換緑長久此君操正可起頽俗山隂牛羊侵渭濵斤斧辱持君易金錢伐盡猶不足是中主人賢不作薪藁束有酒作并引豫羈居遇春不復出友人孫侁伯遠送酒時以自遣率然成韻語野無倫特書所目耳富貴日厭意志願男子多饑寒一身贅奈此兩臂何有子立參肩於人猶負痾食菜色染顔肘露枯樹柯柴門曠賔從汝往張雀羅不粒尚猶可無酒傷天和半世友孫生斗祿才免薖割腹送名酒一飲衰頰酡弱子知有酒走戲如投梭鐡也未抵醉阿林先緩歌環守獨腳銼杯到傾長河我若不飲酒顧影已婆娑仰看頽簷日去去疾滄波過淨慧院曉披鷫鸘裘繚繞青冰陌高原回東飈草木負春色瀟灑竹間寺慰此流浪客溪梅薦餘馨林光動寒碧一寸經綸心長嘆念行役虛明齊道源泠然白疏通無一塵中扃泬寥生太古以上人齊居不三月水鏡冰壺身日觀紅未升緑瑣先知晨逍遙且齊物靜與鴻濛親如求漆園吏先與卜西鄰山居緑樹初浮光嘉禽自行樂廚煙續雲根澗水斷冰腳徜徉一樽酒坐看山花落日暮歸去來嫣香裛羅幕彥升索春暉亭詩豫昔登亭上見凡賦詩率比興於寸草如東野初語豫疑命名者意在春暉育物如慈母之賢欲彥升朝夕眂亭名必有得矣今無負於春暉豫是以有作也雕龍雛老師塊坐司莩灰東皇駕青車先動一信來咸池洗日光擁出扶桑臺從前幽谷根細甲亦以開百嘉各分榮差遍嶺頭梅玉壺花箙遲舒景詎可催河水澌液流暖意何限回要見物化工無處求枯摧晴暉最浩蕩氣律浹九垓慈母融和心撫弄從提孩明眸照封胡笑齒發老萊君求賦春暉世豈無鄒枚孝報日益豐但先植三槐冬北風多雪霜嚴冬無徑草獨有青青松歲寒能自保坐歌鳳凰曲心馳千里道歌聲徒繞梁誰知此懷抱南至日過鹽埧官亭墮衣黃楓香著鬢青霜濕江山如故人到眼類長揖客行先飛蓬不肯擬馬立時節當書雲相將何太急我本芻牧兒家有舊蓑笠勤心朱墨間銷減耕耨力欲歸倒虛囊追赴村社集傳言東鄰翁但空西向席梨栗隨所有大白更增一勿復問市朝與翁醉終日蕎麥神農播百穀賜羌荍麥種下子分苦甘甘賤苦蒙籠西山律候晚春種夏苗茸秋花深入雲風浪綺霞動灌溉以時節牧放遠原隴歲登蝸負歸兔徑行錯總積架連雲根藁秸亂墟冢赤莖墮叉股黑實盈缶甕鋭首師郭尖駢結友張仲一身多模稜四角腹膨腫舂開鐵屑飛磨澑塵粉凍溲和陶甄手灰火助培擁劑堅眂鐵石薄厚擬輕重不問鏡月圖行至齊眉捧杵窪新炒香揉以牛羊湩不托遞炊䴵芹美思貢奉來牟莫我貽桄榔尚珍送大宛來苜蓿與爾俱闒茸中都千貴人侍食姬環拱流匙滑玉粒雕胡不在供四海會萬珍方丈無㸃空戎獠犬豕性真可糠粃共有客飯黃粱渾忘夢中夢春日雜言燕麥詎可食兔絲那為衣重絺不禦寒野葛難療饑綈袍脫有意豈得全身歸一飯責相酬北山寧採薇妖桃氣濃暖蛾眉困風光楊花撲羅帳春夢自悠揚愁心如碧草隨春日益長碧草逢秋歇此恨何時忘雜興燔肉茍不至何暇稅冕行一日廢禮經不如無此生相鼠知拱手寒暑不變更威儀特文具衽席為亂萌蔑知聖人意但以口舌爭如彼為肉者死即五鼎烹醴酒偶忘設於禮殊至微穆生引身去自昔能見幾陽橋慕香餌豈知為禍機楚梟集叢灌斬伐猶不飛復有陶朱公去國家亦肥五湖拒扁舟我信無所歸四除延月魄空庭零露滋西風獵黃葉蕭蕭辭故枝前日秀春陽詎知雕落時反側孤衾裯早寒先自知藁砧山上山刀頭杳無期無乃逐新歡巧畫雙蛾眉妾心南山石生死竟不移辛苦行君採北山薪妾捕西溪魚登山莫避險入山深何虞君行妾亦行辛苦同朝晡相樂成家室此義千載孤古意虎頭自食肉何在識一丁五言纖巧詩便歎當長城讀書髮早白不讀鬢晚青窮邊物蕭條鳥雀下空庭雖亡好事者勿廢草𤣥經無分清濁流殺爾投河伯無結死生交一死生便隔模稜不失事禍起分黑白百年過逆旅今是長安客嗟來吐食死漂母愛王孫等是乞憐人一飽何足論東方老先生笑傲忘至尊朔饑侏儒飽且用長短分野人孤鶴姿與雲相伉儷百禽相和鳴了不關鶴意彼美靚閨女窺户欣客貴復有琴心挑中夜駕車至詞章燦星漢市門甘滌器竟使誰病痟野人却歔欷日出東南隅日出東南隅照見城西途出門履冰去荆棘殘人裾洛陽繁華陌車馬尋芳客欲往從之遊青松淡無色安得鄰松心投君千歲隂憶故園杖藜出北郭山阿延餘暉屏營立高原霜飈吹我衣牛羊稍絶跡聚落燈火稀顧我豈無家廢置不得歸大田已蕪沒故丘人亦非終當問遺老何如丁令威
