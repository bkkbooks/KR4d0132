body:
  text: 跨鼇集巻一宋李新撰賦癭賦王孫異疾兮癭喉刺咽强名宿癅兮吁嗟礧然領如蝤蠐兮乃增胝胼繫若匏瓜兮亦寄而懸類稟中和兮氣凝以偏病在腠理兮我尤山川重將覆臆兮墮將委肩其大如缶兮其小如埏是物也不分貧貴不擇庸賢汝潁之士兮軫若為之醜江漢之女兮憎爾敗其妍非唯嚬笑之不適抑亦喘嚊之相牽思操刀而一割顧生理之難全類駢拇與枝指於幹軀而有緣繫之以瓠蓋已過矣署之於木則奚慊焉胞抛既可資兒戲枕枕尚可期妻憐世詩有妻憐為枕枕兒戲作胞抛之句王孫兮胡不自惟而又何怨乎天者耶蛙賦逃虚西山兮徜徉乎叔皮之方池冥師濯原隰之光兮少女靜林樾之枝偶萬籟之初閴兮問淫蛙之奚為悲耶樂耶曷汨汨而無時鳴其類以為才耶或其處之非宜豈疾痛而呼天兮抑懐憂而增悲漲其腹以怒兮騰眦目以俱裂將引吭而效鼓吹兮復隸官而隸私居士曰興考槃之歌賦衡門之詩引澤畔之吟咏北門之薇士不得志故嗟歎之鳥鳴常山孤雉朝飛杜宇亡國秋猿號兒物不得平哀也無期意者動吾天機適然騞然而不自以為勞倡者自倡和者自和而不知其為惡四隣結蒲藻之好一國幸泥沙之託往歳東鼈等蘇秦之徇前日丙魚參彭越之臛吾大非鯨鯢兮免京觀之築小非鰷鱨兮逃竭澤之虐吾身不登於俎豆兮志已忘於溝壑泳坎井之隘兮同鈞天之妙樂據釡斛之水兮謂東海之莫若時跳梁莫予侮兮雖強聒焉而無怍紓情賦并序元應季年得子字以奏雅度曲已終而後奏雅奏雅君整麗秀發生八月而卒衰宗墜户不得聞韶濩之音使奏雅君以殤夭其母追念之極自言非特磔肺膺腸且潰矣會元應冬十月行縣􅀫樂至池夕夢奏雅既覺涕泗滂注起呼燭體騷以紓情荒山絶人百蟲靜匿月逗光以入帷露乗倪而霑席一榻蜩蛻四支樛梧情通幽而窅窕氣合漠以紓徐夢遇亡子為樂只且其始見也翩翩婉婉負青陽之葳蕤趨而即之皜皜炯炯瑩素璧之晶輝薦綠緹之重襲柎絳綃之輕衣若孤鴻之姁而來也若良瑜之溫以近也目之翦明濤也膚之劂層冰也蘭之蜎如秀以發也珠之的如粲以潤也不知何以得此於桑樞蓽牖間蹇莫究其所鍾也於是畏渴命乳􅀈笑指頤攬所玩以戲廋或含睇而迎之音全孤竹之妙章隱霧豹之奇顧予貧之傑出獲至寳而心疑既歡焉若平昔又焉知其鬼迕謂偶耕已有伯直授詩詎無宗武繼阿戎之酬客骩添丁之應户童烏可與談𤣥惠連定多佳句爾固譏夫騂角羌輒譽於珠樹將誤徵於鳳毛特置疑於梟父何物老媼生此寧馨敢言起家幸逃祝螟方指示以之無冀或傳於一經彼悠悠之黄穹迺昧徳而弗靈畀盜跖以鮐背趣顔淵於雛齡密攫拏於尤物曷吾兒之適丁豈彝鼎大吕宗廟之具置之虚野肯安其所輿御藻黼歸之侯府匹夫服乗誓將去汝山之東西將相攸宜深丘大壑龍實生之惟其有之是以似之念蹇德之何堪兹慶弔之相隨自汝之化汝母沈疾惙然枕間六十九日千觹解結莫闡隱憂日約永辭往偕汝遊蓬萊神人挾汝而飛越海乗煙丐汝而歸黑風羅义誘汝而逸訴於上帝得汝則息化為芝草母成本根鵕䴊長往阿閤奚存汝未能言孰懐至恩吾甚痛夫無和緩以起疾悵楓香而返魂者也已矣夫情竇難窒愛源幾潯六合九泉之茫茫走長夜而焉尋騶隱見以非時雲出沒而無心百珍均藜藿之飽一漚窮渤澥之深等椿蒲於旦暮貫彭殤於古今則翁之夢已覺而媼之疾庶幾其可瘳與四言詩祭先農皇帝親耕耤田以先天下也帝先農功叶曰惟孟春載耒與耜昕及南畆叶穜稑薿薿以布以種帝躬三推土膏雷動百工比櫛其耕澤澤嵗約有年裕帝之徳我藝我黍我歛我稷叶為醴為酪斟酌吉禮吉禮既至神􅅘来游燕及祖考萬邦作休降福孔穰飶芬其羞於以正辭亦又何求五言古詩送髙執中赴文州楒林兩眼追霜鷹鐵石懸肺腑何為向北風送子淚如雨平生珍古交及今未多數相逢漢江曲聊作蘋鷗聚我疾子不憎人棄子或取莊舄尚資越茅蘭植當户坐與斥鷃爭秋蓬塌雲羽甞笑禰正平飛毫賦鸚鵡身為机上肉手復亂撾鼓老瞞畏口實假手待黄祖早知時不容歛板就公府社櫟名散材長年謝斤斧文豹皮為災安所逃繒罟我亦懲禰生嚴律繩步武閉門收舊學不管脣舌腐子今落窮邊武庫泣降虜過客無隻輪捷布恐旁午黑雲壓孤堞殘月走夜麈四隣遞隂風隔壁嘯乳虎非但飲徒曠愈覺詩思苦參軍新婦賢眉頰生媚嫵慰子遠行役舉桉頭自俯已聞富書囊到即充棟宇異時寳弓劒棄置賤如土承平諸將老誰復師尚父可憐高閤生落筆輒杕杜宛然瓊瑶姿寒光照𤣥圃再入烏衣曲觀者但如堵襄陽佳山水檀欒結隣塢蚤晚折簡來為子脫簪組送李能擷蕙仙人洲日下舞雩歸晴光濶天宇羃羃祥煙飛旦起修羊酒來觀石麟兒刮眼玉骨異無用金絡羈長楊獻賦去英譽嵩少低俯署神仙聽親植桃花枝走馬秦樹側濯纓錦江湄春深小瀛洲西湖生緑漪華堂富花氣春酒歌白眉彼美南方秀移根天之涯幽巖蔽嘉卉芳姿長陸離誰如古工師來採窮民詩雜言二章送栁愼徽赴道州教授荷衣老長官擁紬呼衙晚黄閣有造父伏驥起編棧廣文局如水何人檄慵慢豈無同升公空谷飽藜莧寄書獲我心正須衡陽鴈白髪柳夫子政是柳州孫譚經能解頤經綸出其門彼美蒼梧士紉服得蘭蓀抽身朱墨間初知儒者尊報國直以人不類一飯恩山中多散材著意採蟠根送崔生斥鷃意自適舉俛歡一枝安知摶扶揺乃有萬里期鳴鳳困高岡愧此腹背衣我無瓊蕤漿可以療酒饑一稅西南風勉從黄鵠飛送万俟持正三首棠垂千里翠冠拂九重煙夾鬢紅霞斾揺龜淺杏韉酒醒思鳳語惆悵落花前東湖春水歸湖上主人去紅塵舞衿暗水面空落絮明日悵孤風長安在何處高歌聞白雪美味熟醍醐解印懸虚橐鳴鞭指上都倚樓懐舊德目遠認平蕪別莫倩赴茂林三疊陽關聲兩行鉛水淚人方入荒陋天或我遐棄雪山鴈不到音書何以寄和李卿新軒宦情魯酒薄自意能久醒窮年太常齋那得有夙酲將身侣記室碧鸛趨華楹誤倒名卿屣目光如許青中臺獨稱妙九棘舊飛英徊翔舜嵓廊飽見重瞳明苦營便蕃歸尚顧昔管寧人言猶龍孫去就一羽輕新軒事隱几大勝安期生綠篠靜娟娟徙倚驚流鶯翠荷亂田田小盎揺清泠欲留妨召節趣起料繁纓次韻宋都運慶豳學成我昨行邠郊徒馭顔色欣周道日已遠猶復見仁人所挾一世舊至前豈無因載賡七月詩古風亦已臻如今天下士氣偉而多聞政成泮宫新要起後學勤加我以數年便與張范隣明當遊涇河即是泗水濵次韻九頂如故人要見或可期下有瓜字江一別長相思作客殊不惡何苦獨念兹吾宗此登臨未覺鳥道危白雲繚籃輿一線歸路迷且裁半隱衣令與蠟屐宜吐霧隔凡俗勝遊那許追我亦癯仙流詎堪逋客隨江山自美女生憎鉛黛施遐矚豈厭意所遇亦復奇峨峨青蟬冠嫋嫋紫金羈問公是中樂鼠輩何與知渠愛錢神論公有山行詩甲午九月十七日畱題太平寺秋飈弄寒菊老木踈空谷尫驂疲欲休征意元未足山行循桔橰澗走數機軸百年一局棊歘爾分半局當時不識字雙鬢今定綠作客寧在家無愁亂心曲結廬東城東疏畦界明玉鳴蛙等鹵部晚食自當肉豈須太樂丞清聖貫渠竹屬媼但酌酒與媼創高躅宗武但收詩清名銷五福他時尋此翁雲深駕黄犢有懐高執中危襟坐西軒綠牖浮曉光初疑故人來冷吹嘯踈簧春意已浩蕩寒雲尚蒼茫家貧食無魚但覺早韭香念我莫逆友失計臨邊塲定當何時歸共此白日長書韓生壁欲為洛中英竟成秦地鬼音書雲雁絶故園四千里望歸今不歸愁滿西江水次韻答西城王尉二十韻自慚井底蛙邊幅徒自飾行遇南山虎引首叩白額前後履尾者鮮不斃其側長嘯激虚籟隂風昏月夕裴旻抱弱弓蕭蕭失寒魄李廣落神鏃往往中微石嗟無食虎氣徒爾中區窄半夜欲編料當場浪呼索有力但足畏亡機尚可測正將餘生輕無乃狂病發貴身非千金保家空四壁王老恰如虎吞吐不動色過口雖幸免探穴反有得祗知抱睡難誰謂向牆迫新詩來相攻口語頗籍籍遭逢摩詰後騷雅甘伏役今雖不負丞固已愧仙職願交要忘年憎慵妨割席求逐松雲飛距容劒嶺隔詩成仍屬君南牕驚鼻息送劉尉斗南無兩劉弟子半分魯傳法得其人隻履便西去天章蜀家世生女如士虎我叔亦不癡最寳劉家婦道通而為一何得區文武子路冠雄雞初不妨學古西山厭魑魅造化兒并苦老者方謁醫少者遽攙舉碧雞金馬間遍我見諸父定當憐小阮指與稅駕所勿數大刀頭碧雲合已暮富貴鄙白首長安在何處古興春採中洲蘭秋採芙蓉芳芙蓉以為衣春蘭佩其香曉織比目魚暮織雙鴛鴦裁成合歡被副之君子堂粲粲桃李姿過時空自傷漢宫專使至羅搜窮洞房長虹直軒轅祕艷不可藏平時同閨子坐看鉛華光共解明月珠私結羅襦襠出門驅車去富貴無相忘良人遠行邁道經折羊腸五月日如赭履地猶探湯濯汗無廣隂赴渴誰饋漿去未定還期隙月知空床兒小莫應門妾身當虎狼峻岨作高臺日日永相望學僊在空谷不復顧榮名肯因入俗語易此高世情僊道竟寥邈癯身學未成赤松果安在日夕哀猿聲謂言冥飛鴻四郊絶網罟生命法朝菌羲驂莫停組山中豈久畱迅反無自苦倮葬畏禮法厚葬索衣衾金縷與玉柙五陵非不深萬寳埋幽光苦為羣盜尋上古莫封植棄之中野林上以飽飛鳥下從螻蟻侵人情遠臭腐焉知孝子心死者或有知自亦畏奢淫送劉前谿耀靈浴虞淵光屬朝夕池氤氲滿寰宇幽草無閒枝岷山玉嶺花寸根武陵西寒揺塞北霜踈影何葳蕤春意已浩蕩造物夫何為煙條凝淥雨纈彩紅參差下有濯錦泉清泠鑑毫釐佳人古西子徬徨水之湄蘭苕採朝露佩服良所宜凜然冰雪顔效嚬那可希江國日云莫無媒鬢如絲願言配君子獨立無言蹊誰獻常山根與之植龍墀勸飲安所求羇客比坰徐翁廬清聖殊不惡中之百憂紓癭樽但滿注一飽隨家蔬巻簾矚平野木影揺扶疎綠針麥刺土碧幕煙染虚田父老且耕我尚堪犁鋤勸翁日飲酒何苦多著書書成人亦惜酒至懽有餘王朝美招飲有能窺狗竇之語因作詩貽之校書隱馬隊飲酒窺狗竇禮法不見縛高軒一宇宙二王咤連璧小王腹如繡囊無一箇錢氣自秦楚富公子莫焚券婦翁幸銅臭往年數青蠅騰䵬輒尚口言我已投劾謂子不長夀本自植蕪蘼返惡芝蘅秀青蠅復青蠅勸爾一盃酒雲衢無遮攔鬼錄有先後馬糞多長者百怨不懐舊持此幾酸餘諸君相挽就坐上要車公老李苦春瘦元次山作友丐予乃諺之罷惰嫉游手孤獨嗟窮民聾盲本定業疥癩詎可親生事自破碎誰肯收頑嚚期期依馬韀勃勃根車塵眇者道眇者跛復有跛僎蹴爾既不屑嗟來猶發嗔色驕從墦間所與皆貴人氣微仆桑下會作山鬼隣七日不火食自斷無此身所以號道邊時逢怛隱仁子胥至瀧口從者亦在陳志鞭平王尸弦歌杏壇春不聞汩廉恥亦豈生顰呻只今趨權門偽不如爾眞盃殘炙已冷赤澤盈精神䑛痔嘗便溲不怕汚吻唇摩足拂粒鬚猥辱以為申軒然上車馬氣耀無等倫造請冒風雷謁吏訶叱頻嘗聞郭恕先本是先帝臣酒偶挽屠沽謂言等縉紳衣而龜紫章解而衣結鶉扶起溝中瘠便可席上珍定知節義者以故長賤貧幡然歸首陽不厭薇蕨新
