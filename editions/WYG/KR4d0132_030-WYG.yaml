body:
  text: 跨鼇集卷三十宋李新撰襍文樵對樵歌於途居士遭之聆其噫嗚曰孰為天地而令拘墟孰為隂陽而多慘舒羲農兮厲階書契兮權輿智力并噬兮吾誰與俱猛者叱咤辯者囁嚅禿南山兮作偉構如紫閣兮焉居鬼俯窺兮盜穿窬獵雲夢兮數鮮獲實九鼎兮膻㕑火未燼兮而號狐馬不勝兮人代車器未敝兮玉欹璵恩甫結而門户朱寵未殫而腰領殊予之樵兮何所虞朝游兮披女蘿暮歸兮宿陽阿樵兮樵兮爾奈何歌既畢居士意其有道者也始趨而即之曰某聞網羅不設則鳯凰來遊天象清明則野無滯歎觀生之容貌若虚意者其有所望耶其避地而逰耶奚自愚扵樵乎其生而樵耶其不得已而樵耶樵將愚扵生乎敢問所安生曰若知予之樵乎鄧林之茂斜谷之宻牛山之美梓澤之華實曾不賞予之斤楓楠楩橿櫨枒文襄檀櫚櫹杞梫栟豫章大而輪囷㣲而毫末修而拂雲廣而䕃壑予斧鏗然而其尾已焦矣癭不中規菌不中繩脆不可以為器弱不可以為柱鴟張其陽蟻腐其隂匠石之所捐絶椽楔之不足為用予旦不束其隰則夕伐其本矣栝柏雖小而有棟樑氣喬喬之材足以輸明堂予挾斤以過泯不敢議况敢戕其生以害其直與芳於林而困乎樸蔌蔽乎幽而不遂秀且將芟夷其左右保合自拔之塲以包含雲漢之章俾作新風雨之時負抱日月之光樵雖賤不茍為也充詘於樵無所望足猶繭于城郭非㝠遁於世者也顧予豈愚於樵乎衣食于樵而安之若命直自樂于樵也何為而得已乎不得已乎樵豈能愚子予乎居士間其語踖踖自失始執其裾命之曰盍從予歸願請間功欲移生之術於天下之相以其餘遺一道之使一國之守則賢不肖得所樵之功矣反振其裾不顧而去癡虎文昔過褒斜道遇獵虎者數百人上峻下􅀈麾衣服作旌幟擊鐡木當鉦鼔隘設罝罘道置穽機男年十五以上皆操梃以隨士彀滿以待殺聲動岩谷勇者六七人持長矛鷙莽翳以逢其怒虎一嘯向之數百人者乍離乍合麾衣服者失手擊鐵木者失器操挺者失便矢彀滿者羽箙六七人者辟易亡色萬有一焉歸而飲至則傷者扶憊者輿血汗霑衣計其得不能以償子縱觀其傍為之悽酸㑹有北客過而抵掌太息曰吁危㦲我善其術不以告若後有獰者苦無以敵矣自吾獵以来所得不可勝誌荷㦸出門而妻子滌釜望膻吾庖厭虎肉室厭虎皮窮南山之南空西山之西彪然有文者吾狗彘畜耳雖卞莊子之馳刺子路之徒暴周將軍之搏擊裴旻之善射權其精諦曾不吾若也且虎谺然而哆者其穴也塊然而隆者其枕也其潜其出確有常度將逰而索食則蹲踞于穴門之外眈眈瞪視復入而就穴凡一再重崖慘隂寒風蕭蕭百獸屏息始偝其穴以去比其歸坐宂外瞪視如初俛首而入伸其足偃然挾枕以寢吾俟其出穴之外實腐葉枕之上飴脂膠未即奠安而頷項之下稍稍不當其意則局縮磨利愈不快則躍而出哮噬輾踣而腐敗益合不可揮解退入而就穴則氣索十九矣盖虎之性決故爪毛有孔竅不欲有所攖拂而莫知所從受柔附纒著殆不似尋常見輙䘮魂魄扵是牙可劘鬚可編頭可料而尾可履矣三尺童子執寸兵唾手洞胷涊涊受縛凡吾邦之人能此者命之曰癡虎虎曷嘗癡恃吾有以癡之予毎訂之曰天下之士勇勝怯不勝智智勝勇不勝度鼓勇以奮怯者束手日用其智則勇者力怯智有時而窮吾之度無窮樂毅屠燕獨莒即墨未下田單之智固已在毅度内矣騎刼以勇来而田單之知得行項籍氣盖軍中一范增之智殆未有先之者髙祖毎置二子智勇于度外曠延嵗月蔑不與角草具設而增疑夜半歌而籍亡増怒則發背籍怒則自剄而髙祖之度豁然無所禆損兹豈非癡虎之術耶天一生水於北水于五事為知虎奚為其不知者與知則無類矣天下之勇幾何而不癡死也耶予可其說間為文靈泉老詮茶榜泥牛耕空寳山布種窮盡大千界祇這靈芽試遍第一泉無此至味舌根知處勝于乳酪醍醐玉塵飛時碾出山河大地汲取八功徳水瓶中已作蒼蠅聲戰退四天王魔枕上詎成蝴蝶夢要知下口䖏湏是㸃頭人惟詮公禪師云何住心是名說法便使千齋日赴也要兩腋風生大衆事還㑹麽幾入鷲峯雲自碧重㳺鹿苑日何長謝師訪臨已後為人不得錯舉元稹家奴河南黥徒子以下賤為元稹家奴事稹謹稹倚辦之使釐𤨏務薄有機見稹擢明經第中書判對賢良䇿第一聲聞甚譁舉足入捷徑自當無臬閡㑹宰相不愛貶江陵士曹稹矜才恃一時人物無我先者班班在臺閣我反後之膏火日入膓肚内熱求復進家奴徃喭之曰得䘮命也强飯自聊十口飽煖屬郎郎不幸先朝露奴昜主尚可如郎之妻妾子女何稹謝之居數月熱不解奴復徃說之曰衣食在身愚人所知奚暇議逺然駕人車同人危啜人漿思人憂尋常理也江陵士冠有可與成事者乎稹曰亡有郎諗監軍崔潭峻者乎曰未諗愚竊覘其人沾沾善人意必能當上心為郎計莫若覆奩中金以奉監軍脂顔面以奉監軍用則郎復用矣郎復用則天下之金可盡鉤入奩而他人之顔面亦將脂而承君矣野燒在山不禁爆背束薪薦廟要炙手可得耶稹黙然久曰古固有之商鞅相秦由景監劉賈王燕由吕澤汝休矣稹更念之自惟前日士良之仇老其齒不能報明日決意奉監軍摩足䑛痔罔不到長慶初潭峻入朝大被寵幸首稱稹才可用陛下不當聼姦言斥逺賢者穆宗入其語立詔稹還除祠部郎中遷翰林學士未幾進同中書門下平章事天下不多稹附潭峻得宰相而多稹奴能謀由非其道雖拏重權安知其非毒藥論居士有女五歲死暮得疾暴泄旦下痢數日困不食惟一味仰藥痢止食復進漸有生意精神修擢如尋常他日啟齒酬居士居士顧見斷間嶷若蟻穴念不治恐愈作梗三軰走醫醫言脾受病胃虗氣上蒸使然兹不足治居士曰見疹不攻是曲突不徙薪養虎自遺患遂不入其言有同舍毎稱秘竒方方不可傳獨可授藥一傅即瘥居士神之乞半刀圭歸嚴其法經夕而藥毒大作面色如地唇頥㼜然猶擊寸舌盡裂罅口不得外以薺苨菉豆甘草之類解之而毒不去病女不復語問疾增損頷之而已時自捫痛處而呻苦苦者再三宛轉四日而絶醫視藥云中有砒霜注按本草味苦酸有大毒質其人則曰誠用之亦不多居士始大恨曰誤我誤我我殺之藥殺之天乎人乎女浪生乎不得其死乎踰月悲不置愛不割咎藥益甚客過居士曰奚懟對曰懟不得其死者客曰菌之華樗之老以霜雪死以斤鋸死等死耳安用懟居士曰擇之不精慮之不熟夫何使吾女至扵此極也客曰藥之毒一夫嘗試之而已固有大扵此者安用懟擇之精慮之熟居士不過取參术以為良徹烏頭堇蝎以為不良生死自命雖不精不熟安用懟世有坐朝堂㨿威福種黨與以久其柄而擇之不精慮之不熟其被毒也小則一家大則數族有居端門職華貫挈銓衡以司命天下之士而擇之不精慮之不熟其被毒也小即一邑大則數道海内性命懸執政之手三軍存亡繫大將申令被毒人何止破腦磔胷潰膓出血而已耶甚則虐子孫逺則流數世此而不懟彼又何懟耶擇之不精慮之不熟其毒何止藥而已耶請居士志之亡用懟過李固鄉偶書唐識者為諌大夫諱陽城館為隠君子諱浩然亭孔子賢邾儀父賢紀季賢季子季友故書字而不書名賢公孫公子故書氏而不書字賢宰孔賢司馬司城故書官而不書氏賢夷伯故書諡而不書官夫賢者之名而不諱是天下無可諱者某宦㳺至兹竊念太尉之諱與其邑名同自漢到今千有餘歲學士大夫與夫走卒厮養逮其鄉之人獨不為公避何哉太尉名節耀史牘其忠義度越後世陽嘉初對天子斥阿母訶刺外戚抨屏宦官順沖質不永漢祚三絶䟦扈將軍利在幼弱太尉専欲立清河王正議蹇蹇迄無一人助胡趙媕娿使狂瀾倒飜而羣飛刺天於是國紀斷盡已矣天下事乃有如此者餘訓遺烈至其子復不肯立王而其女又能戒變以逺禍門生故吏亦守義不惑雖千萬世亡進矣噫橋𤣥墓下宜沃酎以過車峴首山中嘗見碑而堕涙終藉當塗之力薄論事以回天庻令行道之人知入門而問諱况如在之靈雖則無求于當世而好古之士或將有感于斯文年月日書書清軒居士之職十九野次治橋梁一日未歸則串腐貫瞪視厮役與之圍坐暮投清軒極有媿色祓除土灰友松隂竹光收召爽觀以求復其清而走傖老婢勃崒問家事新火相交智識不停䧟在險宅為清軒主人得乎哉軒之内無俗書書非俗文其来無俗客客無俗語浪聲潺潺流筦枕間聽之毛寒自然心開後之㳺歌安知不笑居士也㦲居士為清軒主人得乎㦲題瑞花圖李翁既葬其親欲廬墓左或勸以生者待養欲去之重不忍諸弟更進曰任灑掃之役有某職松楸之守有某約翁嵗一再歸古人謂骨肉歸扵土至于魂則無不之也父母天地也何國而不戴履葬之明年載家寓武信行年五十與物俱化四十九年之非與夢俱覺旦旦課妻子女共讀海藏書歌徃佛名字悉有經程翁所僦屋有花竹負幽憂之苦未嘗一俛首擷而玩之㑹有袁老子者過而指示其一駢首並秀蕚中挺出六緑葉色鵝黄類姚家花光彩射人袁以為瑞馳召工圖之翁哀其不得地呈露孤陋無賢東道作賦附翁集中矣草木脆弱旦暮委地惟圖可以傳贈數者羅公弼山鬼知一歲事過此不知也大耳通他心寂然不動則無所通也公弼屈伸數指五行十干引而信之言貴賤夀夭竒中明驗十八九本儒家者流而為隂陽家流以道德性命之學而窮刑名度數自妙而入竅宜其術之髙而取名之多也司馬季主隐扵卜筮君平為人言忠孝以此求公弼則得之矣雕龍譚天其放為幻譎曼倩射覆其餘為詼諧以此方公弼則似之矣請子倒金過而問焉䇿問制而用之謂之法推而行之存乎人有天下者嘗患乎法之不立法立矣又患乎不得其人而行之此後世所以企古人為難又悵治功之邈也皇上攬政六年扵此矣祗循前烈考古建極善者因之弊者革之潤色其已立者創修其未立者播之方册若掲日星則法陶然矣然議者猶以謂實利未加乎民而有徒事虚文之誚今欲有司百執皆純明篤實之士曉然知朝廷立法之意推而行之使斯民均被實利而無徒事虚文之誚將取之以何道試之以何術願詳著之以待上問而發焉
