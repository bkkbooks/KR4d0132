body:
  text: 跨鼇集巻四宋李新撰七言古詩歸美堂妙齡通籍金閨裏三媺垂輝分鼎趾君恩至重論報難烱烱臣心罄歸美太山深根蟠厚地嵩華連鼇隆國址黄河一曲一千里初自崑崙薦繁祉龍馬負出卜世圖玉敷萬葉春有餘走問南箕天永久莫計後天難老壽中和賡入頌聲中明堂布政知無窮當時五章寄天保而今三祝增華封籌筆驛惡潮翻海真龍泣未央庭露秋蓬濕崧雲無意招不來旌旗日月隨山入茅屋主人長臥揖盛氣虬髯横槊立漢陵白骨生春光半夜平懐聽呼吸筆端隐語飛英畧潛拉秦原老鯢角天心不肯續金刀渭橋水急妖星落武功驛留題霧捲馬蹄塵自起東風送渡咸陽水故園花木緑成圍猶向關中見桃李聞道春前雪最深行人僵死薪如金羲和不肯為日馭潛入北海分幽陰長安今過何曾識此度劉郎老於昔終南入望眼長青渭水飜波心更赤只今身在選官圖夢守么么五十餘衣輕躍駿美年少愛爾平時不讀書項羽廟平生虎力鼎可扛憤氣不作咸陽降江東子弟累千百誰知國士元無雙一夕楚歌四面起伯圖未就人懐邦自古功業有再舉何不隐忍過烏江過垂雲亭西風吹秋落山谷霜紅換盡煙邊緑垂雲門冷一事無只有庭松與籬菊白日蘭堂一局棊百年閑事無㳺絲山僧更勸黄粱飯真似邯鄲枕上時飛仙道中鳥銜桃李墮髙卑陵谷逢春花作衣猶憶去年攜小筥上山獨自採春薇澗流到海住家處今我無家何更歸修途老來倍酸苦晚雨一絲愁一縷曉征春事太半無未盡蜀天已秦語仰㸔鴻鵠向南飛笑殺鴟鳶争腐鼠廣都道中作萬花織籬凡幾曲繡屏處處圍茅屋家貧張日無羅幕東風吹開莫吹落居人應笑行客癡春去春歸殊不知過東界雲浮山腰末之頂水穴青崖浚于井孔明不死吾其歸左衽豈宜蝤蠐領羣羌負藥倍車載螺齒錢丈束嚢癭得茶便重不便輕肩突駝峯猶外屏石碉設嶮鳥鼠智銅鼓銷聲犬羊靜入門蹲足唤煮茶嚼鐵相甘苦荍䴵東陂珠槃出海山崢嶸滎陽城東春水生路沙䧟車沒馬脚行人避沙堤下行箇中人利魚芡美輕舠細網晨縱横烟雲瀰茫水面闊鷗鷺不管機心萌齒繁九州無曠土此地何得無人爭我欲決水界畦壟萬頃畢種淵明秔黄簑大笠趂春雨日與老農来勸耕出塞城頭落日黄雲起斷草飛蓬滿千里紅塵一騎踏髙回半夜驅兵渡遼水馬蹄行盡闗山月燕然山下沙如雪負戈淚落暗吞聲煙隴悲笳共幽咽我皇有四海何用窮元㝠邊人縱戮盡亦是吾生靈先王修徳懷四夷梯航重譯歸無為不使城南征夫怨三春折盡緑楊枝訪幽人紫騮揺玉東城東緑睂少年雙頰紅掃塵先過風騷客豪氣幾吞雲夢澤新詩一夜急春風飄落櫻桃㸃忩白青烟晝覆琉璃罇何時投袂歌王孫歸去來黄陵老鴉啼日昏登牛溪嶺岷峨潤眼長可人清江水緑如九親水光山色不相送自涯而返情太眞别車驅將向何處到此已與魑魅隣投荒哀過三良死可贖人亦百其身題月山亭山如偃月江如玦我歌驪駒與公别出門大路礲砥平何得却言新徑捷新徑無人可問迷荆棘勾衣馬蹄折急行先到決不疑大路知公笑人拙巾車和鑾長中節緩綏脂轂循安轍此身逸樂無踈虞五里少休十里歇一遲一速勿復論只將大路指兒孫西軒雜言風琴牛笛難度曲早韭晩菘誰當肉筆端畫餅不得飽汁少熬雞渾未熟三年楮葉太勞力八尺鼓圍竟空腹遥遥華胄猶龍孫皎皎白駒縶空谷頭風豈無草檄愈醬瓿正須太𤣥覆供書小吏腕幾脱免冠毛頴髮仍秃年來軋思倒挽牛逃虚僧社髙如秋乞身得此清涼國不減人間萬户侯打剥牡丹大芽如繭肥小芽瘦如錐我今取去無厚薄不欲氣本多支離緑尖墮地那復數存者屹立珊瑚枝姚黄魏紫各王后肯許闒冗相追隨姬周祧廟曾祖禰主父强漢䟽宗支昔人立朝惡黨盛敗羣雜莠何可知一母宜男竟衰弱豈有如許寧馨兒吾懼生蛇為龍禍又畏百工無一師故今披剥信老手如與造化俱無私明年春歸迺翁出空庭還閉絶代姿風雨大是遭白眼酒炙誰復來齊眉衡門一鎻略安分幽谷待賞幾無時寄根王謝自得地燕子歸來汝莫疑飛將老翁望封竟無有自是翁骨生來醜猿臂懸知不入相且有殺降聊藉口翁今逺孫骨雖瘦不解射鵰能飲酒自漢至今太寂寥何得遥遥紀華胄尚方侯印只方寸豈有鑄金大於斗為翁力取置肘間令翁千歳無恨顔樂園假寐鵲聲去復回蟲絲長復短江村石枕冷一睫春夢斷明朝騎馬且重來日遲更為楊花煖麻姑楓樹隔雲香桃花千歳紅朝飲瓊華臺暮燕蓬萊宫翠鬒垂緑烟霞裾藕絲重明月落空山那得人間夢手甲鈎長玉芽薄不墜髻鬟愁綰約入門騎鳯出無蹤洞外寒聲悵孤鶴梓潼張孝女七盤小阿張孝女廬墓三年竭酸苦揚塵篩土秃指尖墮淚漣漣等秋雨領長鶴脊不勝衣手杖半銷縗百縷彼蒼者天呼不聞那知此女行髙古路行多少忤逆兒已後令人重生女我哀怙恃今十年不及增培一坏土俯首廬前有愧色劓刖情知無可補問女膝行日幾曲哀聲雖㣲動嵓谷夜燈熒熒慘苫屋神鬼同愁鵶伴哭冬夜有感蓼蟲常食苦旅鴈自知寒談士惜巻舌將軍解愁鞍雪霜滿天冬夜永地爐無火青燈殘功名富貴苦不早一年百日紅塵道西還故國無故人憔悴少年心已老讀書當許萬户侯豈意却作蘇秦羞深取閭閻薄徒笑魯人不識東家丘吾祖謫官還舊里㶚陵亭尉猶低視少卿偶作匈奴降隴西士人慙姓李由來人世輕不遇文章第一空徒爾俛出跨下何施顔當時悔過淮陰市夜深氣射青雲霄此生早晩當乗軺彈冠舉手揖豪貴行得紫綬牢結腰本是壯夫志幾成兒女曹平生重恩義聊為寄風騷送杜丞鴨頭未換秋谿緑漲水吹沙亂泥玉孤城雨過星斗稀曉起為誰歌别曲江臯人散空鷗鷺飛截長煙斷寒素當年珠珮更悠悠岸草黄花重回顧細㸔錦嚢詩字字杜郎生得真男子太尉國風偃如草丞相家聲清似水八月涼風來吹斷浮陰雲風檣急轉望中逺明日東苑生清芬送范秉彛東風吹起原頭緑墻暗萋萋芳草縟舞筵輟按杜韋娘旗亭便聽金衣曲石城山下路回首不堪顧灼灼小桃燃蕭蕭踈雨暮錦岸海棠烟重㝷已四年新班慶蓮幕舊鬢愧華巔市橋萬縷森森栁玉勒錦韀快鞭走故人半夜洗牛頭望載濡唇百壺酒須臾還上鹿頭嶺道入猨猱怯分影槐陰萬笏黄閣深沙路歸來定重省後生不乏樂職詩幽處西南恐未知吏部門人宻無數但慙駑馬煩鞭笞天邊鴈翮已光華試睨銀鈎㸔草麻夜直蓬萊得歸晩照衣金炬長飛花縱鑿城南溝常有河東鳯青嶂入髙吟行臺集佳夢宦遊無定居相逢又相送送趙伯髙北忩玩韋編窮年見三絶持文鬬時英勝不待口舌以此起門户鶺鴒同好音何物弟兄賢令人笑書滛車中瑩連璧世外無南金當時聲名卑賈馬嗟今位出稠人下我歸政欲質經疑禮失尚容求諸野争名國寄涎蝸角得少失多人不覺渾無鈎距肖子都大有詼諧勝方朔平時出山遊錦官馬蹄踏君門前道江長舟自横逕荒人莫掃不須苦洗霜根髮星星復出如秋草龍華美酒賤如水一酌令君變衰老送鞠彭山丹輪隨待十三州青𤨏文章汗馬牛喜見錢塘山水好卜居為有荻花秋年來遊宦無覊束要醉海棠西入蜀侯門不慣撲車塵猶憶畫堂紅映燭未易池中甘索寞乍屈數旬聊自託牛刀行割武陽城夢魂已到天章閣鞠之大父亦宰武陽其後擢天章閣待制勸君强作岷峨客莫念鳯凰煙景隔歸家重倚望湖樓依前水浸吳天白送菜徐安叟清非太常而有三百六十齋貧似庾郎而無二十七種菜日食萬錢竟虚語不糝藜羮時可再一杯㶑灧飜緑波作客不妨窮鼎鼐大兒咀嚼等太牢小兒飲啜甘沆瀣青青染腸形於色阿騖渾無食魚態聞君亦有釡轑聲大本須煩一車載何苦厲聲責妻孥乗興可能來訪戴送時仲西歸掛書牛角來東都短小不長五尺餘龍章鳯姿蘄見用回叱關吏身無繻志如秋鶚氣如虎整束衣冠詫齊魯膏油繼晷不識眠虀鹽充腸久味苦爾來試擬觀國賔執筆四顧旁無人劉蕡射策不中彀何蕃如家知有親不平豪憤四五載虚老身姓三十春杜門讀書破萬巻終教此道淳乎淳行行雪霜寒凝野侵星據鞍跨羸馬妻子評郎被褐還玉柱機頭差不下但誇舌在終可圗肯向明時慙達者送栁愼徽赴道州教授何以送之山前月千里隨人光不滅何以贈之嶺上雲出入無心疑似君何為自此陽城逐邊老日髙快便腹次山曲愛道州民昔日亂離今太平後來賔興無短瘠帳裏先生猶七尺送犢鼻褌與任敦夫任翁何為窮一性共癖左不妄取芥粒甘似西山餓短褐結郭絲犢鼻詎穿破當時北阮貧矯枉幾太過肯揭長竿頭恐亦是竒貨豈惟宜躋升抑自利頓挫濟河不擷褰秃尾正便坐遲行少前跋趨急或後簸刀尺初與形蟣蝨已相賀平生馬鞍間髀肉已稍磨此既身之章十年共起臥必以孤裘易顧我應難和子賦從軍樂城壚始煩癉服之逺行邁百步無一蹉爾來玉泉老以此勸勤怠猶憶當時庾嶺前傳衣正是普通年問道未餘衣下事寥寥千載不相傳送吳使君西南世家無十族吳范生兒長食肉虎頭犀骨初長成閉門教草三千牘傳來舊物凌雲筆楷字君王無第一墨池染盡俱拙人柿葉學成幾失實聞道甘棠陰已宻相共政聲同一律玉壺盈尺不消氷清峻照人常慘慄歸侍安車幅巾叟石建板輿憐白首二年贏得倚欄干醉㸔紅梅霜雪後草𤣥故人偏嗜酒試􅂸黄金追百斗芋魁榿木的然成丙穴郫筒依舊不行舟牽挽由來有十倍青衿折楊栁未容學舍鞠園蔬歳月用陶燕許手駑驂無取休推轂二十四蹄肥苜蓿近時牙頰惜春風吾曹易效窮途哭予宿承徳日夜苦霪雨擬金筌賦六韻呈陳居中黑雲䟃􅑗陣巋麓女媧補天伴天哭結愁起坐函丈間祠禴除門繡黄犢書冊入眼萬花纈石泉氷腸河九曲市頭老木昏鴉歸屋角赭山瞿麥熟胡村水平已可渡軟屐青燈循昔路後期詎能數甲子希夷長年耳不死嵗盡行縣歸示時雨五府辟書如齧鐵八關炙手能令熱山梅何苦要先春清艷更多終欠葉貴遊結懽過美酒不問賢愚皆可口粃糠簸揚在米前雞口差池落牛後迺翁活計真么麽欲掛冠纓猶未果一歳山行今解火百巧百窮無似我贈術士羅公弼陂逈山空谿水淺騎牛信牛行自逺大翁織笠六銖輕阿母理衣簑直軟短􅐟呌雲無曲終年年但見巖花紅何者為榮何等辱牛飽歸來睡亦足識字無多浪得官出門車折舟風瀾當時牧牛無許事初信人間行路難羅生邂逅孤城角細數直推期命薄五福無有六極全四字干頭三字惡逆知大似他心通元辰空亡那免窮壬癸是非終可畏収拾人情稱晚貴我家幸有石田在夢裏歸耕心未改季咸再見應茫然壺子而今藏九淵謝王司户惠紙被霧中楮皮厚一尺岷溪秋浪如藍碧山僧夜抄山鬼愁白雪千番沍墻壁裁成素被劣繒綺故人聊助蘇門癖經年鼾鼻吼蝸室睡魔已作膏肓疾蕭蕭散髮臥南忩腹稿未成空費日小兒惡寐驚踏裂村妻手線自縫宻幸無寒泪泣牛衣却有春温借光逸的知非布誰譏詐沙汰襆歸安足訝合歡若繡雙鴛鴦出門便有連城價世外浮華雖自許錦爛珠光變為土落日南柯一夢回斷雲流水無尋處聽王子定吹簫水花浸鬢根荷葉踐衫色西城王老子豪健不可得客從日沒來鶉衣遍黄埃銀盃未羽化公餘煩一開山猿供嘉果書螢驚蠟炬能持白玉簫為作蒼鸞語涼飈助清奏雨脚揮殘暑臺邊舞鳯拍雲來潭底吟龍撆波去君不見寧王當日争門迎三十六宫學新聲玉人今夜教何處二十四橋空月明西城煙景何踈索王子宦情殊不惡有田日種黄金茅叵奈蠧蟲揺齒脚少年英氣無覊絡浩唱髙彈神自若春風走馬入花林紅日垂頭困瑶閣老去腰支便矍鑠座人那肯妨詼謔飛觴得似少年時西忩幾度燈花落陳蜀州黄鸎哺兒驚不起蜂子飲花渴瓊蘃日長燕語踏簾鈎栁絮榆錢撲流水紫霧五雲斜掛壁夢破長庚海天碧不乏當年感遇詩定知光焰三千尺細香繞熏白玉爐長生酒滿黄金壺爐煙直起射河漢壺酒滴滴如明珠祝公富貴薦公壽夜煑振靈晨進酒上皇方倚老成人自問天翁借商叟别島花深燕未闌瀛洲春老尚餘寒似聞延揖真仙侣乞取人間不死丹懐酒清聖濁賢莫區分一入愁腸功等倫石爐三日不舉火麴車過門齒生津松忩草𤣥亦已勤好事勿謂秦無人呼兒但滌牛頭爵正恐壺榼來繽紛凍消講舌流冰凘寒破笑頰生紅雲愛酒未減子猷竹豈可一日無此君謫居無田種秫米忘懐有詩上嚢紙鄰醅不隔一航水却隔醉鄉三萬里王中玉生辰瑶磩桂楹香霧濃貴人罷直承明宫髙樓内集慶生子酒面油膏紅復紅嵩雲入洛秋容曉水冷青洲蘭蕙小露蠲仙掌生寒光翡幄華帳飄晩涼虬電蜿蜿䕶飈駕吹笙子晉從天下泬寥緱氏空月明世間唯識王司稼野人薦公千百壽大椿骨健龍腰瘦紫芝老艾副椒漿請公倒盡長生酒天廟明堂遲飛棟杜宇數驚銅輦夢錦城雖好不如歸中散年來憶雙鳯石鼓寺晩歸野鳥音喧豗蒼欒翠轇轕冷光雪色陵雲端亂流江勢侵天末蒙衲老僧初睡美倚榻陂龍暗揺尾竹庵虎子呼未回石竈茶煙寒不起阿昕愛山定忘返我已興窮歸路晩悲風鳴鴈一聲聲眸寒更覺江城逺青銼山寺春去山鳥悲春歸山鳥樂髙軒一樽酒臥㸔山花落厨煙續雲根澗水斷冰脚山中不可留兮歸去來日暮芸香裛羅幕
