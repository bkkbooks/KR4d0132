body:
  text: 跨鼇集巻八宋李新撰七言律詩次韻張永錫待制留題通泉聚古堂及時𤓰李任浮沉畏景遊雲苦太侵環縣江流元渺渺參天喬木自森森七言妙語騰光焰八法新題冠古今聞道宵征最清處風翻旌斾月流襟送劉金部三首綺鸞衘詔碧霜林按部歸來聽好音卧㸔蜀雲山厯厯行遊蘭省夜沉沉柔桑平帯三川緑蒼桂同鋪百里隂天子虚懷求妙道肯令公負一生心煙老谿花幾堕紅髙陽閭巷接呉宫禁墻鐘斷翻新雨劍嶺雲寒想去鴻汴水波聲天地逺上林春色古今同行觀勳筞知多少河水安流敵帳空七里亭中酒滿樽野梅踈淡月黄昏可憐白屋西南士占得青春雨露恩千載誓言飛將種一生歸報豢龍孫年來佩劍人相笑寧立孤風晝掩門送元景㕘辟廱老年鶴瘠玉蒼蒼送汝難收淚兩行短褐尚存慈母線義居初割紫蜂房塤箎元自音聲協鴻鴈而今羽翼長别業未嘗收菽粟一家溫飽待文章送張君實赴制舉不用名矜自半千髙才十二許爭先乗軺逺道三千里下筆談王數百篇忠胆自能傾白日決科時似選青錢山城送别無他祝早屬登瀛第一仙送知府王大夫一笑行抛漢水湄野梅殘雪照旌旗啼鸎未與春先去歸騎猶呼雨自隨徃歲久旱公入境禱於鷄翁神約十日而雨下車數日而雨歲以有年干禄且優垂老姊宋庾彦達為益州携姊之鎮西土稱焉今公亦侍郡君逺來窮經自有起家兒後人覔得松巖石先刻寒生送别詩平生和氣滿襟春徃事飛鳬自在身風伯已驅天上霧鳯書仍起漢濵人一鞭草色吟青嶂幾刻花隂夢紫宸從此唐衢哀世泪為公無復更霑巾送權守解印趨闕欲挽行人入醉鄉殘春岐路日偏長花容貼雨蜂兒靜麥浪翻風燕子涼心計已髙劉晏幕恩波終戴召公棠去思正伴東溪水聽得潺湲更斷腸喜王子溫教子諸郎春鬢緑鬖鬖閬苑幽人為指南大率已經平子目未應更與阿戎談夜螢撲案光分燭秋水挼青色染藍的見松牕珠樹客碧潯龍頷問誰探喜孫伯逺王周彦逺訪晩聞佳客過煙城抛檄歸來掃榻塵連騎莫憂原叔病食鮭誰謂庾郎貧定因殘雪尋穿履聊覔江梅遺故人重與論文在何日自應乗興一相親次韻蘇必强見寄不知暗室鬼揶揄曽入魚鳬伴蠧書分背鴈音清漢逺動簾風竹故人踈小桃煙老三年樹白馬原空百兩車消去泪流氷筯若待憑濁酒一樽餘再和憶訪東坡舊隠居飄飄兒姪幾家書閉門草牘人誰識抱膝吟詩客自踈枳棘那棲雲表翼壺漿爭勞雪中車窮愁定笑江干尉瘦骨空長六尺餘燕走馬少卿口號冠蓋相逢好駐鞍况知北陸已迎寒詔歸未覺堯天逺星應休辭蜀道難欵聽話言敦夙契更催歌舞奉清歡慇懃莫惜通宵醉歸約松梢月影殘和李少卿見貽之什碧江青嶂冷飜光水鏡氷壺照座涼舜日有時琴自動鱸魚何處鱠飛香竹開細尾攙先出雀引新雛底事忙老去得為裴度客舊來頻過鄭公鄉和任普州冬至日作詩成椽筆一何工元有英聲妙洛中已是少師扶日手更㸔公子釣鼇風書雲寳筴開新瑞脱木香山堕晚紅經濟通才猶補外與騎星鶴問圓穹答李丞用其韻四時秋色可春回古錦囊空信短才紙尾依隨丞不負天西窮絶客何來頑雲垂翼山碉暗喬麥饒花雪嶺開投老播流情味惡孤城移作望鄉臺年少文聲許過秦仕塗便失自由身初思鱸鱠飜歸興不見仙槎却問津道德千言遥胄事文章萬丈當家春魚從丙穴如收得更與張華細辨鱗謝楊秀才恵文編漆園夢過感天涯坐客元非借齒牙小杜阿房終是好沈郎雌霓不容差豈羞東郭先生履行謝闗西孔子家五斗折腰聞道晚未窮摛藻勝春花寄鄭明舉香手匀沉實伴蘭蓀著壁青煙未有㾗掩鼻新來憎甲俗佛衣無處避膏昏不成亂臭須持棗却恐偷生誤返䰟寄語山間鄭夫子年來懸麝厭當門代張元老上許漕人在坤維久覆醯故教使節出天西後來武庫成清職平日家風歸品題欲見流錢凴馬䇿稍聞刮膜待金箆鴒原曾冠仙鼇頂應覺人間太華低文章摛錦已堆胸直指威聲俯仰中蜀部星髙千幛靜平輿龍起一淵空閱人妙學函明鏡飛鏑清心本素風垂手汚塗收醬瓿為憐識字老揚雄青石阻雨茅屋隂多麥化蛾西山雲重雨流禾未聞回也改其樂觧道虞兮柰若何身與前村孤堠逺泪隨流水一溪多文章生世元無力半歲邊城伴枕戈隠居伯鸞翠構元臨市靖節幽居最近朝事過自餘安水石客忙何至走漁樵價髙少室仍休問徑捷終南更易招嶺上有雲如可寄肯將台鼎換簞瓢龍水板橋院送臘溫濃萬井同筠輿猶走萬山中曝成枯菜依簷白染出春衣映壁紅掩豆豚肩仍歲儉傳觴釀甕幾家空不知新歲招陶否待向江干送五窮普通院而今漫叟正聱牙無復新詩頼碧紗行馭乗風方少快歸期破鏡儘從差月頭漸黑山雲􅂒雨脚更斜江路义寒士規模新宰相這回行處亦堤沙東津淨行院老於春事無交涉退作淘金榻底沙蠺到兩眠方健葉柳成三倒却飛花小桃漲浪堤㾗潤緑麥飜風燕羽斜不得毫釐稽古力起人松竹問誰家留題華嚴壁直向忙中得少休一生縁分屬清幽好山不許尋常見野水從教自在流種竹養茶雙碧重有僧無客四時秋當初著眼如低下不識光芒射斗牛書梁山楊氏亭壁騎馬黄塵本不知作新軒榭發幽竒纈雲山色屏千曲繡地花光春四時滌器詎須能賦客力書自有起家兒心肝嘔出無空處一宿相酬不廢詩遊寂照院萬箇當時几席深想揺寒碧䆳隂隂青山甚富猶藏石焦尾曾收更愛琴籬脚稻花香遶夢雲梢桂樹色分金他年寂子如更變佛法從來不離心寂照院道人築室不草草燕壘蜂房斷有才細細轉泉縈屋去踈踈栽竹放山來琴無殺意客何憚士怕移文車自回清夜不眠留遲月譟天耘鼓急如雷遊雍熈寺隨身刀筆快投空黄鵠憑君放出籠野馬已飛樽俎外白雲端在笑譚中太平老將辜三畧遲鈍參軍得五窮近日半聾并半啞莫將佛法問龎公遊化城寺山色從來不世情水光分與萬家清連雲種竹官租薄入谷收茶野屫輕小雨結縁留俗客好風吹夢過江城這回勸飲休辭醉後日西山第幾程遊雲門山寺宰官得度却無能直斷曹溪一㸃燈脫體化為牛馬走隻身歸是水雲僧晚煙破竈迷村落桴鼓譁空走稻塍弄水㸔山元未足半規初月上觚稜再遊雲門山寺筠馬梯空正肉飛山幽鳴鳥自聲微地趨玉嶂新朝眼巖織天花欲墜衣雲木綢繆青羽葆竇泉零落小珠璣重來且與㸔華表秪恐無人識令威暮還官寺新雨初平萬頃波移家歸去舊煙蘿三年鄰里定相笑八斗才名豈是多地近聊為分袂别酒醺閒作扣舷歌晩投方丈雖岑寂客喜談𤣥自見過宿青城板橋寺村落蕭蕭煙雨收鶉衣寒䜿挽歸牛平生脚力未到處當路貴人安肯遊蹶失馬蹄無限恐荒涼僧墅不勝愁北窻季弟還知否一夜秋聲已白頭春日自錦封歸寧過寳巖寺曲檻横橋盡落梅春風草木自承恩一身初逐斷鴻去百里猶餘殘燒痕回首錦谿花柳市那如山寺水雲村鳴騶喜色知多少白髪雙親笑倚門過江遊靈泉寺徐卿才力已無雙幾日飛書約渡江岸石有紋欺錦繡野蘆無數認旌幢酒投渤澥難招偶詩築長城欲受降玉麈清談更通昔定容寒月半侵窻遊法濟寺俯檻微歌猛虎行暮樓鐘鐡又錚錚好將石劔磨三伏自有巴猿報五更種竹養茶家計薄依山臨水國風清張王左道曹劉戰秖此祇園不識兵暮鐘曉磬雜啼鵶尤覺幽棲與市賖風力吹回千嶂雨柳隂遮斷一谿花蒼皮樹癭何妨醜横水橋虹不厭斜夜半春雷亂車軋不須鳴鼓助驚茶大佛寺留題緑篠寒松小翠微魚聲寂寂皷聲稀山頭逺見龜屏出海嶠誰遷石笋歸欲得鬼神添嶺檜却愁風雨斷天衣醵錢欲作翬飛觀一鉢無妨厭蕨薇感貧女天然素質勝鉛華一握青絲過老鵶信手畫眉成柳葉移盆貯水當菱花長憂夜雪侵肌骨不識春風到齒牙媒妁近來趨勢利終年元未適良家送姚深之急向空花認此身莫因宦學苦傷貧遲遲海菓未成子忽忽荷衣㸔作塵玉有細疵那覺病谷俞玉切無雌虎自生春還家少皷男兒氣麈尾驅牛笑煞人鐡山祠成二首千嶺分崗一嶺西一峯驤首萬峯低仰㸔木杪樓臺小猶聽雲端甲馬嘶暮角回風吹落葉曉暾籠樹轉寒霓要知血食無窮處隂壑藏雷水遶谿縹緲團空翠一圍叢神社鼓日相依隂天幾處㸔雲陣夜雪何時化鐡衣鳥䑕莫棲新蘂殿風塵從染舊龍旗門前汗馬蹄飜玉猶似當年力戰歸賦鄧士載祠髙鳥無餘弓自除由來名盛不堪居易揮道左降王縳難弭朝端謗篋書更欲平呉功未就可憐出蜀智何踈鳯臺山月知寃魄夜夜停光照故墟磁釣翁磁釣翁寜傍釣磯且當兀坐小盆池模形陶氏不須恠入手蒼鯨未可知風雨不渝端此志江湖歸去定何時閒惟秋水磻谿客船入蘆花笛卧吹無心不自任公子手引龍魚敵萬鈞瓦觧弟兄驚墜甑塊居煙雨勝流人非闗釣譽雖攘臂未欲垂言却巻綸更與甄陶一坏土鈴齋相伴豈無因跨鼇集卷八考證第十頁前五行曲檻横橋盡落梅梅字出韻因無别本可校姑仍其舊
