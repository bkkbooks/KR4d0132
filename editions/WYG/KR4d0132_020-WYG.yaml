body:
  text: 跨鼇集巻二十宋李新撰書上翟户部書某愚無狀前在蜀校尉考滿誓欲築室青都載千巻書杜門却掃沉酣厭飫而後出重念三世儒其業不售到某始饕餮齒仕列又欲急得朝廷一命薦之堂上為婆娑老子桑榆晩晷之光捐此一事外即無有他志漢水在此某不食言奈何素廩于兹行再見春矣其初心自以簉縣功曹幸不為權首模稜隂喝容頭過身事必因人以成而簡書獄訟雖有過失亦因人以免時時登髙賦詩弔古遺迹以表暴於翰墨間悵望舊都而知髙祖之興王徘徊廢壇而想韓信之拜將求士之堅忍如張騫者賢良如鄧先者而從之遊挾筴趙壹之臺下車李固之墓往往感發名節不知涕泗之横集瞻彼原隰即考求曹爽張魯戰鬬之場諸葛牧馬養兵之地當時之井竈次舍營壘軍陣歴歴在目過亷谿讓水而善范栢年之對右眄駱谷左顧褒斜經牙門府署躊躇四顧則思嚴震馬勛之忠義愛温造之威畧尋張徽王彦休之惠化李大亮裴度之開府詠歌逸事以作新江山之秀此其志也㑹歳大祲障梗不得遂荒政之謹賑給之役水旱之祈禬官事沓沓恍惚病憊生意蕭然若於是時訪古懐逺真為大僇瞀亂不曉世故也曷可爾爾伏惟閤下易使者節雍容漢上拔識寒滯振起衰薄文雅道妙見於精神之表小吏濶疎數侍座末承服教晤欲竊緒餘之論紉緝補綴作一段竒絶以終其志是亦不負其來也至於成就其聲名使及其老如上所謂桑榆晩晷之光者事在閤下不在某也上王提刑書某歴耕山中知春穉秋斂候雨雪之時不時螟蠈蟊螣之有無為終歳喜樂憂戚事筋力未大成不堪秉耒耜即肩芋羮豆飯早晩饋田土伏臘有黍釀豕炙一身飽暖遑恤其他父兄油然詔學書意識偏傍與門户充縣官役足矣而同舍有忍酸辛信空夢濶視虛名為有必得之術行欲與知人家國事某内訹其説去而東之率然落有司沙汰中調今尉幸緝熈日久法度完密中和保養四方而一夫失職親於民者起視左右無刀斧徽墨可忌而畏或不噤其口且言之當路當路者起視朝廷無妄斥逐與築塞肯言者且列而疏之故田舍子益不内量乃欲分辨當否刻畫狗鵠窮盡小識以取衆人指目果得盡所欲言曾何益成事耶自念從仕日淺耳目所聞睹有户絶之弊有坊場之弊有盜賊斷獄之弊其不便於民者炳炳也宴方丈者慙咽李之飢醉酒漿者悲向隅之泣而名卿才大夫何得不為失職者慮耶何謂户絶之弊且世之人為身謀者為其子謀也占熊羆之祥設孤矢之具祝廟鬼掃先塋孰不欲有後耶推穰苴之轂倚張禹之牀丐善田覬美官眷眷為其子樹立也帚聚箕斂銖求寸積胼胝其手足焦爍其思慮錐刀之得不以與諸人借菽水者相而授之為其有子也百歳後不可諱則倉庫牛馬有定簿管鑰雖寵奴幸婢靡一毫之得者為其子繼也今不幸至于户絶耆隣守門官吏據堂括出籍入恐其死者目未暝而一簪不得著身法雖許葬送齋供之費給付近親或令得財産者同為營辦縁法止許給財而不及葬地故牽文之使不敢摽已没之田俾户絶者穿鑿甚者妻不得祔夫子不得陪父松楸墳墓一抔之土無非官有兹法之弊也夫封樹皆古之制而掩骼埋胔漏泉之所先安有太平赤子而不得尺地以葬耶此誠可悲也何謂坊場之弊葢商於海者不寶珠玉則寶犀瑁商於陸者不寶鹽鐵則寶茶茗持籌權衡斗筲間累千金之得以求田問舍大婦烜簪珥小婦曳琴瑟茲商賈者所願也漁於海者志魚獵於澤者志獸勅婦姑滌錡釡羽毛齒革夕登於俎茲漁獵者所願也蜀婦守丹穴白圭觀時變雍脂濁脯乃至蔵鏹千萬人人願以為陶朱家家願以為猗頓利所在者冀必得也今承買場務不幸至於敗闕一年無人投收狀而體量之官背項相望絡繹道左其保明供申不過指人煙指商旅指道路謂人煙有疎密商旅有多寡道路有僻要交馳文具徒虛語耳一日敗闕之家生事蕭替逋欠委至追胥滿前必不得已則傾餘釀售法具以逃旦夕之責甚者離室家質血屬投哀乞憐於親戚故舊父子昆弟非喪居凶歳而戚戚有不保長年之色譬猶出力重負計百里而止日之夕矣重不得釋從而益之主人鞭其後以進是則實封投狀百里而止者也亟改者不過以實封為罔民然不問贏虛耗息而代者自至今立額大率髙於買名而好謀之人目敗者為覆車踣馬之戒豈不籌其不可耶是敗闕之家重負終不可釋也法有以減定額錢問見沽人且添二分錢止防見沽人欺紿而官吏舞文雖他人承買亦以添二分錢為率則是前日之體量減價為未減也故擅一壑之甘守已遂之業即規從末減錢數輸送其夤緣巧倖愈不可究上下結密共成一網欲棼而理之者殆不勝其勞也何謂盜賊斷獄之弊且天下强吏少良吏多强吏常令法在我良吏常以已殉法在我則人畏殉法則已畏與其已畏寧若人畏良吏之不及强吏也明矣鈎曲傅致逆得事情神明之斷出没胷臆間牘背之示掣肘之惑屏息不得發果畏其强耶强吏之為强惡姑息耳今法有按問欲舉條其情有不堪憫者例得減等法意務本忠厚而為政之實何可惠姦今盜賊率以此相慶而良吏定罪狐貉輕重引避失入之罰至謂袁安不以贓鞫人而吾曹希牧守望宰相何苦分外按數毛脉吹求疵垢煅煉束縛致人於不免耶是攘秦人裘拾楚人弓取髙廟環匿子卿羊掠士衡舟舉獻之氊類盜也一切得原免甚可怪笑借使乙為盜甲緝之物色其人而已獲贓證乙勢既蹙盡暴其所為是甲無適而不為盤詰訊問乙無適而不為能自首服此風決不可長立法者之弊也吁豈人人强吏而能尅懲之歟往年朝列有爭姦人之殺其夫者妻不當減其議不合即緘噎以去天下不如人意事何止八九耶楊素曰癡人欲了官事官事未易了素真知言哉閤下入蜀求民之瘼且留情於法令一紙形容霄漢間援蒼生於淪胥某何憚而不發耶近時廣收常平米意非不佳也議者以數年之糴紅腐相因而西南亡有水旱之變不可以厚積某度閤下一出則此事便已可人易曉而易聽從已而脂轄叩卭蜀隨處輒罷彼固執者距至是耶雖然士之可與晤語者衆而堙伏下微泯泯亡先容多言則為躁大言為狂言而不當則為妄某處之不疑矣上李承㫖書某叨冒元祐第閉伏東西蜀二十年始再遊京國徜徉四顧公卿士夫間念無以文為意者因口其心景其時也遂束書以歸又十二年矣復一來且邊夷下賤絶無知識猶能以十日五日一風一雨卜知中國有至仁今某之來時哉不可失也矣重惟某自幼至壯自壯至老未嘗一日廢書於書亦無所不讀下筆造語不肯躡沾前人臨髣舊迹自我作古書成亦不以示人愈自信不疑加緹襲閟重之私輒誓言是必有投合處決有愛其書因書以知我者不至覆醬瓿為卜筮之流編諸子偏蔽一曲之士去年春始以潼川城賞改官用非稽古之力家窶甚藉太倉升斗以活俛首外諸侯借令深相知不過以一紙書薦諸朝而已力量止此何能為也昔言道必託之黄帝書託之孔子曲託之李竒然後速售於天下可傳於後世某不幸屬在逺徼名聲不到中州將老而無曳裾之門生右文之朝而不克以文進天子聖學淵妙奎斗之文雲漢之章昭回上天輔以閤下髙明之識宏逺通博之論超邁不可跂及之才述作著黼黻一代之典垂播四海更相傳授以擬三謨九誥之作謂是魯共王壁間所得之書温潤渾雅秦漢而下子長愛竒卿雲翰墨不足多也某前日固嘗抱書以泣今之來豈其時乎所業一編副書以贄暮為閤下取則某之名聲旦振一不取則已矣没齒無聞焉將盡棄其學火書以歸終身不復上王提舉書某嘗謂呼於垤澤者化形置之莊嶽者變音是居移氣養移體者也公相裔也勝衣有官探穴有金宜其目雲霄而弗下顧朱紫於菅茅比數見公乃謙虛下客㝠搜人才雍容温潤如太學生折節如寒士是中氣類最耐富貴蕘指柯葉為非旱孟陽遊山寺不復觀風總使事舉趾恐不髙色恐不莊語言惟恐不簡而重謂位貌當然爾公使一道也相門出相則細故宜忽俄爾外補則民瘼何求比聞公一出曲問水災熟訪流民察役人之敝視給散之致皇華之光遍照原隰跋履䝉犯莫肯告勞所以推行神考法度勤且詳矣所以不負朝廷委屬之意亦至矣垂惠逺人博且厚矣伏惟閤下德宇恢疎智機澄靜陽春浸潭上滿赤澤前此擢除皆自宸扆易節換印不因人言行將遄吉甫之歸召晉公之入使海㝢䝉休豈獨私左蜀之人而已耶繼大丞相之功業世不乏人矣詩曰惟其有之是以似之願公多自愛無忌下吏之言上家提舉書某嘗聞前此蜀有佳士排時之蠧自謂折腰官時顧竈火之炎輒大悟天下事如是世俗之情如是我知之矣口其心曰使一日提衡銖兩不差直道無愧皇天后土實知此心他日持節私自為一道賀曰寒滯舉矣又自賀曰不負所學矣甫引其車未出國門而强有力者薦若人素所與游者薦若人盡一歳之舉不能飽其數而使者之心已忉忉矣既下車周流博訪右顧左盼仕某郡某之親也職某事故人之子也其里閈同出入其恩私宜補報者又復數人如築道周室肘掣不得施筆閣不及下將行而跂􅅉思慮膠轕不復敢有所主矣且聖人忘情最下不及於情情之所鍾正在我輩遂前日之薦終不飽其數以今日之見殆又不可違一不得行其道信其志至是而反曰負寒滯矣負所學矣夫以公舉以賢舉又何所負耶祁奚之不避親山濤之不避舊豈皆有所負耶果且有負乎哉果且無負乎哉亦曰君子之於人無所茍而已矣恭惟先生用儒世家以經術妙天下横經登席入幕曳裾春生郡朝風動縫掖而西南英流培養逺大屬目在公某時就師已能誦公所謂全章登三嵎望蟇頥纔兩舍風馬牛幸相及沐先生之清風葢有素矣為吏漢中守出納之吝其職事張廢實𨽻亷按正坐寒滯無一指之助徜徉四顧無親非故人之子無同里無舊恩特暴俚語敢以呈耀而文學誠下科不能捭闔揣摩尚欲窺覬新歳論薦妄意門下一紙書以先士林其人物之可否其能官與不能先生寄耳目于外某又何言故曰君子之於人無所茍而已矣干冒清峻戰越不已再上家提舉手書某件所聞見少禆聰明小官不守本分令人憎目有如此者死罪死罪自去歳霖雨雖薄害稼而上户所入仍蹈故常場圃未畢而榖價已小涌矣梁洋間厥田上上衣食為一路本源梁米斗金五百而洋州告飢其他葢又可知也溝中之瘠固非推而納之既無寇火兵刃使太平赤子指日月以待盡是終毋可念耶春秋諸侯相滅亡不書其由為齊桓諱以其力可救而不救則為桓公恥晉饑秦輸之粟秦饑晉閉之糴故君子譏晉夫行道之人力所不給其未死者聞其聲哀之而已其死則掩鼻以過理無足怪然在上者方且罪歳有力者方且謹藏而停藏之家方且邀厚利聞今洋州録饑民至三千人尚未即止謀發義倉賑濟而文法病之既未申災傷復未經放税則義倉決不可發想以是瘼聞使者矣且疾疫嘗起於饑饉今聚而無食疫癘一扇則相枕葄不早圖之後且奈何四路之民老死不出鄉井未嘗知有趂熟雖大凶荒無流民災傷不赴愬山東河北淮甸福建湖南北京東西與夫闗中陜右之人不雨則訴旱過雨則訴澇以至訴雨雹訴蝗蝝以求蠲除無歳無之監司不抑赴訴州縣不憚申請官吏不辭檢視奉行賑濟亦自有方為今計莫若委守令勸諭有力停藏之家減價出糶往時徐信道在成都榖價甫貴即文移屬部令縣令㩁上户所入等第均數置場立價委官出糶後數日而市價平矣此所謂揣其本而齊其末也夫朝廷愛養元元不為不至其不能自存則給之米其鰥寡孤獨又貯之屋其病者為設醫其棄遺則為僱乳姆立法之意固已近厚則稟而行之者要何似耶汲黯不卹河内火而發河南粟真得使者大體閤下講茲久矣如何上王提學書某不敏嘗歎博士倚席學舍為園士風墮􅂒論議不正而朝廷以三舍養士日考月書道隆德峻芃芃棫樸成薪槱之材青青子衿入俊造之板雖三代賔興之盛不過如此嘗聞燕樂亡蕤賔六律下太簇七均不合於古八音日奪其倫今大司樂攷中聲而用求子聲而訂澌鍾牛鐸盡入制作儀鳳舞獸行書簡編雖咸韶英莖之妙不過如此又嘗見列庭闕有夏之器享帝微大烹之具今草茅之士能獻至言為時薦祥與國增重象三公而列足通九牧而貢金元羮呈味龍文絢彩雖禹時所鑄汾隂所得不過如此某宦學不進僻在一邑覩太平盛典乃至算數譬喻所不能及而才力短拙不能作頌歌以形容從事末路風塵湮没無可言者恭惟閤下推賢樂善見於精神之表立教有方育士有經前日賔興辟廱㑹校獨此一道得人為多雅樂之作收召和氣而此一道惟吏與民氣平而聲緩登車攬轡澄清蜀部鎮靜不擾猶一鼎之重某既覩太平之盛典又事太平之偉人前日推行學制過沐論薦不為不遇也去替無幾日月云邁老大寸進亦有動於中者伏望終始提拔令得循資某豈直太平之幸民已哉上王右丞書某居蜀四千里外調官窮陬凡三十年齒髪俱化不接欵中州士人習成簡野念無一長可移人觀聽獨以文成癖且痼不可藥矣其位與貌甘自為人下至於文定不可以勢屈坐此窮困宜若有待也自舒王文忠公没寥寥數十年無有議文者士人亦不見以文命於世者閤下德望隆重方且建功立業河北之士謂是魏公復來片言之出鎮於鼎鼐人所宗仰不減舒王文忠公閤下在翰林時代王言雄渾温潤前惟典謨後無訓誥相金玊以為册㕘雲漢而成章琳函祕篆本神霄舊語飛落人間動為萬世之觀閤下在中丞時章疏之入中外聳動上回天機下斡地軸致士風丕變國體增重以平日所學豈特載之空言葢欲見之行事耳斯文興喪待閤下一言而決非獨某所私也夫自古好名之人多軋路而排進師鬼谷者秦不及儀故秦辱儀事荀卿者斯不及非故斯殺非學兵法者涓不及臏故涓刖臏茲六國之士何足道盛時右文邁越三代豪傑宜以時出富貴之地廓然有餘何至軋路而排進閤下試别録而用之以繼舒王文忠公得士之名曳裾雖多掃門雖勤真得一士則餘子避席而馳矣上宇文守書某嘗聞天地之間五行之大而水為之長百川之流而海為之宗故包乾奥括坤樞南瀲朱崖北洗天墟東演析木西薄青徐洪濤浩澣萬里無際此其廣也其極則崇島巨鼇峌嵲孤亭擘洪波指太清其中水怪鮫人之室不知幾千萬仞此其深也若乃宇宙澄寂八風不翔蛟蜃帖息魚龍恬嬉上下天光瀲灧一色可以察毫末可以燭鬚眉其靜有如此者其始則淋淋若白鷺下翔其進則浩浩溰溰如素車白馬帷葢之張旁作而奔起也如輕車勒兵六駕虬龍附從太白奔吞浩渺前後絡繹其動有如此者故李華賦之於前盧肇詠之於後始能狀其髣髴然竊以為在人者無以異於是道德之宏博奥衍有類其深廣歟文章之富贍飄逸有類其動靜歟當今明公乃其人也輒贄其説以為請見之禮茍以為可教而遺波餘潤時䝉沾及無使枯槁聖世幸甚上吳户部書某事公四年矣鳬趨雁列東階西序升降俛仰庭烏竇猘識其韡履聲倒板失謁龍鍾昏憊為老閽司賔所笑者殆非一事公貴人也坦夷洞達開口見心肺不以苛微責譙人故士樂為公用上賢下不肖使能不使不能韋柔脂媚無所復出鯁介弦直坐獲奬與故士樂出公門下雖支離疏之形哀駘它之惡叔山之無趾申徒嘉之兀止啼怖瘧千怪百陋公熟眂周覽求其形骸之外故士樂從公遊酆舒之雋盆成括之小才少瑜之非貴仕楊炯之止令長皆不能逭公清識某無善狀薦官東州人材從政炯炯在公目光中不知得何等品題自念初官及今有始相知而終不見知者有始不相知而終相知者有始始終終相知者亦有始終不相知者其於論薦也有求而得者有不求而得之者已老矣知其無可奈何而安之者命也夫士既樂為公用爭求出公門又樂從公遊且又不能逭公之清識况事之四年者不為不久矣其可置之耶再上吳户部書某竊念自庚辰之初得疾迷罔怔忡瞀妄謂白為黒一昔疾已收召精魄循省悵恨若酲之解若夢之覺顛踣摘埴而值清曉若乗安車而走通道始知國有是論議有正鼓舞再造此皆聖度涵容愈於天地父母生養之恩庶頑讒説堯舜與之並世至其能格則承為賔師庸為臣吏某之格也久矣伏惟某官智識虛明學術宏妙圓融和㑹與物無間自昔章疏取端亮純慤之名入蜀觀風布寛易近民之政西南人材收拾幾盡此某所以不敢以往疾自疑夫變荆梟之音以為良濯西子之汚以復媺磨白圭之玼以成器繩臃腫之木以為梁柱齋戒惡人以祠上帝起癃廢之疾以全其生鞭一跌之馬以及千里録功忘過以為至公之度茲古人博厚之意以取先生長者之號中和維掖更相稱譽以培承平之基以助太上之德某日夜仰望於閤下者葢在此不在彼重念某沉伏選調已二十年亦欲溷諸公薦士之墨幸今垂成閤下肯棄之歟若其學其從政其人物賢否目擊而道存之矣
