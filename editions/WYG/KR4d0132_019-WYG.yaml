body:
  text: 跨鼇集巻十九宋李新撰上書上皇帝萬言書元符三年五月十一日興元府南鄭縣丞李新謹昧死百拜上書皇帝陛下臣伏覩詔書以四月一日日蝕許中外臣寮及民庶實封言事者臣學闇識陋不能深明治亂之原謹條當今急務析為十事以應詔書所求伏惟陛下裁擇臣聞天不言示人以象天子繼天故應天以實行無用之文以弭昭然之戒循先儒之腐說以為古人之禮經其誣甚矣春秋書日蝕書之而已不言禳禬之事而左氏乃有用牲用幣擊鼓馳走之文書曰建用皇極謂大中之道不立則咎徵洊臻其傳曰時則有日月亂行薄蝕是也而古人乃有避殿徹樂減饍之事是皆不求其端而修其末不推原其失而狃習之臣所謂行無用之文以弭昭然之戒循先儒之腐說以為古人之禮經者此也迺者四月丁酉朔日有食之在畢八度夫日宗衆陽而象至尊四月正陽純乾之月也陽生於復至於已則陰爻盡矣陰爻盡而猶蝕明陰侵於陽是猶小人而乗君子之器不可以不慮也臣竊念陛下出膺寶緒乗龍御天純乾之象也朔一月之始也即位人君之始也天其或者警陛下於其始耶春秋謹乎始所以舉其終君子謀於始所以慎其事方小毖求賢以為助訪落謀廟而後行綸語之敷初自微以及著渙號之發亦惟行而弗返一設不當則舉棊不定再慮莫中則置器非安汨河之源而流卒於不清亂絲之端而末至於不理此陛下所以思正其始也仰惟陛下仁孝洽聞睿智有臨而更求已躬之闕失大新憲度刓去敝蠧而復咨政令之臧否欲分左右之忠邪故未即乎正殿而知親賢之為急欲明風俗之媺惡故未加乎元服而知民事之不可緩廣垂漏泉而懼上之徳澤不下究大闢言路而恐下之疾苦不上聞雖舜之紹堯中宗之繼太戊孝文之起代邸稽古願治之意不過如此而臣竊有議焉自臣結髮讀書彈冠從仕釋負薪之憂而索大官之廩者已十年矣目之所睹者信以傳信耳之所聞者疑以傳疑屬在遐徼叩閽未得流賈生之涕抱嫠婦之憂蓋亦有日矣丁紹聖有為奸臣擅命朝多忌諱殺身亡益而狂狷之論進不得吐退復鯁其喉而不得下見庶人之議於道商賈之謗於市則又與國包羞而懐憤也幸今陛下揭至公之路來直臣之口臣雖疎愚請畢以獻非陛下赦而容之孰肯右臣言者臣嘗謂方今之弊權綱不在人主貴任不及宰相朋黨之風熾臺諫之職輕士不素養而用師不素慮而出土木之役興財利之臣進西南亡備以虞倉卒之變内外相蒙而有衰微之漸遠士下吏不識國體繆悠之談欲以上移天意動悟萬乗午夜甲帳乙其處以終篇是非野人之芹則遼東之獻豕者也何謂權綱不在人主自古固有專之者矣政在陪臣則諸田分齊政在大夫則六卿分晉在房闥則拱手在外戚則䟦扈在諸侯則僭擬今之弊釋此而在宰相曷以知之臣嘗見其挾天子而報私仇摟大臣而生死之鼻息干雲端芻狗視同列臺諫斂袵道路側目方哲宗皇帝春秋鼎盛可與有為可與無為者也不於此時輔弼以仁義啓沃以道徳今日兵革明日祥瑞是進之以好勝喜功之心而萌夫驕汰之志則聲色之奉臺榭之樂無所不至矣是蠱人主而奪之權也此與夫言天子不宜登髙登髙而國耗不宜閒暇閒暇而觀書者同也且神考憲度利於民者不一元祐諸人變更倒易失之太銳既竄其身又錮其家廢置其子弟蹊田奪牛不已甚乎於是排元祐者進士取上第小臣得要官有可以逞憾借交者反復探導而躁競之士爭致其身非善攘人主之權者不能為也瑶華之廢哲宗皇帝固嘗訪之宰相矣禁掖秘嚴事不得聞而一言喪邦焉用彼相乃至設鉤摭以防民口引羣小以固本根恐其權分則虚右揆而無所薦㧞欲膠其權則植奧援而不恤公議黨已蕃矣而田蚡之除吏尚未盡門如市矣而欽若之子壻尚撓法作福作威塗人耳目尚賴祖宗法度磐固嚴密周慮遠顧而承平之人不敢變名姓以復讎養刺客以為用匕首雖銛利不得發盜賊之嘯不敢激民以首事臣恐久假不歸專之不已而堅冰之漸養虎之患虞在後日則是辨之不早爾昔吳楚七國反以誅晁錯為名侯景陷臺城以誅朱异為名禄山起范陽以誅國忠為名今天下嗷嗷亦必有指宰相以為名者臣願陛下收還權綱總攬在已賞罰之任名器之重雷動淵默出神入神端持太阿無授人柄豈惟天下之幸而亦宰相之重幸也何謂責任不及宰相古者三辰悖序水旱失時災異生變疫癘迭作盜賊竊發蠻夷不賓率以咎丞相丞相亦以不稱職上印綬乞骸骨避賢者路天子勉留之曰君上書歸侯印丐身謝事是彰朕之不徳其專精神邇醫藥强起視事以與朕共治丞相固請則賜之以養牛上尊酒不得已而許之則杜門省愆免冠待罪甚者曰朕未忍退君其審處焉則丞相自殺淮南衡山稱戎而公孫自以為無功居位使諸候有畔逆之謀平原東郡民多餓死而魏相亦以奉職不修致災害未息永徽中自三月不雨至九月而張行成告老焉熒惑守心而罷方進日蝕而罷王商問牛喘而内史以怪丙吉閉坊門而陷濘者以辱再思方今丞相殆不知此而朝廷亦不以此屬之髙堂鮮言務養崇貴曷與尸而祝之社而稷之乎稽考程案顧問鹽米曷與什已者游而若已者趨乎八座議事而丞相睥睨如以鵰挾則一切媕娿氣焰十倍寒熱自殊則模稜以求茍容伴食以希無責其間和事忍垢者又比比也始霍光謂蔡義可制故引以同職林甫謂陳希烈可制故援以知政若是而朝廷何賴耶頃者河北水災齧地千里蕩室廬汩牛馬老弱轉徙箱筥錡釜篳輅籃縷號泣道路州縣畏其聚而無給則更勸而遞遣占富人之田者未暇耕鑿而死者已十八九所謂賑濟之法第行空文爾自雍以西米斗千錢而京東西物價翔湧兩蜀巴漢之民採橡實屑木皮以充其腸而屋無尺椽突無燧烟獸游于市鬼哭于庭死者若蟻潰麻仆殆不可以占而記也朝廷曾不以此責宰相也宰相亦不以此謝而去也臣願陛下用鎮撫燮理之任專責宰相則天工人績庶幾乎熙而理百辟卿士庶幾其率屬此國家大體非愚臣之所能條布也何謂朋黨之風熾當堯之朝有舜禹稷契臯陶太戊之朝有伊陟巫咸文王之朝有閎夭太顛散宜生武王之朝有太公望周公旦召公奭宣王之朝則有山甫申伯方叔召虎之徒然不聞其有比周之歎何也臣嘗謂朋黨之原始於東漢盛於唐甚於本朝為患最大而最深者也方今其標榜曷止三君八俊其熏焰曷止八闗十六子其禍之起曷止李杜其憾之結曷止牛李退休偃月而經營擠報者累累皆是也背公死權佩劍相笑飴漆不能過其密神鬼不能窺其奧張弧於前設穽於後其甘如薺其裂如蝮笑間藏刀盃酒殺人者累累皆是也自古士植朋黨卒死於朋黨風俗薄於朋黨由朋黨而亂法者非一日也一黨去一黨興根株蔓延不可芟薀天子巍然其中為之證佐而已既排其人則反其言其言反其法變勢不得不然也且進君子退小人太平之本基可則因否則革天下之良法前日之士無賢不肖一切目之曰元祐黨詆之惟恐不力前日之法無可與否一切目之曰元祐法變之惟恐不盡逐之惡地禠職削階者五十餘人夤緣薦舉從而遷罷者又不知幾何人也始時讒媚之人為十九章以激怒哲宗皇帝和之者縵緯如織雖嶺南若人蒙罪以去迄今天下不知其由謂其有姦謀則昔漢桓帝之立止於殺李固唐憲宗之立止於殛八司馬不如是之甚也然猶明告天下咸使知之夫惡不可掩罪不可赦嫉之者與天下同嫉之也棄之者與天下同棄之也奈何執政者實以攻黨而反以罔上又以罔民者耶元祐訴理欲其改過不吝俾之自新捨此亡他意也日月之食而更則人皆仰之惡人齋沐猶可以祀上帝而含垢國君之盛事使過古人之用權者也前日設訴理所執政者取刻薄吏司其職抉剔案牘吹求疵病槩指而摘之所雪者輒報罷而詿誤者益張也是豈聖人記功忘過之義耶夫治道惡太甚見淵魚為不祥尅核至則不肖之心生疾不仁則為亂之心速况已湔濯之矣而復治之何也是所以闢告訐之門而長怨讎之府欲以此召迎和氣弭寧天災得乎兹朋黨之弊也且自古及今人不勝天人定能勝天天定亦能勝人此忠邪之分枉直之判所以有待於陛下也陛下臨御之始召元老于外咨以大政海隅蒼生咸謂直道更興正人在上而猶懼張權輿作坦腹之謠劉崇魯有掠麻之哭則人主疑之而不察昔小白問害霸於管仲曰任賢而不能信既信而又使小人參之者害霸也唐文宗謂宋申錫孤直擢而任之王守澄誣以不道幾弗免死此又在陛下待之以不疑而察之欲其至也何謂臺諫之職輕古者御史大夫次丞相司諫亞九卿皆天子得自除授非以時薦而時用之也非限乎資格也故名其居則曰御史府或曰肅政臺名其官則曰中執法或曰大司憲嚴其任則為風霜也端其本則曰綱紀也分左右諫諍輔人主格非心糾百官不如法如豸之觸邪如草之指佞勑容其批也詔書許其封還也裾容其牽而止也檻容其折而勿治也何者司聰欲聰司明欲明使天下之情上達上之過失以時而聞元首之耳目不壅蔽而亡飾非遂事之失假之以疾惡之權而實自以為助者也若人君自聖於不諫而宰相怙升沈之手以閉拒公議則臺諫之官結舌飲忠約時情以去就殊未免過屠門而大嚼立仗馬者不嘶尚可希片言之助以寵進君子沮排小人也哉然用之非其人則將據要津以自保而一切觀望假道烏府以為清要之津委靡備位否則懐怨隠慝席風聞以報其私而為之地者又安其說而不疑是非竒衺雌黄於匹夫之齒牙此被繡仗斧者所以不厭其心而至公之柄返困於倒持者也亦未聞朝廷以直敢養士氣而俯仰寵㧞與之溫言賁之禮物以吐其骨鯁開白獸以助勁力賜黄金以比精厲而區區言官猶車中女三日婦巻懐皂囊而伏蒲請劍寂世不聞其人矣亂之初生臺諫為虚名亂之又生臺諫為備物鄒浩以言立后事得罪中外之士恬於故常學為轅駒安於豢蓄容容日久一聞其風則或笑或駭立朝右者或目而憎之嗚呼古人之所甚易行今人之所良難知此衰世之弊而見於華旦者甚可傷也夫世無採詩之官以拾民言又禁之使不得言道無朝端之木以習士書又禁之使不得陳賢良科廢而人吞直聲匭函名存而士司冷局天子所賴獨有臺諫官爾臣竊謂哲宗皇帝强明疏通不待劘拂而曉者大臣專恣築塞言路外峻刑法以拒脅來者士欲全身遠害呼吸以終天年者亦不肯自投諸淵然而鼎鑊白刅若置之通逵付之士師考其疏論萬萬不中則坐之誣罔士雖死之日猶生之年何憚而不為耶近者陛下擢豐稷孫諤龔夬陳瓘等列之殿陛斷自聖知大協羣情臣願陛下每於閒暇之時旁採清議區别名流躬自㧞識不以付大臣使行私恩以叛公正而臺諫士自以為天子門生則効誠竭節於萬鈞之下而羔裘之正直晨風之飛集足以跨越古昔兹事體大伏願陛下不以為臣言愚而力行之亦社稷之福致治之本原也何謂士不素養而用古者開石渠東觀以論經天禄以讎書宣室承明以訪問皆天子自育人材平居無事養之有素一旦加諸上位使之陳力就列左之而宜之右之而有之以為相而廟堂無備位以為將而閫外無敗績使之昌言則真御史也使之居百職事則名卿才大夫也置之近侍則正人列之郡國則循吏其未用也則或目之曰此國寶此南金此清廟器此明堂材此千里駒人主振其侣若鵷鷺髙其選若瀛洲時雨之保護菁莪之樂育而巖穴幽隠玉彩呈露下僚英俊錐囊穎脫號為得人之盛而三館之士天子往往微幸其處處士布衣得占詩進見載之輅車導之金蓮使參鈞天帝所之游以激奬英氣故拱把之杞梓有干雲之志而一班之於菟有食牛之量或引之便殿訪以外事宰相所不知諫官所不言者借筯假笏得盡閒燕而内相帝聰日聞所未聞矣非養之有素試之亦有素矣今郡國庠序之地以家老圃大學敎化之原以宗游譚謂他時十科適增長浮競而日者宏詞又闗通權要其與選者皆近臣之子弟四方寒士才力雖髙奈有司之不公不明者何自丞轄而下府寺之要臺閣之妙至一牧守一監司遷除補叙出自權門天子頷之而已且管晏之智不可以方伊尹吕望伊吕之功不可以擬風后力牧騏驥千里駑馬十駕洪鐘百叩沙石一擊人之才器之相遠也非今日矣驟而談兵則括不可以將驟而用客則武陽不可以使司晨必雞吠盜必狗織必婢耕必奴其所以養之者乃求所以用之也臣嘗謂粹美王道粉澤治政卿雲黼黻以昭囘雲漢之章盛時豈謂乏人而代王言操帝制者詞氣卑弱反䘐國體俗失之俚輕失之誣粃糠我制度斷絶我繩墨所謂大雅溫厚之訓簡諒易直之文或近於嘲罵不幾於攘臂而捽之此識者所怪而流之遐陬適資外夷之笑也至於治河者以河決奪官奉使者以辱命削職廉吏十一貪吏十九民社之託筦庫之寄汚穢簡嫚吏議而去者略無虚日夫蟲莫知於龍劉累豢而畜之獸莫戾於虎梁鴦養而馴之士不可養歟亦不可用歟以楚猶多賢臣以衞猶多君子皇宋造邦百有餘年文物之盛比蹤三五非楚衞區區小國之比而一職之闕緩急擇人則天子假名器於近臣近臣斂恩意於私家大起寒滯之歎甚亡謂也臣願陛下養士以嵗月日與二三元老講論人物磨礲漸勸取其姓字書之屏風覆之金器舉而用之以為治世先務從民之望以新天下之耳目豈不偉耶若夫朔方節度得其姓不得其名歇後鄭五有其名而亡其實除韋巨源而朝廷解體用牛仙客而士大夫養恩房琯有浮虚之名崔湜無經濟之略是又人主不可以不戒也何謂師不素慮而出臣遠不敢舉三代近不取五季其間疆臣專封而割據山河如魏晉之時則臣不復借喻臣嘗謂漢唐之地廣於本朝而法制不及法制不及雖多奚為也漢興封建子弟大啟九國燕代有鴈門以東齊趙有常山而南梁楚奄龜蒙而有之荆吳擅江湖鹽鐵之利淮南總山澤之富諸侯之國聨三陲而控胡越天子止有三河江陵巴蜀雲中隴西凡十五郡而公主湯沐列侯之邑尚在其中唐列藩鎮以為輔而大厯貞元以後益更負横田宏正盜有魏博王氏盜有成徳朱氏有幽薊李氏有淄青劉氏有宣武吳少誠有淮蔡或一傳或再傳或三四傳或一姓或再姓或三四姓四郊多壘唐天子號令所通者不過河湟數郡是四海之遠賦之所入者十之一二已遠惟祖宗深鑑漢唐之失以立法詒孫謀而不窮内無封建藩鎮之失外無戎人侵擾之患坐而守此萬世帝王之業也以中國之實甲兵之利可以坐扑四夷而祖宗不肯輕舉而輙發者智慮深也澶淵之役豈得已哉方今用兵連年不解青唐順義散而復圍是得其地不足守降其王無所用之勞民費財職此之由永念神考之志謂羌夷驕黠為日已久侵暴我黎庶䖍劉我邊陲天威震疊欲待時而動舉無遺䇿睿謀神算臣愚不足以知之然臣竊觀夫積粟如山是取於民有制也宿兵於農是敎於民有法也志已先定矣計已熟復矣糧已積矣兵已練矣一舉而用之豈無成功也哉今廟堂之上倉卒造次築一城俘一級喜見顔面賚予四出使之拓土至玉門列張掖酒泉武威等郡如漢武帝時若是不知朝廷何以為賞也日者固常妄發救援行軍死地老師費財闗輔空困是皆慮之不素也且今叩闗請命未必不包狼子之野心而築城受降未必能斷匈奴之右臂而又契丹輔車相依縱觀勝負强弱之勢徐起而乗我此尤令人寒心今欲進兵亦未可釋甲亦未得臣願陛下遴擇良將堅壁以守少休士卒訓練加勤積粟邊鄙待時而動以追述神考之志所謂萬全之師豈不韙耶何謂木土之役興臣嘗論大禹之卑宫室不如堯之茅茨不剪武帝啓千門萬户不如文帝惜中人十家之産以禮考之天子之制有三朝有九門以考工言之夏后有世室商人有重屋周人有明堂其度如此而已治人事天以養體者亦惟如此而已洛邑之營止均諸侯之會不聞其為游觀之美靈臺之作止同庶民之樂不聞其崇私已之奉蕭何治未央孫盛之論以為開後世之侈楊素營仁夀裴矩之料以為必婦人之說諸侯黝堊大夫倉則楹不可丹春築于郎冬築于囿則譏臺不可為故阿房就而大盜興紫閣成而國用竭驪山幸而荒靈光成而亡以至鹿游姑蘇香分銅雀未暇風雨之避而招兵火之憂再行宫室之塲而增禾黍之歎者古數有之殆未可法也邇者月臺之造龍艦之制以般之斤工輸之巧晝夜雜作丹砂曾青之所圖繪香棼柱楣之所紛奕磩金玉以次第為步割龍蛇以飛走為戯陶甓倍於南山之土釘頭多於太倉之粟以鬼為之尚憚其勞以人為之皆知其不可而又繁飾服御增崇佛廬夫司農不能供無訾之求諫官御史未嘗有一言之及閹寺希寵則樂成竒麗以蕩揺天心庶幾荒淫不度顛倒裳衣以滋禍亂之芽而探矯命令與知朝政以隳紊祖宗之法者在旦暮也幸陛下繼統以清躬先天下黜淫靡之觀究支費之蠧前此者已罷而勿居則後來者宜勿啟也臣伏願陛下日慎終戒防微杜幾書無逸為元龜置欹器於座右仄席儒者而與之考古今成敗之由疚懐民力而躋之仁夀之域則堯禹之至徳孝文之恭儉亦陛下所常行而不為異者也何謂財利之臣進夫先王生財有政理財有義而論道者以謂不貴難得之貨使民不為盜說禮者以謂貨惡其棄於地也不必藏於己使養天下者揣本齊末厚於人而薄於己知所謂不貴難得之貨則雖借黄金白玉以翼而不能飛借明珠以脛而不能走非特使民不為盜而已也知所謂不必藏於己之意則家給人足猶吾之胠篋而掌握盈虛來如江河積如丘山不時焚燒無所藏之非特惡其棄於地而已也季道末世經營天下猶寒家細民務爭錐刀而有司之吝賢士大夫不敢輕議其失得則桑𢎞羊起而為公卿皇甫鎛進而至宰相財利之臣得志矣且許行以滕君有倉廩府庫為厲民而記史者乃謂倉有紅腐都有朽貫為富貴之美談王制又謂國無九年之儲則國非其國而鑿古者則曰鉅橋之粟洛口之榖為興王之資則財用之積散與夫取予之多寡果在於時君世主因事趨變不拾狼戾為有餘不强隕穫為無節求適於當而已夫以父攉子則必貧旦旦伐木則必微而寡婦之利童子之餉無非吾國與天下也若生之而不傷厚之而不困使之稇載囊負各滿其意以歸見於聲色此堯舜禹湯文武成康以來所以父母子民其愷悌忠厚發於詠歌傳以金石以至于今而不衰也方今利孔百出臣不敢徧舉獨指虐民之大者一事為陛下略陳之且摘山以為茶民之朝暮不可闕也議者以謂户部之計茶利嵗入不訾邊防之用仰此以為喉吻之哺故朝廷假其權大臣怙其勢而司其事者過桀跖之徒奉其法者行水火之政臣官漢中目擊其事利之所在民賴以衣食得之則生弗得則死未易可遏也而比年禁其私販五木巨械鉗首貫足考一逮十考十連百囹圄無虚刑餘半道而寃痛之聲至不忍聞夫臘茶之直數十倍於草茶而其罪惟均細民輕以觸法自昔然也今官賤其直以市園户不吾市者為私售酷其威以脅州縣不吾從者為沮法陛下試令諸路提刑司具斷獄以上聞則縁茶事坐者十倍其他也交通貧富貿遷有無商賈之職也茶事半天下則商賈不通商賈不通則闗市之征廢他司嵗計日朘削矣而又月計軍儲官吏之費嵗總侵欺失陷之數其所得者僅償所亡是所謂朝四暮三割膚肉以啖口者也至於縣官茍旦夕之譴則抑配良民以津積滯而他司按劾所不得與舖兵為盜賊之淵則轉寇良民以資口腹而有司坐視所不敢訶故每茶使一過則聚罵族誹思臠其肉噬其臍呼天而詛操矛而逐之何啻十目所視十手所指奈何朝廷益重而委之臣所謂財利之臣進者斯人之徒與陛下之遠民忍不聴此而矜怛之耶閭閻之疾苦此其大者如陛下以為鹽池之壊未復國用尤急於茶利又神考已施之迹不忍遂輟則宜求長厚之吏以補使者少緩法禁支計博買外許之通商則徳澤下流孰有遠邇耶何謂西南亡備而虞倉卒之變夫患生於所忽而燕安為鴆毒之懐壊防之水始於蟻穴􅂸飛之鳥肇於桃蟲故聖人於萃聚之時除戎器於既濟之時思患而豫防之今朝廷惟知備西北而不知西南之可備也且自威茂黎雅以南正古之南詔南詔西北接吐蕃北抵益州東北際黔巫自唐時已更臣而數叛閤羅鳯之攻雲南劍南節度鮮于仲通乃有白厓城之敗天寶中異牟尋與吐蕃并力入寇令其下曰為我取蜀為東府杜元穎治西川王嵯巔乃悉衆掩卭戎雋因陷三州入成都止西郛十日掠子女工技數萬引而南今南蠻種類已離而不合西戎道里自梗而不通其勢不能并一然國家晏寧日久兩蜀之民數世不見風塵之警白首休居拊子孫以待盡賣劍買書廣弦誦以竟日外户弗闔而無有犬吠行人千里而不持寸刅恬玩已久臣恐一旦有急則劍外州郡為蠻夷區落是入無人之境而莫之攖拂者矣臣蜀人也知之詳矣嘗見乞第寇瀘川董阿丹寇茂州上煩朝廷命帥遣將而飛輓之饋一方騷然今蜀兵驕懦不可使飽稻飫豕十九如瓠朔風正嚴緩步一舍已呀然汗矣萬一有變是決不可使也蜀之守邊者因仍徼倖計嵗月蓄香藥犀馬以去不問其他萬一有變是決不能守也以至有城池而無樓櫓有金鼓而無嫻習矛楯以脆昜良弓矢以柔昜堅甲胄爛潰而不復治障候弛沓而不復明萬一有變是攻與守皆無其具也比年峨眉蠻獠以闗市不平即包人民掠牛馬以歸兩林種至挈工徒鑿山開道直趨盧山以市珠馬為名其意果安在耶使之有飲馬岷江之志而吾兵不能戰邊無良守戰與守又無良具則斬狄山之頭據騎刼之兵出入自如蹂躪數千里之地而民畜為之一空矣臣所謂西南亡備而虞倉卒之變者此也伏願陛下勿以臣言為迂詔修守備益屯戍選清白知兵吏以鎮之斯遠人之福也何謂内外相蒙而有衰微之漸昔賈山謂秦以不聞其過失而亡故杜牧之曰族秦者秦也非天下也春秋書梁亡左氏言自取之也榖梁謂心昏耳目塞大臣背叛梁自亡也周之天下自夷王下堂平王東遷而周室遂微其亡也非赧王之罪也秦之天下自二世暗弱趙髙專恣其亡也非子嬰之罪也西漢之亡非孺子也兆於元成之不斷東漢之亡非獻帝也由於桓靈之不君唐自代徳姑息至昭宗而遂亡夫人之受病有在榮衞有在四肢有在心腹然非一日而成也在榮衞四肢則心腹為之不寧在心腹則四肢為之俱廢榮衞四肢之疾緩而可治腹心之疾急而欲急攻之也望色聆音以知病所從起不待疾至而治謂之良醫朝廷天下人主之一身也仰惟太祖太宗之徳澤固結愈遠神考之紀綱維持不絶固無有受病處蓋嘗治之於未然而已臣試言之夫黄河貫地中猶人之榮衞邊鄙猶四肢大臣猶心腹築隄以壅疏渠以泄然後河乃安流或決於東或決於西譬榮衞之不通故結而為癰㿉緩而絶經絡治河者不深窮其利而茍簡一時之功是諱疾於榮衞也芻粟不繼如筋不勝將不知兵兵不知戰如骨不勝今邊鄙之臣或虚張戰多或擅棄所得茍目前之捷而不設久慮是養疾於四肢也前日大臣專恃顧命頗有得色貪天之功以為已有臣言之於前矣上賴左廟右社之休山川百靈之助而權臣揺手不得不幸而有他變則莽之文詐操之奸雄崛起而萌亂矣是藏疾於心腹也一身而有此三疾臣所謂内外相蒙而有衰微之漸者此也陛下即位神器攸屬人意所歸而又文母厚徳儀坤徽音嗣世沈幾意表而同天道之運扶日虞淵以赫下土之照共斷大務而施設注措人神僉同則不必巫咸和緩之術滌腸紉腹肘後萬金反魂起廢於急迫尋常之間彼榮衞四肢心腹之疾徐診而治之箴砭所及聚毒供事尚未為晩也在陛下施之何如耳且今天下如磐石泰山陛下求直言而臣以自古危亡之君以為陛下之鑑不已過乎李雲露布固訐矣而桓帝止以不諦何語為口實韓愈表佛骨固切矣而憲宗上以天子夭促為乖刺是二君者有拒諫之實而無好諫之名安足為陛下道哉臣釋耒西山立朝無葭莩之親負笈賢闗終嵗惟雅言之學貧無以自資而載色載笑獨於借書乞火居下位不能媚上官以釣名沽譽所養如是殆一木彊人耳如上所陳皆朝廷已行之迹衆人之所不足言者無禆聖政之萬一而祇自以為勞伏惟陛下天縱之聖自誠而明既恭默以思昭曠之道又緝熙而成光明之學昔人求禮於野人求道於瓦礫問迷於童子每況愈下謂愚者千慮或有一得而臣之井窺管見區區欲罄而終未能已也臣嘗惟天下之事莫尚於密聖人之功無昜於勤昔陽處父言狐射姑不可將晉君以其言告射姑射姑刺處父于朝而奔狄髙宗欲廢武后上官儀諫之及髙宗見后則曰是皆上官儀敎我而武后卒殺儀且為容之仰舉趾之髙儀可觀也而昜測其中前在馳逐後在音聲志在内也而或見於外人君可以富貴生死天下之士未發其機而人已逆而合之矣况以不密者乎故臣願陛下尚密則無過事明皇之初銳意勵精誓復貞觀之治而開元之間號稱太平晩節怠荒聲色游幸失道敗度於天寶之末可為歎惜夫禹之勤于邦文王之日昃不食非謂其勤于始而已始始而終終也十日暴而一日寒百年為而一日廢適遠中畫與不適同深耕不穫與不耕同故臣願陛下貴勤則無棄功若夫血氣之戒精神之用隙不在大失不在小永惟陛下深思而長念之則天下幸甚臣誠狂妄干犯威顔臣無任瞻天望聖激切屏營之至臣新昧死百拜
