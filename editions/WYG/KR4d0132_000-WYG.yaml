body:
  text: 提要跨鼇集三十巻别集類二宋臣等謹案跨鼇集三十巻宋李新撰晁公武讀書志曰李新字元應仙井人早登進士第劉涇嘗薦于蘇軾命賦墨竹口占一絶立就元符末上書奪官謫置遂州流落終身今考集中上李承㫖書稱某叨冐元祐第弔安康郡君詞序稱解褐通籍在元祐庚午與公武早登進士之說合上皇帝萬言書首稱元符三年五月十一日興元府南鄭縣丞李新云云上吳户部書稱庚辰之初云云元符紀元凡三年止于庚辰與公武元符末上書之說合謝循資啟稱妄投北闕之書久作南冠之縶與公武謫置之説亦合惟馮隱士碑隂文稱崇寧二年跨鼇居士以言抵罪覊于武信遺愛堂記亦稱崇寧初入遂寧境則其謫置在上書後三年又與馮德夫手簡稱歸來山谷㡬半歲時時掖老母登髙指烟雲明滅處正前日覊管所則未嘗終于謫置再與瀘南安撫手簡稱祗役新疆茍攝支邑上鄭樞相書稱陸沉州縣三十許年始以城役改官其他轉資到任諸謝啟雖不能定在何時而更生閣記稱宣和癸卯八月誤恩貳郡復有謝茂州到任啟正在是歲則新斥廢以後仍官至丞倅亦未嘗流落終身均與公武所記不合豈宋人重内而輕外不挂朝籍即謂之流落耶新受知蘇軾初自附于元祐之局故其所上書詞極切直然一經挫折即頓改初心作三瑞堂記以頌蔡京上王右丞書以頌王安石上吳户部書至自咎前日所言得疾迷罔謂白為黑其操守殊不足道且所作韓長孺論譏其馬邑之役沮前日之議敗今日之功所以隂解滅遼之失也作武侯論謂其當結魏以圖存所以隂解和金之辱也無非趨附新局以冀遷除公武但記其上書得罪而不詳其後事亦未免考之未審也惟其詩氣格開朗無南渡後啁哳之音其文序記諸篇忽俳忽散雖似不合格而他作亦多俊邁可誦在北宋末年可以稱一作者固不必定以其人廢之矣集本五十巻今散見永樂大典者裒合編次尚得三十巻集中更生閣記述政和丁酉勦茂州叛羗旺烈事所述宋兵怯弱之狀殆可笑噱核其地理即今之金川土司而諸書言蜀事者未嘗舉是篇則是集亦罕覯之笈矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
