body:
  text: 跨鼇集巻二十一宋李新撰書上劉夢臣提舉書某嘗謂士以文受知古人不過片詞隻字拊髀爵躍終身推許某於公長牋短札繆至樂語累萬言矣以人物受知舉趾進退古人不過一見再見即抵掌笑談締交促席某自大觀初事公及今幾五年矣凡居職事取能名取快健名得質直得循良稱譽古人不過一試歴試即借助齒牙引汲舉代無所不力某𨽻公部中三易賤事矣公朝之薦非可以私祈國士之知豈由於勢取傾葢之遇指白首以為期童䝉之求亦畏再三之瀆恭惟某官以文受君相知以人物為時標準將明使事以孤寒為意蜀人由公成就者衆獨某未得與門下一士之列嗟乎老矣毋益老矣有可憐者其文其人物其職事具不足道然累萬言之勤事五年之久三易職事之賤必有一憐者情不能已上犯師顔安所逃責上趙龍圖書歳在大淵獻某攝梓司寇㑹閤下初入境走拜下塵退而告人曰使者氣淵定自息以踵出語粹潤聲應黄鍾之律若拊璆琳清越以逺赤澤如規天庭晶明蘭臺峻直隆負而豐下神觀莊靖進止詳雅望之沈然即之也温真富貴人也祗事五年數眂台光熟顧公行事未始有過舉九支下都之役取兵於夙籍取財於餘羨卜築飛輓而州縣不知獻言盈庭横議斥幕公獨計於心吏奉成策務在不擾惟耐久近厚乃肯經始有欲𣙜民酤以益邊用徙邊市以實新城有欲商夷人之茶築市易之邸童山木以資費割租賦以贍兵公曰此正登龍斷咈百姓之事吾不為也昔議鼓鑄吕申公獨建言願不禁農具識者謂有宰相器後果如約公之為言利亦博矣某目公四進官再進職超升使介換易服章位益尊權日益重宜節節據體貌而咸虛樛屈愈謙下於前日無一芒矜大之色向文簡大耐官職方之於公又何間然一道士人成就强半既獲顧遇則讒間不行專治大體不責苛微末故凡不當意必教誨諷導不臬礙其進濁流小過包含揜冒輒不出口胷次不知幾雲夢伯仁空洞叔度汪洋郝婁耐事見於今日使人消鄙吝忘形遺辱願執鞭靮為馭而甘心焉去古已逺人無異見許負唐舉不垂筌蹄之書郭有道裴行儉掃絶人倫之鑒退居下坐自有青白而尺涔止水堪燭鬚眉曩在新疆曾𨽻一傔之役酸辛寒乞露於眉宇龍鍾跛倚有愧面目城純與滋計書通天賞典到地無名受禄獨得四階之進毛遂歃血某最因人成事子推逺引某為貪天之功非閤下特保提某復何以至此及㕘外選心口相盟必欲祗恪賤事旦旦掃門以護雲林之庇王粲依劉公石洪依烏公韓愈馬揔依晉公牧之依牛公鄭覃依衞公得其所依則坐安席寢安枕食飲安味親安㫖甘一家安飽煖其所安者又非一也繆侣記室行周一星微譽弗聞捄過不暇中山之謗書日至東阿之毁言日甚曳裾失謁倒板汗流雖亡它虞但自膽落葢名利之兵起於几席殺身之禍肇於酒盃怠者忌脩則曰其不免矣同列競進則曰孰為來哉重念某立朝無親居府無助孤寒二字與生俱生亷白一身得死寧死耕奴織婢既積日而累年老馬敝車幸知途而合轍惟閤下全而成之亦全而歸之禽固擇木木亦擇禽客善相主主亦相客若是則某安所逃審惟去取已大定矣情迫直書干冒鼎席死罪死罪上王知府書某沉伏選調二十三年矣試士彭門初識紫芝眉宇夷甫目光美姿晳面氣語温粹自是富貴久耐人别二十年前李生官不加進若引萬斛艘上八節灘若倒挽九牛陟峻坂何其艱也孤貧流浪龍鍾跛倚乃始斂板趨庭退處幕下借令公鐵石心肺亦必怛然憐之伏惟閤下父子兄弟徘徊蜀道為人愷悌父母恩波惠泉與春更榮聲音氣味同俗俱化出入劍嶺岷峨導江潼涪清秀琴臺墨池卜簾石室雪山火井牛頭瓦屋碧雞金馬皆公平日眼界中玩好登髙弔古則相如揚雄之才子淵君公之學鄧先譙周之辯仲元君平之隠絶世異代髣髴猶故人惟蜀衣冠不漏一指同堂接席締交聯事不知身之居蜀歟蜀之為秦歟某最無長亦幸一日之舊其為學從政禔身涉世閤下知有素矣王正薦士竟令出門下可乎其不可耶老矣情迫不能成章干冒尊嚴俯伏戰汗上楊提舉書某智小不周於物大愚弗靈其身竊食偏州懼不勝責方堯舜在上臯夔立朝三代之法推行著明見於今日所謂方田者葢其一事也井地未均賦調未平有司所宜深究某也漫浪懵不知省嘗推原先王所以均定之意與夫後世侵欺不平之弊似有可言者試以禹貢九等周官土均之法明之雍州土黄壤田上上在九州為第一而出中下之賦揚州土塗泥田下下其賦宜輕迺惟下上上錯則賦之輕重不繇地之美惡而係人功之脩否爾及觀大司徒以土均之法辨五物九等制天下之地征以均齊天下之政則賦實眂地而輕重異矣爰自井田一變阡陌代興所謂田者人始得貿之貧者冀速售則薄徙其税富者欲邀利則務低其直税移而薄故地雖去而賦益重償直既少故地愈廣而賦愈輕此天下之公患也神考熈寧中嘗詔有司講明其法分利害若辨白黑以土之肥瘠為地之美惡以地之美惡定賦之多寡其步畆所至則方為之帳其升斗尺寸則户給之帖舉數千載軒輊跛倚之病衡而齊之無逸漏者主上追述先猷復以田法委一道使者使率土之民均而無貧而郡縣之吏不得為姦職方按圖周知息耗茲事體大伏惟提舉大夫直道禔身文雅飾吏推行仁政惟恐一夫不被上澤則其於方田之事必精擇一二能吏詳考式令以指教方量之官不識謭薄之才亦可以備驅策乎重念某筋力未老實耐奔走之勞心志不荒粗明三尺之律言宣口授積日累月收其成効萃為一書期無負知己者而後已然金躍冶為不祥夜光明月無因至前則必按劍干冒重德安所逭罪上尚提舉書某竊嘗謂有道者之言曰道甚邇無謂其逺道甚易知無謂其難童子可以適巨茨則近踰眉睫象罔可以得元珠則易若探囊見早則明卓自得而獨成耳目不用取成於心攬鏡見覺一息超然而道無餘藴矣奚至於連連徇外不知其歸揭竿而求之若父建鼓而求之若子曖昧於一言以見笑於大方之家然後為得哉然求之其人行年五十則聞道何晩約舍重趼則求乞何劬三月齋居則進之何篤一覩而三賀之則見之何以為榮七年而一解顔則告之何以甚吝意者道之難言邪則又曰可傳也且曰道為可傳邪則又曰不可受也道不可受且將忘言耶則又曰非言非黙議有所極也是道果何以造之歟則曰嘗為汝議乎其將矣又曰嘗為汝言乎其崖畧矣是道之至極者終不得而告歟則有四問而四不知三問而三不答而以不知不言為真者矣若是則道終不可得聞也然則拊髀爵躍者又何所得而然歟愚將蔽之曰茍非其人道不虚行此則一言可以盡道矣某天運方拙猖狂妄行假渾沌氏之術以經世則不知後重而前輕攘支離疏之臂以竊食則幸以無用而獲宥有哀駘它之貌實駭羣目無絣澼絖之技不鬻一金將欲為鏌鎁反不祥於大冶自念叔山無趾前行何補是以務學不輟求尊足者於天地之間道之所在固將贏糧趣轅南之沛北過楚而不息其逺又安得以連墻並席一不請見之為逺哉恭惟某官閤下聞道在先超然自得正容悟物與之為春且曰以已出經式義度人使有足者同至於其丘乃以恢恢然大空之裕衆甫也吾師乎吾師乎聞風而悦之久矣今乃何幸乎見猶龍用是祓除其心志澡雪其精神求以進於道焉而未知烏鵲孺魚傳沫果有得乎其未之有也是又安知物者之不息我黥補我劓使我乗成以隨先生耶干冒清崇戰汗無地與張君實書年月日太學生李新振衣彈冠譔書再拜君實明公閤下新非義足不登侯門名不通豪貴耳平居以賈生自許故言有近乎自譽而非譽也然則自譽者古人多矣髙論以求知矜詫以取信少正夘不容於孔子東方朔取譏於揚雄舒元輿員半干不售於盛唐之世某不才為言近似數子而非數子之比也諺曰誰為為之孰令聽之僕將有望於閤下者已幾月矣且某生二十有三年無它知喜與黄巻聖賢語故於書無所不讀羅孔校孟搜揚絡韓古人竹簡今人紙軸百家九流日與之偶昔所謂董仲舒下帷卒業三年不窺園者殆將學之矣且又有四方志故嘗走半天下南經江淮西過闗隴往來陜雒之郊而索米長安者嘗再見秋昔所謂司馬遷自龍門厯㑹稽浮湘沅涉汶泗然後歸而作史者殆將學之矣夫讀書萬巻則下筆有神文章駭人則在處鬼物為之䕶持少壯出遊則知山川形勢不守一鄉則通九州風俗負是二者故氣宇廓落志思灑然酒肉交兒女戲未嘗一日過門而胷臆之論豪憤不已所以每重然諾赴人之急而囊無留儲嘗謂萬金隻馬不告姓名推以賙人葢王義方郭元振之細事誠學術遊從使之然也比者西歸旅見左右雖負戴迎遇重於丘山而希言無色可敬而畏如近氷玉武庫使人凜然欲進一言而起其臭穢輒復已矣然丘墓之邑桑梓之籍實𨽻麾下借未能求伸於清識而茍有所聞見亦可以備精思之餘則雖以言陳何傷乎彊聒伏惟閤下以非常之才應非常之詔以不羈之學求不次之用辯論國家體敷陳宗社計執事造廷待天子問雖萬劉蕡不足介畏訐宦豎則黄門骨寒疏貴戚則近侍膽落對御史所不能對言宰相所不及言論事回天吐辭倒海拔犀之角擢象之齒以為詞刃而螭頭一言士氣增長此閤下之素志而僕亦與有操焉且制舉之廢已十餘年而豪邁有為不過竊進士之選方今朝廷數路旁招十科兼進自以為不足以籠絡天下之英雋而興復制舉以新儒林之耳目而閤下獨於此時自拔于蜀其所推轂相為後先者已得虢國公數人而已是則一朝陳言半夜悟主昧旦而指期卿相矣然後千金成諾足以走冠葢而一巾折角足以作風俗北斗以南大海以北風馬牛所在皆知所謂君實之名僕於是時將亦重其身於温隰而攝閤下之踵以就此選也且株守一經不能自植一家雕篆數韻不能耀名數世僕之所愧每每在此幸不惜虚尺寸之地以為僕之周旋而僕之讀書遊觀浩聞多識數事可談亦足以補助門下之萬一此其張本也言亂不經猶以青眼為望不辱前席且羞死矣與張君實第二書五月日李某再拜獻書君實明公閤下某愚不自揆比嘗為書汙下執事而辭語迂放為它人言皆不省㑹閤下在告而閽者拒不内退踰月不䝉下氣垂情聊有所褒貶私懐惓惓因以未畢或以謂閤下謹許可茍無過人者隨一笑而遺忘則某之區區亦將以狂妄棄之矣然迹將疎而意彌親弦欲絶而聲愈急傾座上之顧而質胷中之疑此某所以復有獻也嘗謂衣冠而稱士者宜有以異於流俗應天子制詔而稱非常之才者宜有以異於士治平以前朝廷以詞賦取人而涉獵之學章句之徒操數寸之觚畫方尺之紙無不拾取青紫為宗族榮耀一詩一賦之外没齒不究先儒義理前人涕唾鼠竊狗盜亟不容手自熈寧以後朝廷以經術造士而五經之奥孔孟之㫖一旦與士大夫私門墻然學詩者不通書治禮者不知易鑽窺莊老隙竇而俯掇甲乙科第至三年廷問而一策之試樸􅈪輭懦不能發明紀綱敷陳治迹以稱明天子精選之意借使問災異必闇於春秋洪範之學詢存亡則蔑通漢唐厯世之為而麞頭鼠目之子揚然自得夫然後知制舉所以責備於儒者而其人必有異於士故愚志此久矣手不釋方册目不置簡牘居與書為鄰而充棟宇出與書為行而汗馬牛楚精神磨筋力十年于茲矣然志大而謀不售事左而身益困雖於進士之選不能一得而私自鄙之以謂不過異於流俗而已此豪傑之士所以既得而又歉焉伏惟閤下馳騁書傳轇轕古今俯仰目仲舒笑談却劉蕡兒蓄公孫𢎞吏役牛僧孺如鼂錯谷永杜欽元稹白居易之屬雖累千百緩急安可望哉且吾蜀自有宋已來應此選者不過十二三而其間甚顯者又不過四五人而已頃者蘇氏兄弟一日過闗而聲馳四海是時有韓忠獻公歐文忠公為之後先而宋廷文章遂無出其右者葢其志必欲異於士而已也雖然入朝爭名者愈於錐刀而一有不羈之才則必為肩出者所害往往齊與鄭兩大以家而不肯借門户鳳與鳶相髙以飛而不肯借羽翼是又不可不戒也某今日之言將以求知而後日之進將以求教何者閤下既已異於士矣而某猶不得異於流俗木植而水導之使之不後陵之儒者在閤下也駑驂蹇服知所趨嚮而伸於知己者復何人哉下情所操索言於此俯伏待命上吕太尉書某讀書至周公嘗復而思之昔武王有疾周公作祝册欲以身代其死夫受命於天有所制者也死果可得而代邪説者以為周公不智成王幼沖羣叔流言謂將不利于孺子公誅管叔蔡叔説者以為周公不仁周公留相成王而召公不説周公作君奭以自解説者以為召公真不説矣陳賈問孟子曰周公知管叔叛而使之與曰不知也孟子亦以為周公之過然則周公而不智不仁召公至於不説孟子以為有過欲無疑得乎且天之所助者順也惟至誠足以動天地金縢之作知天知人者也乃周公之所以為智羣叔之流言得行則周公之去國無日矣去國無日則孺子之惸獨誰與保也其誅不仁乃所以為仁方成王以中才嗣位周公以冢宰專政以親則昆弟生嫌以外則武庚淮夷亂召公於是時宜不説矣惟其知周公之忠所以未嘗不説也國難已平成王涖政盈難以持也成難以守也故召公不説周公因其不説而作君奭之篇告以天命人事而已豈真不説者哉孟子之言以為周公弟也管叔兄也其過不亦宜乎此拘於教而立言者之常也管叔宜誅周公非過是開後之為兄者不教而誅之也不教而誅且以周公為口實則孟子之言不得不然使周公而為孟子亦若是而已矣伏惟宫使觀文太尉以周公之才之德居周公之位好賢下士躬踐周公之實今之望人在朝廷處方鎮者俱無出閤下右晩學後進學言治道學為文章學議典故偘然謂有經濟才者如小巫之出不復自神而先朝大臣惟天錫閤下以難老是將盡表周公之所為以使天下後世無所致疑茲國人之所以喜公之入而留也主上得一元老如八寶之成九鼎之重茲國人與某所以喜而又喜之也所業一編併書以贄上凂鈞席某下情無任俯伏戰汗之至上左司書某㣲賤微一手借力之助姓名不到中堂不與堂差之目欲一見宰相無因至前也豈其不才而老死州縣葢自有命而無復清要念宰相不從天降地出前日書生耳咫尺私第而謁不得通森列舍人而門不得掃出史院入三省鱗日視事坐未定羣吏擁合投牒赴愬者譁言盈庭本皆有司之事非宰相所當親而行之者也其來已久如日中之市交易而後退各得其所宰相雖欲不省斷不可也且吾宋以祖宗積累之厚垂二百年七聖相承無一事過舉神考法度深明詳著循而行之三代之治未易過故厯朝宰相無赫赫之名其稱賢者特能循而行之而已太平宰相與守成之君無有二道前人固以為難矣在今日尤為不易廟堂自有定議某不敢輒論而天下事又非鯫生所當言者苐以謂士寡亷恥莫甚於今日僥倖之門四闢奔競之俗漸成一旦封而築之闔而樞鍵之賈怨滋甚閤下以天下為度身士夫之怨而不恤夫豈易得哉愚嘗疑士之得至於堂者必有異於參吏部之士參吏部之士必庸常碌碌之才賢能不待次而舉不次之舉葢嘗有之而不廢也所謂賢能者果真賢能乎其居不次之舉者未必盡賢能於人也頃嘗至太宰㕔見呼其名而進者青紫煜如步趨俛仰吾屬人也言語應對吾屬人也呈劄子丐上㕔歴堦及席乞憐足容一作乞憐之音足媚之容逾時不肯下堂吏厭惡至推而去之者當是時蹴爾而與之定亦不屑也且前此知縣人而得知通初改官人除監司未入仕便乞宫觀不識字不經試便入館閣省寺臺監其濫者尤不可勝數是所謂僥倖之門四闢奔競之俗漸成不可不革也日者一切嚴之以資格之限以至罷諸局罷宫觀罷權學官省曹官私不勝公横議自屈皆閤下深究其弊自為吏部時已一一申嚴行之矣然今仕路猶未清冗官猶未去法意猶未明是以選舉不公而真材碩能未獲見用於天下意者雖行之猶有不通之處故其弊不去耳竊惟閤下當朝名臣之後英風義槩凜然見於事為迺今起自列曹陞華省闥助吾相輔導人主其職為專而其權為不輕也方天下思治之時事無大於進賢而退不肖推而行之惟恐不力茍力則無有弗行耳見利則興見害則除在今日此不可緩惟閤下疏其根而滌其源不顧掣肘之患權衡於堂差銓選之間斟酌進退無使偏滯庶乎真賢輩出可以共成太平極治之功不猶愈於闢僥倖之門而成奔競之俗矣乎彊聒之言伏惟裁貰幸甚
