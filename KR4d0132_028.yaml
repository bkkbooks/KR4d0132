body:
  text: 跨鼇集卷二十八宋李新撰祭文開穴祭北斗文竊惟相視宅兆制昉周官若堂若斧之封必慎視厥隂陽非求利益祈魂魄之安寧也人子臨親喪敢不自盡某躬走萬山還至西郛渴甚下取水飲見馬鞍西丘有佳氣象躊躇四顧探腰間霹靂木以定四維遂卜西丘正兑當酉屬辛畚土為宅將奉亡父母以歸藏地理家相眂咸言吉用之不疑土脉赩紫膏潤如截肪水逶迤由戍入已蜿蜿出巽兑山之狀如偃月若身運兩臂左至艮右至巽皆拔起相望是輔弼生于母曜分為福祿巨門貪狼森為旗門如飛暈如老蛟猛兕蹲伏而驤其首巨鼇屭贔夭矯欲戴仙山以遊艮之一土巽之一木生氣遝遝無有窮盡乾坎不見山而坤離無山前列几案面面有朝揖甲乙二山葱蒨明秀拱立扶衛而卯山居中祗肅俯首以聽命於兊寶曜光於武曲積翠化為金龍吉遝四臨無一芒之燭火一涓滴之游魂明堂平治空曠崦嶮隱車馬萬牛卧服有處所或曰是生公輔某曰瓦棺石槨幸不潛於地下土宫泉臺神安遊乎其中過此不知也又曰西來之岡謂後無擁從東南少闕則不利長子某曰蹇陋寒乞身已爾福及昆弟又何悲耶叔子折臂誰測其方來彥洪含笑不疑於遂事今以某月某日塹地謹用祭法謝北斗惟三辰垂祐山川原隰林木泉石之神安靜勿怖歡樂以相豫事代遂寧知府到任謁廟文惟神垂祀千祀迪禱一方風馬雲車昭格上下某祗承明命俯守兹土幾與神共治祗謁云始罔敢徼福十日五日一風一雨疫癘不作嵗約有年相春臺之熙迎化日之長職神之功郡刺史賴焉又築城告諸廟文梓城嵗久弗治摧圮十七八風雨剝蝕斷裂坍隕樓櫓飛觀在者無幾皇帝命某等統其事築而新之某等祗奉聖訓經營卜度夙夜趨赴靡敢怠遑分職率屬凡四十員興徒三千封土構木雷聲而雲屯欲不日成之得以緒狀聞于上惟神安靜勿擾無出其靈響開日景之晏溫俾無鳴條破塊之虞以相我後事寒時漏澤齊醮文發政施仁春回萬里掩骨埋胔澤及九泉仰慿慈氏之祕文廣濟夜臺之幽魄永以為報死而有知伏願卜世卜年等天皇之百萬千嵗允文允武小姬周之三十六王然後旁及無垠上窮有頂含情水陸俱獲圓通禜祭文嵗月日辰具位某謹遣某官修禜禮致祭於城之北門自甲子日以至於今凡我邦人病雨之淫后土莫乾天多沉隂蛙生於竈鸛鳴於野凡我邦境大田多稼河渚涯間不辨牛馬害於粢盛守吏之憂凡我四郊嵗約有秋將誰咎焉元冥是尤漢山斂雲漢水藏蜧召我羲公徐馭其轡有脯在頭有醑在瓢出此隂氣令不崇朝謝雨文去嵗淫雨害穀而秋亡所斂故自春徂夏物價軒涌逮今不少低某來牧兹土適丁是時風俗病憊生意蕭然惟祈有年以與之休息此長民者之心夙夜拳拳無以昜此不欺於上下神祗四境之內田稼秀實比愆時雨用是干神聽既獲賜矣則守吏曷敢忘報求晴文天作淫雨害我田稚彌一再旬麥禾盡偃農不得事鬼不食新商旅不行蛙生竈户宫架以炊守吏失德播菑千里日夜祗惕靡神不宗維神國中之望慘舒隂陽妙萬物而為言裂屏翳之旗拆元冥之車械北澤之虹扶咸池之日散積隂以為和反凶為豐守吏具三牲之力蠲日以謝神俯聽之無忽祭龍洞神文年月日具位謹遣某官致祭於雞翁山洞龍神之靈因為詞以祝之曰天子有命俾守兹土誠憂而懼我旌既彤我車既攻我來自東造國之境徴民之病將以自警日久不雨旱魃流災始惕其來不雨伊何亢陽斯赫誰佩其責有山嶷嶷有石離離有神司之磨崖千尺下倒蒼壁山鬼窮役洞呀無垠幽隂悽辛龍潛其神夙與神語十日而雨神不我拒豐隆揚旗元冥鞭螭雨彼公田遂及我私徐州刺史有百里嵩傳車所經零雨濛濛開元御史有顔清臣奉使而雨歡生郡人繄神之惠浹沐千里守吏有慚無以堪此嵗決有年下民熙熙龍耶神耶神耶龍耶何以報之祭年先生文紹聖元年十二月三日三隔山下舉葬故北海先生三九丈輼車肅駕之前日門生蜀州江原縣尉李某敬遣人致祭於先生之靈因為詞以弔之曰惟公之賢其惟鬼知末路悠悠有生奚為天之未喪道之將行庶幾斯文警我後生方時妙齡登髙能賦說詩解頥亹亹到古觀眉宇間月露孤爽四圍溘埃不入方丈遇不當意虎兕其氣自然俗物稍稍引避煙死曲突凝甑飛塵我知我公曾不病貧餽見百鎰心焉鶺鴒我知我公非私其身公之文章鳳之羽翰公之孝友為芷為蘭蘭陵有書未得其傳汾陽有琴或絶其絃已而已而豫未能無怨乎天者耶恭維尚饗祭宋夫人文惟靈月窟之遊星橋之歸回風雲旗去將何之昔立厥配有美一人登髙能賦擲地有聲言念君子溫其如玉參仙客以登瀛繼相如而諭蜀龍生龍子鳳生鳳雛板輿周流越王故君采石青煙碧梧疏雨魂兮不來往朝帝所悵香軿之縹眇指閬苑以容與彼美人兮驂青鸞而延竚尚饗哀詞弔安康郡君詞并序元祐己巳某識周彥於魚鳬市門語久意合明年春周彥具書幣來致某欲以文相㑹館某於華蕚周彥昆季才器行實邁世逺甚友某則屈則辱安康君與周彥商彥幾以某為兄子數旦旦禮遇有加是年秋某以書貢春解褐衣通籍士部今二十三年矣一飯之恩某拳拳不忘况厚於此者政和癸巳八月庚申周彥商彥奉安康君祔朝奉公以葬行李來告道逺後期某伏在苫塊不獲挽輬車雜吹簫歌士之役臨窀穸一慟而訣癯毁抱恨因為楚詞以弔其詞曰粵吾浮海右以歸兮遴𢎞夥以宅身酷疾下流兮絶頑譎而匪鄰決雲迎日兮徜徉乎中野鳳凰回翔兮鄙叢欒而莫下排閶闔兮吾有待而與俱世無知兮昵忠智以為愚倬安康之五圃兮植連璧以騰光亶緹襲之重緻兮猶韞櫝而厚藏追琢成章兮可禮乎帝鬼欲賞題而稱呼之必聨燕趙與韓魏蹇昔載司南之車兮以荆和而驂轡疑安康而矚觀焉卒驚異而立志匹夫懷之者雖亡辜而棄市爰珍物之震動兮不可掩也已彼銀潢之疏派兮貫軒轅之上流窮崑崙而適通兮墮機石於塵溝探金穴以佚生兮幸侈足而焉求監許史之前轍兮鞭中服以增羞從夫子以徐騁兮駕德義以為馬願西南之足樂兮何必懷此都也信婞直以上達兮乃種蘭而當戶夫子終蹈危機兮亦捐甘而攻苦履世路之多跲兮悲滓穢之霑綸俯清流以濯浣兮處無爭於溪山既一視而均仁兮忽忘言夫久假約白首以同歸兮倐夫子之先謝焫薰劑以抒誠兮屹南山而詎移眂靈幰如有見兮亦恍惚而聆之矧有子而堪負兮將並頴而芾林竟復好爵於昌明兮伸憤魄於重隂事夫子而無怍兮下報於九泉命豐隆扶轂兮歘追遊於列仙夕觴於瑰宫兮竚萬舞於鈞天瞰震旦之䝉囂兮一揚蓬而百年念函鼎之烹潔兮蹇嘗價於上賓佩圭母之清鑒兮慁促母之籲貧俯哭於水衡兮攬風木而歔欷嗟前觴不同兮邇又絶於地維竭涕泗而亡已兮河如帶而海暴倪自今侣王孫兮與無窮之至悲者也贊亡室王夫人真贊夫人姓王名蘭字友芝一年三百六十日病一日不病即清齊事金仙愈於事鬼讀其書不知其已賢哉若人今已矣
