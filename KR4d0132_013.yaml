body:
  text: 跨鼇集卷十三宋李新撰劄子乞州郡講習五禮新儀劄子臣恭覽五禮新儀制作之妙追蹤三代陛下聖學髙逺以作者之聖詔訓禮局講述裁定典章儀物粲然有文自我作古凡伯夷之所典周禮之所制經而三百曲而三千未若今日焕明詳備者也三代而下寥寥千載禮之廢壞􅀢蕝無據時君未遑講明其失或求諸野腐儒曲學相與辨議幾若聚訟豈特百年而興是有待於至治之世而後可興者也禮書既成頒及天下戴白垂髫喜見太平之盛典臣嘗謂吉凶二禮士民所常用今州郡將新儀指摘出榜書寫墻壁務為推行之迹而茍簡滅裂增損脫漏誦讀不行未越旬時字畫漫滅不可復攻民庶所行既未通知至與新儀違戻或僭或陋實非民庶之過臣欲乞諸州並許公庫鏤板儀曹局以某禮行下屬縣置籍抄録檢示粉壁及察民間所行之禮過與不及州委教授縣則有出身官旦望就學講習新儀監司嵗終保明具奏察其勤弛而加勸懲之如此則上下皆知禮風俗日以厚矣乞遂寧府遇闕守臣以監司兼權劄子臣竊惟遂寧乃陛下龍潛始封逺民厚幸䝉被眷澤敷錫府號遴擇卿士賁以職名優寵長民之寄俾其地侔諸藩之重可謂美矣然時闕守臣即以通判司録曹官權攝王人使命之至頒朔布政之始事體益輕臣欲乞今後遇守臣闕許依梓州瀘州例差監司時暫兼權庶幾國體稍重以副升賜府號之意乞禁州縣學濫進之弊劄子臣伏覩大觀學令斷自聖裁制為成書頒降郡國知所遵守者纍年於兹矣昔游夏不能贊孔子一辭則學令之設詎容擬議者耶自三代已來未有如此之詳且明也如挾書代筆之禁奉行者失於不嚴州學季試已不能杜絶其弊而縣學補試嵗升假手尤甚轉透題目出外終日塊坐撫弄筆硯以待文字之來其間翻録至句語字畫錯謬雖差官監門例不敢搜索稍加誰何則必紛爭詬詈公肆抵突傳出送入傍若無人一𨽻名學籍便以保庇門户有繫空名行食身未嘗一躡學圃者有假故逾限已經除籍再託人補試者臣欲乞諸生補試入縣學嵗升入州學許教授當面試經一道試日牒本州有出身官一員監試如文義不通字札不同全然踈繆根究元試之弊則學者知所畏而州縣學無濫進叨冒之人矣乞戒飭郡守勸農不以其實劄子臣竊聞陛下孟春之月親屈玉趾行幸南郊躬耕籍田以先天下行一墢三推之禮舉百年之墜典示萬世之禮容穜稑之種出自深宫鸞輅之音乃光原野父老動色中外歡呼夫以一人之尊而俯為大農之事則勸農之官其將何以順承聖意又聞昔者郡守春秋行縣觀風俗課農桑而暴吏乘時風俗未嘗觀農桑未嘗課千騎五馬重擾屬邑飭厨傳載賓客携妓效東山之遊遊山寺如潘孟陽之作所以先朝廢罷郡守行縣正為此也今雖帶勸農之名而無勸農之實臣欲乞知州每春行縣勸農量帶人從所至不得再宿及取索供帳令人除道約束戒嚴厲色悚動輒受饋送從人丐乞錢物其贓先坐知州不許以失覺察原免則勸農之官知所畏農知所勸嵗約有年此富庶之本原也乞詔州郡置架閣軍器庫劄子臣嘗謂古先聖王於萃聚之時必除戎器戒不虞示有國者不可一日去兵也天下承平日久州郡軍器因循不修治暑月未嘗曝曬兵刃不加淬礪衣甲旗幟破碎斷裂少有鮮明者大率安置不如法蜀地卑濕天多沉隂雨水動經旬月既非髙燥處貯藏則未閲嵗時筋膠解折韋革腐爛絛貫弛絶蹂踐棄擲不可勝數如梓州一路遂寧府叙州有都作院嵗課不少而兩州皆無樓閣架放非惟枉費官物緩急警嚴殊無犀利可用之器誠可慮也臣欲乞諸州府甲仗庫未有樓處並許創置有而隘陋即添展修蓋務要收藏軍器可以耐久亦預備之術立武之餘事也乞令部使者薦進人才劄子臣嘗觀皇華遣使之詩而曰周爰咨諏周爰咨謀周爰咨度周爰咨詢且訪問於善為咨所咨必於忠信使事以忠信為本故也咨諸事為諏既諏矣於是謀之既謀矣度其所宜而言之咨度者以義度之也猶以為未也又遍咨而擇所從焉詢者遍咨之也陛下總章問道游心巖廊以天下四方之逺上情有未通於下下情有未能達於上故每道遣亷訪使者二人分詣郡縣觀察風謡廣求民瘼凡享上不䖍犯法干禁雖遐徼異域有寃抑杜塞及吏之暴橫得以直通陛下遣使臣所以寵遇者至厚矣臣愚無知叨遇將明之列奔走盡瘁靡敢遑處日夜焦心勞思所以報陛下者無非忠信之事且州郡薦士各有常格而竒才文士素為一路推誠孤寒無援沉於下僚亦有甘自晦縮不求聞知或不遇知巳論篤弗及士安義命莫肯競進藴藉博洽難以自暴臣欲望陛下因其奏計願賜聖訓令廣取時譽以名聞即乞下所部取其文藝考察送學士院詳校有可採者陛下自擢而試之菁莪樂育教養而後用之則真材輩出矣凡使臣巡歷所至許令投獻文字仍不得諷諭州縣沽激薦士之名庶幾上副陛下旁求雋乂之意而萬里之逺無遺賢之嘆天下幸甚狀赴慶陽司録先狀家近雲山先占冷族身鄰老澤詎復妙年孤寒伴北陸之冰衰晚薄夕陽之景面顔怖瘧已不入時言語轉喉定多觸諱當處不爭之地可蠲無妄之菑投筆何為從戎自樂泛蓮入幕斷無借箸之籌倚馬待文那有愈風之檄况士子發迹何必中州雖名教中人豈無樂地㑹逢儒將久帥西方王粲正欲依劉杜甫初謀造武仍輕萬户逺慕荆州之名安用千金寧得將軍之諾比拿行李漸及部封方將斂板以趨未敢望風而遁揣無他技修賤事於簿書尚有寸心知威名於草木恭惟某官居仁由義濟武以文身賢長城胸次武庫輕裘緩帶氣嘗蓋於軍中說禮敦詩威自行於塞外諸將不敢仰視夏人至於祈哀固宜聖慮忘西顧之憂然後皇猷專北庭之舉策名未已孰先再世之功諫草何多本自一家之學某志甘下客心切泰階慕義而來聞道已晚周原膴膴情肯飫於堇荼夏屋渠渠賀已私於燕雀進潼川府修城圖狀臣等恭承政和八年五月日御筆訪問梓州城壁並無樓櫓舍屋官司玩習殊失備禦守臣未欲重行黜責仰本路帥臣差官同本州當職官檢計責立近限修立令轉運司疾速應副財用徽猷閣學士瀘南安撫使臣龎某具畫一聞奏奉聖㫖特差臣盧某臣蒲某充都大提舉修築仍支公使錢一萬貫餘並依奏劄付龎某施行臣等祇奉聖訓即時至梓州㑹議鳩工度材下遂寧府等七州剗刷廂軍止及若干尋於梓州十縣和雇人工若干分城為十大料每一大料分為七小料丈尺不等均定工數興築共役三十五萬二千三百九十六工城周圍長二千六百九十步髙二丈五尺舊基闊狹厚薄不一隨基增築面收一丈一尺為準臣依已得指揮不置馬面外共立敵樓一百六十八座女頭一千六百八十六箇上鑿箭窗連女頭共髙七尺鵲臺髙二尺面闊一尺五寸女頭巾子及肩悉用一寸許石版經久隔雨水城上砌荷葉渠子流放水若干所入溜瓦槽至捍水臺上以石版砌池子承之再折水之裏壕渠外築護險墻敵樓兩傍露地元檢計立瓦屋後來奏乞罷瓦屋又慮夏秋雨水即權以茅苫臣深慮茅苫城上不耐風雨密近敵樓招引火燭因採石布城面一百七十六處浚水入荷葉渠內委是經久堅固城基腳表裏皆築捍水臺裏臺髙五尺闊三尺外捍水臺髙三尺闊二尺臺下又築裏堤腳面闊八尺髙五尺至八尺隨壕面闊窄淘出土三尺運土出堤外堤上栽栁若干又立敵樓四座於四隅每座二十間别建外門樓四座各七間裏門樓四座各五間於重和元年十月二十四日興役至二年三月初十日畢工樓櫓等並按元豐城隍法式無毫髮差誤潼川地産柏一色以柏木為之臣等叨總役事日夜究心不敢茍簡滅裂今具圖進呈又進修城圖節略狀潼川府城臣等遵奉御筆修築其城長一千三百四十五丈髙二丈五尺隨舊基增築面狀一丈一尺為準四門各建樓一座每座十間依元奏請不置馬面外立敵樓一百六十八座每座五間立女頭一千六百八十六箇髙五尺鵲臺髙二尺共髙七尺敵樓兩邊城面露地並以石布砌共一百七十六處置荷葉渠子放水并築墻護險城表裏皆築捍水臺城壕舊深丈餘比年山溪水吹沙淤填塞今開淘三尺運土出堤外堤上栽楊栁若干製造並依按元豐城隍法式無毫髮差戾今具圗進呈
