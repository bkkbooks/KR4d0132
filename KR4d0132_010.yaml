body:
  text: 跨鼇集巻十宋李新撰五言絶句月下俗意未能免高情誰與論惟憐今夜月依舊照衡門和許表民湔江驛四題花盡蜂腰痩風低燕脇涼雲衣迷逺岫烟幕蔽柔桑吹來槐莢細過去杜鵑悲慣客久無念送春閒有詩筍成森碧玉麥熟歛黄雲村酒不堪酌一盃能易醺栁橋通窈窕客轡按玲瓏蒲劔一谿緑酒花雙頰紅遊南水陸院蜀國山河在梁原草樹深暮雲千里色無處不傷心鳴蛙千鼓吹脩竹萬琅玕日下欲歸去谿光生晩寒宿西谷院六首線繞參差路雲封咫尺山寺僧初怪客三日竊優閒野水無窮意幽花不斷香殘春孤客恨惟與漢天長山翠圍裘領谿聲響佩環終年無俗客不用掩松闗野鳥休驚起浮雲莫厭看松蘿秋後碧巖谷暑中寒石髓門前水松風谷外鐘遲遲半輪月未忍出雙峯稍治尋山屐初裁半隠衣聲聲杜鵑語猶勸不如歸六言絶句送菜徐秀才吏部虀鹽滿腹先生苜蓿盈盤珍重尋常癡客不作膏粱眼看食薺已甘予口送荼聊苦君腸見說䑛碪無分借令轑釡何妨黄精末有積雪晩菘猶帯寒烟雖辜主父九鼎不減何郎萬錢增添庾郎方丈掇拾儀休棄遺但令門人學圃不妨夫子下帷七言絶句秋日登樓濃掃清隂一壑秋眼光新困仲宣樓等閒欲作東山醉却為蒼生不破愁洗遍山光暮雨收落霞孤鶩㸃清秋蜀天地暖知無雁不怕愁聲稳上樓送吕興元身離梁苑初蠶月脚蹈秦雲已麥秋要見使君恩惠久滔滔長伴漢江流梯天懸閣馬行空旌斾悠悠照谷紅靈鳯隂寒春過晩萬山猶有牡丹風氷壺舊映藍溪玉璧乘曾依白帝城明日武林山下路過橋唯有杜鵑聲太平天子事東封洛苑回鑾訪侍中自古相門終出相試持圭璧近重瞳霧豹平時豈一班定將清對領威顔東南民病知多少莫把皇華誤出闗行入雲衢路未通主人明日復觀風幾聲寒鵲江村暮煙雨瀟瀟失去鴻目擊懸知九折自成醫痩骨綿綿尚勝肥引睡文書滿床榻病兒猶枕樂天詩送程公明莫倚行臺怯酒醺一盃父老送慇懃白雲嶺上雖無數未敢持來玷使君漸横碧落快秋風回首雲山幾萬重明夕長亭新夢破亂鵶殘月五更鐘解頥詩訓憶趨庭四十專城髮尚青屈指世間無此樂路行争看老人星不羈風韻有蕭郎白傅新詩已滿筐煙薄露寒雖寫痩自應清節也凌霜金闔銅樞喚仗開越班侍從薦高才一鞭野色身何處芸閣清風待客來玉鐙驚驦趂早朝天香成陣暗蟬貂平雲無復偷閒到溪闊煙深鎻市橋無限秋容入跨鼇使君山色兩相高半生笑盡迎逢輩俯仰隨人效桔橰自憐痩骨飲氷寒惆悵相逢下眼看閒想顯人應笑我道傍初試折腰官青草山頭一萬家那分下澤有龍蛇不知明日都門客肯與東風緩頰牙登山臨水送將歸身䕃甘棠手挽衣不似塞垣來泣别傍轅猶怯使君威送菜徐秀才錦里園官供菜把草堂詩客重傷貧一盃野老誇芹美笑煞從來食肉人馮秀才宅晩飲雪絲霧幕晩隂濃還隔家山幾許重引睡憑君一樽酒欲將歸夢過鼇峯西齋睡起避雨燕兒晴又去趂衙蜂子晩還歸西軒一枕無人喚零落桃花繞夢飛緑雲山麥層層緑紅雨谿桃處處殘老去見花如隔霧可堪不得霧中看題北巖定林院方丈戊戌正月二十四日攜諸童稚來遊藉草而飲既醉書方丈小垣以去松嶺晴煙明冉冉石橋融水暖涓涓老翁百事無心計秪有尋春似去年東風桃李年年在化國光隂日日長試數開元到今夕幾經繁盛幾凄涼桃花年少劉郎初見時似笑東風三兩枝劉郎白髮欲再見前溪落盡迷佳期正月末再來渡石橋見桃花盛開有感而賦小桃弄色仍千本流水飄香又一年何必人如花灼灼但教情似水涓涓梨花太真欲泣君王羞一枝帯雨春梢頭年來樂府不栽種淡月青煙無處求種蓮分得清潯白玉芽旋抽緑柄信欹斜當時蕩槳耶谿女可是無情笑隔花題純益壁記斜雨逆風昏舊字是中能有幾人知未言温室栽何木先向忠州教竹枝晩飲馮秀才宅遥天孤雁泣離羣疊疊秋山更莫雲孤雁足添遷客恨相逢賴有小馮君雪樹巴山雪樹慘黄雲劔甲參差百萬軍不用寒光苦凌鑠若論官況冷於君登天台江雲不與山雲接土雨還因夜雨消獨上天台肆遐矚故鄉只隔一山遥送劉祠部漢苑何人侍翠輿鏘鏘環珮雜璆瓐劉郎帶笑大誇客此是予家千里駒玉腕騰雲黑霧開穆王八駿如駑駘逸氣飄飄長不已重聞汗血下天來芙蓉城下多埃土却逐劉郎上天去峨眉一顧一回頭明月東風在何處立化童子冷飯殘羮屬與誰其他消息問誰知竿頭一步饒師進不是當年去得遲泛松溪浪激氷花潄大堤山回雲影照寒溪一生懷抱無人見又躍蘆梢困馬蹄過賈浪仙崔秀才故祠浪仙句法得全功崔子區區立下風客塜相望歸不得青衫憔悴兩君同倦飛好鳥下荒陂不見騎驢主簿歸林杳笛寒聲愈細為尋牛背一簑衣題貴閒軒塵埋鬼笑有無間多少真癡不貴閒白日舒長問誰老幾將春夢到三山除草緑茵春葄暖無加醉眼蒙茸纈萬花聞道芟夷殊不惡直須着意認蘭芽還書室浄室歸來自冷氷矜持筆硯更非能假令一笑人間事大似當年碧眼僧緑隂亭茂林侵路能藏寺喬木參天却見樓山石因循雲外老江聲掀撲屋梢流題望喜驛黄夷仲詩後杜宇啼愁連谷暗嘉陵流恨接天長路人要見行人喜看取眉間一㸃黄黄詩云眉間見喜氣行人有歸期春深過黄亭碧流未到小池開半畝篔簹䕃紫苔遲日暖風留不得亂紅飛去燕衘來秀野亭二首眼纈蒙茸真草木春歸廣莫自文章妙回玉指香羅密秖許楊花傍小床溪光山色淺無㾗荒樹平蕪見幾村秖恐重來春自去梨花吹盡月黄昏題興化小閣田界紋楸看緑玉池分龜兆渴清泉水曺載酒非無意小雨留人信有縁迎馬玉簪看作竹浸籬鴨緑已盈溝田園秀潤吾無着却要江湖一小舟鉢囊有潤何癯瘠魚皷無聲太寂寥更向衝衢見車馬可能不過虎溪橋舟中漫興梅雨㝠㝠濕釣船失羣寒鷺下江天一聲長笛無窮意自疊漁簑白日眠篷窻幾㸃落梅花旋覺春容放草芽莫上江樓發歸興斷霞衰照起寒鴉盧舍郍僧舍留别小溝水縠漾晴暉上學兒童短褐衣猶記飛泉山下路㑹成春服舞雩歸筠尖側側度朝暉别淚潸潸漬客衣兒女慇懃憐我老登山臨水送將歸脆栁飛花弄晚暉雲羅雲紵試春衣箇身未便長為客化鶴千年亦一歸幽意薔薇老麝隔雲香濡袖隂嵐翠滴牆花樹參差山月出欲尋幽逕導韓郎迢迢不斷古江聲何似當年奉倩情小玉拂屏沉火滅便隨閒夢唾虚名緑帢纒頭錦束腰陣前誰數霍嫖姚何人與掃紅蕖嶂留得周郎伴小喬步步金蓮何可得朝朝瓊樹有無新那能㓂録逃名姓早醉長安一息春過金牛自勞玉人鶴骨馬龜腸白日貪晴夜趂涼誰道飄零大荒逺此間猶是蜀封疆帖嶮縁虚知幾蟠小山細水入平寛云何癭婦飜相笑土木形骸亦屬官送張少卿赴召十首初排閶闔欲朝天流電追鋒急召賢延閣鳯池風月好不須回首望籌邊四海傾瞻調鼎手朝廷側席待伊周江城父老休遮道可是星車肯少留張公論事力回天明日延英席自前秦甸江西勞馬策此回不計地流錢公子詩成輕萬户將軍諾重過千金不煩縣令前驅去回采堅珉刻醉吟天子清閒問侍臣當年張姓復其名事見唐張河東傳金甌已灑銀鈎字庭下宣麻不用驚燕子樓成月滿欄縷金衣就酒翻瀾從前樂府知多少再到東山記謝安光芒先已動台躔子舍修書正妙年奏對八磚看白日文章萬選敵青錢誰將蜀栁贈行人曾伴靈和殿下春笑煞後來門下客風流不似迺翁身龍蛇飛動從椽筆昔看公孫舞劔來何得却知顛草妙為隨賓客到金臺傾倒憐才出至公吹嘘牙頰自春風寛和肯問車裀吐涵養須知内史聾題馮園三首林園暖日注蔫紅啼鳥重来樹亦空莫道主人無意在觧將籬落護春風已將歸騎逐東風家在岷峨第幾峯應是故山猿鶴嘯主人歸得已龍鍾渾道無情易别離袖痕㸔取泪燕脂陽闗三疊何須唱正是征鞍欲去時即席次必强六絶句且倚東風拚酒酣莫將食口配春蠶還家更有無窮興曲水飄香滿舍南暖霧團雲晩氣酣柅車遊女密于蠶錦城行樂忘歸客家在魚鳬碧水南夾道紅英碎纈鞍文園春滿帶圍寛䨇輪不觧生方角祗作繁城數日歡市酒郫筒去未還宗人厚徳敵劉寛田歌社舞生惆悵聊向樽前佐客歡憐君醉裏賦新詩皎皎風前玉樹枝在處相逢開口笑一生能有幾多時樓前燕子不知歸樓下鸎啼碧樹枝絲管未收空梓澤恐君還有斷腸時七夕日宿長江去歳龍城樂事多樓頭乞巧傍青娥今年織女知何處不見星郎送渡河
