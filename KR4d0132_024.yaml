body:
  text: 跨鼇集卷二十四宋李新撰啓謝龎機宜啓負檄趨梓操觚渡瀘既叨開府之辟書又玷清秋之薦墨吹噓言重推挽力多初求鳯毛忌諱不識再見眉宇鄙吝自銷絶無先容題品已歸於月旦決有定議剡詞不待於歲終審當承顔之餘肯借緩頰之助歆向未始異論渾戎不妨清談方興九里之城俾效一夫之役謂子貢肆無窮之辨能說大人致韓琬無不遇之言可題客舍脫身選調結草恩閎此蓋某官智自天開學惟性妙氣平以定語粹而文同門弟子之詠經勸大將軍之薦士庭下過子鯉人已多其賢聲軍中立左車士或得而快意取青箱之舊牒録跛傔之賤名顧後日之曳裾正曩逰之下士未遑報稱何啻感藏謝循資啓末路焚舟在兹一舉青雲附驥俄爾再遷録蜀客之微勞疏堯天之睿澤光生蔀屋愧入汗顔伏念某學非無師力弗逮命困值䵬伯退編逋翁虛馳璧水之名誤玷龍門之賞志荒求仕若倒挽於九牛老至為文近退飛之六鷁碑顔沒字鼓腹無腸妄投北闕之書久作南冠之繫罪將溢貫智不滿囊辱吾老子之龍文來自司空之城旦三日新婦宜閉氣於車中百年枯桐輒揚聲於爨下誓言投筆樂賦從軍㑹將命以恢疆許開府而求士陳力就列不足使於前與趨事勸功有以賤為貴者憐其勤匱試以劇難饋糧以供師行制器以前民用悉禀坐帷之畫推而行之載加伏櫪之鞭與其進也直道為屈讒言孔多終成貝錦之章遞肆燃灰之溺和戎自絳草奏非湯削竹簡之春秋化雲天之雨露祐甫疏內八百吏無親舊之嫌子儀帳中六十人皆將相之舉靜思濶遇端出腆恩此蓋某官學殖根深德機深湛獨運潜神之計兼收闢國之功歷六詔之故封窮三代之荒服不必解降王之縛益能得面內之心來則安之屢布相如之檄召則行矣將遄吉甫之歸某濫被薦論猥叨升進拜細書之一札載厚賜於五雲愧在盧前重靦顔於躐等請從隗始形雅意於好賢感無窮恩盡未來際到任謝二走馬啓仰奉除音外移使指上副聖人之欽恤俯慚器業之空疏郭伋重來第見兒童之慕令威復至稍驚城郭之非托庇云初量情備喜伏惟某官忠嘉許國直亮秉躬立清凖於朝端播徽聲於士論下車解衽方勞望履之思拭目揚眉行有趨風之便謝黃都大啓埋輪當道不問狐狸爝火虧光何傷日月行迷途而不返墮眢井以誰尤且法本貴於持平事或容於脫誤不循三尺殆以私而勝公雖有二天肯轉禍而為福猖狂固無大惡踈略豈有他腸不平謂何或失而已告者過也難明竊斧之疑問以辨之寧無投杼之感况摘山之謀以强兵富國豈折腰之賤能隳事沮功誓無此心偶褫其魄譬尹何之為邑未能操刀如揚干之亂行無所逃命如某者才不周變學非適時因人而成為鬼所笑屬同列之競進忌寸步之或前先張之弧又下之石內自訟者何當嘔出肺肝人必知之盍亦有靦面目尚希哀顧許以自新此蓋某官德浹神明性全忠厚垂惠於不報推恩於無知矜其地寒與免吏對仰天呼救忍坐視其困乎搖尾乞憐必有動於中者願引車而改轍不忘終身將洗心而事公請自今日謝改官啓築斯城而鑿斯池蔑無勤績言如綸而出如綍誤玷優恩念昔第功全歸化力及今祗命獨後衆人脫半生選調之卑激百口愚衷之感竊以穴居避患巢木安棲天造域以分疆王設險而保國折栁樊圃智未有餘丸泥封關愚不可及國家閒暇常恢道德之威日月照臨絶無內外之患曩置漳川於劍限實為右屬之喉襟豈其雉堞之隳無復蛇形之壯總兹重任斷自宏規人心均和天意甚恱奬詞溫厚謂可威於百蠻立制精詳固宜垂之萬世實墉實壑非徒壯觀自西自東特為雄冠毛錐子已投地上寧力之勞王先生雖在役中奚功之有伏念某鈍不及事拙無取才初伸已知猶恥人役驟叨换爵獲出汚塗不因汗馬之勞尚得桑榆之景行三十年之空限險阻備嘗遇五百載之賢人推挽加進欲求報德之所曷在他人之門此蓋某官髙義薄雲至誠格物易以事而難以說望之畏而即之溫哲夫成城已懋金湯之績君子蹈道能踈雨露之私致此么微亦獲升改毛遂惡因人成事齊人多以口得官是何永廢之流如假再生之路生育長養惟父母喜于就任飲食教誨約兒孫以盧為名庶不忘卵翼之恩姑以盡犬馬之報到任謝劉夢臣啓占星蜀部昔來何遲望氣關中今見恨晚將交一臂坐闊十年實每懷於好音矧難雕於朽木回雖不敏誤䝉卓爾之稱棖焉得剛初學浩然之養念在官均將母之樂爰當時慕稽古之榮顧萱草以涕零指具茨而雲隔雉介意以無匹雁孤飛而底哀操繆悠而弔戰場禀生碩以事儒將河潤九里知未易於忘情鷯巢一枝幸有餘於樂地固其求舊方賴作新恭惟某官以道為宗惟刑之恤言可觀而行可法望之畏而即之溫忠臣必求孝子之門大夫正行古人之事曩依函丈獲教書紳數勤倒屣之迎嘗布順風之請世憐其困料黃祖不能容禰衡士擇所歸主侍人何以為孔子未始見幾而作固當慕義而留儻因醴酒以置疑竟卷綬章而投劾茂州到任謝啓郡守承宣雖資輔佐雪山輕重不係去來越岷峨深入於不毛古松㑹强名之曰郡矧石紐大禹之所宅本冉駹西漢而後通貢賦無三品之金羈縻僅十州之獠虎狼充路橋閣緣雲隕石飛空冒險豈千金之子凌霄置戍當關宜一夫之雄在昔從戎迫令使敵書生事俎豆乃乘桴笮以迎降士林肅衣冠俾扣兵夫而問疾溺深救至䝉河伯之不收病極更生無扁鵲而小愈言猶尚在志不復來或叨誤恩誠出非意鬭驚濤猶過覆車之轍視舊榻如不共天之讐楚些重招哀同濟有三閭之作藥籠預備念此生成九折之醫所居而安何陋之有恭惟某官清淨以治順巽而行以堯事君與蜀為福歆向父子考論議之同歸機雲弟兄見文章之相亞比從下座誨以至言一塵不揚請舉安平之燧九河已潤更濡枯涸之鱗再謝循資啓朵雲再上名玷囊封閲嵗四遷恩歸臺府功亡可記感不待言伏念某學迷聖徒愚自天性政事載餳以冒人材沐猴而冠非法家流嘗忍議文之愧本儒者服絶無稽古之榮書成蠧魚傳養癖疾老虀鹽於太學程朱墨以功曹多言數窮殆取投荒之謫强項不屈姑參起廢之遊時操毛錐務出月脅形第怖瘧氣將食牛而曹雖類於郭尖無處可逃於鮑五識一丁字那勝挽於彊弓相萬里侯豈容分於縱理日者辟士與之開疆獲請命而與行非因人而借譽晉公幕下本求韓愈文章昆邪奏中惟許李廣材氣大道最嫌揀擇至公不論孤寒伯樂能空冀北之羣劉安盡化淮南之石燕公大手筆迭回雨露之私太原小朝廷終許衣冠之盛受賞乃爾顧德何堪此蓋某官克己於仁見幾以獨體賢者之蹈道得哲夫而成城萬歲仆碑已極夜郎之地相如傳檄尚虛邛笮之君圖書初總於道山雞犬亦遵於雲路致兹嵬瑣荐被超升凡畢循選人之階是誤乘君子之器侏儒易飽爰增粟於一囊傴僂過恭式循墻於三命瓜蠅遽集水鏡肯搖既越等以叨恩敢興言而觖望感遇二字願勒銘於山阿圖報一心不食言於河水謝王亷訪築城畢工啓修役事之至重不亦勞乎尅期㑹之太嚴非敢後也既免瘝官之責遂叨粹語之褒設險擬於金湯保民必先城郭百年弗治一旦惟新墉壑髙深樓櫓華煥五月而息豈杇糞土之墻百堵皆興又復他山之石執殳朴而從車右挾法式而問規程制而用之古未有也凡經台視之過曲盡精微雖資人力之為深藏知巧而况書生田野俗學童䝉頗疏拙無取才號遲鈍不及事焉知制作在俎豆則嘗聞試使經營本斗筲何足算荐䝉驅䇿復賜指蹤長裾化畚鍤之塵重趼困梯衝之舞暴身既久宣力為多果有功而見知借餘論而不惜儻離選調全出異恩此蓋伏遇某官德宇恢疏智機穎利以道自任與物為春說使人而忘勞善用才而無棄非一夫成百雉之制出片言愈九鼎之安致兹凡下之流最荷提攜之重功名難際恐英公惡命薄之人富貴無忘推傅說在版築之列誓言九泯圖報一生賀王觀察到任啓鳯厯推剛龜文顧左已諧禮上倍切歡愈稍移蜀使之星迭拜周家之命雪山增重金馬開祥當易于請腰笏之濵正李雍求識面之地念昔提文衡於漢上顧豫執賤事於禮闈肉眼未識貴人步吏固宜革帶蔡見鄂嶽曾晚學之莫知楓落吳江亦前人之誤聽别一閲世共兩禿翁巴子國窮聞太史起滯留之歎河圖職妙謂劉公知取豫之方惟摘山市駿之謀實富國强兵之本肇自神考精求偉人俾興至利之源待以不次之舉數政之後奉法不䖍比年以來為弊滋甚明珠異貝既交走於貴權空籍紿書又肆謾於公上於今所受任責不輕必待先見之明乃救末流之弊雖望之在外終雅意於本朝使宋璟居中肯容心於私謁蒞事伊始著聲何高載道之謠若碑落筆之觀如堵恭惟某官因時以出載道而行才超世而非師學到古而自我擢從他部簡在帝心烏衣馬糞之遊典刑具在西清延閣之邃几席久虛佇聼受釐之恩端有追風之召某投荒逺裔臥疾餘生未瞻雙舄之飛初託九河之潤猶叨五斗粗明投劾之幾止有一天斷無挾故之慮參承尚阻傾陷良深謝謝轉運判官啓初馳囊皂豈虞罪戾之加再服官針猶起功名之念敬仰陶成之賜敢忘湔拂之恩喜與幸并感非言盡伏念某隴西末裔鼇嶺寒生素無倚馬之才夙負屠龍之學再飛秋鶚繼捷春闈豈期躍冶之不祥遂失夀陵之故步多言賈傅自取間疏挑戰李陵竟成囚虜狂圖至此薄命奈何丹闕春風未信淄川之對山城夜月來觀梅尉之碑反求諸身未為不遇此蓋伏遇運判奉議先生氷壺雅望水鏡清標絶代風流逺嗣東山之逰屐驚人事業近追淝水之殊勳文采不羣已先明月詩篇獨到何但澄江萃奕世之殊能作一時之偉望茂膺宸眷夙董漕權千里運糧誰識帳中之心計九年足用人驚地上之錢流顧惟駑材實依燕厦曩嘗披霧幸獲拜塵脫略崇髙驟止循墻之走屏捐名分遽䝉倒屣之迎載聆玊麈之談復侍獸樽之飲岸中陪燕清興固不凡接膝論文幸遇亦何有曾是鸞棲之局倍叨龍坂之光喜溢顔間祥生户外某敢不俯勤官守仰法吏師佩穀熟之遺風鑒韓城之舊訓朞年考績覬隨嚴助之計偕餘論吹枯願借山公之啓事李轉運判官逺迎啓顯奉芝書榮持玉節凡叨臨蒞倍切欣愈恭惟某官學造淵微氣存剛大仰被聖神之眷深明道德之歸移孝於忠處仁以義䕫教胄子知學為賢士之關帝耕籍田謂農乃天下之本久居妙選數近清光肯辭蜀道之難益見雪山之重乃得御矣顧瞻接士之容其猶龍耶姑候出關之氣某垂老不調至愚無知侣令綽以分曹參韋嵩而決事畏風以遁未明投劾之幾慕義而留行即望塵之拜趙轉運判官逺迎啓光膺宸命榮領使權方勞望履之思已聽畏途之戒伏惟某官器資宏逺政術疏通深潜富國之謀丕著立朝之績江淮轉漕大被劉晏之功巴蜀觀風行布相如之檄既淵衷之簡在宜溫詔以遄歸某將命叨恩指期覿德雖出坤維之逺幸分河潤之餘參奉匪遙欣愈尤切謝張待制啓不逺千里仰瞻少微之光無有二心恭受杏壇之誨與適未可與立所見不逮所聞過勤倒屣之迎獲布順風之請士皆驚目孰為來哉師獨解顔與其進也蓋丹鳯于飛則率羣羽以皆集拔茅連茹則思引類以同升特親玉麈之談迭奉獸樽之飲燕公大手筆數窺翰墨之飛太原小朝廷真見衣冠之盛伏念某小智易測大愚不靈書成蠧魚傳養癖疾回雖不敏或可使於前與棖焉得剛宜有動於中者久閉其聲而弗出力尊所行以為明身雖不容氣未稍下以寒蛙當兩部非爾所知謂蓮花似六郎則余豈敢進值䵬伯退呼漫郎彼臧氏焉能使魯侯主侍人何以為孔子晉公幕下初求韓愈之文章嚴武帳中惟縱杜陵之詩酒言叨望重恩辱已知此蓋某官至論回天妙文華國得古人之大體樂天下之英才不可親疏曷其簡易得季將軍諾詎肯易以千金掃曹相國門願首先於百執遽違鼎席還守版曹聽指日以造朝更甘心於執馭既多佩德良切馳情賀秦州陸待制啓伏審眷自宸衷進升內閣仰增慶抃恭惟某官清規奕世丕業動天紀綱華夷標準中外雖輕裘緩帶而氣蓋軍中能富國强兵而錢流地上曩嘗驅車蜀道誠由被器先朝豈惟獻摘山之謀固亦藴安邉之術待時而動以道自將賞士衡為龍駒未可量也推象先作人望惟其有之况國朝方清玊門之氛而藩鎮實倚秦亭之重甫眷西顧首頒異恩儼寶構之神區頥帝文之祕府兹為華貫用賁精材綸言遝來柄任有日聞吉甫之北伐式遄其歸想曹參之趨裝可立而待某拘文有限展慶無由望台屏以展光與輿情而均躍上宇文知郡啓竊以峩冠大袖氣概洋洋灑墨揮毫文章落落競就王公之貴孰知道德之歸士習皆然余心患此豈知務師者託素絲之質慕道者先青佩之儀執晏子鞭企孤風之髙邈為李膺御攀逸駕之崢嶸中圗益於見聞外豈徇於名勢如某者隴西冷族鼇嶺孤生滿籯無韋氏之金數尺乏丘遲之錦功名難得憐青鬢之半蒼歲月易遷慮紅塵之暗老學欲為道仕期養親鬻珍豈免於胡盧故步殆成於匍匐少二頃之負郭闕百畝以躬耕聚蚊成雷任罹俗訕刻鵠類鶩强齒俊遊難投足於我疆遂竄身於鄰境虎靴預謁屢升仲寶之堂牛鐸成音未辱荀公之聽於是强編蕪纍仰瀆聰明欵伯喈席者咸謂異才逰子厚門者並稱名士觀海為水尤慙一勺之微以莛撞鐘亦冀小鳴之便恭惟某人行安常性學出真心道德遵時之英才業為衆之準音容和粹春生金谷翠連天風骨精明氷透玊壺清滿腹吹噓後進黼黻斯文伏乞比恕後夫誨加大匠一則俟振特之惠一則祈開敏之私立指迷塗俾知聖域杏壇數仭斯時矜潔已以求桃浪三春異日庶燒鱗而上代賀許侍郎冬至啓土圭揆影導萬彚以迎長寶册書雲候一陽之初復恭惟某官蓍龜大政柱石本朝儲精泰階峙器清廟日著可大之業力培太平之基民人可瞻文武是憲凡四時與合其序則百祿宜受于天更納繁禧以副注意某猥被皇華而諭蜀阻依台屏以稱觴頌詠徒深文言罔既上章相公賀冬啓土圭揆影導萬彚以迎長寶冊書雲候一陽之初復恭惟某官質文全粹聲實保和道觀昭曠之原化執慘舒之柄大熙庶績以為百工師時顯諸仁所謂萬世利臻符瑞之衆至懋功德以兼隆式丁亞歲之辰宜受王明之福某限拘蜀道阻覿台光仰被埏陶實深頌詠與唐梓州賀冬啓伏以明陽胥復瑞景迎長漢儀肅簮辨之賢堯厯謹星躔之次伏惟某官才能許國謀議冠時早收雋彥之科茂奮勳庸之美宜承厖祜用對褒嘉指峻館以非遙述慶悰而莫既數言瞻頌罄寫奚殫回唐梓州賀冬啓伏以歷紀周正首三微而建統灰飛嶰竹冠六律以推長道宜作德之休吉有自天之祐伏惟某官純誠格物善政宜民早參書殿之遊尚鬱虎符之寄清修迪吉已諧道長之辰密勿論思佇有彚征之慶賔榮阻造頌懇徒深
