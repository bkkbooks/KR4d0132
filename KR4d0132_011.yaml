body:
  text: 跨鼇集巻十一宋李新撰七言絶句中江道中江楓揺落市煙青石壁方嚴水靣平若問灘流何太咽定隨行客學吞聲龍洞三年兩到只忙忙誰道雲山得久長松竹有孫龍蛻骨人生頭白是尋常甲辰正月二十三日夕壬申夢坐一江樓上見雪月輝映汀洲高下澄流金碧林野疎迥景物清華絶非人間世所有因賦數詩既覺止記一首風巻寒雲雪壓船樓臺隠約隔明煙黄庭掩映桃紅篆静看雙鵝一水天樓下有一道士云水一天予云不如一水天次趙繼公得未開牡丹之什洛陽二月三月春車輪馬足飄香塵金錢散盡花不見買得桃李猶非真送牡丹與趙元思秖許青松約歲寒姚黄魏紫偶盈盤晨粧休挿無鹽鬢送與文君巻帳看居中饋薏苡青頭雞小詩代簡彈殺能言笑解頥載歸招謗問誰知難隨白鶴同時放且伴黄粱一處炊問田尉公俞丐菊栽曾泛黄花竹葉輕更循籬下數繁英主人已後荒三徑狂客從前號四明静鄰寺垂天雲影暗溪橋寺野人稀自寂寥遊夢已隨飛葉落亂風吹雨竹蕭蕭過廉水渡二首茂林何事鎻孤煙開出澄光見碧天江水不流廉節去清名長解勝貪泉黄金六印豈闗身寳藏盈居亦訴貧不到蓋棺終未定可憐多少過橋人寂照院世路沉迷正厭醒故山洗出纈龜屏已因麗句迎門笑更得疎篁作眼青安居瀕江小藍留三小詩手舉離筵第一杯􅕣􅕣船鼓看忙催恰將幽夢歸山谷苦殺篷窻雨喚回自遂寧府解縴五七友餞於排亭乘醉登舟酣寢江大漲不半日至安居觀水觀瀾見㑹同人情難似水朝東寄聲囑付王家老深鎖堂前翡翠籠安居王十九新儲官奴置别室江干平日重回首樓閣參差目飽秋世事從來錯經意一生幾誤轉船頭月下口占戯子温桂華已出海邊山雨葉翻光作夜寒陶令骨清無鼻息苦吟休倦倚䦨干萬里層隂宿霧消氷輪初上鏡天遥此時仙漢欄干曲竹影梅風笑寂寥貽高執中朝朝騎馬走江城晩弄輕煙暮帯星應笑北堂窮處士遶牆空覔聚書螢項羽廟空使秦人笑沐猴錦衣東去更何求可憐了了重瞳子不見山河遶雍州永吉院阻雨美人怪我長為客青雁傳書不肯開向道在家貧亦好惡教風雨送歸來錦江思獨詠滄浪古岸邊牽風栁帯緑凝煙得魚且斫金絲鱠醉折桃花倚釣船書懶摶寺壁曲崦藏雲樹老藤碧山秧稻一層層回尋二十年前夢猶是當時識面僧書垂栁舖壁逺碧涵空暮天闊落日愁人船不發多情何處雁西飛憑寄天涯尺素歸書孔伯紹題壁後伯紹壁間遺跡在雨昏炱蝕逆風吹何人借與雲嵓石化作人間堕淚碑戯書元明㕔壁漲急灘流隨眼落市忙烏合轉頭空一年三百六十日却有半年閒守窮題東高院壁主簿騎驢雲外去山僧吹笛夢中來行人不用重回首自有東風播鳯臺和李少卿疎雨輕煙憶故林一生難愜子由心未須逕化陂龍去留作甘棠異日隂程公明駕部墨竹淺梢疎節任蕭郎正向祁寒敵曉霜清興未窮僧已老自遺山色與溪光自西縣趨南鄭道中襍詠三首矮陌穹廬青匝地垂楊步幛緑藏橋無端驚耳西江漲十里雄聲學海潮愛山不道妨行色礙眼仍須徹帽裙願借仙人白鷴尾自家親掃北山雲茂林修竹平夷地牧馬藏兵戰鬬塲死節不知師李固溺冠惟解法高皇禪房石竇涓涓函丈冷海雲疊疊暮山低秋風早晚驚禪定肯為陶潛一過溪題韓溪雲夢擒王終獵狗芒碭龍子詎蟠泥前知婦女磨英氣亦率蕭公早過溪墨竹葉葉飛秋聲自來蕭郎國有不羈才西山昨夜虎風惡大折一枝無處栽題賴盤市法雲院二首亂石崖邊花蹙錦鬬雞峯下麥翻雲青螺着地山渾翠丹餅乘天日半曛石壁冷磨閒日月松櫺平覺逺山川便將小紐雙龜印試換禪床一覺眠用劉子黙韻題瘼亭醉頭兀兀接籬斜客宦歸來賦白華小洞方池初着意坐看梅雨數殘花芝溪院青蓋行春踏雁沙連山舊燒起新芽馬蹄何處窮餘興猶有谿山一樹花次韻崔同年馬上口占二首底事安仁易白頭一鞭行色伴清鷗抽身簿領窮清興唯有江天倒射眸栁花榆莢半飛空燕子銜來盡落紅日與長安俱未逺可能提榼問東風白塔院西風晴野快揚鞭臨水驦駒惜錦韀蕭寺凄涼幾不到巨楠蒼檜碧參天龍笛長天雲掃碧龍鱗黄鶴樓前白玉輪秋意正隨羗笛怨夜深愁殺倚欄人天王院溪邊竹瘦暮雲昏愛客頭陀未掩門問我年來何所事袖邊朱墨幾多㾗戯子常㩦妓見訪紅英渾似識劉郎迎笑干株夾路傍曙色松窻留不得斷雲無處覔殘香次韻子温早梅霜多木葉太孤冷欲向春前倒樹開莫道東風無意在餘香看即度牆來新春道中口占幛地翠煙猶惜曉乳花小雨却翻晴去年春恨依前到先得東風捲入城挑去聲人栁目空依路喚客鶯聲又隔林病渴相如今已老悔將春事入琴心老去難禁數别離一樽春酒為誰悲緑楊深院花飛處秪有東風獨自知千本春桃行石顔暖風扶袖入雲端庾郎食菜今多少但看行厨白璧盤白馬蹄輕氣亦驕嘶風嘶日上山椒迺翁不似楊光禄與汝披霜趂早朝榆莢已吹鵝眼去栁綿不帯繭香來輕霜未度劉郎鬢更看春桃幾度開春閒戯書三首幾家桃李高低樹一望江山表裏春寂寞無心看花去懸知自有看花人春天行樂若為傷青鬢吹蓬半染霜莫道一生甘淡薄十年前亦為春狂老病空懷雲水鄉涪江春浪接天長扁舟擬下巫陽去不聽巴猿已斷腸高祖試劍石拔山蓋世何為者三尺青龍不切泥且向斷崖聊一試如聞鬼母夜悲啼詩餘洞仙歌一年春物惟梅栁間意味最深至鶯花爛漫時則春已衰殘使人無復新意坐間賦此雪雲散盡放曉晴池院楊栁於人便青眼更風流多處一㸃梅心相映逺約畧顰輕笑淺一年春好處不在濃芳小艷踈香最嬌軟到清明時候百紫千紅花正亂已失春工一半早占取年光共追遊但莫管春寒醉紅自暖臨江仙楊栁梢頭春色重紫騮嘶入殘花香風滿面日西斜只知閒信馬不覺誤隨車已許洞天歸路晚空勞眼惜睂憐幾回偷為擲花鈿今生應已過重結後來緣浣溪沙秋懐千古人生樂事稀露濃烟重薄寒時菊花須挿兩三枝未老功名辜兩鬢悲秋情緒入雙睂茂陵多病有誰知前調書所見雨霽籠山碧破賒小園圍屋粉墻斜朱門閒掩那人家素腕撥香臨寳砌層波窺客擘輕紗隔窗隠隠見簪花攤破浣溪沙幾度珠簾捲上鈎折花走馬向揚州老去不堪尋往事上心頭陶令無聊惟喜醉茂陵多病不勝愁脉脉春情長不斷水東流
