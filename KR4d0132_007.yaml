body:
  text: 跨鼇集巻七宋李新撰七言律詩從辟瀘南道中曉征三首人情世事今如此與作叢林眼目㸔髀肉未能銷犢鼻溪篁先與斸漁竿山銜落月金盤缺馬踏清霜玉珮寒一十九年閒睡足欲將春夢入長安矍鑠從戎恃骨彊舊衣襃愽詎堪裝歲云暮矣家安在月出皎兮山更長錐子秃毛窮有分碑顔沒字老何妨憑君為䕶痴兒女白首相期樂未央貂裘紫帽日程程不得修途一紙平作雪曉天梅蕚重壓塵小雨馬蹄輕隨身詩酒三勍敵入眼山川幾畫屏到日未須投我轄為燒蘭水濯繁纓金匱道中白雲包裹石城賖幾度親歸夢裏家春入小桃渾綺繡風回殘雪半塵沙唐賢碎瀉真珠粒鄭老微明白杏花莫道窮邊無好語二公流落亦天涯唐人留題道西巖泉詩本朝鄭文寳有此語銅鼓道中所見詩麥秋塲圃面顔光蠶月絲車繭水黄豆飯餉田薅鼓住田塍收水婦翁忙明沙粲粲流泉慢緑竹猗猗苦笋香赩日不黔形自黑剰收斗粉傅何郎尹公湖晩歸箇中適意即吾廬可是秋來杖屨踈碧樹野煙連廣莫暮池斜照落函虚天髙鴈逈字明滅林杳笛寒聲有無喜見眉間知底事近鄉頻領北堂書崇寧寺晚歸逺意難隨燕燕歸故園春冷杏花稀虚名自古雙蝸角别業從來一釣磯已後無人能立雪他年知子可傳衣結廬薄有西山地更遣何人賦式㣲落解西歸長安道中書所懷年少將軍師羽林追奔翻為白頭吟不平豪憤三年氣未死英雄萬里心故國山川知好在異鄉風物許重尋捷書不報渾閒事西出潼闗無好音臘月八日過闗得家問殊不慰覉抱再書北風過河霜霧深凍入毛骨殊侵尋行人已苦長安道俗眼徒慙季子金風月秦樓愁處别鸎花蜀國病中吟莫嗤今日西歸計直為重安親老心還三嵎先寄舍弟客宦乗流同木偶入村隨俗自猴冠鴒飛原上正相應豆泣釜中當少寛貂闕長憂狗尾續客來應借鳯毛㸔隴西衣鉢傳無盡熟㸔羣兒現宰官寄舍弟二首周三千界貧無敵垂四十年癡有名不怕貴人譏巧宦但教窮鬼笑難兄異鄉置酒能招客曉夢還家莫計程起冩新詩歸寄汝尚餘山月過牕明冷漿庭巷四時秋巧拙時情不觧謀逺客病容詩共瘦故鄉野水泪通流稍辜破鏡刀頭約盡失蒼蠅驥尾遊他日江湖㸔生計鴨頭春浪一扁舟貽家弟但知四壁有連珠底事虚名更拙圖一㪷病予猶百首十年笑爾拙三都霜風入頰休驚冷瓦埦無油願急呼世上舌根皆識味滿傾終是愛醍醐徐安叟郊居旋補踈籬短短遮郊居初似厭紛華鄰燈林腹幾螢小市路山腰一線斜衰草綴珠㸔曉露暮天飛墨數歸鵶憐君近歲頭渾白兩泪臨風數祭拏飲田家洞洞依山皆古甓疑古冢也日脚歸雲到坐隅凍禽唧㗚樹扶踈望窮野麥緑不㫁春入山梅香有餘恐是滕公千載室定無汲冢五車書人間可乏賢公子長鋏歌成食有魚山中秋意擬握陂龍陟鳯臺厭聞逺鴈一聲哀霜乾殷葉背林去雨足黄雲歸谷來蕙幛可能留鶴宿草堂終待覔榿栽有心培養山中桂不束輪囷作散材劉子常約賞海棠共愁明月照空杯莫逐時人溺死灰百日酒隨山客盡一年春逐海棠囬門無轍迹草自長燕不世情貧肯來豆飯芋羮容易繼明朝花落不重開問田尉公俞丐菊栽冷官㕔外病隂隂猶向西風擁鼻吟梅福儘藏雲外宅陶潜難老菊邊心許因秋社前頭雨分與東籬匝後金待到重陽不開放却収樽酒去相尋早梅㝠寞元崖宅有神冷香寒色漏天真感深暖日常為力傑出飛霜恐後春千里故人何以寄一枝幽意望誰親孤標若值芳華菀羞與妖紅碧樹隣笋竹崢嶸澤國與煙村飽見尖尖破土㾗稍倩南風開鵲尾數煩夜雨送龍孫平生直節初揮籜後日清隂自庇根殘月莫雲林外㸔森森矛㦸萬軍屯催李祖申賞蓮㑹亭亭緑蓋宻回塘縹緲青娥麗素粧雪覆千年巢曵尾風翻一曲舞霓裳小槽酒滴隨慳雨北海樽空類亢陽何事却妨彭澤醉幾時聊發次公狂讀五代史𤓰割溝分幾戰場坎蛙穴蟻自侯王鐡槍妄謂千人敵溺器猶須七寳粧諸國豈能臣癩子九龍那得貯歸郎堪悲五十年來事荼毒蒸民倍感傷觀梁輔之曉閱羽林出戍死忘家坐作行趨聽虎牙碧月初生弓入抱青蛇不動劒藏花風吹細柳旗隂轉日過寒谿陣脚斜回笑書生頭白早空將筆硯戰年華凌雲江滙潨流揺地軸路窮九頂切彤霄半犁好雨田香潤一簸殘花春寂寥土馬未騣愁敗草仙人得杖厭靈苖與公莫論從前事楚些遊魂却可招隔墻吹簫悲深有作攖心人事細如蓑渾有童心柰老何濕雪盡隨哀泪堕清簫不與哭聲和歸休最病良田少侵老終憐季子多無命無才猶有友但憐雄辯正懸河問張興州覔酒䟃𧽼雲陣暮天低家在雲天西畔西雪片未容欺白髪貂裘不管汚黄泥梅寒花晩休吹笛水瘦江空莫照犀便有綈袍憐過客不如春釀亟封題時雨試步寄員子春與竹他年僅有衣敢愁天賦鮮岐嶷拏乂不拜渾閑事踉蹡初行更效誰莫道漢家飛將種那知天上石麟兒若令新歲能飜舌先寄城東老員詩詠晴髯老新詩錦自裁雨綃烟帳玉屏開風摩團碧隂雲破簷倒斜紅晩景來蟻陣爭雄人未覺蚊雷强聒夜相陪請君日醉兵厨酒千古英流安在哉夜坐有感并簡與訥教授青燈微火照寒更不信儒冠誤此生飜覺廣文官未冷始聞工部辟初行三年宦況秋蕭瑟一枕時情夢戰爭思過故園尋故老旋持春酒㸔春耕感事銀濤千里引長吟玉軫他年有古音雲起不知山有助鳥啼爭奈竹無心畫蛇可笑須安足攖市堪悲只見金莫與浮雲較休戚北窻棊酒夜方深正月晦書事業無家釀致隣翁得有薪溫引頰紅准擬片言能悟主復求一飽定傷弓詩書奴婢晨占鵩鹽米妻兒夜送窮早晩郊原莫零涕動揺葵麥有春風次韻子溫檢覆書事博山灰冷一星寒㪚亂文書少讀殘夕飲清氷消熱易夢為胡蝶過家難潘郎桃樹參差見沈老腰圍隠約寛雅量故應容嬾拙功名同向鏡中㸔上張幕草色恩袍九品中文章髙步屈英雄紅蓮緑水開新幕絳帳青衿走下風沛雨蒼龍功已奮翔雲丹鳯路潜通塵迷試問劉安訣就學僊源㸃化工送胡運使呉江氷㪚水溶溶乍見山花襭眼紅六日春容歸漢苑千年桃樹倚天風預留黄閣朱衣吏令侍商丘白髪翁元圃長生新釀熟一盃相屬月明中請將龜夀卜椒觴遲日花塼幾刻長千里煖風春夢好半鈎新月繡衣光帝前動笏揺山嶽劔外行車映雪霜湖上柳青歸未得里人爭掃徳星堂當年姓字列仙曹醉逐西王折海桃萬策水平祥霧合峨眉嵐靜使星髙泥封明日傳清詔台量何人薦佩刀老去功成解金印卧雲閒笑一生勞劉小漕亂紅纈眼柳花飛煙抹􅀢溪秀一圍北背美人占夢去夕陽行客舞雩歸三呉父老傳氷節兩蜀江山識繡衣預草封章千百紙此身明日接天威小槽軋玉逗瓊漿滿酌金花薦夀觴已有駿駒傳驥足莫辭持節下羊腸䕶詩何處無靈物報國新來有皂囊要覔甘棠尋舊愛莫雲千里蔽柔桑五雲入夢翠浮空正在髙陽巴里中八葉蓂含天露緑千年桃映海波紅流錢逺裔爭推晏青史何人獨比雄白面門生指椿檜願肩華髪倚春風江提倉生日二首青鏁沈煙瞑著沙芙渠雲帳曉吞霞南金人物無雙士宫錦文章自一家賞過十分銀漢月採歸千歲海桃花蜀仙行勸長生酒燕寝凝香碧霧斜自應騎鶴下浮丘雅意人間事俊遊長久方壺新歲月飄颻江左舊風流嵓椿骨老三千尺佳氣春回十五州溫詔趨歸行有日此封端是富民侯贈翟提刑雲麥供羞薦紫閽里閭初識子威孫千年海骨蟠桃實六日天眉畫桂㾗飽見雪霜威劔閣行㸔松栢老夷門石麟下作人間客故有光芒掃夕昏虬龍金璧走天閽下有髙陵幾代孫賦擲玉聲那問價筆生春意自無㾗尚書補去由髙第廷尉除歸不署門元圃長生新釀熟一庭椿露滴黄昏呈恩主户部郎中某皇恐再拜伏承恩主户部郎中頃被綸言榮還省闥惟此求全之福悉皆稽古之功同出於儒何必曰利况損上益下無非天子之仁而富國彊兵殆成覇者之佐若講之有素即行之非艱姑省前人之誅求以察天下之息耗某久叨下客數戴餘光既城狐社䑕無所出其靈則芻狗犧牛或有補於用久留蘄術而夫子纔一解顔將行贈言故每篇凡三致意上凂師席退積驚懷伏惟采覽幸甚幸甚玉翰飛出漢江東蜀道三年興已窮城郭宛然人未老笑談終日座生風汴雲歸去觚稜近珠佩收來漢月空衰草寒苕更惆悵亂鵶無數失征鴻何必庭臯木葉黄秋風無處不凄涼莫言短髪遊郎署且伴閒雲入故鄉漢殿早瞻新日月劔屏猶帯舊氷霜一飛碧落三千里還向瑶池浴鳯凰翠軺行色倦秋隂且聽新來澤畔吟雲起已知山有助鳥啼爭柰竹無心斗光指客求佳氣桐尾收煙得好音他日欲通千里信西風吹鴈亦浮沉壽王提舉二首新歲祥分葆羽車老君抱送浹雲霞夏正更籥稱觴近蜀道占星故國賖尚憶前時司玉牒試簮明日剪金花風俗人日士女以剪金花勝相遺這回飛燕知恩舊肯到尋常百姓家本來卿伯籍神霄時與羣仙立舜朝邂逅吹笙雲鶴並等閒飛舄海天遥在公載燕方稱夀厥日惟人只隔宵黄閣年年春酒熟商山皓首却煩招留别寄元裕耳熟英聲相見晩觧顔一笑盡天真有魚待客不妨醉無玉藏花初厭貧踈竹已留清夜月好風先㫁過江塵幽居莫薙庭前草枕葄他時有故人過何權道幽居不遇水部風流小隠居别來眼法定何如霧中不見空峒子世外空傳珞琭書今歲紫荆簮未得後溪黄鮓食無餘素冠如遇文園宅為我慇懃借子虚過卧龍先生幽居手調鼎劑作清涼不秘千金肘後方閒數嶺雲松自翠卧聽梅雨藥初香公辯四山皆種藥三山夢斷黄粱熟一逕莓封白日長我欲從公結幽隠不干泉石解膏肓鹽井鑿到金輪水際通綆長牛領血垂紅作梅後日㸔調鼎擬雪前人欲㪚空波素儘熬青瀚海虎形不待盬南風輸官已足金籯滿坐咲騎驢困五窮
