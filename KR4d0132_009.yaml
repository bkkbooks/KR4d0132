body:
  text: 跨鰲集卷九宋李新撰七言律詩曉起曉禽聒起坐薪床梳裹斑絲短短蒼甕面撥來蛆子白花心飛出蝶鬚黃逰蜂聲沓晨衙退細篆香縈碧線長已約鄰家來小飲是中容得次公狂過馮十夜飲見燭花有作世事不知渾井底巴音猶在已天涯攻愁有酒杯吹浪報喜非春燭自花賈誼長才空賦鵩東陵餘地欲栽瓜詔書許逐陽和至寧乞西山度歲華下鹿頭坂偶成朝來喜下鹿頭關誰謂追奔匹馬還意氣已無豪憤態夢魂猶在嶮﨑間白雲親老愁歸計明月知音笑病顔天子已籌西夏策將軍未易許安間九日林守同飲因思昔年朱侍講跨鶴之集常記秋登跨鶴臺儒先杖履共追陪如公已到蓬萊上過我又分符竹來往事已成千古話遺風空負十分杯依依正爾重陽日襟抱何時得好開次韻任使君詠梅二首堂上髙人解賞音孤根未放草來侵不妨此後頒春力却得從前愛日心模臘曾看黃淡淡試粧猶恐暈深深而今驛使行如織聽取新來塞上吟平時化力與扶持莫道春工未肯私暗有浮香通淡月瘦無寒葉到空枝腹中太白何多錦句下韋郎自不知前人謂韋蘇州詩絶無脂膩隂谷未開公見否葭灰暖律更煩吹次韻解君接感懷能向風塵識馬周新豐飲盡得相留後車慣載胡王縛衰草頻驚戰馬秋靈武須公來闢土桃林他日待歸牛承平衛霍知虛老剩著新篇繼日休太平事業按商周麟閣儀形待子留壯士長歌三箭定鴟夷歸老五湖秋生涯底事空藏劒英氣平時已食牛歌扇舞衫今太寂暮雲佳句敵湯休天池讀書寄元明絺葛皮冠蕭隱居溪山隨我亦名愚調和得所弟乳酪麗澤不均兄瓠壺曉雨莫償雙淚落夜燈常照一心孤阿松活計今多少試問山前幾木奴甲子春趨太學過華山賦仙掌峰一掌巍然占碧巔分明髙舉欲擎天升沉盡待招擕力指點都歸造化權好與清霄扶日月莫留寒嶂弄雲煙不知千古興亡事屈指而今是幾年北窗偶成呈遺逸北窗氷研碎魚鱗未伏徐翁筆有神止酒詩成三徑曉買山錢就一家春飢鼯如市莫欺客窮鬼作朋終笑人未敢移文謝逋客且看除道過蒲輪觀前古美人圖璧月塵昏瓊樹秋無從百媚一回眸荼䕷香度梅粧冷鸚鵡聲低玉笛幽唾背但能知禍水逢春且莫上迷樓歸來安守無鹽女不寵無驚共白頭所見鬢絲蕭散忙蠶月笑靨勻停喜麥秋落照已斜猶曝繭故人未渡莫橫舟屋欹雲影長年見枕壓溪聲半夜流料得此生無好夢却勝終日有間愁蓬溪道中所見筠輿百曲篆溪灣潤麥催花小雨慳鶗鵙弄聲知境靜鞦韆垂影見春間一生瘦骨幾隨鶴萬事無心却愛山為濯小槽收重碧掃除東閣待翁還詩情冷落接坰荒鳥語鈎輈伴日長山館花煩蜂蜜重溪橋雨潤燕泥香鄂君被暖春回帳犬子琴間月到床醉裏要歸何處是無功猶解記吾鄉西岡重九周奉議座中賦得黃字韻天涯一角見重陽蕭灑西風客斷腸麻紵未更今日白菊花還似去年黃陶潛把酒重開解宋玉臨墻乍感傷借問龍山歌會者座中誰認緑衣郎送馮夢授試禮部殷樹蔥籠繡曉暾馬蹄東去亂氷䀶世收徵詔藏商谷家有新功刻禹門太白夜郎初辱顧馮唐漢殿欲承恩南山報喜通啼鳥明日榮歸鶴有孫年來初識小馮君鞭靮何妨馭晏嬰三世卿雲涪水秀一門巢許蜀山清飄零殊幸逢公子邂逅相看不世情入手華標歸早晚願扶藜杖出山迎送錢使者三首不須回首漢臯亭白髮愁催却易生好夢先依鸞仗去此身聊伴劍雲行隨輈芳草真無賴送客黃鶹似有情故國要知何處是望湖樓下錦衣城玉翰飛過漢江東蜀道三年興已窮明日登山臨水去故園啼鳥落花空聞今自草延英奏合下人推長者風燕麥兔葵初亂眼欲將修翼問歸鴻翠羽頒書出紫皇殘春岐路日初長花容帖雨蜂兒靜麥浪翻風燕子涼八葉世家方越古二王振鷺已成行行行才業知多少千里吳天水滿塘簡任安中邉公春夢晝悠揚借有新嘲不汝妨杖屨未經桃李樹棹歌空憶水雲鄉子規啼去花應好燕子歸來日漸長稍學淵明惜名酒掃除齋閣待君嘗神泉道中寄李道明野鳥啼春稍覺空馬蹄何故萬山中樹連土雨微茫緑花入麥秋零亂紅北阮不知貧氣味謫仙元有舊家風正須洗出青青目看取新來塞上翁題普州東溪參軍龍鍾大可笑清聖寂寞何所中往事幾隨山影轉此生元與浪花同金鑾視草人安在曲水流觴迹已空溪有翰林灘鑿流杯早晚北風吹得去欲參雲漢問鴻濛送許東傳碧霄已覺少微明帝所行看召老成好夢謾依淮水去秋風空見雪山輕衣冠幾許披雲霧父老于今識弟兄黃閣他年開月旦想公終不解忘情轉蓬孤鶴昔流人千里樓西客此身江海相忘魚自樂雪霜已過樹回春長安索米非方朔谷口耕雲待子真收拾從來憂國泪太平無復事沾巾送元播恩光渺渺似涪波濕雪欺梅奈别何斂盡寒威離兩蜀播將春色入三河輕裝舊槖黃金少故國新豐美酒多不負一生經濟術他年元鼎解調和送李才儒未覺鄉關歲月深轉山旗影緩愔愔逺人願見喬卿服支邑曾隨子賤琴攄散幽隂千古恨發明忠義一生心氷清不屈二天庇雨化寧逢三日霖理官食木遙遙胄一姓而今萬頃麻渾道婁公能耐事惟餘老子未通家行經閶闔雲生足歸到方壺雪弄花休丐一麾江海去且扶堯日度清華送邵馬勾二首飄零愁殺病參軍點點黃泥漬帽裙藏火解銷秦地鐵騎驢重數華山雲兒號惟有韓司業官冷誰憐鄭廣文身世泡漚渾道得請君一笑北邙墳芳菊江藜泣冷煙秋風秋雨老行鞭嘗依故國橫經笥猶憶南堂乞火仙月瘴稍昏斜谷路漁竿空倚北溪船有錢他日鄰枌社待覔嵩隂一頃田送周晉叔妙齡壁水興何窮投筆幡然定逺功寶仗初依金碧輅鐵鞭間靜海連風萱堂歸去椒觴近珠珮收來漢月空明日紫騮嘶曉雪故人端在亂山中送邵子文柳映平橋路帶沙行人歸思浩無涯臨岐蕭寺瑣蒼竹催客杜鵑啼落花千里亂山雲自暗一溪流水日空斜伊豫最是多情者為拂前題置碧紗送劉漢特兼簡邵子文緑篠欹墻葉葉聲夜涼風細露華清飄零何幸逢公子邂逅相看不世情擬向伯倫求酒頌不知東野解詩鳴三峯峯下文章伯應憶當年阮步兵婦嘲歲晚隨君色色無嫁時我自有瓊琚借令值客休捫蝨幸未能詩勿跨驢寧與漁樵安舊隱莫言封禪著新書夜寒憎見牛衣泣起執晨炊觸釜魚藥水巖巖前曾考腐斤樵洞裏仙人不可招龍睡有時慳小雨春長無地覔靈苖與攻中散平時懶更沃文園異日消調鼎和羮須玉液預私清泚注輕瓢陋夷療飢寧採故丘薇真陋羌夷詎可依火日四山猶墮雪鬼林六月不單衣藥殘花蕚歸方册狨老金絲觸禍機倒指瓜期今已足早修雲翼背西飛宋隱君挽詞貴口輕翾意自融鳴柯芥羽逐春風猗歟宋氏青雲器師我緇川白髮翁沃壤可彰千載義舊窗空負一生功新阡無用栽凡木待看竒才長碧桐蒲靜安挽詞舞鸞雛鵠已先飛曾倚西山泣晚暉老去兒孫雄北阮古來門户占烏衣蕭蕭華髮猶供祭歷歷清談又解圍洞口仙人招白鶴玉翰何日與雲歸陳丈挽詩七十飄生世所稀初休利鎖便忘機清朝有子方干祿白屋無塵自掩扉髙論競推猗頓富夢魂翻逐楚莊飛素車白馬春郊道鸞鳯相呼舊穴歸挽崇寧王雅橋楊公善宣教詞何必他楊重蜀苖關西華胄固遙遙大成殿老身先倡貝葉書成血未消金馬祥光開舊地玉虹寒影臥新橋偉翁有子全忠孝行看圭璋薦盛朝挽江源張寬儒承事詞善頌堂下幾生芻牂牱墓西千輛車邑人清淚墮不已食客行歌悲有餘家法新增小戴禮生涯半用計然書平生隂德知多少勢等岷峨報亦徐挽張承事詞長吟清嘯蜀江干一尺霜根向物寒吾道祗知尊孔子竒書何用學劉安玄談客去虛方丈碧落雛歸迅羽翰曉月流星無處覔斷雲空著子陵灘東平縣君挽詞玉翰飛過碧江東露泣三荆向曉風貝葉塵生昏舊緑蘋花煙老墮疏紅鳥沉孤影桓山外蟲返青𡨕壁水空德範豈惟墳上土傳家清訓是無窮挽史太君詞吳楚雲帆萬里風元歌來哭舊江東梁城皓鶴千年恨蜀壟青松一夢空滏水波聲天地逺灞陵山色古今同碑隂且刻東坡語勳烈將收國史中壽安夫人挽詞閨門秀色擢氷清行佩蘭苕八十春傳道先生為擇配起家著作不憂貧金花貼子分雙軸子舍登瀛有幾人千仞龍華松竹域婦姑雖死亦相親榮德夫人挽詞舊池龜去必巢蓮龍隧愁看錦水邉肯與玉人俱逺宦自憐王母已髙年松窗弦誦親曹叔秋月家風起鄭玄仙客立朝何所恨自緣退有可耕田隂伯庸悼詞妙年詞墨一何工漢苑家聲戚里雄居避飛塵門似水客投漫刺袂生風香消絳帳魚難蠧月照銀杯酒不空陽報豈須窮寶篋鳯雛行看赤霞中病中二首虛名畢竟耳邉風夢入巢由事一空貧窶未能防鬼笑悲哀端更遇途窮胡沙十月驚弦鴈水國三年食蓼蟲得似此身無好味病餘明日即衰翁林間風氣杳無蹤欲遣誰人慰病慵丐友何顔堪著論祭拏無泪可沾胸不知心逐搖搖斾反為官憐楚楚松最是少眠多念處瞑鴉殘月五更鐘
