body:
  text: 跨鼇集卷五宋李新撰五言律詩古塞曾經古塞間萬里控長關卧日邉鼙舊嘶風戰馬閒戍樓喧暮角羌笛怨空山應賀升平久車書混八蠻漢江低靄橫沙碧長灘宿鴈孤樵薪窺樹癭漁父就龜趺落日駢游女鳴波咽佩珠啼烏與驚鵲先我渡城隅湖上招故人栁影依窗過荷香拂枕浮雲邉山近雨石下水通秋白藕離新斸嘉魚落晚鈎還同動情興已為掃西樓磁釣翁尺巘方壺小泓泉渤海深陶公慈母手抔土故人心蓑笠不愁敝鰷鱨何處尋虛堂值蕭瑟猶苦百蟲吟髙祖試劒石巨石中分斷涓流自此東堯仁方宅土項氏曷當鋒興起漢髙業勤勞夏禹功故應行道者千古企遺蹤官歸旅巢幾百指水國漫三年極望祇秋草歸耕惟石田不成便招隱漸擬欲安禪那得蘇司業相逢乞酒錢不寐不寐成孤坐悠悠百感生燈眀將續晝鼓急欲移更藥熟知僮倦杯殘任鼠爭羈懷忘未得時作下階行晚宿江漲橋鳥徑青山外人家苦竹邉江城懸夜鎖魚市散空船岸靜涵秋月林昏宿水煙又尋僧榻卧夜冷欲無眠龍洞龍睡抱眀月我來窺碧潯攖鱗徒有志探頷本無心雷去春霖足雲歸夜水深餘波應不惜好為濯塵襟分蒲萄遺蘇必强吏歸珍客賜手自舉銅盤珠釀舊瓊液煙勻秋露漙初分馬乳碧聊別水晶寒教徹梨園曲停歌一處餐鑑亭石壁緣雲白松風特地哀斷鴻隨眼沒秋浪擘山來鼓急船頭轉山眀雨腳開知公歸未得此作望鄉臺次韻員子春逰馬溪二首有花栽性地餘法寄燈房虬蜿駢松瘦鍾寒殷谷長赤髯班石坐白驥踏雲驤一夕參𤣥客森森出虎場樹影隂蒙徑雲衣淺撲門禪心無冷暖客意自晨昏澗水鳴璫破山花野血噴再來何薄暮騶從觸狐蹲春逰寂寂茂陵春文園病後情黃蜂腰欲斷細栁眼初明麗服駢逰女餘酣失老兵殘粧深院落相對任卿卿杜鵑終日欲歸去蹉跎空歲華只知催客泪何處是君家寄子他巢穩頒春故國賖林梢啼不盡流恨入山花桃花菊秋雨秋風夜間為桃菊吟任香飄澗水回翠入籬金苦李自胡越幽蘭初腹心故山千里外回首暝煙深官居偶書湖山隨顧盼薄俸亦甘心窮鬼不教富詩魔長使吟支頤聞落葉隱几見棲禽此意竟誰喻蕭蕭秋夜深重九出户非我識長安雖萬家有愁焦緑髮無語插黃華酒僻喜宫醖衾寒怯絳紗欲傳此情况行客在天涯中江道中茆結蕭蕭宅松周淺淺山斧桑雲墮緑堤水月留彎楊蕊風團去蟲絲燕掠還行經雙隻堠曾未徹重關醉鄉客至終投轄朝回詎典衣待眠卿且去亟酌我將歸泉郡新封邑糟丘小翠微離家今萬里坐隔羽觴飛經甘相廟相君天所佑童子知何神不必茂為祖因知秦有人一言成大計千古仰青春廟下塵勞客將慚白髮新逰石鼓寺石鼓寂不振金聲無處求層巖參霧樹亂玉響氷溝破屐前無齒孤城逺見樓山僧癡問客阿汝謂湯休龍興行香逰寶蓮寺魚舞天清日經行小剎初松柯青羽葆貝葉細蠅書杜畫竒無敵周妻俗有餘業無支遁輩難自卜幽居張安化重陽日置酒挽同官逰靈泉寺登高時適有客占牧之詩一聨因緝成一首書寺垣白髮新遷客黃雲古戰場自然堪墮淚何必更重陽山削孤城起河兮細水長蜀峯髙處望猶是隔秦鄉八月十五日過蓬溪書淨戒寺瓦冷雲埋殿燈長黑暗沙藥靈閒草木蔓走古龍蛇石佛隨山老松梯轉路賖門前溪水淺無處問仙家過永安院山暗雲垂地溪回樹倒流詩隨梅冷落夢入鳥鈎輈欲住無佳致重來即舊逰村眉攢八字已解作春愁寶巖寺竹影與溪聲蕭蕭眼底眀秋雲浮古樹山石削長城暝色凝黃碧啼烏伴晚征髙僧不知客故遣作詩鳴龍逰寺南屏軒和宋宏父韻平日江干過南屏首重回不妨圖裏見曾是夢中來近市樓臺逼髙城鼓角催老年知涉世臨事却䘖枚感俗回腸驚紺髮汩腳沁寒眸沃壤連千里封狐媚一丘生憎守錢虜冷誚富民侯不厭江西水長年傍屋流問俗窮極天窺涘幽隂地絶春石壇荒誓鬼藥媪下羌神鬭雀分疏事晴山親近人刲羊留髓骨正欲卜歸辰羌俗卜占遵火兆詛誓謹歸誠渡笮蒼猱捷旋碉墨蟻輕養生茶作命據嶮石為城縱去擒來事無人是孔明西山誓鬼名歸誠王山間女倚竹情何極傷春事已䦨長眉彎月薄翠袖怯天寒倩婦攏新鬢憑人易舊冠輕聞騎馬客相趂隔籬看
