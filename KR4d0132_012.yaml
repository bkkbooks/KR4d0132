body:
  text: 跨鼇集卷十二宋李新撰表皇帝即位賀表紹膺寶緒丕冒海隅方受命以維新蓋體元而居正神祗叶契中外歡呼中賀恭惟皇帝陛下恭儉身先聰明天錫法乾之健如日之升纂承七聖之休光克邁百王之懿鑠端一德以當寧乘六龍而御天九州攸同萬物並覩某逺居蜀道誤領憲條望九重之深苐傾於葵藿稱萬年之夀阻綴於鵷凰賀河清表上聖勃興圓穹眷佑格靈源之澄徹罄率土以歡愈中賀臣竊以四瀆所宗九河為大昭負圖之龍馬著舞氣之神魚未丁至德之期宛有黃流之濁千齡叶運三聞大瑞之呈七日效祥萬縷榮光之出逾八百里初動漣漪垂億萬年永臻晏粲凡在照臨之下悉知鼓舞之歸恭惟皇帝陛下廣文之聲行堯之道仁深行葦澤及漏泉歷觀有國而來未如今日之盛治之極也表而出之俟河之清目方欣於有覩如山之夀志並祝於無疆某誤總憲綱喜聆異事阻綴鵷鸞之列仰稱椒柏之觴天寧節賀表電繞神樞表珍符於有永星環北極隆寶祚以無疆四方爭望於堯雲一德允躋於湯聖叶千齡之景運紹七葉之丕圖夷夏蒙休人神胥慶中賀恭惟皇帝陛下道同天大明並日升著孝友以因心亶聰明而自性盡新庶政獨斷萬機創鼎璽以賁閎休作英韶而揚大烈池鹽彰大德之瑞河水應聖期之清風雨格三階之平夷夏即九功之敘金城千里永維奠枕之安天子萬年共致如山之慶臣誤膺逺寄獲奉熙朝稱夀丹墀尚阻封人之祝傾心葵藿徒馳魏闕之思皇太后同聽政賀表伏承皇太后誕垂懿訓同攬政機人神胥歡天地均泰恭惟皇太后坤靈厚載海量并容綏祐皇躬載光帝業丕顯思齊之聖共成訪落之謀至德嗣音保千年之熙運盛慈儀世洽四海之歡心某職使逺方不獲趨闕庭云云賀皇帝生辰表竊以電繞神樞式表珍符之發星環北極用明帝位之尊篤生真人佑此洪烈叶千齡之景運紹七聖之丕圗夷夏蒙休人臣胥慶中賀伏惟皇帝陛下至仁光宅潛德升聞揭日月以為行裁天地而不過亶聰明而自性著孝友以因心天且弗違人惟求舊金城千里已知奠枕之安天子萬年共罄如山之祝某誤膺逺寄獲覩昌期稱夀軒墀尚阻封人之獻傾心葵藿徒搖魏闕之思賀皇帝生辰表六龍御宇位適應於純乾八極蒙休時更隆於大有載臨嘉會並起歡聲中賀恭惟皇帝陛下道格神人功參造化運屬成康之緒性充堯舜之仁旋乾轉坤潛神機於至妙允文嗣武奉寶厯於彌昌崇鼎鼐以賁宏休作英韶而揚大烈五辰七政允格三階之平四夷八蠻皆即九功之敘懋建巍巍之治載隆赫赫之名風馬雲車已昭格於上下金泥玉檢方潤色於太平永惟濬哲之祥肇此休嘉之旦明光拱日心馳清蹕之音御醴傳觴目想鈞天之奏覃及四表敷錫湛恩賀八寶表三微更旦頒朝會之縟儀八寶成文著治功之偉迹虛清躬而俯受罄率土以歡呼中賀臣竊以命自天申寶由地出無脛自至玉全溫潤之文亘古未聞工窮制作之妙權輿一代之制長發千古之祥雖假人為殆若神授恭惟皇帝陛下法乾之健如日之升書已同文時方交泰誕敷國信式丁堯厯之初允叶珍符靡循秦璽之舊百官以治四海攸同號令所施並雷風而鼓舞文章增焕與雲漢以昭回賀八寶赦文表一新至寶同有昊之降康四馳聖言與􅍭生之均慶瑕垢盡滌人神胥歡中賀臣伏以器寶待人式丁作者之聖皇天嚮道肇成受命之符制作冠美乎百王赦宥誕敷於四海厥惟在位之士並戴渥恩至於無服之親悉叨異數市征幾於不稅笞罪期于無刑謂重法地分頗害為善之心謂新復土疆宜開向化之意封母得視於父養士不取於民凡兹渙汗之施皆自淵衷之出恩均遐邇澤被幽明恭惟皇帝陛下盛德乾行至仁眷育恭承珍物克享天心更鳳厯以履端揭雞竿而播告親臨翰墨焕垂星斗之文覃及華夷溥霑雨露之賜臣敢不勤宣睿澤力察官邪將命稍遙莫簉千官之列望雲徒切阻稱萬夀之觴八寶轉官謝表肇新器寶永為受命之符敘進官聫叨與垂天之澤撫躬甚惕揣分何堪中謝伏念臣才不及中職非致逺偶將使指誤辱聖知千里運糧第乏關中之心計九年足用敢期地上之泉流惟八寶之告成合萬方而胥慶爰紹先志見作者聖而述者明特疏異恩使賢服休而能服采豈兹闒冗亦竊榮光恭惟皇帝陛下行夏之時循堯之道目所共睹焕星斗之文章逺無不周驅雷風之號令用縻好爵覃及疏臣申錫無疆福已均於夷夏降年有永業自鞏於山河賀九寶表帝德升聞上動髙明之聽河源薦祉逺輸溫潤之珍肆寶璽之告成即嵗元而祇受一人尚慶萬宇騰歡中賀竊以天申用休地難愛寶無逺弗屆三河呈琬琰之姿有開必先萬世祕琳琅之瑞稟陽精而不雜􅍭虹氣而允孚紐以龍文協乾元之用九受之穀旦邁帝德之登三方諸侯圗事之朝正六典始和之日見禮樂備成之盛驗天人相與之符蓋匪人為實由神授恭惟皇帝陛下務循堯道克廣文聲宗祀之孝格天重華之德協帝道包有截九功之敘惟歌天載無聲諸福之物畢至臣逺分符竹阻造闕庭捧漢殿之觴身莫陪於鼇忭望長安之日心徒切於葵傾代謝職名升使表龍閣驟升使權叨進疊下渥優之命載加踈逺之臣寵居人先喜出望外中謝伏念臣性資凡近政術濶迂蚤被眷於聖神嘗獲司於禮樂久持漕計雖欣陸海之饒幾老坤維未見雪山之重驚心瘝曠竭力轉輸冝投散間乃與掄選况祖宗華閣藏經天緯地之文而膚價行人正持節觀風之任惟賢能不必待次謂太平固欲立基豈臣瑣才遽爾躐等妄意功名之會肯辭筋力之勞富國強兵猶是至卑之功烈耕田鑿井願臻太古之風流興言竭忠永以圗報恭惟皇帝陛下道同天大明共日升獨斷萬機盡新庶政舜不遺於衆善禹或計於寸長致兹螻蟻之微薄著西南之效欽承異數已逾稽古之榮黽勉賢勞終補吹竽之濫臣敢不勤宣睿澤博究下情代興元知府謝到任表乘險仗忠道數經於叱馭分符得地居遂宅於亷泉祇荷寵優緬懷驚畏中謝伏念臣性資凡近治術迂疏箕裘恐玷於先臣龜組幸叨於聖世風塵久困刀筆自慙試邑神畿蔑見臨人之效鎸名仕籍獲紓負擔之虞三易守麾半餘腐齒拙將何補但黽勉以承流過藉奚尤旋兢惶於責實斯蓋伏遇皇帝陛下智惟天錫聖自生知考百度以由舊章養四方而酌祖道恢張偉績敷繹大猷凡小善不遺使有功則説臣敢不勤綏逺俗上答皇慈禹别梁州舊著厥田之上詩歌漢廣今推美化之行雖涓埃未效於寸長而宵旰敢煩於西顧謝賜大晟樂表首自京師丕著功成之作用之邦國濫叨拜賜之榮里巷至於嘆嗟耳目未嘗聞睹人神胥悅遐邇攸同中謝竊以微盧彭濮之人古為逺服英莖咸濩之樂久失正聲惟上聖之應時獲異人而考古調律於鑄鼎之後得器於受命之邦坐格天神念一夔而斯足來儀羽鶴知八音之克諧宜鄭衛之淫銷故天地之和應頒從內府覃及逺方用於四時大備禴祠蒸嘗之薦習以多士日聞金石絲竹之音後無以加昔未嘗有此蓋皇帝陛下知周萬物德冠百王為律於身作古自我制窮髙妙豈特百年而後興本出虛無宜其一奏而增歎顧簫管之具舉合笙磬以同音雖坤維之下州分工師而肄業導和有自感遇非常既作泮宫又許魯侯之用雅不知肉味偶同齊國之聞韶賀正旦表乾坤交泰謹首祚於三元玉帛會朝合歡聲於萬國中賀臣伏以以聖繼聖永惟蒞政之勤先天奉天蓋重履端之始方導迎於景貺已浹叶於昌辰恭惟皇帝陛下盛德乾行至仁春育世遘明良之遇化觀昭曠之原新鼎璽以賁宏休作英韶而揚大烈夷夏即九功之敘風雨格三階之平綏五福以攸同輳四方而來賀某誤叨使指阻逺闕庭柏葉稱觴莫綴鵷鸞之列南山慶夀第傾葵藿之心賀錫元圭表錫圭告成惟前人之盛烈垂旒拜貺實今日之宏休穹壤交孚神人共慶中賀竊以時惟上帝顧佑下方甸萬姓以陶唐錫九疇於夏后滌洪源於無事六府孔修奏鮮食以庶艱萬世永賴即寶玉而寓象對璇靈而告功德貫三才色該衆妙别土冝於山鎮沛天澤以雲雷平其首以象葵體道之復好其中而納組執德之洪義實難名制惟可識爰自非常之德聿來希世之珍在昔未聞於今為盛恭惟皇帝陛下德先二帝業冠百王性安於仁身以為度膺皇天之眷命乃聖乃神享元祐之成功惟精惟一黎民於變庶績其凝自作厯以授時及鑄鼎而象物凡邦家之垂憲質堯禹以同符惟盛德無得而名故珍祥不召而至飭備禮而登之天府渙大號而布於海隅凡屬見聞率皆舞抃臣誤叨守吏祇奉德音稱美禹功若親臨於雒汭歌謳帝力敢自後於康衢覩所未嘗喜不能已錫元圭賀表恭承至寶式際昌期垂祉自天歡呼率土中賀若昔有夏實治洪流輔五服以圗成致萬世之攸賴允釐庶績告厥成功况百姓萬邦已格時雍之化而六府三事克諧惟敘之歌粵惟錫圭於以報上瑑非止刻四方之鎮色固嘗形兩者之元既鍾陽精之純又括天數之備制葵於首則體之以無為納組於中欲執之而勿失玩兹神物獨出聖時鏟理祥光多歷年所本自一人之慶載通四海之歡恭惟皇帝陛下仁已如天身嘗為度克勤克儉乃聖乃神道特妙於行堯緒尤洪於纘禹練辰備禮膺上帝之降休蕩垢滌瑕與􅍭生而均福念百王之甚盛宜歷世以相傳必依人而行亦待時而動臣仰窺大美敢忘雒汭之觀俯效衷誠願罄華封之祝
