body:
  text: 跨鼇集卷二十九宋李新撰碑文永懐廟磨崖碑鄉之貢士王由與予弟斤薦以書来言朱使君東漢時人為巴郡守隱唱車山死千餘年矣今初遭堯仁漏無垠之澤覃及人鬼因民之心號祠永懐神既拜賜榮耀而又祠貌更新非夙昔比惟是古史亡傳後人無文獨貞元之十四年平泉令王寛記修祠之因逆數甲子三百十七年矣其語平平願得數字大書深鑱為耐乆事由等磨崖以待某諾之五年多難不果念昔未仕時一再禮神神祠居山巔巨石磈礌若屋若潮若鯨鯢若兩觀木老地秀氣象悽清過者畢肅雖暑而寒仁壽廣都平泉三邑之人趨祠下道里適均四方牲牢曰至伐鼓坎坎而三邑之奉居多使君庇䕶亦私仁厚於三邑之人蓋雨暘時若時蟲不犯稼癘不入境無天灾屢豐年然後三邑之人得以富得以壽得以康寧春秋答神惟恐粢盛不㓗羊豕不腯幣帛不腆神弗肯燕享嵗復迎神幸其邑旌旗亘野簫吹鉦鼓沸路雲竿角觚魚龍曼衍之戯雜陳於前比其送如初或時雷殷殷起巖竇少女習習生木杪雲駸駸出殿㘭人以是知飛亷為之清塵冥師為之灑道矣風馬龍軿戒嚴以發也三邑之人歌舞歡呼對神之休祭已合社飲福受胙以去予嘗謂人曰使君為巴中守時未必有此樂也昔人事之未必如此之盛也蜀自𤣥徳仲雋割據南蠻侵擾崔旰郭英乂劉闢陳敬暄等縱放王衍孟知祥僭偽兵火蕭條當時靈塲飢鼯晝出宫寢欹仆草封重䑓雨剥像偶巫覡守者有菜色敢問使君丁兹時意味與今日孰愈治世典章固已詳備化國日晷由来舒長神其率萬靈扶掖宗社以億萬斯年隂報天子則神長有此樂也年月日記馮隱士碑隂文崇寧二年跨鼇居士以言抵辠覊於武信十一月癸未舍館主人延之上座顧右廡仆古碣字泜隕不可究訊其端主人曰昔我先公與皇妣趙厝于妙䑓之野凡六百有七十甲子其季於今三之一也我先祖先君以時灑掃祭祀無廢日者鄰好不睦乃貪我疆土削我阜城使我先公皇妣不獲安其宅兆我是以疢心恫首而又夷我封樹斷我龜趺我是興虞芮之争以大復圮址庶㡬徼福於先公皇妣今天誘其𠂻君辱在敝邑俾墜緒有紀泐石有章我先公皇妣之迹不泯以享食兹土君之惠也敢不以聞亦惟君圖之居士指妙臺以應之曰自有天地便有此山世代變昜如更旦暮英靈磨滅如螢腐而此山嶄嶄不損一塵惟種徳於人所不知見垂澤於不斬流善於無窮之源故其後必大乃能與此山争雄噫泉下古人亦已邈矣其行已予不敢以此筆誣也馮氏出畢公髙之後在武信為著姓子姓子孫蕃縵不可盡書予今所目名令宣者盖四世孫珪一流五世孫天寵一流六世孫前所謂舍館主人者也予酌諸馮氏方熾而未艾其在武信者散處四境而北郭為多第舍聨亘橚矗若官寺嵗賦肩封君而子弟居養未始有客氣父兄相視如醍醐酥酪然鄉里稱善人以此考泉下古人足矣昔云必百祀是中可見也至欲使牛羊勿踐一蘤斤斧不樵一木盜不取一坏土不乏人焉其誰敢欺妄意他日有過者必指而相告曰此大馮君諱延錫之墓其碑隂有跨鼇居士李某之文墓誌馮君貺墓表銘君諱玠字君貺其先畢萬之後子孫食采馮鄉因以為氏世居信都長樂遭時亂離謂三蜀可以偷安而遂之士風尤端慤用禮因卜而家自唐到今㡬十世矣曾祖祖父俱不仕君昆弟五人守法度無可訾者余来遂諸人好事時時觸爵羅肯與辠人遊唯不及識君問其兄曰其為人不如吾亡弟君貺問其弟則曰某自知不逮吾亡兄君貺然則何賢乎君貺蓋馮氏稱髙貲而君貺亷於財冨流寡趣尚而君貺厚於義元祐初君母令狐夫人老且疾君問醫嘗藥未始見隋容既即世哀毁制行葬畢兄弟約曰我等創鉅少殞父天而令狐夫人孤苦立門户目營指聚垂二十年生事日贏有金一阜有土一雷今室無空虚穉息如管取婦異姓駢首囁嚅口衆難調脱有么麽離間患在後日盍求便安各營一丘以老於是辨田宅媺惡區寳貨器服為俾一人從旁典籌既探所得則帖息不復議君貺笑曰籌所以息争端吾兄弟何争楚人亡弓楚人得之用是已鑿渾沌矣或曰業已爾君憺然其間後鄉里教子弟必曰馮氏一門塤箎曷不取法君喜儲書自為兒時已喜賓客他日築館治花木客至飲以醇酒以家事屬其偶劉一不問儀觀雖胖偉而几案蕭蕭無一塵與人交有初終同舍生相繼入仕君方礪毛錐行且決科而以崇寧三年二月得疾卒年三十六四年月日𦵏於某所娶劉氏生四子曰徳棻徳輝徳剛徳新君之婦弟子常一日挈徳棻来乞文以誌墓如君貺之賢我知之矣死而不亡者壽也因系之以銘詩云當門蘭昜以殘城頭草霜亦早故君嶷嶷馬糞烏衣問馮之賢誰白其眉連珠兄弟礲砆表玉其中有人生芻一束卜宅西山見葱蘢之佳氣得此銘詩可含笑而入地丁夫人墓誌銘丁夫人蜀州晉原人曾祖延緒祖允懐父宗道皆不仕母顔氏夫人既笄嫁同郡唐公翊唐氏食口衆夫人烈烈有標度不可親疎公翊儒者挾方書能起危殆户外之足常滿世間俗醫務肥其室治貴人疾如治其父母用意益精審由貴人金多治富家疾當吐反下延其苦使呼天乞救富家大概吝嗇不如是不肯輸財俗醫貪婪非止一身出門赴召而妻兒婢子已斟探所得至某州切儲某物某縣輦某物歸曷嘗不然公翊喜風誼恥言錢而夫人又樂於予寒士之失謀者多至其家公翊坐堂上招客夫人韋褠半臂入竈下操刀問㡬何自設食徃徃舉前筯客才定未始厭公翊介然有古俠氣遇不當輙瞋目恚恨夫人濟之以寛故親友與其厮役皆憚公翊而徳夫人紹聖元年八月十四日卒年五十一生三子男環取楊氏女二人長適胡熈運次尚幼夫人卒之日貧人之婦来弔者且百數哭之慟曰夫人死誰肯念我我輩即死年月日塟於晋原縣承惠鄉某里袝先塋之側環從某遊悲涕求銘辭不獲銘曰審如是仁婦貧益親審如是義客遊自至賢乎哉豈不謂賢也哉任隱君墓表銘隱君任某字某遂之小谿人曾祖祖父皆韜翳於徳亡肯出仕者君性安静静而介介而通通而明明而復晦自髧髦總角時不雜諸兒狎弄挾書趨堂皇閴寂處習誦三四過畧通大義又昜他書頗渉獵經傳班班知頭足尤嗜黄老招致方士自熊經烏伸鸞舞龜息盡通其術未嘗衒試於人曰吾自以游戯三尸耳肆意杯酒引滿無量其醉竟日或三數日日或一食或數日不食家釀竭亦踰月不問坐一榻四十年不昜生事不知有無娶劉氏先君五年卒劉賢明有聲主祭祀賓客區理内外攻苦齧淡舉桉相舂不以針芒事拂君故君得以簡放為承平散人正古貞耀之流也君一子鉞兩舉進士文學行義每每得第一推稱二女長適石從聖次適馮世南孫男三君卒於大觀三年二月塟以四年閏八月墓在歸善鄉姚興旁之西予嘗論處朝廷昜處鄉黨難使鄉黨稱為善人尤難故孔子曰恂恂似不能言又曰善人吾不得而見矣得見有恒者斯可矣如隠君所謂有恒者也自少至老老至死不變其趨向大與世俗人逺異昔公牛哀病化為虎搏其兄而食之曩人也今虎也形與心俱化故不知有兄弟季孫揚病目以㦸摘其子中其父曩明也今盲矣無所識見故不能辨父子今為儒冠動小利害之前自蹈茍且不廉之地愈於公牛哀季孫揚盖不恒其所守者然也出入視隱君能無愧乎鉞以叔和之狀来求銘叔和子端確誠信人也句語有法不可增損予附之以銘云生者自生化者自化裘而冬葛而夏不尸於棺不騎箕尾神竒則遊隂魂則止樛然之几一世之安乎庶㡬相遇於䝉穀乎曰不也巋然之墳千載之歸乎求之於天則真也於䝉穀則妄也李君墓誌銘李知新字温卿仙井人曾祖某祖某父某皆晦迹不仕娶某氏生子楙公年若干以某年月日卒楙舉其䘮以某年月日塟於某所温卿初遊鄉校頗有推稱朝廷初革詞賦以經術造士温卿一再舉不利志鬱鬱不樂兄弟五人相繼淪亡垂白之親意尤不堪也温卿出身獨任家政積錢如阜麓賙鄉閭之貧乏者資親族之亡所依棲者無有怠意人多義之温卿於予為袒免之兄而予事之如親兄温卿視予猶弟而愈於同腹出之弟其居近市有問其價茫不知曰物之不一物之情也世榷鹽泉問其入笑而後答曰利之所在人争取之以去矣予丁先承事䘮謝賓客遊譚子皮故隱讀道佛書安静虚簡以延一呼之氣他非予所知也嘗遣子從予游戒之曰若叔之才吾不能量汝謹事之必有以發汝之䝉也鄉之人不知予與温卿善而温卿之賢鄉之人又未必能盡知之則其知温卿者誠不若予之深也推財樂施敦親好義此居鄉黨之常而其不常有於鄉黨者盖孔子所謂善人吾不得而見之而得見有恒者是矣予於温卿又何必細舉而書之予来濮陽聞公之䘮恨不能弔今董役梓城方困板築之事楙走二耕夫来以𦵏期請且丐予誌其墓義不可辭故為之銘銘曰天設鼎嵎立足泉生鹹地穴腹居其中食公餗任夫人墓誌銘夫人任氏遂寧縣人也某之子某之孫某之曾孫其系出詳明有任氏家牒在夫人生長冨家得全沖和故姁媞静温而性天虚明肝肺玲瓏八聰四達名物應事機鋩銛利不待倒囊發智髙出老師辯士右父母愛之為擇嘉匹年二十五乃以歸令狐府君某字某者既謝姆傅車至門扶玉笄葳蕤黄金歩揺飛翰之冠光彩照人閭里盡傾造廟致拜舅姑禮成更衣不復事熏染絶去鉛膏如懸黎火齊不受垢衊旦起問安堂上上餔飲舉杯桉等眉不聞跕跕履聲守禮防恭甚舅姑歎息曰天錫我孝婦持令狐氏生計金錢出入若有司存賦田别上下壤豆鍾釡龠升降取予無一芒偏重雖年侵政荒而令狐家氓𨽻無有逋逃者皆夫人平時有以存撫之過厚也元符己卯間再出粟賑饑儲食餓殍待健而遣今厮役傖奴班班是前日道傍棄兒其慈仁恤物類如此令狐君晩嵗治䑓榭日延賢賔客飲以醇酒烹薌擊鮮不厭乆慁夫人韝臂短襦俛首探右飪和鼎鎘機砧然而四座食指更動母楊齒髙夫人嵗五六歸寧楊年九十餘立侍其側女母俱垂白迨楊死哭之慟或慰勉之曰世固有母那得長日許壽者既化則已無重自苦夫人曰吾覺母老慕之猶有童心吾哀至深不知㡬何時而有詣極也長子昞秀發有清才遊學石室遂客死夫人念之竟成疾至政和二年五月初吉盥手誦佛書暮若假寐焉而卒年六十七生三男子昞先夫人十四年卒暎曄皆俊造士也女適進士任紹孫男三朴松卓二子奉夫人以三年十二月日𦵏於某所暎最善某来乞銘且慟使世人考第愚直某當在第一書夫人之行底實無所䛕矣其生者不必某具書之也銘曰言采其芝蘼蕪蔽山終朝亡芝挾筥而還靈承夫人可代芝萬宗族稱孝俗厲以勸佩冠陸離禮成無虧玉匪待瑑藻藉何為假而食天脫而溝瘠以任為名義死不昜客至如雲日當擊鮮豆觴腆潔君亦粲然曩王譽兒夜光失一生者幸賢尚爾連璧陵痩谷肥斯銘永乆下車式之墓在原後郭孺人墓誌銘宋子固妻故屯田員外郎郭敏通女為郭氏女二十三年為宋氏婦二十二年至紹聖改元七月十五日卒以十月二日𦵏于依政縣昇平鄉懐恭里宋氏先塋之旁婦人不與外事無可書誌其生之年死之日足矣然予哀夫人無子又哀夫人為子固一世糟糠妻子固始登第軒軒有光華夫人不并享而長榮之可哀也已凡為書生婦四時伴燈火漏下五更坐觀翻故紙瑟瑟不知休書生輩有千錢便作眼孔茍無餘然後帖定謁貴官不見謀科舉不利其咨嗟沮毁使左右索氣如此雖一日不可人意但為書生婦亦有快樂時屠沽兒豈無盃盤市道兒豈無衣食相與至白首懵然不知天下有佳事游宦所及其美處子固已登第調眉山佐夫人伴燈火勞不償而死予哀之為銘銘曰種一田穗孚而為英薄言采之嗚呼何人楊夫子墓碣銘代栁㡬撰楊夫子諱直方字端甫成都人年五十四卒於大慈寺生有材無時命也奈何崇寧改元十二月二十日塟於某所以夫人謝氏祔焉㡬與端甫為同堂友忘形爾汝凡三十年矣治平中文翁石室養士千數風譽錚錚如褒武者有㡬意直承明倚閭奉制要皆是我輩事㡬初冠游其中一日教官命攬羣經日課莫私閱之得端甫賦快語琅琅如金玉他日端甫得㡬賦亦擊節因歎曰自古所謂擲地有聲者耶遂相為友每試得名輙相甲乙大尹吳兆庶召還朝堂諸貴客戯求觀蜀玩仲庶答云惟數本蜀楊桞客求觀吳出端甫與㡬賦示之客省數過歎曰是中不減靈和風流熈寧元豐間朝廷罷詞科以經取士端甫被送正在優等元祐復詞科士指數昌言冠秋榜及楊夫子方可已而果然賦流東下争傳誦之四海士見端甫必目送之曰此西川賦難題者公急景下乃爾不幸春官罷歸前此諸道許推維行一人今大丞相蔡公帥蜀首以端甫塞詔明日田舍老至持酒賀鄉校議政且曰龍圖公行某事舉某人某事冝矣得某人矣其為世所推如此端甫為人莊重不妄交蜀大姓授以師凡從之遊者成市都踵武得官獨端甫不得命也奈何娶謝氏生三子一女三代不仕曾祖某祖某父某自端甫死家益寒乞藳秸五年不克塟㡬糾鄉里博之始及塟其子虞憲来匄銘且知端甫無如㡬厚端甫無如㡬銘端甫無昜㡬雖不敏不敢辭銘曰文章弄翰天將與之囊以江山之秀冨貴浮雲天實靳之域以檉蒲之壽行以異路某也夫子之死友憲也夫子之賢後三尺之冡閴然踐跡車過三歩腸痛不怨為此銘詩不忘平生之言藏此銘詩不知其㡬千百年陳隠士碣銘君諱某字淳老唐廣明中某以羽衛屬扈僖宗西狩卒於蜀子孫家閬中至公十一世矣淳化中賊王鈞冦成都獠李順冦武陽兩川震擾名光乂者以勇力捍鬬賊平補遂州别駕過廣安之雲賔愛山水頴異遂築室以居生子徳鑒咸若咸若生篆篆生公著公著生公皆隠雲賔雲賔大聚落公數世以恩意賙䘏其人土人徳之指頴川家謂人輙曰此吾土儉嵗之黍稷也祁寒之衣裘也公圜機遇事警敏於書雖涉獵而無所不讀昔程士以詞賦君造語清㧞昜取名不難掇貴仕屬父卒祖母王母徐齒廹暮不堪釐生公遊學巴蜀間投筆而歸問田舍事自言孔方兄不至癡我當神我阡陌君宜知我不愚我五經笥豈忘我自存我料理深藏權時盈虚其術在計然鴟夷之間産加十倍以故遊士歸之行者必以贐能飫飽其意士夫揚之義聲落西南籍甚天資純孝事二堂滋益恭旦旦問安侍洮頮進饍飲趨前為壽無一日惰䜪王與徐年極髙王前死死時公已老追慕毁瘠迨事徐奔走左右䇿翼承顔色翹翹如壯時過者相語云是中有老菜子徐䘮既終制猶衣衰墨或告以先王制禮賢者不敢過君子制行亦不以已以兹尚人可乎公應曰吾知䘮吾親終身之慕計天地萬物不吾昜也他日卜塜藏地理家互訿謫莫知適從君禱於雲賔山之神夕夢神指示其所曰吉無逾此遂𦵏又營石室其旁謂其子曰異時於此祔我庶㡬依吾母若早得從遊地下為樂不苦也政和元年七月一日以疾卒年六十臨終戒其子越曰汝學以顯親從汝志也不則謹守先業吾家三世一子儉故能足第崇徳以當勢無罪以當貴堅强以當名清浄忠正自娱樂則隠非隠不顯猶顯也留二詩以訓卒章有親賢逺小人之戒公再娶皆劉氏前者生子越字居中一女子適王思孫男三公卒之三年十二月某日塟昔自營之墓某伏幕武信清州人或時徃来更稱居中賢思一面之吏通謁有居中名在因倒屣逆之坐乆語益温潤人非虚稱之也為之賦承徳堂詩居中薦以書来丐公銘予辭之曰顧不識乃翁今覈實居中則翁可知矣銘曰琳公有書可訂不誣言世忠孝籍之清都若昔隠君事王與徐至行動天化豈物俱其飛行自在周九洞而流六虚豈遂棲雲賔者乎誄王朝奉誄皇宋政和三年八月庚申舉故朝奉王公先生塟於縈川鳳凰䑓之原其子庠序發専使奉書參數千言言倍酸苦覽者墮泪有曰吾先君至行動天愷樂好賢仕為小官敢言不避要勢位不究徳而死吾母安康君誓志受托以復爵湔寃報吾先君庠序受命日夜祗惕今皆如訓約無負將誄先君而安康君亦以疾薨化又曰庠十六而孤區區立世正為老母在今餘年何所戀得乎扄幽堂藏兩玉骨於九泉塟畢幸有弟序在庠即死求母於地下豈不遂所欲某三覆書辭置之苫蓆伏地長慟吾䘮吾母更六晦朔居處之容烱烱在目咳唾之聲如在耳奉觴豆如平常而不復見啜飲嗚呼吾哀無時而已不忍更聞周彦輩痛切之辭也既誤以某為能言且辱交㡬三十年矣無所追悼以慰二孝友疾燔之以告先生辭曰種徳必蓺和氣生祥孝友得封江山增光吹塤與箎擷荃及茝義聲爰集于王之屋爾在昔仙居氷雪面顔兄弟承之居曾閔間先生智明猶照乗珠名物應事老師不如筮官巴西一割無留圜扉靚虚凄然似秋凡三字邑民不厭徳予欲考之石白不泐獄市不擾平反有功增秩勸能出于帝聰嘉陵漲濤来齕果城大為之防今猶利民建言茶郵徑通囊封勢官不愛衊誣鑿空歸休雙谿菊有東道我其淵明辨之不早先生質直務遵正軌千躓百跲不潰厥志嗚呼哀哉視金如土廼得士心蒲許二生振于湮沉樂府五言逼李陵祖遺書簡嚴自我復古安康作配實由戚里輔佐既賢亦曰有子出者有聞處者逹節如彼機雲獨匪其埒先生之化騎星上穹飛行八荒見之猶龍或趨鴻濛問道忘歸海中神山抑從安期厭世溷濁蜕身而去舉棺疑輕託靈安所有功徳者死則不䘮予為誄詞用慰泉壤嗚呼哀哉畧世繫畧有詳本此故曰畧按唐宗室表云李氏同出於帝顓頊髙陽氏髙陽生大業大業生女華女華生臯陶臯陶生益益生恩成自臯陶至恩成世為大理至理徵因官以命族為理氏以直道不容於紂得罪而死其妻契和氏與子利直逃難於伊侯之墟食木子得全遂改理為李自此得姓其後數世秦御史大夫曇乃始别為二族其一隴西其一趙郡春秋之後典籍揚聲名史冊耀光華者無世無之獨陵䧏匈奴而隴西士夫以李氏為恥至周隋則皆望姓膏梁腴華差第門閥而與崔盧劉鄭相矜甲乙可謂盛矣至唐則非獨盛而又大也吾祖出隴西房自太宗第十四子曹王明始分焉明生偲材勇過人為諸武所忌誣以罪流劍南家焉偲生昌昌生訓訓生挺挺生宗宗生瑜明皇西狩瑜負圖牒詣行在所抗表自列乃得追附屬籍尋拜長江令卒官而歸塟于眉之丹陵自偲而下世傳一子至瑜始六子􅀈昵暕曙暎晴暎生二女而絶餘子各有所傳今蜀中諸李悉祖長江而本房則長江第三子暕所自出也他房族屬不能備載今止詳其本支世次所繫庶易參考耳暕生承光承光生叔徽叔徽生璜璜生褒右贊善大夫華陽令褒生䖍即某之五世祖也家於陵生智智生延嗣生二子長曰文賀次曰文貴文貴祀除文賀生四子曰思問無子曰思訓生揆揆生君俞曰思齊生谷先生舊名九功祈九變斤九章昕九臯沂曰思明無子自䖍而下亦各有女適良家諺曰女生向外此固逸而不書然則䖍逺矣不得而計也延嗣文賀皆以壽終守道安貧矜恤孤幼父老有稱之者先君學儒道通班固書立身行事殊有可紀僕欲為傳而未能或曰李氏當有後於陵則振而起之者其在谷也年月日隴西李某記謹按舊本及李隱士誌銘叔徽無所謂生璜者叔徽三子長曰球次曰璜季曰琳乃見於長江五房世繫圖而唐表又載叔徽二子曰球曰璜以是當知叔徽生璜為無疑矣今從之
