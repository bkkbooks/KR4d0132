body:
  text: 跨鼇集卷二十六宋李新撰啓賀蔡祕丞遷直閣啓伏審榮被溫詞進升華貫伏深慶抃恭惟某官妙文旁達至德敏修登蓬萊之三山總圗書之四部為可繼也佩清訓於父兄是以似之追元勳於師相已見飛鴻之漸敢先賀厦之誠賀王都護加留後啓仰膺眀命榮進重權夙接下風倍增殊喜伏惟某官立名以武許國惟忠出竒無窮威已宣於塞外所向必克氣每蓋於軍中比成青海之勳逺過燕然之績論功有在推賞孰先凡兹留後之稱實報無前之勇兵書紬繹更為異日之孫吳西土削平未下當時之頗牧無緣趨賀第切馳情代人與程侍晨啓顯被渥恩真膺渙爵即正名於視品侍邃殿之清晨從古所未嘗聞於今尤以為盛遙叨華貫喜倍衆人恭惟某官道法自然化窮無始調一元之氣固成六虛之流攝衆妙之門安行萬物之上逰心於淡易俗以淳曾參紫府之朝元來輔繼天之教主公孫立辭數萬更開問辨之方混元言道五千再見發眀之㫖且寶籙清虛之地愈於仙山金門燕閒之濱是為德友數應崆峒之問時參鴻䝉之逰方興不召之臣益見非常之德峻遷四品密近三微侍清旦於沖和擬西清之華要朝夕納誨闡微妙於域中雲漢為章副昭回於天上某久使蜀道阻趨泰階終當望氣以來亦欲順風而請夫子之牆數仞通籍良難壺丘之止九淵相形未可側聞新命欣見除書未容一介之馳先拜五雲之賜占星在望共知釣潁之閒承舄有緣詎覺飛鳬之逺謝席徽猷薦考察啓光被絲綸徙平涼之重鎮戒嚴牙纛趣蜀道之輕裝自持許國之心猶慮遺賢之嘆至於踈賤不忍棄捐愛及陋儒亦叨薦墨况達官多在年少立朝率美風姿灼知老子之癡頑不入時人之好尚某者鈍不及事愚為無知孤寒伴北陸之氷衰晚薄夕陽之景棲遲屬部偶占北海之飛書流落窮邉未化冉駹之左衽顧乘公舉獲出汚塗此蓋某官聰眀疏通簡嚴易直老成前輩忠義大間龔黃弟兄踵報近民之政淵雲翰墨親裁樂職之詩仰觀題品之章半是西南之士致兹嵬瑣或荷甄收方觀諸葛之安邉遽失仲宣之依庇謝盧運使城畢薦舉啓大役偶興念宣力多矣至公所薦惟有功得之視等列以增榮睟面顔而無忝借使巧宦弗容私求竊以祐甫不避親舊之嫌祁奚率多內外之舉後人得以藉口取士至於遺才令出莫從人恥為役有若寒蟬附木忽閉其聲亦猶貧子市瓜先取其大如某者才不逮古學粗知方粥飯僧無所建眀牛馬走不通問訊桑樞甕牖未嘗有顯者來簞食豆羮固不改回也樂荐被驅䇿何敢獨賢冒暑雨而趨鳥夷束章程而相雉堞懼使乎之辱命效伻來以獻圗再捐朱墨之煩來治金湯之險執殳朴以從車右挾法式而侍台光盡除糞土之牆悉布他山之石前古未有不日而成得寵若驚見知則說兹蓋伏遇某官懿文旁達至德敏修深知取豫之方久付將眀之㫖錢流地上輪輸陸海之饒智出囊中裕足坤維之富與人不求其備相士寧肯棄貧致此孱庸亦䝉提奬頑金就器已安造化之爐朽木成文更借丹書之手謝蒲提刑城畢薦舉啓初更月評爭乞齒牙之重來就板築豈聞巖谷之空平時誤採於虛名是役厯觀其任事惟蜀人絶無黨與在賢者不可虛拘因故人之言較重輕宜半年之薦分先後大道豈嫌揀擇至公不論孤寒未免為鄉人忘情詎得非謂有喬木屬意可知數遺才指屈而未伸迫重權筆閣而莫下念子貢指難析之辨足以說大人恐韓琬發不遇之言終於題客舍律偶幸同於鄒子鵲初喜合於竇申時不再來老之將至如某者學海涓水儒林弱枝類鼯鼠五技而窮在鷦鷯一枝亦足金湯設險拙無運智之私竹帛第勞慚非稽古之力兹蓋伏遇某官惟刑之恤以德為修澄清之志爰示於至公疏通之才能戒於太察平持三尺折在片言非惟議獄以緩刑抑亦推賢而揚善致兹愚昧亦被甄收既膺國士之知敢後衆人之報回唐修撰謝列薦啓右某啓睿㫖旁敷蓋重賢能之選有司列薦亦惟望實之求伏以某官富有長材夙膺妙簡出司漕計入佐宰司暫屈逺猷俯臨遐服聲名籍甚允為公論之歸事業赫然雅副歲成之考敢圗謙挹特貺緘題感荷之私敷陳罔既賀劉提舉轉官啓帝佑皇圗初靈承於珍物賞延多士欣顯奉於芝書進隆秩以增光贊歡悰而無已伏惟某官處仁以義移孝於忠淑問如臯陶出拜維新之命事親若曾子歸稱難老之觴方攬轡以澄清阻披雲而慶賀修文敢後馳係良多賀提學轉官啓肇新制作欣八寶之告成申錫臣鄰合萬方而均慶惟懋遷於峻秩實贊喜於私悰伏惟某官至論回天妙文華國氣存剛大識造精微仰被休光式表聖神之眷陶成俊造深眀道德之歸拜寵之初修文殊略回人賀轉官啓築斯城而鑿斯池蔑無勤績言如綸而出如綍誤玷優恩脫半生選調之卑出十朋龜益之助未伸謝牘先辱榮緘感佩之私叙述難既謹具啓復不宣賀余少宰啓制具白麻冊登亞宰歡生西海傾巖石之具瞻光列三階見台躔之上應照臨之下鼓舞以欣恭惟某官道任覺民德尊輔世不負所學自結上知肯茹吐於剛柔弗磷緇於堅白直繩風憲素推烏府之嚴視草雲章猶記金鑾之長處仁以義移孝於忠既遷左轄之崇又陟西臺之峻登庸良弼倚重熙朝慮總四方寵殊百辟輔相天地爰收補衮之功燮理陰陽曾旅嘉禾之命某誤叨使事逺出坤維但馳賀厦之私尚阻掃門之役欣愈滋切冒瀆居多賀鄭太宰啓惟帝注意首相真儒具欽四海之瞻寵列三微之顯制麻敷告華夏歡呼恭惟某官學貫天人知周事物發道原之昭曠斷國是於紛紜作新二學之衣冠充美一時之禮樂顯仁藏用素髙經濟之才論道經邦仰赴亨嘉之㑹况今民物繁阜而又天人交通神霄臻享上之多儀宣和奉遊心之清燕惟此君臣之遇初無上下之交是宜公朝爰登上輔所立卓爾望尹氏之巖巖燕處超然獲周公之几几某逺使蜀道阻趨泰階不憚山川之勞欲答爐錘之錫雲天靄靄冀少護於鈞衡公府潭潭願無忘於草芥賀趙招討平晏州啓甲胄起戎有戰固非得已蠻夷猾夏不討無以示威雖舞干能格於有苗非通道孰來於西旅方叔之征玁狁髙宗之伐鬼方四夷之逺弗賓三代之所不免蠢兹卜漏擾我南陲口血未乾而背盟封壇甫成而入冦思峨恃險敢堅狼子之野心阿永投誠如斷胸奴之右臂醜類欲殄逰魂何之昏迷不恭抄掠未已奮天威之如震舉廟算以無遺乃命侍臣實求儒將輕裘緩帶運帷幄之良籌折馘執俘築鯨鯢之京觀斧鉞專乎閫外鼓角鳴於地中授首萬人拓境千里雲梯火炮盡焚梟獍之棲蒿矢木弓難禦貔貅之士破諸囤若竹之迎刃平二州如水之建瓴數路進兵常山之蛇擊首則尾至千夫奪隘臨淮之法救左而右奔巢穴至於蕩空孳畜不可勝計捷書報上喜分八彩之堯眉輿地開圗逺出九州之禹貢古未之有後無以加伏惟某官深道眀權以文濟武大盈若缺成功不居將歸美於一人復推勞於諸將富貴不改其度眀哲以保其身六詔望風就公旦中和之作八蠻落膽畏孔眀擒縱之餘某夙遊恩閎初被謗語叔孫求搴旗之任李績惡薄命之人辰不再來聽凱歌而不獲月聞三捷親汗馬以無因趨慶不遑馳誠徒切賀宇文叔通啓西風落葉方興志士之悲塞草黃雲重卷胡塵之暗舉單于才一郡之大命元戎啓十乘之行振宣皇威恭承睿算弔十六州之生聚復漢衣冠掃二百年之妖氛闢唐境土遴除重德出壯逺猷前席參帷幄之謀謨聚米見山川之形勢智囊無盡才力有餘天實先開時不可失帳下得韓愈人已知其甚賢軍中立左車士或致而相慶恭惟某官斷裁國論式著三言子房之知無名而勇無功山甫之柔不茹而剛不吐將茂北庭之勒石已成南國之甘棠行聽捷書實資妙畫朔風雖徑共飛太白之觴昜水自寒更式荆軻之墓代人湖州到任謝兩府啓浮家四水初為習隱之謀出命九閽誤玷惟良之寄免寒塗之偃薄即官次之便安自為之謀不過如此伏念某材非大受學第小知少不自量冀亨塗之接武老而多難潔孤迹以投閒方且賦歸來于松菊之間詠招隱于雪月之夜躬營小隱以樂餘年歘奉誤恩俾臨舊治白骨再肉雖荷生成于思復來豈無姍笑此蓋伏遇某官中興倚仗吾道權衡不廢窮人知聾盲跛瘖之有用若作大厦須棟梁棼橑之各安肆令寒谷之人上達細旃之聼蘋州花瀨敢事于燕游羽檄軍書第勤于警備賀李侍郎啓重膺溫詔復侍清光泰階增輝海㝢稱慶伏深歡忭恭惟某官元功翼世厚德承天聖神待之不輕中外倚以為重侯藩出偃念吉甫之未歸輿情具瞻喜晉公之再入謂不直則道莫見故至柔而動也剛蓋千頃汪波宜撓之難濁惟一心事上則終以無嫌雅意乃在於本朝彛鼎數銘於大節方孝文起代共欣泰道之交念周公居東爭徯夬剛之決况景星數見而少微尤眀宜召還於真儒仍畀豫以舊物既三仕而無喜色爰一言乃可興邦載開謀廟之初端見垂衣之治某夙依墻仭獲被春溫退理青箱大愧為箕之學仰占鴻造曾成躍冶之金無一夫不被利澤之時實千載共逢亨嘉之㑹逺居蜀道阻覿台光賀宇文侍郎啓伏審榮膺溫詔荐對清光增輝泰階垂福海宇恭惟某官大節名世至誠動天夷險不移骨鯁終在六逰儒館嘗肆筆而成書屢易藩符率五月而報政不負所學自結上知遭時未容有黨方熾坐月堂以營思蔽宣室之思賢所以歲序無多三經函谷奈何坐席未暖再徙山東擇術幾於不同佩劔宜其相笑孝文起代離日中天周公居東明夷出地時哉易失王曰還歸欲令國有望人於是政咨故老况秋官司冦選畀重於他曹惟端士正人俯仰可以居此故曰赦則勿赦庶幾刑期無刑已聞侯霸之入朝必先寬令何為曹劌之請見尚欲以情方躔天步之艱竚聽衮衣之補某夙依墻仭獲佩訓詞第從造物之遊栁生其肘不聞夫子之道茅塞乎中尚逺台光益馳私志席侍郎問候啓搖落窮秋棲遲遐徼屬台光之在望播輿論以攸歸陰被寵庥伏深懷想恭惟某官清規奕世丕業亮天妙簡淵𠂻仰參聖制卧鎮西南之奧獨分宵旰之憂刀夢伊符雪山增重子淵上客方裁樂職之詩伯禽世家已報近民之政竚聽衮衣之補載賡金鼎之調某邂逅披雲徜徉入蜀飄風發發冀少護於鈞衡夏屋渠渠審無忘於燕雀潁昌髙侍郎問候啓上簡宸𠂻外勞侯服政通清淨道合保和伏深歡抃恭惟某官德海靖深性天全粹氷壺可鑑玉璞不雕萃忠孝於一門并侯將者數世俾契敷於五教命作司徒生申揉此萬邦王之元舅既蕃宣而維翰還眀哲以保身民人所瞻文武是憲雖已書之竹帛功無與加姑更樹之風聲善莫大此星移踐土地首豢龍妙眷老臣薄煩卧鎮所幸生此王國豈久棄之諸侯式遄其歸可立而待某曩依賢府辱薦公朝落落京華灼見承平之旦沉沉蘭掖親聞正始之音出守小邦日逺賢德代賀馮左丞啓綸言誕布管轄榮升初登真儒允叶公議中外胥以為慶人神至於交歡恭惟某官丕業亮天元功格物用眀於晦載道而行惟自結於上知宜不負於所學賁眀治典資黼黻之文章入告嘉謀賴蓍龜於政事代綸言於清禁斷國論於中臺輔弼疑丞已得䕫龍之佐左右前後更資周召之才某久便鄉邦誤將使指方忘難於蜀道阻趨賀於泰階頌詠徒深敷陳罔既謝康朝議問婚啓河出崑崙未越慶源之逺食前方丈乃收苦李之微豈意下流獲攀華胄某女子薄諧禮則下堂畏保傅之嚴令子素秉義方過庭知詩禮之訓前辱問名之庶綵敢回納幣之多儀少寬合卺之剛辰正望過金之重諾告祖考以咸喜卜龜筮而叶從仰聽鳳鳴大協英莖之聲律行瞻玉潤喜陪王謝之衣冠王守逺迎啓光膺明命榮鎮巨藩竊𨽻庇庥實增歡抃恭惟某官性天全粹德宇靜深約愷悌以宜民本中和而制行惟聖上始封之地復先賢舊治之邦龍德正升棠陰猶在當時父老能言孔鯉之趨庭後日羽書首見伯禽之報政俗已歌於來暮士方徯於作新久行難道之青天再叱前驅於折阪藩垣屏翰仍歸白首之名郎規矩凖繩如理青氊之舊物某老既不調愚尤無知備奏記以從戎曳長裾而入幕未眀投劾行即望塵賀趙機宜啓郵傳捷布路載歡聲凡在統臨胥增欣抃竊惟軍尚密合縱鬼神而莫窺師出有名驅雷霆而加震妙領從戎之記優先入幕之賓參古司馬之用兵勸大將軍之薦士庭下過子鯉人已知其甚賢軍中立左車士或得而相慶晏夷蕩覆惟斷乃成瀘水周流無逺弗届盡本謀猷之助致兹勳烈之髙恭惟某官大智間間小心翼翼濟仁以義移孝於忠吏祈脫腕之文世貴愈風之檄量國士之才器固已無雙論指蹤之功能宜居第一靺鞈趨賀山川阻長回何狀元啓仲舒發三䇿不言道真西蜀第一人端自公始行白晝而衣繡丁春日之載陽望舊國以暢然瞻飛烏之爰止山川動色廬井生光且鼎足立嵎已有上公之象而海波熬素實資冢宰之權士雖至貧强項不屈家自為孰執經以逰神仙之迹可求鳳凰之棲猶在挺生俊傑冠天下之英才間出真儒得古人之具體惟爾祖有通家之舊念乃翁結同舍之歡里嘗聚於德星宅亦鄰於孟子上堂拜母知𤣥齡有公輔之才與弟議兄許王勃是文章之伯見童子或與其進於鄉黨似不能言共依杞梓之林獲觀宗廟之器雖聞道成佛有先後之數而夜光眀月無左右之容射䇿決科既奉眀庭之對微言奧義果虛乙夜之觀適當大比之年特倡羣公之首言旋枌社阻具壺漿敦長者風先下五雲之教叩丈人行未修三命之恭伏惟文縝狀元至論回天妙文華國以大道答黃帝之問以碩學宗唐堯之文未有虞卿再見而輕萬户誰知公子一釣而連六鼇馬空北則羣無留良鵬圗南而風斯在下髙汜卿之閥閲繼水部之風流具慶增歡定遲行於魯國故交借譽恐思用於趙人優逰三山潤色六典藝香格外細觀未見之書柱史室中更謹守藏之職某比離苫塊久絶簡書粥飯僧無所發眀牛馬走不通問訊桑樞甕牖未嘗有顯者來簞食豆羮固不改回也樂兔園冊在蝸殼廬空坐困詎堪病狂稍解幸識李揆面偶居鄭公鄉夷夏知名尤倍老夫之喜衣冠盛事豈惟吾黨之榮趨見未遑馳誠徒切賀劉提舉生日啓蓍成九數占吉筮於熊羆志在四方立桑弧於門屏重覽德輝之盛式通禮慶之歡還祠先祺為具湯餅觴飛椒桂共稱眉夀之長庭植芝蘭更數佩觽之秀太白儲蜀山之錦繡石麟化江左之風流文在手以可名頂貫犀而終貴何煩髙户曾是記環客坐烘堂笑林甫弄麞之繆夜分取火無厲人似已之嫌方土圭迎日影之南惟陽律候莩灰之動魏公如約昴宿開祥擁全五福之名扶翊千齡之運降神維嶽載觀申伯之賢有命自天潜叶尼丘之禱伏惟某官德動髙厚孝通神眀俾熾而昌方興未艾推賢固宜有後愛老謂其近親以堯事君與顔更譽永錫難老等商丘四皓之年無有後艱極黃閣三公之寵某拘文有自上夀無階祝詠實深敷陳罔既賀成都鈐轄啓仰奉渙恩榮膺重寄叨鄰有幸溢喜無涯伏惟鈐轄團練德履純誠智謀宏逺俯參軍政實簡上心欣聞忠義之勤載省言容之粹左貂貴近每依日月之光右蜀富饒更挹岷峨之秀披雲未遂望舄徒深
