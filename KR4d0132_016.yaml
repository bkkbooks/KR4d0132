body:
  text: 跨鼇集卷十六宋李新撰記上潼川府修城記潼川城廢圯久不治守土吏未嘗過而問焉元豐中吳幾復茍完之又四十年矣風雨剝蝕土漫浡不收斷裂窪凹癯瘠骨立其存者數板若長蛇蜿蜒折脊異首尾封豕病憊莫能興雲屯陳馬破碎離坎不復合人超踰不知有限禁負販小盜出入猶阡陌廉訪使者林公按視之喟然歎曰是可以保民乎樓櫓無欂櫨在者歲以虛籍報上使者曰是嘗以此欺朝廷乎且皇華遣使臣之意以忠信為本天閽九重蜀道萬里任視聽之寄攻將明之旨一字大礭不敢通囊封一言傳疑其肯就造膝馬與尾而五闕一猶懼譴死况虛籍乎他日狀其事疏于上前上美其奏特隆宸諭詔帥臣徽猷閣學士瀘南安撫使龐公選官括其役龐公啓畫便宜詮吏度費條具以聞上命轉運使盧公提點刑獄蒲公都大提舉修築命廉訪使者林公王公檢察之俾漕司資財用有司無得吝其出聖訓旦下盧公趣至潼川與蒲公計議協比無間得之於心決䇿如神庀徒三千人度財百萬章發某庾之紅粟給某帑之腐貫分職就列者四十餘員城縱廣二千六百九十武高二十五尺役四十六萬工程其工為十蒲公呼十邑長戒之曰順天之道而天道左旋分地之利而地形有差始於甲終于癸請為子典籌焉於是射洪令古洵直得甲安泰尉蒲中立得乙郪縣令郭信老得丙東關令李顒得丁鹽亭令李瑑得戊中江令周嵩得已飛烏令孫垣得庚通泉令卞洪得辛銅山丞鄧會得壬涪城令張宗愈得癸百堵皆興而李顒最先成建城樓八古洵直為東張宗愈為南周嵩為西郭信老為北輪奐宏麗而周嵩最先成創團敵四卞洪為西南隅張宗愈為東南隅郭信老為西北隅古洵直為東北隅而郭信老最先成為敵樓一百六十有八女頭一千七百七十有一疏荷渠磩城顔皆以玫表裏護城趾皆有臺蔽險有墻登降有蛾眉道浚池有泉覆堤有楊卞洪郭信老古洵直又新東南北三梁焉以駐泊郭讜同謀環總役事聽三四公之節制以今諸邑之長林公王公朝省暮察周遊四顧凡負運畚築之勤土木瓦石之用高卑厚薄長短曲直委曲縷縵細入無間靡有不經意者誨人以規矩士夫爭勸匠石無所遺其巧考元豐法式無一芒之誤制作之妙幾為天下第一盧公嘗曰某坐見城於前食見城於羮精神之運心術之動無適而非城也若等勉赴事功寒燠良苦説以使人故人樂為之用數公乘城未始空晷刻役起於十月壬寅休役於二月丙午樓觀飛驚干靡雲霄蓬萊方壺突起平陸是役也天氣清淨日景晏溫士不告勞民不加擾數公忠於國事智有餘矣以有餘之智而行體國之忠此城之所以易成也傳曰惟聖人為能內外無患自非聖人內寧必有外憂今四夷來王拓地無際三代之所不能臣妾者胥州縣之矣是豈有外憂乎然於豫必思患於萃必除器亦欲其內外無患爾潼川辨冕三蜀方率十八州山川形勝衣冠人物貢賦織組民庶繁夥望成都不肯低一線氣城郭雄峙乃今過之比進府號擇重臣臨鎮板築就緒耳目咸新天子所以寵光潼上之民恩至渥矣諸公成城之績不可掩也已後人宣寬大之令布中和愷悌之政以其餘時時加葺焉毋穴我垣墉毁傷其材木則城於春為熙臺也於夏為風觀也秋登高足以賦也冬講武足以臨閲也遊於斯燕於斯使潼上之民奠枕以安倚肆而逸外戶可以不閉商旅藏於市桴鼓勿驚而雞犬杵臼之聲相聞安業樂生不知帝力之加於我歌歈舜琴之阜偃仰化日之舒兹仁壽之域也耶正古華胥氏之國也若欲安求哉年月日記成都後溪記大皂之水由羌域中來裂地擘山下合岷水東分為沱西北注成都離為內外二江其一自小橋入都市有篤淵建昌安樂龜化等八橋跨水上高駢廣羅城徙內江繞浮笮南之萬里橋回內江自洛陽門至大東郭俱匯於合水尾其後溝洫湮塞圃亡灌溉人多疵癘天災流行萬井皆涸不舒不泄物無精華太師魯公曩鎮全蜀使治水者循大皂之源得會仁濯錦二鄉使餘之水自曹翁堰導小渠承以木樽環武庫至西樓獨府第有水而城中無水太師魯公曰城皆吾家民皆吾子一草一木皆國中之利而清流不及何示不廣復鑿水溪於閲武堂後入諸部使者之寺與凡帑藏所在園無衡官支分派決均受漏泉之賜逭前日桔橰抱甕之苦月墮清泚無濁涇數斗之泥風回漪漣過靈河九里之潤公相既歸從帝舜遊巖廊垂三十餘年矣後人簡􅒵溪亦不治今龍學王公下車布政咨諏父老不作新奇盡循太師魯公之治數月而政成濬開後溪故道水行如昔邦人驚喜再還舊觀且楚蒍掩為司馬鳩藪澤數疆潦視堰瀦町防原以授子木君子猶以為禮是溪之成忌者惡修怠者不修乃指為燕遊張本夫不知光澤一方備預後世前人自有妙意某江山褫魄老不能書事槩論始終以待久遠考究云年月日記三瑞堂記崇寧大觀之政垂休薄海真人統天槖籥二氣珠璧三辰十日五日一風一雨神魚龍馬鼓舞呈露唁我河伯乾寧同蹄每見漣漪此千載之期非可坐而俟者也慶雲翔鶴上下天宇嘉禾異花陸離地軸此一德之報非人力所能致玉關磧石已廓提封牂牱夜郎率歸輿地此何以詔之彼何自而然天道人事唱豫和汝自昔仁政之所不及困窮無告疾病勿問骼腐不收今皆撫息保養澤漏九泉自昔邦誣作朋紊我法度今國是已定罔敢作慝刑罰中而囹圄空庠序興而俊造得九鼎著方物之象八寶隆受命之符由儀萬物保合太和多士秉文輯睦無間制作大成以導人聲之和而天地之和應之一塵不揚六合弭淨萬里之遠慈父孝子合為一家若吹塤箎窮諸典册羲軒而來莫盛于此故普雖僻陋往歲生瑞竹今夏生靈芝岐麥載秀士以為郡政之格而太守任公以為盛德之事歸美君相圖其狀以上禮部作詩以載賡且朝廷惠利求所以加民者無所不至推而廣之在守令耳公愷悌出于性天吏治本于家法凡守詔寬恤若書生窮經盡其意而後已使普人實被惠利宫祠廟社一日必葺山川鬼神罔不拜賜地不愛寶三瑞薦臻緑竹以歌武公來牟以貽后稷芝草以壽商丘之老公所得多矣珠旋虎往鳯集蝗飛時去時來正若鳬雁彼安足道哉普地最瘠其人服田士最貧而向學者衆後日之瑞將發諸人以光昭太平豈直竹麥芝草而已哉遺愛堂記崇寧初豫濟九節入遂寧境川原膴膴行者謝畦饁耕者相待如賔童稚見人輒拱立有禮法砥路雲梁蓄古氣象市區官寺有偉觀苫廬小家亦嘈嘈聞頌聲胥史皂𨽻步武合繩律不輈張虛恃抱程案辨治朱墨灑灑可理管庫謹嚴無一絲一線錯紛揭樓鼓白早晚令尊若神既衙退庭下虛肅猶烏臺冰廳此所謂樂土真右蜀道家三山是時橫海王著仲晦為令豫問其由曰僕安能致之此前賢中散李公之政垂四十年而風俗不變規矩歷落如李公在時後七年豫以節度賔屬數至縣縣令蹇昂元直合陽人其治率髣李一字一事不敢異自言後人強項不肯師古李公立政大有遠意前無能聲後無來者吁嗟乎為治如李公足矣往昔土豪幾溺儒冠公首興學校士接武登科今天子以八行厲天下九州萬邑堪賔貢才二三人而邑子劉震行義第一大司成以名聞上趣命以官劉君達固晚升堂遊夏親聞道於公者也獄市不擾覽公遺記想見當時清淨詔民條約皆耐久近厚用周孔道德仁義以緣立訓使民不犯司空城旦書田婦野老能口公聽斷以歡遺子孫指某木公時所植某社公時所興相與保守不廢古循吏有如是者乎公不充有為未老而死一抔之土民力脆弱且又去朝廷逺未能上其事日歷以授太史奈何然高門已有具車阿閣已生鵕鸃大觀四年公之第五子出鎮是邦為政大抵用家法恢疏無心靖重有體胸中吞幾雲夢未嘗見喜慍天將以福寰宇豈特為武信千里賜遂寧一邑父子兄弟舊所遊歷月屏水寺清題妙語蹇令臨而集之繪二公像於堂記所憩茇處使後人指碑以墮淚自蹇君澤而明之年月日記潼川二顧相公祠重畫記更大觀嵗號某攝梓司冦綰組二日伏謁二顧祠周覽四阿循墻而趨粉堊圖繪皆作伶官弄臣像豫歎曰兹野人叢社中物前史稱顧公有儒者風風馬雲車其鬱鬱居此乎夕夢二吏召某造府府潭而幽兵衛祗肅堂上有東西嚮而坐者豫問吏吏曰此二丞相也謁入主人降階以逆某上西階先右足歷階及席坐云則坐其西嚮者曰旦辱經臨君亦與我合禮樂以俟君子試與儒生魯璠議之後數日璠來以所夢質之相對忪忪若作寢語璠抵掌曰神哉靈哉璠病此久矣願因以倡相與考唐冠服制度參以天聖令文凡節度使相所得衙官從吏巾韝櫜鞬冕辨袴褶及功臣鹵部鼓吹行軍鏗鐃鐘鳴棡鼓革車誕馬分别隊伍啓殿森次命工師以筆墨從事十日一士五日一馬丹砂曽青熠耀于廡行者俯者植立者若貫魚字雁無敢亂行者如雲屯月陳俯聽師律者如三令五申無一敢譁者嗚呼二公以忠義死自政和甲午逆數至唐大順凡二百二十年而後得廟號邦伯王公吉甫一新宫宇宫宇成而畫畫成而祠事大備矣風流有餘典刑具在二公以享將遊歌而安樂之也願請疥癆賔以斷伶官弄臣像可乎嘗省郡牒叩之父老具言祠地正昔鏡堂公嘗表楊景安為監軍以高祀蔡然明張希範為賔友李孟宣胡守章唐友通為爪牙雍容嘯呼置酒高會雅歌投壺想見一時勝快鏡堂春歸擷翠帳花涪上女子弄絲吹竹顧影婆娑其樂無涯鏡堂秋歸涼飈灑衣清露濡席登高以賦感候而悲四座歔欷涕泗注頤送暑迎寒一樂一悲或借箸而籌或舉觴而畫酒酣氣振蔑視四境今高臺已為池深池已為丘歌舞窈窕之區化為城市永巷連欐民以為廄庫千秋百歲後大率多若此骨為土矣為塵而揚矣二公獨以英風梗槩血食此土梓人事二公如生歲時食飲不敢先其祖禰而先公公非有實惠加梓人而忠義所在非特梓人能伶而尊事之也魯璠索記豫并書之年月日記普州鐵山福濟廟記大觀二年八月詔書祀典之神命在處長吏營賁祠貌洛陽任公適守此土數登西山欵隋姚鎮戎之祠顧祠陋甚右杙左義玉貌風埃蒼胡古憊兵衛跛倚祀事不虔負我神君任公乃遵詔書卜于神卜吉三年春徹而新之麾工徒悅殿構方梯而上烈風怒號人披靡不得進衙官杜之奇酌酒酹地曰神之攸棲局蹐寒窶若妥靈重遷郡朝何苦與聞必許從革則收還豐隆使庀徒任事惟神擇所宜語既風止逾月殿成會某從趙使者城純兹來歸任公竟以西山之役屬某與安嶽令馬觀是役未嘗費於公上不斂於民為寢為廡為樓觀為齋堂為更衣室為厨為祠吏之屋凡八十楹此固末邊事小家編戶豈無茅茨庇風雨鎮戎君曩殄蠻獠力鐵山之戰有功于民土人德之春秋享祀不忒祠貌之新理當然爾但隋史逸其事他傳不復見而姚氏居普者皆自謂神君後也普地千里屺崦走伏率無良疇大田若箕三日不雨地裂龜坼無長江大河以滌洗煩癘惡氣中人死者十三國之生靈託神為天朝夕之所以祈報者宜無不至非若官守者憑几視歲而已亡可奈何即謹荒政幸安隱以去若是則土人之望於神者常重而官守之望於神者常輕也任公能傾家藏倡先土人字字行天子詔書以祠貌為意比其成也人與神咸喜某因人神之喜作迎神送神二曲以遺祠吏俾歌以祀云夜郎北兮雲蒼蒼辛夷落兮木葉黃兵佖路兮凱歌闋渡瀘歸兮馬汗血宅靈安所兮嶺之西鼓角隱地兮烏夜啼倐而來兮鼓舞迎將苾芬蘭羞兮泠泠桂漿羅拜兮堂皇神之樂兮未央右迎神曲伐鼓兮􅀢􅀢風雨時兮歲豐刲羊炮羔兮旨酒清潔相與答神兮繼日以月肉掩豆兮中禮盞斚酢兮告終神之福汝兮百室攸同神歡以留兮塵囂而蒙靈旗雲馬兮或時返乎離宫右送神曲泗洲堂記千百億身靈光端能普照二十五門行業獨獲圓通僧伽大師來自西方示現不一萬回饒舌喚作觀音大士李老師知這大士以慈悲願力遍滿虛空周流恆沙國土救度一切苦惱我昔在靈山會中聽佛説法受佛頂記歷劫修行一念差别墮入生滅滅生乃至于今大士曩坐法席首愍我是會下人疾病墮溺拂以楊枝灑以香泉從死籍中幾奪其名今復往震旦老師未嘗有一香一花恭禮大士但不作魔見不顛倒妄想不綺語兩舌於貪嗔癡擬諸衆生事事減半行住坐臥知有大士靜慮不起普慈何知方寸一移觀音在目若道昏花幻見夢覺不分彼無求而來我無求而見則人非人等當共證知平時護念如人飲水冷暖自覺而况世人尊之如嚴父者愛之如慈母者事之如君師者布種收成薑不變芋吾鄉仙山其南有古聚落名始建有大檀越姓陳氏父兄子弟奉佛愈於奉父母君師者自廣政到今二百餘年由周至謙凡七世興築松峯院於賴耦鎮得提刑張逸御為之記謙等又建泗洲堂繪大士像堂就而柱生芝芝豈人力能致之哉開祥呈異以著陳氏篤向佛事之勤意大士安肯揑怪山神亦何所知不像不堂則芝無自而出芝出有因則陳氏之果行且熟矣我今為子結緣捨財與成文皆得成佛道謹皈依而詞之曰供天花於雲空結寶繪之層重孰若自然玉芝之秀重乎金鼎之出聖像之儼瞻乎古佛之容天地人如粟云何獲圓通共作龜山山下夢莫知身在玉華宫徐子玉畫像記循三終星須富貴何時抱九回腸開口而笑者幾日一生強項兹膝不屈坐是窮困自謂無雙何物徐君亦復爾爾客宦播遠相見以晚為恨歸來逾年而鄉校之議委巷之謡類稱子玉之賢同一氣此豫所不逮且具言子玉持軍嚴部曲不敢仰視足一跌便膽落豫意者暴武少文及見之雍容雅洽如國子生如修敬子弟其言子玉熟格令口刑書如建瓴豫意者堅忍不通及見之疏敏和厚可人也其仁義知勇莊子目為有道之士梁上俊遊陳實目為君子莫夜不速士文目為異客自子玉來彼有道之士高蹈幽隱君子異客回車而他聘故厚藏之家闢外戶以寢日者火延民廪不可嚮邇前導呼徐君來朴滅如浸祝融回祿豈引車而避之申令之明使人赴水火如是郡古亡城有城自子玉始其所以左右保我民者非一蓋山谷氣象丹碧飛驚瀹而晶之付霹靂手今子玉受代以去文學士相與詔工徒堊佛宫垣圖子玉像約為後日甘棠來請居士記之居士戲謂曰諸郎如南山白額平時噬人口中雌黃不可調一反勤誼如此徐子槩可知矣作一段曠典某幸不賈謹以十數語侑醵子玉姓徐諱璹廣陵人方圖試改未可量也居士贊之曰兵家者流悍盩寡能子玉雅詳山之豹文法家者流堅持少通子玉卷舒天之雲容曷為圖形冦亡聲淪雉堞袤延用保我民愛之思之惟士為深寧喪千金無失士心更生閣記政和丁酉正月辛亥靜塗諸羌叛火折博市殺居民千掠婦數百屠汶山聚落殆盡羌媼競掠財貨輦負而歸適民有春釀賊縱飲至漏澤園昭惠祠朋醉莫能興時郡闕守司戶曹杜掌攝事乳臭不知兵民號求救爭趨城闉掌急闔扉嬰城以守城中尚有戍兵百土丁三十人皆扣頭願襲戰掌不許趣收城鑰土丁健者十輩至夜請縋城而下掌曰城禁嚴重賊已醉殺之不武士皆切齒儻縱之往如劉菅茅耳兒曹不識機會以吾民餌敵曾不之恤也癸丑復引生羌來攻城矢石如雨人負板以行決絶新谷三溪水道贍軍池涸人無樵蘇撤屋以㸑援兵至賊始解去朝廷命成都帥周壽節制軍事鈐轄張永鐸統制軍馬廉訪使者丁弼監其軍三月庚子至相公嶺羌賊六百迎戰士氣鋭甚左右馬軍翼卷夷賊居中東兵千蜀兵三千餘欲接戰永鐸一麾兵賊無遺類矣乃下令仆旗鼓問賊何來答云來取爾曹首級日昃賊稍依山長嘯而去王師入城永鐸暗愔無謀四月己未旺烈空碉囤率其族六十七人降監軍丁弼以為詐因命囚之取旨不報是時數其罪而戮之則諸羌膽落不即受而降之遂可班師優柔不斷醞養邊患以遺後人五月癸丑西將丘永壽及張永鐸議宵攻靜州堡而夷賊先刻知漏下二鼓師行扣賊壘賊鳴角相應王師皆陷凡偏裨將十一人不戰而死無一騎一卒逃者時丘永壽為大將當行日晏矣永壽猶臥營中不知師敗比聞報乃行至故州基導以胡部樂謂之奏凱而還士皆竊笑永鐸居帳中股栗不能言大槩靜塗羌種類不滿二百其勝兵者才七八十人耳掩捕殄滅一巡尉之職而帥司張鼓其事至煩樞府發虎符兵他路銓將飛挽饋運一方震騷凡費國用四百萬緡兩蜀由是困矣上遣中官何伯通究其役條具五事以聞燾左遷張永鐸丘永壽丁弼竄嶺表復命孫羲叟節制綿茂軍种友直將中軍以施黔義軍為先鋒首破赤土山深入板舍源部族凡射傷賊賊視其瘡沸謂箭有神如耿恭時夷人奔遁搜山抉谷至濕山背去茂無兩舍靜塗諸羌吻草牽牛抱茂州將賈宗範足投哀丐命願平夷碉囤遠徙幽隂以田授宋世世不敢犯邊會孫羲叟傳令抽大軍回是時軍若達茂則諸羌束手就死矣賈宗範即受旺烈等降反慰安之奏諸朝賜守領官月給茶綵綿茂分屯後靜塗羌益驕時時跳梁謂法非我制數出為冦豫昔以書記從戎目擊其事數進議不合每從傍觀同列咋舌以杖扣地曰何乖繆若此一切誕謾公肆欺天是當有隂責且外夷盛衰各有時然一日縱敵數世之患是役也三月丁未強嶂十二族投降次水西三日不肯濟庚戌聲言願得二郎中來盟乃可濟永鐸屬成都儀曹趙滂副某入不測之地乘桴至中流浪激桴桴覆同行八人而七人溺死獨某脫蛟涎免葬魚腹中是所謂更生者此也四月己卯永鐸又迫某與犍為丞陳益臣環視兵夫病給藥劑翌日癘毒作某益臣皆仆牀死數日不知人是所謂再更生者也其溺也屈原居汨羅其病也童子在膏肓豈念見今天日已矣誰堪追咎者宣和癸卯八月誤恩二郡恍惚疑若經行夢中不知是覺豫之更生止是而已乎嗟嗟茂才三里之城如方砥如棊楸士民勃蹊半廬野外羌人動輒十五為羣日夜舞持弓刀躪我市肆奪我餱糧剽傷其孳畜前守王彥卿病之慨然召將佐父老告之曰城無以保汝汝不可無城為汝保也旦起具畚築百堵興矣大帥龎徽猷惡其專彥卿飲恨以罷役後二年有靜塗之禍且折柳樊圃何足禦狂丸泥封關未能拒敵然為之猶賢乎已蟻為垤蜂為户三其穴狗兩其竇鹿環角以戒害猿為域以全生巢高窒深塒雞檻畜各欲知所畏避若等不幸生長荒服安於下賤且無城以保聚故熙寧政和再罹西羌兵火嗟嗟磷光夜晶遊魂亡招往者已遠來者未知仁人有言其利必溥閣在楊靈祠下非燕樂地也因以書事待野史之詢採某年月日記
