body:
  text: 跨鼇集巻二十二宋李新撰書上席徽猷書某嘗謂飲神液神遊華胥列禦冦夸大神怪其說烏有是處所邪某走匝天下及還西南迺始覺風俗恬熙人物潔麗飲食居寢幾華胥氏之國也民垂白不見兵甲老死不知飛輓無蝗蟲害稼無蟊蜮含沙過雨不言澇亢陽不言旱大田有年人安土曠俗無流徙細民重犯法囹圄屢空斷大辟總一路嵗不過二三人兹非華胥氏之國邪比年天災流行火延市區重以綿茂之役逾年不解迨今始平定烟氛寖消當息兵愛民之初務農重穀之際主上遴擇重臣坐鎮坤服閤下父子兄弟醖釀恩愛日久甘棠茇處惟席氏居多恭惟閤下元勳丕業載在日厯忠規直節著於朝端今兹入蜀治貴清静重厚不擾而逺人安業樂生欲還中古之淳正在今日蓋将侔華胥之國而與民俱也某官滿東蜀無罪而歸有經由之幸不一瞻拜台光以去是真不遇者也生乎同時見而師之獲並席而坐一解顔而笑又出於意外與其進不與其退在先生耳干冒鈞崇伏深戰慄上興元吕守書某竊嘗言吕悉本齊太公而國朝望姓尤髙自秦國太師兵部儀同以學術妙天下功業冠古今載在日厯著之彛器而譜繫益大𤓰瓞綿綿與川源河瀆相為流長凡所謂南阮北鄭萬石八葉隴西李城南杜自昔稱為名家者聲望相埒曾未若閤下之家聲門閥實處有宋第一某僻在西蜀自為兒童時固已熟知矣言念吕梁漢唐輔郡而前古政迹書在簡䇿者姑置勿論而近時有許景山治堰崔元弼馭吏文與可鋤姦燁燁有嘉稱而閤下之治乃與二三君子爭雄灼在耳目於已行而可攷者某非敢譽也且馬遷作史首分世家而孔子設科亦列政事至於逺人大觀薄務知識豈惟曰父書家法平訟折獄而已哉有道之人倫平子之品目許劭之月旦得於性分而昔人之器遇往往在於隻辭片言故童子以月蝕被賞孤生以樂句見知微雲淡漢長笛倚樓戰場文阿房賦非有識者詎能拔出俗中借之齒牙某前日嘗以是道進矣恭惟閤下文雅博厚詼敏疎通得之自然清聲佳句播在人口重惟冰鑑難欺止水不摇主持風雅用人物為意某也無似幸𨽻麾下簿書期㑹朱墨出入不敢不勉而山樊牧竪聲迹么麽其言語蹇吃其標韻塵俗列在曹掾俛仰進趨閤下固已數見胸中固已有定處矣然某私自念齒髮甫壯筆硯不廢方将培厚所養以備閤下異時萬里驅䇿之轡而新嵗論薦或得出門下夤縁英識使諸公知是人以辱吕公許可由是脱去選調決無疑矣漢美竇憲府多文章士唐史稱鄭從讜在太原多得士天下指為小朝廷嗚呼何物兩人者乃竊多得士名於衰世悠悠之途而況我公者乎伏願少關意焉干冒清峻戰越不已與宇文吏部書某嘗謂鳶託風以髙蠅託驥以逺此物之微者有所託也士君子之名垂若日星久逾金石豈無所託而然故言道必託之黃帝曲託之李竒書託之孔子然後速售於天下可傳於後世某不幸自先君捐館舍十年貧不克葬瓦棺石槨決不僭於地下肆筵設席方量力而後起兄弟五人上下勸厲足以送往無憾但先君治命欲得髙世之文以書行已之實獨此一事疚心恫首求之十年而不獲它日辱公之從弟巨源貺公所為祭叔父文與誌伏而讀之兄弟相視而笑曰得之矣公之立朝節義鬼神不疑天下之稱譽尊服者若出一律雖門人之惑童子之見而文有道之碑宜不媿於心惟公憐之且人萬里而來既又以勤請拒之不祥伏惟裁貰暴易之罪謹以狀布几下荅喻企先書某頃者辱企先足下賜書索鄙文意欲私有識者取一笑之雅退羅餘藳得一紙半編迫不得已通示足下幸䝉拊髀之嘆别後三日洗剔故目而相見乃愈於前時古人伸於知己者俱此類也且吾鄉於蜀為小郡衣冠而稱士者大率不過三百人試筆硯戲場屋麞頭鼠目呫囁兒女語讀書魚魯濶視大言者又居其半至於以世家自名者蓋有二焉其一曰某之先為都押衙在邑里為有門望是子之所不加我者此也其一曰某之先據山澤利所藏不減陶朱猗頓是子之所不加我者此也其間又有奔合世務趨炎赴竈傳觴為夀而不敢膝席信其㖒唾而諾不後時必曰某人與鄉選者幾某家登進士第者幾此皆僕所常論而非妄也今足下於鄉選與進士閴然無聞在閭巷且揺手不得低眉舉足猶有踐影之嫌僕世世又非都押衙與據山澤利者人所不信固可知矣足下意不悟此而强欲以僕文字之惡張大其所可稱恐竟不能得許可於人祇取辱耳且越蜀之犬畏雪與日倉皇吠噬至無雪與日而後已此栁先生所以為戒也屈子賦曰邑犬羣吠吠所怪也往者吾廬畜數犬呼而前却而後帖耳揺尾唯主人之聴僕一日振衣彈冠自外而至羣犬驚齕不已蓋吠非其常者惟足下奮不顧此攘臂而稱道嘘濡挽摩借之聲光以幸萬一期以取信於人曾不知自累於不信也願足下察焉無為所毁以重其過夫以昔人家貧猶不得推擇為吏笑談不羈而人目之為狂類多有之矣豈獨今日哉足下為文未嘗蹈襲古人語言其清簡蕭灑過僕數等其詩與詞僕願學焉若其志大識逺終始然諾讀書盟死生好惡捐凡俗此又僕所以求近也足下於僕可取而拳拳若此昨日遣人奉謝而請所褒貶足下猶再三見器以盡推轂之意有如徇名而求實屑玉而求瑕則僕将不勝其責且懼足下譽未絶口而唾詈繼之敢告不敏謝張徳翁書某頓首拜手某比寫詩凡二十篇凂獻左右退省拙惡無地羞死畦逕小兒作蒼蠅聲謾言綺語想足下不笑則唾末吏踵庭有詩為辱故鄉之榮何必以錦為耀是一日伸於知已斯足矣伏而讀之至於再至於三凡昔之所謂盈川先生者幸親炙於今日僕雖不才不得如王楊亦将如盧駱而後止且僕生二十有三年無它知喜與黄卷聖賢語故於書無所不讀又有四方志故嘗南走江淮西過關隴往來陜洛之郊每經崇山大澤則氣宇廓落當月明風清則志思灑然時出語辭不覺成詩僅與聲律相通因以是意不求之它人而見之足下伏惟足下指導其所以非詩以成其所以為詩則足下之所謂繼謫仙者復何人哉僕誠有望也前日謁上五十六言間有郝婁長者之句誤作霍字就煩改正無狀凂塵不勝驚負稍隙再見猶復以詩為終日清談答喻晞文書譚子圖經及神仙集録皆載天池本末太平廣記亦有傳池直長三尋許濶十丈深丈餘舊有水閣臨池砌池之西南有觀音堂在焉凡嵗之上已端午陵之人空城郭以遊叩檻觀魚以餅餌食之善沒者泅不及半其曠可知池廢而人不及遊者幾四十年父老傳陵凡旱亢禱於池皆有應又云池涸而魚躍去其言近迂未易言也昨承詢訪退請族長之所見與里巷所聞書以為寄大抵物之興衰皆有數繫主之者何如耳然此地久為好事者嗟惜收復舊觀正在今日餘俟自見索言之上姚宣徳書某甚愚無知竊意比日士子通名於将命者詎止一二或為歌詩或敷為書翰辭甚謙下以求教者髙自推譽以求知者有得半而之識挾為終身之榮有遂外臺之請廓逢入仕之階此誠厚幸矣然決未有持孝義之説以為左右獻者愚請畢焉且讀古人書當以古人自期而世豈有無親之國邪故古人求忠臣必於孝子之門豈有無賢之世邪故古者求賢士必於慕義之家某頃嘗𨽻籍太學丘墓之邑違去六年鬱鬱念桑梓以謂事親之日少每當春秋上夀時執觴四顧祇自寒心欲於是時脱身西歸日暮道逺倒行逆曳復且隠忍就功名有如何蕃謁陽城還養久留不敢某殆失所以為孝之意又嘗雅善西南之士聞明公名久矣往年京師始謀一見適不在館閣拘於假告後數日復一見會朝車已出都門私懐惓惓如有所未盡有如魏勃見曹參無因特為之掃門某殆失所以慕義之志嗟乎如某者尚何言哉大抵人心貴無慊茍有不至何苦倔彊為近甫還故國既得伸所以事親之孝居無何丁明公下車復盡所以慕賢之義皇天后土不違所存譬夫飢者得食已食而甘俄享珍饌操願畢矣恭惟明公當朝名臣之後奮功業為二千石剛斷靖重得之自然千金成諾足以走冠蓋一日閉閤足以移風俗聴政未浹旬月而三尺童子皆自鼔舞以相告曰昔一郡百太守今百郡一太守雖古之諸侯近世刺史未易過也某方且以忠義自撫而謂向也不足今則盡善因索紙裁書敬敘所以不及藻飾蓋其文華者其言浮其言浮者其行矯愚将以古人自期不復作此矣迂率之至干冒崇重不勝驚愧上漕使書某嘗謂冢宰制國用而户部度支知總其書數而已至於生而用之制節謹度經費斡旋蓋付一道之使日者削平漏夷闢新疆建城市營宫室儲兵給農飛芻輓粟導濫觴之源供尾閭之泄疏左而右竭應右而左眢自有東蜀已來其賦入如是而止耳舉版籍以覆視幾無所用其智巧而又有司不知出内之吝從而腐耗之甚可誚也坐餼廩者忽豆鍾釜龠之數居帑藏者有緘縢扃鑰之名因循噤嘿吏縁為姦不可條舉某昔佐幕武信嘗病税務除官監外如遂寧遣専攔發船與收過税而縣官不與其事因都㕔鞠衙校温約始窺見其弊約以差次當至遂寧既在外邑挾州郡之勢無敢誰何凡養妻孥飲嚼蒱博外月猶得四百千是一専攔之身一嵗之得幾七八千緡其它可以類舉合之外鎮如獨柏峽口三四處皆付之攔頭以為擾輕而增虧未嘗比較嵗又不下數千緡二州某所厯宦處故為公言其略此關市之征所蓄者非遺利也試講求之必有毫末之助又比年公使增錢以養州郡之㢘而場務官以醋息羨餘為能商旅去來舟車一至不問課利之多寡先令認醋息然後收税蓋醋息有厚得而利速課利有常數而增虧不問彼何憚而不為邪其為名則曰頭子錢所謂使司公庫僅有二分之得而州郡所倍之一時之令以添置公用為文而其實制不急之物如舞衣樂器之類是也若約有司通融候發綱應奉軍須稍畢乃得支用以二分之得而通四分為用是本司嵗計有六分之入也季㸃官下縣不究其實虚張聲勢隨例供報以為訖事安知取之甚艱而耗之甚易當優游閒暇之時且為不可況偃兵息民之初務農重穀之際錙銖之積所當宜先是安可置而弗問邪某疎謬無取辱先生招來之意寵甚恐亦有所詢採敢略陳之幸母以迂緩不切於事情而後為得也代元武上新刺史書某竊言士大夫前不為科舉所諉後不為生事所迫其志與氣果何如哉猝嗟風雲激回狂瀾平揖不解顔繩墨非所羈其為人可與奮不可與留可與榮不可與憂平居無事往往以仲舒賈誼自許此無它適其幸遇有二焉單言暫謀偶合世主冠佩雍容遊廟堂之雲霄旦厯仕階夕名忠良昧爽而指期卿相矣又其次伸於知已為當路者深器曳長裾公侯之門挾左右半面之知方且有徳色而自以為功如二者士豈得皆然千載之一時百世之一人耳有如不幸不得為天子臣不得為公侯客士類見鄙里閭追咎流俗難合無與偶者豈某今日謂邪某始祖本長安崎嶇逺宦流落僑寓五世居陵迫於寒微人所不齒兄弟復無它長號為遲鈍不及事而望族之家因亦媒孽其短不與所進砥礪場屋終不得一名雖自豪憤時亦抑鬱矣伏惟明公以功業起名以忠義事上如鳳凰芝草賢愚皆以為美瑞青天白日奴𨽻皆見其光明宜不肖無復道也比者車從東來某首執刺道左後數日謁先聖某復從執事後塵雖拳拳若此亦自無取且古語云得黄金百不如得季将軍諾又云此生不願萬户侯直願一識韓荆州祈於幸遇昔人皆然願賜指教而激昂之則志與氣某尚可鼔而前也言科舉書某名位低下習為髙語不識揭厲妄用所業贄顯人将以伸而公府潭潭若淵顯人胷中無涯涘自當不報始時欲言䑛筆和墨臨文輒罷曰是大亡益祇自勞耳幸今閤下訂意人物與前者不侔故某兩有所獻未濾清濁澌鐘牛鐸不入里耳冀天下之知聲音者過而問焉竊惟科舉一事西南碩學病之久矣古有鄉舉里選之法推有徳行道藝者登其數於王王拜而受之謂之賢能之書戰國之士急喘疾馳榮譽朝夕謂談仁義如孟軻於齊不過為下卿談王制若荀況於楚不過為祭酒儒其業若叔孫通於秦不過為博士去而學兵學兵可為将不如學揣摩揣摩可以為相於是周孔之道脆弱不振者久矣漢代崇經士皆専門非伏生書田何易則謂之無師非父子傳授則謂之無法故漢之文章閎博淵粹號為得人之盛下此如魏如晉如齊梁間設科不一而士氣浮偽無可持循者今日取士大抵與唐相低昂而法度櫛比往往過之然郡國變詐未能盡去且一經之弊甚于聲律而命題植意可以網羅每聞邛之士走蜀蜀之士走眉成都緜漢彭嘉陵簡之士又不知其他走也多購厚蓄更相貿易以中有司之求而迂學陋生枕葄圖史大挾以入有司任好惡不以全場定去留見皮相馬用指測律未能考實其失愈多中間賂遺賄行幽談聚笑神鬼凄惻汙吏不顧崇滿谿壑外樹牙纛中啓關鍵棘圍重重無補嚴密同列者豈能究之哉視其面若無蹊隧可入而其意之所私髙則出月脇逺則過暘谷其深包曲藏則在蒼梧雲夢之野同列者豈能究之哉剽金者忘人貪餌者忘鈎有司之不公不明者忘法且三晉之士尚權變有因權變以成功齊魯之士競口舌有因口舌以得官習則為風恬豈知怪而況科舉乎唐薛登嘗言今之舉人有乖事實明制才下試遣搜揚驅馳府寺之庭出入王公之第俗號舉人謂之覔舉覔為自求之稱非人知之辭其為弊何特今日邪崔郾試士東都吳武陵持杜牧阿房賦詣郾使以第一人處之郾以有所主而牧之出得第五是非為有力者所奪邪往年劉青州關情於此故文移校官丁寧訶切往返件諭開陳根萌以逆閉其塗而十四郡之士以此相慶其檄草當在尚可覆視也吁三嵗括賢於海内實朝廷大事其上以為三公其次有簿書獄訟錢穀之寄雖小亦有民社之託而令俗才僥倖以得盜天官者愚弄其衡柄直使人惋憤恭惟閤下以文雅道實取至公上第周流四方知人之情偽而皇華之光再照右蜀雍容温潤出於天姿和而不同緩而不迫以待吾蜀之能言者有使者若此其忍負之哉如上所陳倘可徵採願閒燕索言之與家中孺提舉論優恤户絶書某竊惟户絶之法朝廷行之最為周密夫民不幸至於户絶倉庫牛馬屋下地上器皿毛髮四至八到一拳之土皆歸於官耆鄰未至官吏未及則移易晦匿唯恐其後法有被差官五日起發蓋以防欺故雖替移不交與後官而今有被受文移逾月不往甚者逾年不往以至替移不復省問寧得無欺邪夫死者目未瞑一簪不得著身披出括入無所不至又有明給齎送之費令近親營辦之法今州縣至檢括財物而不知給與費用若此等事皆㢘按之所當行為今莫若州置籍具某日某縣申某所户絶某日差某官某官某日繳到文帳内給若干錢為齎送其行遣次等與依違限日按圖炳炳可見矣且鰥寡孤獨法朝廷所以子惠困窮而推行法意往往疎漏官為居養蓋以户絶物養之不足則繼以常平息錢以户絶屋居之不足則繼以官屋今州縣有處據舊條仍付親戚村坊養恤或祇給米豆而不居之以屋夫居以屋欲籠而養之幼者待壯老者終天年而後已謂之無告之民彼将舍此而奚歸哉立法至此不為不周故曰推行者疎漏耳某小官真不守分重惟在閣下閭井之末聲音不殊用是不復閉氣臨紙信筆蔑有文彩他日行部借與閒燕當索言之與宇文吏部干墓誌書某昔辱公之從弟巨源貺公所為祭叔父文與誌某以書簡祐夫明舉謂子思著中庸孟軻與告子萬章荅問之書二千年無此作乃及今見之且大書二通以訓子而孫伯逺謂如仲舒某嘗復之曰仲舒之學不醇乎經其作繁露背孔子意者十六七首禜祭行啟閉不質隂陽而隂陽亡序言災異身幾不免於戮辱眭孟祖其餘卒投禍機是安可擬公公之文與行稱是其於道也能言之且能行之兹天下之公議某所不敢私也某先子死有嵗月貧不克𦵏某衰且病一旦殞溝壑則先君節義不揚於世兹世所謂不肖子不肖子與無子等寧無子焉有子而不肖則将焉用之元祐初某丞南鄭聞先君卧疾丐身歸寧不待報步走十日至陵問省牀下先君命某來前曰良苦吾氣惙惙待盡日夜固已望汝之歸也無咨它事第與我求文行髙於世者其言足信於天下俾後人不疑誌書吾實於石柱表之墓陽則吾有子矣某有弟四人其三人核意學古清厲穎秀悉通經相與求文行髙於世者十年矣今得之吏部云知其貧必弗肯重辭謹以狀布
