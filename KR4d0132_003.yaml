body:
  text: 跨鼇集卷三宋李新撰七言古詩將進酒君不見青青河畔草秋死嚴霜春滿道又不見天邊日薄暮入虞泉曉來復更出匆匆年光不相待桑海由來有遷改人生荏苒百年間世上誰能駐光彩秦皇漢武希長生區區烟霧求蓬瀛驪山茂陵皆蔓草悠悠千載空含情榮枯自有主富貴不可求正值百花飛似雪如何不飲令心憂勸公樂金印莫療饑珠玉難可肥碧酒濡唇百事美緑鬟扣眼一笑隨跳丸日月不受縳朱顔易逐飛花落情知一死同衆人何不趂取生前樂有所思洞庭始波秋風起舟人怨遙心在水眸寒不見瀟湘雲天碧江沉一千里西洲蓮老誰愁紅蘭橈欲採悲秋容採得秋容咽無語白日長安在何處行路難君不見天上星萬古耀虛碧豈意一夕間墮地化為石物理變化無定端誰保人心無改易憶妾江邊採白蘋郎騎白馬渡江津垂鞭停棹潛相顧共惜當年桃李春石城二月東風暮斷腸狂絮隨郎去百年誓擬同灰塵醉指青松表情愫可憐一日君心改前日之言復誰顧棄捐不待顔色衰忍把流年坐相誤還君明月珠解妾羅襦結念之空自傷長慟與君别出門望鄉關不惜千里行從人既非禮何以見父兄去住兩不可佇立以屏營此時心斷絶始信天無情野水東流去不還憂樂翻變須㬰間婦人將身弗輕許聽歌今日行路難漁父曲黃蓑老翁守釣車賣魚得錢還酒家醉中乘潮過别浦睡起不知船在沙籬根半落春江水稚子蓬頭採洲芷蓴絲芹甲滿筠籠日暮溪橋得紅米秋山逺秋木黃斜汀曲嶼苕花香歸雲帶暝卷寒色晚吹吹回雙鴈行鱸肥酒熟蓴絲美獨釣孤舟老烟水故人停漿問生涯湘水光搖碧千里送逺曲紫騮蕭蕭車轆轆為君掩淚歌别曲城頭月墮鐘鼓殘安得輪方馬無足離燈熒熒向人冷便是歸來照孤影與君從此永相望星在青天泉在井坦溪亭溪上龍孫千歲緑上亭擬掇青溪曲團團白露著琅玕故與幽人送暮寒東海曲鑑湖搖碧冷吞吳虎丘雪樹紛瓊株破霧氷輪薄雲母河漢微茫星有無清輝浩渺夫差國爽氣橫空凝夜白古石寒生萬丈光飛虹逺射徐卿宅徐卿世有玉麒麟長吟鳯語城南客東海蟠桃紅復紅千年消息倚春風汾陰曲吾愛西河段干木凛然節槩凌孤竹遺風掃地青塜存汾水千年為誰渌水邊劔佩鏘寒玉熊車來作江陽牧忠梗峩峩一面霜想像古人今在目我歎今人似古人絲桐為播汾陰曲送春曲東君欲去繁華滅城南把酒聊相别雲旗風駕不可親但見楊花飛似雪楊花送君無返期髙臺望斷夕陽低歸來客散深院靜門前緑暗啼黃鸝鶴雛引君不見郝氏庭前晚日破秋陰隆也便便千古心又不見雲夢漁磯碧水處俊也清名掛青史儒風忠節兩傳家傑氣源源長不已武威夜色沈秋月武威樓上歌聲咽夢回天與玉麒麟爭似峩眉千仭雪雪中落落多喬松蒼枝偃幹如虬龍枝上曾棲雲表鶴養雛飛去翔寥廓年來又見鶴雛歸城郭依然人已非悠悠却返烟霄去蜀霧秦雲千里暮春郊行半夜東風入桃李楊栁烟深塵不起江南乍暖蜂滿園洛陽初晴花出市走馬尋芳白面郎回頭巧笑人在牆一聲鶯囀墻南北引斷行人歸未得曉霧行山川蒸空氣充塞宇宙冥冥晝昏黑九州四海安在哉出門寸步迷南北赤烏觜距非不剛執轡神人身更長胡為柔濡甘隱翳坐令萬里無晶光我欲奮袂揮霜刀恨身無翼愁天髙茫然一身不可斷力微援寡誠徒勞安得長風生海邊掃除氛穢開青天葵藿傾心知所向共看白日當空懸中秋夜𤣥雲蔽月行惆悵中秋不見月太陰垂雲兔藏窟我欲上天掃𤣥雲桂露團團漬氷闕中天放出千里光層樓翠閣遙相望一杯一杯重相勸今年賞汝中秋願上天髙髙末由到𤣥雲愈濃不可掃空庭蠟炬落寒花宫裘起舞秋風老江邊行貽趙彥成江頭舊路楓林逺長笛欺梅紅尚淺榿茅破樹緑無餘水霧團空寒不展髯郎雙鬢春山青眼光射客詞如雲却恐抱書移席去竹風吹雨更愁人感歌行春陌露草悲銅駝漢宫秋吹驚紈羅北蟲成塵天峩峩鐵牛古背橫黃河蘭陵千篇窮愁死屠狗一劔袪羣魔酒闌感槩心如軻兩眼耀日雲生波是時功名當如何癡兒豎女徒悲歌抱璞吟最憐皇孫衣如鶉嘗笑參謀衾似鐵我今短褐秃無尾窮年絮被還百結朂清祗飲洛口水祁寒欲避西山雪奈何童婢生菜顔雞肋相將伴頭屑小兒窺見已么麼自言身是西州傑青天白日用意深浮雲薄霧生愁絶一夕飲水成內熱抱璞出門望折節餘光箭牖驚客眠唤作非真應泣血霜月吟飄飄青女顔如花雲軿羽蓋乘烟霞手持鳯尾青錦紋掃空颯颯飛瓊沙嫦娥孤棲宫四寂倚柱長吟愁永夕曳裾搖珮渡明河間弄銀波洗虛碧嬋娟相如爭清夜素彩寒光色相射金烏翻樹不成棲啞啞半夜繞林啼綺閣吟嘉州李使君命官妓段倩乞詩席上為賦秋風瑟瑟吹簾旌浪英碎玉秋渚平綺閣美人抱明月坐灑銀鈎錐畫雪神情何似衛夫人小年學歌風挽雲錦囊乞句苦不早種樹江南今亦老閣中璧月間搖空美人巧笑開芙蓉凌波莫背欄干立捲簾但放餘霞入茂陵白馬何時歸江北楓花處處飛有酒歌晴暘斥沈陰散漫浮空雲手提竹溪醪疾聲呼細君且滌牛頭樽我欲有所云仰看東南天始見昭回文星星眩兩目歘爾還相分天下愛浮雲浮雲能自寄屬君看浮雲要識浮雲意何必持身苦苦愁但願有酒長長醉醉中歌駱夫子逢惡客酒食未闌客呼索燭花銷鑠不肯起口縱長歌手彈拍一年所得能幾許一日散盡何所惜囊無千黃金亦無雙白璧負郭二頃田斂稅三四石十九種秫榖以助糟丘癖家釀喜次道狗竇招光逸何物駱夫子乃爾太曠生始知張翰一杯酒愈於身後名駱夫子聽歌聲為君留好語伴月照江城飛練歌呈宋豳州宏父玉娥入月雲鈎衣素裙雪綃雲畔垂三山老仙不倦舞霓裳半在秋江舉謝郎解取澄江擬飛下髙城化清泚朝元環珮玉玲瓏天風吹落人間耳六月夸父暍將死一吸瀾翻九河水蟾鄉換入石泉中古栁陰前授瓊几清泉無苦多酌我空洞麟腸已行舸窮源直上翠微峯小段參差繡嶺宫歸來泉邊却張席女頭殘月投蒼璧送張德翁推官赴闕歌君不見長安城中長樂坡坡前冠蓋肩相摩十人八九送别者我今亦吟送别歌任煩應劇青山裏下望州㕓如井底白雲滿眼心無塵明月到窗詩就紙山花映面春日遲紫騮嘶去聞行期年來聲韻非相知幾屬喧啾輕薄兒我歌止此不復作更欲作歌當寄誰春晝歌櫻桃花落春風暖緑波浤浤春渚滿龜屏六曲晝夢回紅日一庭香絮亂層樓幛雲身半倚春意撲人濃似醉茂陵白馬歸不歸眼沒平蕪一千里苦寒歌北風吹忩琴自動擁爐不覺氊裘重孤城日落星斗稀一寸清霜壓寒夢河氷嶺雪隨髙深山雞啄土鶴在林西樓歌舞隔珠幄獨有春風人不覺龍興客旅效子美寓居同谷七歌陰風刮天雲自幕窮山十月愁搖落歸來囊有惜空虛石田擬與誰耕鑿我生正坐儒冠誤終年凍餓如癯鶴嗚呼一歌兮歌已悲山鬼為我相追啼隔忩冷吹嘯踈篁頺雲逼月色無光南鄰昨歌今日哭訣别未永相思長我今與之正同調無錐能直九回腸嗚呼二歌兮歌再曲唧唧悲音斷還續殞我父天悲入骨更有諸昆寄吳越拊膺灑血欲長號畏傷孀母輒不發罪逆自合當刑誅神譴人怒豈汝忽嗚呼三歌兮歌極傷午天為我下嚴霜有弟有弟汴之陽共失所怙心摧傷裁書黃耳送不到道逺未知存與亡歲云暮矣天蒼蒼鴈飛安得隨汝行嗚呼四歌兮歌愈急漏天為我同時泣蕭蕭角聲疊疊鼓招提曠蕩無環堵編蓬懸席不遮攔西面透風東面雨官歸庇身無一瓦反更罹此百憂苦嗚呼五歌兮歌思多不曰有命其如何西山白虎跳天遊朝食行人暮噬牛居民胡不避此苦復聞暴吏猛於虎怪爾巨蠧敢身由拔劔一擊誓不留嗚呼六歌兮歌六疊太息仰空淚橫臆富貴貧賤無巧拙時來火光遞生滅世路不容一井寬啞啞跳蛙笑東鱉殘杯冷炙勿復道故交惟有西山雪嗚呼七歌兮歌章畢死血埋墳色應碧丙寅四月乙丑夜漏未盡五鼓三嵎程平起問安堂上燈爛然有圓相事異耳根故孝聲大譟士爭賦詩伻來叩某某亦為作燈光謡夢過漆園胡蝶入月落松忩煙霧濕曉涼却恐老兒寒驚起薪牀穿破褶土壁蕭條室如水貸粟何人借甘㫖金蓮駕象得得來華燈一滴祥光開彩暈收還香火寂門外塵空鏡天碧桂樹殘花蒼影沉玉娥掃徹雲中魄某夏夜酣寢飄然身若凌雲其覺也作夢逰仙以原其所自與狀其所以歸獻於楊德翁其辭云飄飄夜半身凌雲夢與羣仙遊玉京龍虎騰驤爭引導侍童羅絡甘逢迎絳幡羽扇前驅列寶蓋華旗助旌節鈞天九奏畢笙竽飈馭數行響環玦初朝太一何所為次歷紫微心自知青虬吐烟滿瓊殿白鶴起舞臨丹墀更過十洲尋舊友旋返瑶池燕王母文章已作人間遊功業却從天上走朝霞乍吸心耳清沆瀣忽餐肌骨瑩九門不掩閶闔靜玉女下詔馳名姓始驚造作玉樓記白馬詩囊空委地又疑本是謫仙人錦綬紗巾初溷塵鳯簫一聲輕哽咽霧卷雲收天水徹葛洪伯喬兩無知送下九霄不言别時人學仙不得仙未能白日升青天無心却向夢中見千萬人中何處傳大雪不宜干人漫瀰江天慁霏雪市薪黃金粲環玦大寒叵堪出門户已麾中涓束漫謁著作千卷字不同下希牧守上三公榻西有酒鵝兒色鴻音讀書句成拍句成拍不是平生等間客乘興可以訪戴瀟湘千里凍誰結夜趣小傖駕桃葉故人此心思見之幸有寒光交雪月興來興盡我自樂棹去棹回共何約入門篝火撥新醅相對此君殊不惡題遂寧馮德夫隱士畫像一年三百六十齊一日不齊事如麻蒲團曲几烏藤杖是中正要心出家不耽錢之龎老未剗草之丹霞幅巾紫裰春顔在己見山雲埋秋槎逢人莫問西來意春去杜䳌啼落花
