  - {type: page-break, offset: 0, content: '', id: KR4d0132_WYG_023-1a, image: WYG1124/WYG1124-0590c.png}
body:
  text: 跨鼇集巻二十三宋李新撰書上許運使書某少學書未知用筆法便謂古人削柎褁粻盜寰海之虚名臨池柿葉費汗青之餘力毫童十年碑下三宿勤則有之拙亦甚矣婉若銀鈎飄如驚鴻微濃疎瘦自我作古使為之不已則今日可簉米元章李致堯之列學書不成去學畫操觚䑛墨解衣盤礴十日一水五日一石丹青雨露化洛陽之春江湖平逺發瀟湘之興若為之不已則今日突過賀真張顔之右少也多病九折成醫味黄帝之靈樞繹岐伯之素問於是訂浮沈滑濇以分隂陽迹隂陽以較虚實琅玕榆葉指下有自得之狀張弓操帶意外無可傳之法若為之不已則今日秦介曹應端是流輩少也不羈憙習音聲夜月一笛有牛渚之風流胡牀三弄得晉人之襟韻方且求隂山之黍嶰谷之管以起黄鍾之律以攷子聲之妙使澌鐘牛鐸盡入制作儀鳳舞獸行書簡編若為之不已則今日司樂協律正堪備員回念太極殿榜有髮白之驚春菀池鳥有汗流之辱巫咸和緩與卜祝為伍則康伯不如貨藥都市鄭譯阮咸雜工師並進則安道不為王門伶人故退而稽古以是得官凡十八年而官不加進算計課効不如前四事之速奈何底突狂見得罪流落閒居八年寒乞頗堪忍方崇寧大觀之政比隆三代周官之詳講於太平芃芃棫樸成薪槱之材青青子衿入俊造之域以至書畫亦有學醫有師樂有司某於此時曾無一長以竊升斗之禄他日能事中道而畫私自惋憤恭惟某官以儒縁政以文起家卿雲之章昭回蜀天甄收人材亡有遺逸如某廢錮久溷封部幸朝廷涵容漏泉無邊例許敘復其自新之志欲滌腸於清無有滓穢涪水在此某不食言比嘗以繆悠之作為左右贄其言不根於道而學不到古則請復少年之業以求售脱謂可教則盡弃其學而學焉上張丞相書某嘗聞百千法門本無差别河沙妙用豈有異同人與非人性相如一衆生錯亂為境所惑一漚起處目為全潮故於是中觀大觀小茍能圓融和會不與物􅘅眂彼與我等則凡聖情盡體露真常泯絶妄縁即如如佛恭惟相公虚光獨耀覺性具存逈脱根塵了絶知見凡所謂雕牆潭府髙牙大纛呵前擁後妓奴舞僮使令便辟俯伏趨走多色伎倆此皆幻相於本來湛静之體了不相應既已自利亦欲利他世固無西天多羅䜟可以前知而明珠水鏡應物現形自無臬礙且以全蜀千里三峨之秀九江之清其先騰而上者不知幾萬由旬自漢到今人材出興晶明奇特迺至算數譬喻所不能及如王褒子雲之智慧何武相如之辨才君平仲元之行業譙周子昂之多聞俱得第一彼皆具正法眼藏得湼槃妙心神通運用足以尊主庇民當時之狗監牧守能誦其賦傳其書力推其人數千百年風誼寥落借如有相如賦人亦不識其字有子雲書人亦不貴其學士之志節髙於須彌者化為微塵氣魄斷盡厯殑伽沙劫歎惜未有窮已也重念吾屬識性有限人倫藻鑑如郭有道裴行儉者才一二數而宗門印證何其多也六祖謂讓曰他日足下出一馬駒踏殺天下人其後果有寂子而龍潭稱徳山亦云他日孤峯頂上立吾道在溈山稱徳山云将來有把茅蓋頭罵佛罵祖在洞山言雲居云此子已後千人萬人把不住在黄檗謂臨濟曰汝已後坐斷天下人舌頭在盤山稱普化云此子向後如風狂接人在忠國師稱丹霞云三十年後覔此子也難得在前洞山稱後洞山云此子已後走殺天下人在龍牙謂天台云汝向後自會在片言之發如矢中的凡所肯可若九鼎大吕他時云為竟入先料非龍門月旦山公啓事之比其精諦確密過吾屬逺甚是事且置伏念某以言語文字觸突狂見得罪流浪選調洄洑凡二十年其本有之性雖無成虧幸今僕射相公調贊元化為天人師䇿百工盡待鑪錘之賜值遇之難愈於佛出道徳嗣似何啻燈傳爍迦羅眼通身皆是西南之士願備掃門之役垂手接引宜有半箇人悟無盡妙義直取凡庸授以梵位似未為過性地可指衣鉢不傳得法無心事不獲已尺書陳情干冒鈞席某下情無任俯伏戰汗上劉樞密書嘗聞東野巨人健噉而家居疎寒終嵗不充惋惋振憤乃謀自甘口腹度其計決不久長因懸箱金邀致繪者書圖庖饍之具與古先人物置在肘腋時時泛觀以起滋味如擇食然於是一飰輒斗粟不厭會有飢王孫過巨人入其室且欲得一杯羮撑敝腸而巨人方大嚼矜聴其畫王孫不得已徵之曰東向負鼎而傴僂者為誰曰伊尹割烹北向跪甌而其意慇懃者為誰曰公孫豆粥其喜而持臠者為誰曰執炙獲啗其怒而探湯者為誰曰染指獲嘗眦目盡裂髮上衝冠者何曰漢壯士樊噲其机上肉曰彘肩揚眉奮袖揺吻吐詞者何曰晉佳士陸機其席上珍曰蓴羮巨人復件其右曰此太傅何曾萬錢食此尚書韋陟擇米飰此張翰鱸鱠此王武子蒸肫尾後一人豐頰而凝脂利牙而頰肥盃盤狼籍有如倦膏粱者曰此監厨趙稚長王孫曰美哉稚長其樂無窮語未卒巨人掩卷去王孫恍然若失前箸已而大醒始恨其流涎咽沫者俱妄也而初至之飢益進他日入大都鳴鐘之家合食賔客主人擁篲於門延王孫入羅九鼎於庭下備八珍於堂上惟所擇下筯處而王孫便然飽其徳以歸視從者亡有前日菜色與觀巨人畫時斬斬有間矣且古語曰求賢如飢渴蓋恐或失之也先進者其欲逢巨人之畫乎寧其不逢而逢鳴鐘之家者乎恭惟閤下以盛徳夙望為吏師帥為民冠冕為朝廷羽儀今也入蜀每食不飽窮治羞饌正在士子而西南之人烹薌擊鮮鮓龍脯麟胹熊蹯熟豹胎求鹽梅市椒桋以和鯉尾以助猩唇以調露雞臛蠵日夜盡走閤下之門如某疎寒特負圖畫以進竟無補公饑上劉運使書某不佞自念有生九千三百日無半口氣向人出好音聲得一第例蠧太倉一石五斗米而田舍子門户庳陋不當在人牙頰容頭過身退避訶誶如腐鼠敗草逐溘埃以沒分定故也重念當道諸公日洗冰鑑拔去聲援以一味至公芼擇西南士人某何苦自廢垂塌羽翮使腹背之毛争先呈露是亦天地間一物可惜數耳某嘗聞馬得之驌驦禽得之鵔鸃劍得之湛盧草得之杜蘅世之人不問嗜與不嗜其陽氣見於眉宇之間俊物在前自起人意他日視駑駘視鴟梟視鈆刀視稊稗未嘗不心惡而切齒士之俊茂當十倍於此且以全蜀千里詩書萬家導江岷峨之清子淵君公雖已死千百年中佳氣未絶塵外奇特往往過眼持未有品題曰此龍􅟯此瓊枝此南金此國寶此明堂材此清廟器此千里駒而光後之容或無可借故琬琰之䝉棟幹之老殆不勝乎一嘆恭惟閣下駕使者車澄清劍外名聲日新標度益髙主持風味以先士林掇拾豪傑盡令出我門下他人手臂不敢輒相推助而特陽吹先飛冷灰士之貧賤適丁是時且有妄想矣往年朝廷有經行之舉閣下取樊生又取彭生皆窮山中人孑孑無謀儈者自是劉公一紙書使人珍重愈不易得矣舊文二編為左右贄㢘按之餘俯賜觀覽去取在公某非敢望也上徐提舉書某聞太常廩樂工甚饒工憙其饒也一占太常籍不異進士上第升絀遷罷至相慶弔亦自珍重其選往年籍闕吹笙者一人鼔瑟者一人擊鏞者一人大署太常門補其尤者諸工執其器以俟判丞晨入院延協律坐堂上俾工長厯試之吹笙者前為新宫為下調鼓瑟擊鏞者以次進如吹笙者曲未既工長訶之曰笙失之髙瑟失之疾鏞失之濁時判丞協律議命盡去之無留而羣工惘惘於太常之門某伏念朝廷承平日久無大水火無連年旱饑而力田之家膏血向衰衣食糜爛由是天子遴簡使者順攷先帝成憲而以西南一道寄之閤下閤下所至與人欵緻略去聲采不為形骸陛級之游使妖狐不能容媚技鼠不能盡巧如是自能得士心裁結役書以報天子必不晚也且日講法以求士士之急廩延望屬藉者為不少矣其髙其下其疾其徐其清其濁其不合節奏者亦為不少矣某山中白面非能言時事者今輒集舊所為文一編求試之閤下如有可收下管雲簫揭為一聲求合節奏焉而後已不然亦将惘惘於太常之門上宇文修撰書某生無有他好不知琴音射儀彈棊走馬有餘樂否於古文亦不異世人好琴好射好彈棊走馬筮仕江源隣閤下壤天意欲遂成其好也伏惟閤下論説古書樹成一家含毫發輝陳言自去乃所願學於閤下者已數月矣屬縻文法足不到門闌無端由厠賢賔從列聞閤下音聲以洗簧耳解膠舌而蕩穢腸其不幸亦泯泯也舊文一編為左右贄玉麈一揮請奉餘教上張運判書某狂妄竊謂閤下徘徊蜀道土風氣俗人之情偽盡知之矣士賢不肖區處有方而塵外奇特搜抉奨薦絶無遺漏蓋上以報明天子區區遴擇之意下将流不竭之澤於門户此時直道挽起衰薄真無負於士類某也獲為部吏謹守出納聲迹么麽自當泯黙泥土中而當路諸公主持風誼往往不先要援首拔寒素某又何苦自褫精魄以幽獨為間夫竹頭木屑斂之似猥而敝冠雞肋棄之可惜藥籠之寛兼收參术之具清廟之祭不遺沼沚之毛樊公漆梓為器在於他日李衡木奴餘利在其子孫某之於公妄意在此伏惟閤下樂善忘勢推賢有後陸機入洛初從閭里之俊游賈誼上書本亦少年之故事今兹持節聲髙士林如某何人竊窺下容欲曳裾危榻以髣髴風流願備員一紙書以蘄脱去選曹庶就異時萬里驅策之轡此其志也且貴戚書多而种暠猶與一孝㢘輿縣雖疎而徐寧尚列一吏部止水不揺冰鑑難欺在閤下屬意上鄭樞相書某元豐太學生居蜀荒陋聲迹伏匿陸沈州縣三十許年始以城役改官念初斂髧髦就父師之訓謂人才要在所養非其義一介取予不可茍於人非其道厚禄要資不可屑以就是吾父師之訓使之安於命而已漸通書識理道浸更世故尚及見前輩所為乃知父兄之訓不謬誤前輩之所為皆有道有命者也凡為宰執者率前日臺閤中人為臺閤官由省府寺監中遷或由外諸侯監司中召除平日經士夫㸃數有重譽四方想望其風采一職之缺中外必曰某當得用某人乃宜已而果然士風一變多歧捷徑千門萬户炙手易以熱呼吸雷風化枯涸於一瞬間不用刀圭騰井竈雞犬於霄漢於是有挾寶玉古器書畫以進者有飾媵妾市歌僮舞女以獻者有採花木竹石錦繡服用求充棟宇苑囿者分建谿茶薦海南香盃酒通慇勤之懽幽期達窈窕之區可以締交子弟結好門客黄金賂親信脂澤及奴婢媚文侈頌贊詠功徳便謂是周孔以上人餘子碌碌不足數也復有偵刺事機逆射除目喜為耳目梟狗以愚弄權貴大者鬭小者傷遂得志於其間巫醫卜祝玩其技以進暮投錢乞活且與從官為伍黄冠武弁各自有門生在昔一掛吏議振起無階贓淫敗身沒齒不録矣於今使有孔方子何病不為清流嗟乎士風至此極矣皆前輩所不肯為亦不忍為跂而眂之令人愧縮所謂義與道與命者果安在夫周之士也貴今朝廷貴士士不知自貴為時之羞且奈之何恭惟閤下丕業殊勳著在典冊重名夙徳熟於華夏宰輔舊物所繫甚大時數前定鬼神不知惟是前輩所為獨有閤下爾進退出處過九鼎之重所立卓爾非八風能揺要之前輩人氣味自别某梗野從陂澤中來不識背向但時覘達官貴人清揚晳面其間豈無前輩氣味者殆未親炙之天下有公義奚可草草亟欲得一職任杖藜以歸俾廩人繼粟退食無事雅歌擊缶以形容太平幸無資以進不驚暴得富貴斷無顛危不祥之憂效古人晚食當肉安步當車以養全其生是中自有樂地所業一編副書以贄用言以求其志庶幾或收録焉前輩之氣味盡在是矣上孫運使書某嘗謂喜射者藏良弓矢喜獵者蓄良鷹犬學兵相遇則談兵好劍遇士則説劍彎而破鵠彀而中鵰若發大寶藏不啻得千金其喜見於顔面此射者之志也鼻頭出火耳後生風疾馳平澤中得一鹿如下一城束一狐如俘一将愈於勳在銘鼎此獵者之志也凡守如是凡攻如是兹穰苴語兹吳起孫武法至如摧堅擒敵處則氣息振然往往失聲攘袂以起是談兵者之常也飛若跳丸舞若流星溝上之會微吾項莊漢祖幾不免大抵自右其術謂鏌鎁干将變化若神裴旻之徒非其妙者此説劍者之常也吾屬好文不若是之甚耶先後進相援引因其一言以䝉譽於當世則豈持弓矢鷹犬之良而真好文者十倍於喜射獵喜談兵説劍者然則古今文士既不少盍為泯泯不遇猶飢驎餓騶脱皮毛以死與螢腐同瘞者不知其幾何好其文與不好者又不知其幾何也某竊自念有生二十九年窮無他舉日造俚語以求售於時俗而數以此窮他日暴所為文於當路者一得之以衒客曰西南士若斯人者未可量一得之則絡之馬腰不復省視後日進見無半語之及蓋事有向背理不相入殆未足怪恭惟閤下以文章據巍科以譽望振風俗再将天子明命持節蜀道主盟善類以先士林而車轍久勞幾環天下度所閲固多矣昔東都士以書抵某且導之曰孫公有清裁以人物為意請持所作章向獻於馬首時乎時乎往者不可究來者未可知舊文一篇為左右贄雖小道或有可觀者焉上胡運使書某不佞往日讀書窮山槩觀古今治亂廢興之迹十年一室千百年事蠅頭鬼名􅋏􅋏方寸間軒眉髙談刷去塵土便謂一日接貴人不䘏等差左手持衣袂右手揮松麈吐朝野利病出所著書要以驚怪入官二年始悟所養芒髮不可施設如三日新婦鬱閉氣仰視一世貴人十九器宇潭潭希言無色可望而畏啓齒問士不過邑里姓氏所從來士人執板避席曰某卿某家子此外吞屏不敢發貴人旦起坐堂偶賔從攷程案送歸迓來有宴笑有行樂有歌舞俎豆之御有琴音射儀之好白晝酢酬娓娓不窮夜火照眉已爛然困矣孤孑之士貧無牙頰獨庸翰墨關所長投貴人几下真沙粒入滄溟其相知無幾耳方今西北之患間作黄河之役不解法令渙易財用未殷士人班班有能談治道者是人材可以言語取而貴人不果賜間燕虎豹炳於犬馬鸞鳳炳於燕雀足以藻繡治具光華聖旦是人材可以文學取而貴人未遑議物外風氣猥入滓穢何時而拔此直某所以為病也閤下三吳世家世世區處文武士持節入蜀主持風㑹以先士林彊力大援不能贊一辭而西南英特多出門下竊度閤下不以言語取則以文學取之矣如此而某又何病焉舊獻所業已瀆清重一之謂甚其可再乎上楚朝議書某不佞自聞閤下在東蜀時以嚴謹視事簿書獄訟大舉其條細入無間有弊蠧處明者往往不察貴重者多忽之俾前後苞掩以罔主司閤下一過眼即披抉其隂翳窺窮其端倪使老姦夙惡汗脊慄股恍惚無人色引服而不敢欺彼非不敢欺是真不能欺故州縣振慴鋭於從政未幾何而皇華之光徙按右蜀前日之任達矜飾標宇捐去禮法務為清虚者曰楚公來寧修舉我職事尸素敗我貪者約曰今而後妖言媚色不敢妄為欲摩人之足䑛人之痔畏楚公笑我夫為一道使者而部吏無捐去禮法為清虚者弛廢程按為尸素者貪化為㢘巧不踰矩如是亦足矣某生二十有八年耳目有限所見如此所聞如彼既又久畏風稜不敢輒竄名於傔中欲借文字以自暴聲跡亦復己已幸閤下至公無心不間賤微何苦閉氣鬱鬱不發如車中婦重念不久當去求試為縣閤下曲有鄰愛足以成就如其人物可不可其能官與不能閤下寄聰明於外某又何言
