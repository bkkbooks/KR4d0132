body:
  text: 跨鼇集巻十七宋李新撰記下引素軒記寶臺寺瀕江茂師即佛舍為軒吾友民極名之曰引素因諷沈郎長烟引輕素之句導茂師丐予文以記焉予客洪川一再旬軒前之景目力百窮乃今得之民極時一來不逮殫觀且為休文所誤矣將以夸景耶而未盡也日出而臨朝氛四開波光萬頃篳櫓未揺斷縚繂已有解意舟中之憂耿然猶在午漏乍交墻隂初轉荒蕪嘉墅隱隱落眉睫間浪華激而頑鱣舞蛟風起而孤鳥沒驚灘鳴磧自有嘉致至若殘照半竿向晦而夕漁火百星方易曲移灣以濟之人俛首掉臂而不顧重峰青嶂咫尺遺恨耳兹軒前之景而亦未盡也茂師曰此一日之得獨不見夫四時者耶予謂茂師曰食肉不必馬肝而知味飲堇不必焦斷而知苦四時之景可以逆推試為子槩言之春風鼔衣江山一新氣象爭出草根木芽灑然猶得意少年登軒者豈不知把酒而迎歡夏日如赭大雨暴作洶為狂流驚濤迅瀾逆走而横擊龍鬛差收障隄漸復南山之雲稍稍卷去試取琴而歌則泗濵汾陽之美亦畧具矣若夫遠碧涵江暮景蕭條葉黄而隕霜沍而堅悲哉秋冬之氣仰視俯瞰嗟凍羽而哀寒鱗徙倚回瞬不有感慨即土木偶然則果有是哉茂師曰有是哉而亦未有盡也且滕予之舌不足以言景鈎民極之思不足以命名是必有詩人之詞明意所未到如是則盡矣無以進矣即心堂記以何名心心無所住若欲即之了不可得包含太虚周遍沙界一沙之中有無量國土乃至須彌高山億萬由旬東西南北四維上下一心攝授無有增損若欲即之心居何所譬如明鏡應物現形形從何來鏡外無象中亦不虚實豈能應物不即鏡形無從生是鏡自生形未即之間形復安在物離形亡寂然不動我欲以身為鏡以應為心以物為即去道逾近不假外求諸佛即我我即諸佛六通妙用三十二相舌至梵天光照阿鼻非非想天人非人等皆可為說法一念若起火齊為城黄金為地身居兜率寶蓋珠網幡幢花香百寶異音導前擁後受種種快樂汝不即心去佛轉遠葆大師若於此返照内觀便成佛道輙莫生疑寂子佛法不變黄梅熟矣何日出山年月日記臥雲亭記南山之隂多喻姓有公辯者處而不出𤣥君蹈高築臥雲亭老于其上四時有花夕有月旦暮有盃酒嶺上有白雲簪花起舞弄影月明中醉則登亭倒著接䍦仆牀以寢日出而方寤旰而醒醒而飲飲而復醉日以為常雲駸駸入戸牖掛屋壁覆琴几杖屨散漫圖書筆硯間處士毎以此自怡不費一箇錢而富於雲若此故其接肘腋作筦簟者皆雲也予始疑之且處士之於雲覽之不得蓄之不可招而友之亦不可奚以命亭哉油然在天翼翼然在岫去而不返飄風暴雨消磨破裂去而不知歸者蓋以無數奚得而臥之也處士質之曰市有狡獪世有黨與朝乗華軒暮役泥塗吾不與之比肩龍斷揣摩斤鈞掉弄豆龠以窮逐錐刀又不與之分部譁謡佩劒相笑隂扇鬼構以擠報仇怨吾無得䘮憂患而長有此雲可也况以命亭哉夫雲無心處士亦無心舉天下之士皆有心者也終日見雲知其為無用而不知其為無用之用有如此者耶今而後予將曷疑歌以遺之曰幽人居真兮山之隂願言孔招兮山雲深閒庭除兮馴禽垂湘箔兮幽沉沉既覺兮復夢酌樽酒兮鳴琴彼美幽人兮隔雲無處尋市隱堂記腒䐹簞壺斗粟方布無必與者藏不為嗇荆玉隋珠路車乗馬無必取者予不為惠散髮傭書於風塵俗士間者無害為隱避世金馬著書漆園吏可隱朝可隱故曰無害於為隱凡坐市區踐市令與其魁老遊掉臂雜唱編行人以為伍紛紛混囂放而知歸則道實在我所以指山林之癯瘠若囚江湖之憔悴若病釣徒散人若游手嵩少為捷徑衡門盤谷為怨歌之地使人徴之不來就之不得見乃至招以詩遺以文賁帛旌田於冥鴻雲嶺之下而隱者益自傲倨白衣乗金根舉足加帝腹睨冠冕猶桎梏顧朝廷如樊籠作為接䍦犢鼻草葛襜褕而人不敢衣曰兹隱者服椎髻䝉垢熊經虎踞而人不敢效曰兹隱者容嘯鸞鳯而侣麋鹿擅松菊而癖泉石而人不敢議曰兹隱者居瓢巹瓦缶以示質緑葵紫蓼以示泊素琴白鶴以示野而後不之繼高風中絶嗣子莫傳務為孤峭以取笑於釋家佛士而長往之轍丘壠茂草豹文霧障寥寥其音聲號山鬼而泣狐狸於是所謂隱者亦不能世其家矣咄咄隱者人生朝露耳曷為遠引曷自苦而然族友子俊之宅近市踊貴屨賤未嘗不知爭錐刀者正在戸限外大不妨子俊作樂堂有圖書有棊可彈五木盧雉且有㫖酒以娯賔客賔客罷休主人闔關鍵便謂一丘一壑同羲皇上人此市不廢隱者也予生窮岫閉伏有年畏遠聲迹一行作吏屑屑不憚煩重為故人羞然渴思漿熱思濯編皁之馬不敢舞牛背之鐸不改音要賦歸與請俟明日年月日記長江三聖禪寺記唐景福中有異僧洪謹由福建來結廬此山驅蟲蛇刈榛莽稍稍增佛觀土人久而敬之龔重慶捐田以基寺又益田以贍僧為耐久傳遠事目寺為新興時唐已衰弱凡三蜀有邦冢君各萌僭偽盜賊蠭起四郊屯嘯洪謹一囊不得着身今覽官府想見草間乞命㑹畊發三鐵佛於閟藏中鼔鑄精妙當時謹師定未有見處若到居士靣前將烈火渡過不問覔一粒舍利提起鈐鎚看他三身鐵漢作甚伎倆相與存䕶乃至于今時時放出種種光明白毫屬天彩暈繚體燈炬圓鏡離合上下散巖谷間揑出怪奇疑信父老繼無良徳寺壞不振得今可辨傾倒智力化導經營凡二十年其嗣了居克相役事堂殿輪奐樓觀飛驚二師之誠鬼亦奔動浮木於溝㧞石於地富人達士乃肯像土圖垣作梵天相好辨欲與諸人布種來世蓺豐熟之祉寺既成矣某自錦官趨寧川枉道訪辨辨求予記且名山大川凡勝處福地皆伽藍雄據金碧未就風雨已侵曲房洞戸窈窕綿羃若蜂房蟻穴淫坊酒肆盡在其中然我不禁汝所造明窻淨几陳文列疏支離穿鑿分條布科不究妙義雖致天雨花石㸃頭然我不聽汝所說打毒塗鼓聚那又羣喚波旬王說外道法毁禪破律犯戒叛道然我不議汝所行具爍迦羅眼睛呈通身般若不立言語文字直令見性便是二十八祖八十一師驗在目前然我不問爾所見辨公建此緣事以何為功但得方袍中人矗整衣屨東廡西序是箇本分人風雨有避就處寒暑有溫涼處不必走王舍城乞食得安穏快樂有洗鉢趺坐處當餘閒時補罅塞漏扶傾立圯為辨繼立不作末法魔見兹豈辨志之耶劫火洞燃大千俱壞寺亦隨去辨能復之則予復能記之年月日記九華禪寺記九華寺權輿開山拓地約賦擬中人千金之産一列侯湯沐之奉苦營樂施不知何物老師長者無一畫篆𨽻可按獨有偽蜀賜書百函在以故不知所從來羣山逶迤臥龍蹲彪右揖左朝前列如几石矗矗若墉行至水窮坐觀雲起兹古人植錫處用意不凡自眉往舉武九千渉大江自陵往凡兩舍間蹊若絲貛愁鳥悲高者去天一握下者及地九泉天限殊勝隔離風塵其徒以律為家私鑿户牖若蟻穴蜾臝然婦蠶息敗行劵責償無一法叛俗夙傖姦人羼名觕迹以為狡穴疾藪元祐丁丑太守楊公慶基上章叩禮部請革為禪邦人講詞願得文禪師主法席使者五返然後自錦官載師以歸緇素車騎聨沓二百里道他境縣令戒候吏惟肅未至陵二十里太守郊迎吏卒負弩矢先驅觀者如堵舉袂生風鉦鐃賁鏞鐘聲􅀈唄箜篌洞簫幡幟寶花旃檀楓香非雲非烟廣列導前師笑曰何關道人車至門扶馬祖百丈之規以繩下魚鼔鍧然趨鳬峙玉細柳號令不識部曲猊座傳要北祖南宗杏壇崆峒此有遺風截圯截傾為屋六百楹輪奐離異斯事且置自無始以來我與諸人負殺盜淫罪流浪生死震旦國土中天佛日爭先覩之為快哉與諸人投入􅗎僻自䁾以瞽况今空山蘭陁色色三昧便有闡提宜回心以向是中無復摩登伽女毁戒婆羅外道毁法波旬王毁道斷自文禪師始寺有記自李某始移癖亭記跨鼇居士少嗜山日齎二升糒行遊弊躓然後返或日忘歸巉崗㠔巘薄薄有佳處則箕踞其上居屋寢處占􅀢巒間開門逆羣山嶙巇各屹􅀈䥨然鋸目不厭􅀈視杯杓漿飲有嶔崖􅀈􅀈形影投其中於眉宇津津出喜相過嵩華睥睨不忍去思築室以老是真嗜山者且成癖疾浸久不治來皁江輙自傷其意猥入塵土拊心大恨謂前所好太俗復且嗜水引江流環官舍左右濬二渠曲折順故道洄淟混瀁激為潭潾以洗耳以㵸腸以濯纓以澡思慮以燭鬚眉無一日不進于水所嗜愈于前而其癖滋不可治會山中客來居士貧不置酒㪺水以獻又複其詞并叙所樂以詫客客辭而呼嗚嗚聲盡繼之以泣悲不自勝曰噫物之移人也若是耶子山居而癖山水居而癖水以山水病我者再矣子近市朝將又有癖疑必甚於山水之癖山水之癖可以獨市朝之癖不可獨行且有爭之者矣爭子之癖者毁日侵譽日削憂患日益至子其不免矣其與著書聚歛者偶矣子之癖盡於是則已有不可以移矣吾出有車食有魚吾歸去有家終不能同子之癖客去居士内鑑其說因以移癖榜亭盡用其說為移癖亭記䟦䟦郭子固廉使詩後南蠻獻夜郎故地大觀戊子遂城純州宣和辛丑廢為九支城廉使郭公以忠報上無遠弗屆皇華之光照耀原隰嘗留詩九支詞語清㧞字畫遒麗覽其詞以意逆志不問識與不識皆知其為古君子也自潼川移節右蜀以憂去官上念遠人遴選使敵再勞公行今春臨按茂林茂方九支路尤險絶使者藜杖芒屨登陟峻阻崎嶇至坤維盡處宣布聖上徳意存撫守臣西山諸羌久不識王人衣冠分挈部族百十為羣羅拜道左舉欣欣有喜色仰知天子不鄙殊俗和氣達重譯湛恩溢荒陬使者謂夏持國前守純因以詩本遺之持國賡和并刻之平山館後人覽二公之作懷想名徳要如峴首墮淚石有欹仆羌人亦必䕶念支撑之如孔明碑云䟦蜀倅程公詩後某隱拙于茲行逾一年日食二升麥求古人所謂上䇿頭錢價漢針孔許事輙以經意歴歴未敢忽空山無人坐觀物化不作聲胞中則柳生左肘車軸旱雷馬蹄鬱勃久不到耳目足以自放而使者邦伯如在某左右前後毎以此自驚雖然如是要未有品題在程公辱行下邑以詩為貺詞㫖捷然蓋與人以方也至目為才縣令湔拭太過使散樗瘖雁不得全其生禍從始矣操刀理縵輈張紜紛則文錦措絃終敗迺翁事拜賜柰何殆將紉蘭苕為衣飾以琅玕襲清微之風挽天河以自澤猶在才不才之間耳佩服無忘謹鑱諸石亦以補李氏家法云䟦蔡君謨茶錄蔡公是本朝第一等人非獨字畫也然玩意草木開貢獻之門使遠民被患議者不能無遺恨于是宣和五年仲春既望李某題䟦瑶池命宴圖䕃長春難老之藤據上古不化之松聆語霄之羽客朝巢蓮之隱翁今夕何夕兮送玉麟於八區鶴致羣仙之命龜開千歲之符五雲兮趣駕虚席兮瑶池攬海桃之翠實潔沆瀣之明巵屬西王母薦壽不醉兮無歸
