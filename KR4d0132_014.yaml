body:
  text: 跨鼇集卷十四宋李新撰論上孫武論論有為之君必資乎有為之臣若孫武者可語有為者也觀其斬二隊長之事竊以謂非直嚴號令申約束而已嗟乎無故而斬二婦人此豈足以顯將軍之勇乎武之心其必有說也蓋武始以兵法見固知闔廬可共功名也然武之意豈不以有為之君不患其無志而患物有以昏其志耶今夫天地之間泛然與我同游於造化之表者舉皆物也凡物之有感於外而悅於中者以吾之有吾身故也然來則應之其去則不復挽而留之是萬類交於前者皆可寄所樂於中而無所纍焉物之於我適然而已雖盡六合之變洪纎巨細無非可樂也吾何容心哉茍一有所惑而用意於其間則迷於終身專而不解所謂寄其所樂者乃為吾之蔽也且物固未嘗能蔽人也吾蔽之故也煙雲風月之觀固非可取也而山林之士蔽之金玉珠象之獲又非可親也而市賈之人蔽之且二者皆逐其所蔽而不反况夫居人上之位處可致之勢而物之可取可親者茍一惑焉將見其智慮役於所昏而聰明變為聾瞽也如光武創業之始尚且不飲酒况夫物之可取可親者有甚於酒者乎嗚呼女子之禍甚矣使其小惑之耶將見其舉事赴功之際以今日未暇則有明日之期竟不暇焉又不過曰吾苦身焦思以致憂於為民孰若守常無為而自樂吾樂也使其甚惑之耶則將不復念其身與夫大統重器之所責矣小惑之則其志怠甚惑之則其志亂志亂則敗亡隨其後以闔廬之有為而武之心臆度之則亦未憂其遽至於亂也憂其怠而已此武所以絶之於初以激闔廬有為之志也當時假使武抗言直論獻木强之語謂闔廬曰大王必欲用臣顯名於諸侯宜先屏去聲色臣請先斬二寵姬頭以獻然後臣與大王始可以有為於天下如其計之出此不亦太踈乎是可笑其拙也故武所以必假試兵之術為闔廬除其惑志之本也吾嘗意闔廬欲試以婦人而武遂用寵姬為隊長則武之心欲去之明矣何則使深宫驕倨之婦人而忽當三軍號令之責則先知其不如法而固當殺之也豈非武之臨機適變出吳王之不意而能用其智乎雖然后妃姬侍之奉此天子諸侯治內之禮何獨至於闔廬而疑之蓋武亦相其君而後動也今夫妖艷之嬖自非上智鮮能不惑闔廬勇而無斷非剛者也觀其速入郢久留而不決歸推此考之則其天資勇而無斷固可知也勇則不慮後不斷則牽制於所役蓋有是者易為敵之所乘此武所以洞見吳王之為人而斬二姬於進見之初也如曰不然復敢以漢髙祖晉重耳之事明之髙帝起亭長朝夕思奮以取天下重耳以亡公子流落於四方其心固未嘗一日忘晉也然則所謂憂傷感慨之事備嘗之矣然方髙祖之入咸陽則遂無出舍之意當重耳在齊乃曰人生安樂孰知其他以樊噲趙衰之徒皆平生握手之舊其誠之相通又非孫武比也而苦言切諫猶且不從文公至以戈擊咎犯然則武於立談一見之間使其不假試兵之術以誅之而徒事口舌之爭得乎吾未見其有濟也惟髙祖重耳復聽張良咎犯之語然後能為范增之所驚負羈之所畏卒之取天下復晉國惟闔廬悟孫武之能用兵任之不疑卒之破楚國威齊晉由此觀之女色之可戒宜矣嗚呼君側之小人其為禍亦女子之比也有志之士如欲為聖天子掃除小人之惡者吾願以孫武試兵之術告之蕭何論古之君子言必慮其所終行必稽其所弊其故何哉蓋君子之言載之行事傳之典冊而垂之不朽也言而不慮豈獨無傳哉百世之下有受其弊者矣蕭何之治未央宫也髙帝以過度罪何何曰天下方未定可因以就宫室且天子以四海為家非壯麗無以重威嗚呼豈其不慮哉何其失言至於如此也以禮考之天子之制有三朝有九門以考工言夏后氏有世室商人有重屋周人有明堂未央之作立東闕北闕武庫太倉而已於禮未侈也髙帝之意以天下之衆毒於兵戈者久矣瘡痍者未瘳呻吟者未絶口不欲以土木之功重傷而亟困之也何於此時免冠以謝可也援古以議可也免冠以謝不失為長者而援古以議且足以杜後世之侈心矣奈何區區憂後世之有加耶謂天下方未定可因以就宫室歟則洛邑之營周公為後時矣謂天子以四海為家非壯麗無以重威則宫室之卑夏禹為罪人矣言之謬悠固可知也夫以蕭何倉卒之對一言之失未為大咎然而青龍之間土木並興宫室崇侈民力苦於重傷國用困於不給邇臣之言非獨髙堂隆而已也老臣之言非獨陳羣而已也魏帝之論方有以杜其口而鉗其舌以蕭何之議足以藉口也漢魏之相去數百載矣愚恐至此而何始有以責焉孫盛之論以漢承周秦之弊冝敦簡約之化而何崇尚宫室示侈後嗣此武帝千門萬户所以大興也魏氏之興四海方罹塗毒之苦而述蕭何之過議豈不昧於得失之理哉若盛者可謂確論矣古者之言以蕭何之佐漢豈不謂忠臣哉一言之失從而責之則天下無完人矣嗚呼是豈知言者哉蓋君子不以人廢言亦不以言廢人陽虎之言孟子之所取有為神農之言者孟子之所去去取之間如此而已詩曰白圭之玷尚可磨也斯言之玷不可為也嗚呼豈何之謂哉韓長孺論士各有才顧所馳如何耳茍目前之利而不顧身後之災盜一時之虛名而不能善始於終非其才所不逮也得君可專而顛倒謬戾並反其宿學評于異世覺其不能用其才則可以俯而弔昔人考古書至于廢卷而歎愚讀韓長孺傳亦不知涕泗之從出也悲夫士之不能騁其才適至是耶馬遷謂其智足以應近世之變寬足以得人然誠有之大本非公議也長孺嘗受韓子雜說于鄒田生所要之名有辨口者自知其才足以事梁也知其才足以補梁之闕而通使也持忠孝說以彌縫國主之失知其說之不可破也游說親戚骨肉之間知其說易用而易入也田甲之屬畫鄙俚之計辱之甚矣而猶有死灰復燃之語知其才之必得內史也天下豈有無妄之福而詭勝之徒交口借譽事決無成不成則死而長孺比肩其側不為一謀知詭勝必敗也知其才足以死生乎詭勝也丁漢之初胸奴方强驕平城之勝而和親重養其貪故長孺于王恢之議反覆詰難知其胸奴不可以長繩而係也然則謂之智足以應近世之變誠有矣方是時七國已平上向儒術不推轂賢者無以邀四方之譽與之同列如田蚡樂除吏鄭當時推士翟公喜賔客竇嬰進趙綰迎魯申公雖不及用而人多之故長孺舉壺遂臧固庶幾飫天下之望而免竊位之謗然則謂之寬足以得人誠有之矣其才固可仰而賀者此也若夫馬邑之役自將天子三十萬兵無一騎之得咫尺百里單于之頭已在掌握而乃伸指緩臂使之脫去且諸侯之軍皆屬護軍無功而還誰任其責沮前日之議敗今日之幾歸罪王恢不亦寃乎其後罷漁陽之屯謀益踈拙鬱鬱無聊繼之以死安在其為智耶理固有曲直事固有是非魏其武安廷辨灌夫事天子待長孺一言而决乃至含糊不明首鼠兩端至開蚡以自喜而卒殺二賢二賢之死非蚡殺之蓋長孺殺之一切不足贖矣得百壺遂亦無顔其言安在其為寬然非才之罪也亦非其才有所不逮也長孺固多才特用長孺者非是此固可弔也嘗疑馬遷與壺遂共定漢律遂之所以報長孺者冝無所不至其以情丐于遷者蓋未可知不然何與之或過歟非公義也王允論漢之統誰絶之曰王允絶之也桓靈不綱政教頺敝人物虛蕩威令日去癏癏幼沖不能作為强明以至於絶厯數有窮天命無常然則曷為罪允曰梁兾跋扈所以除去一武士力耳大臣陰喝反以資刑餘之人使尸之為己功冀死而閹尹負恃益更暴恣何竇相枕籍血膏市朝上之人既無以籠馭而天下健者惟有董卓卓與袁紹謀誅宦官宦官死而卓愈不可制求去惡疾必以毒藥疾已去而藥之毒亡以解殆卓謂矣允結吕布刺卓復殺蔡雍可謂能謀善斷者矣然直不能謀直不能斷卓之毒與莽齊名而莽文雅過人於是伍孚以力死何顒以憂死張超劉虞以權首罹咎相與謀卓而不勝者多矣允之戮卓不失一卒不折一㦸安可謂之無謀天下賀卓死而蔡雍附卓至為之咎嗟咿喔恨滿大宅背負國家萬萬宜死而猶以續史祈命欲躡蹤司馬作謗書安知其不彌縫卓失而反推異之貶辱漢臣摧抑天統日書月書以欺惑後世允確持之不肯貸安可謂之無斷卓死而涼州之人呼吸變態存亡須臾樞楗闔闢之變正在此時若一失其機則竹破瓦解不可復合茍能諭檄部曲諸為卓詿誤者勿問敢以兵動者族如以雪澆沸利害顯然而允不肯為靳一赦之故使李傕郭汜乘以為亂是一卓死百卓生允不能遏又死之能謀與斷者固如是乎晉已勝楚文公猶有憂色左右曰有喜而憂如有憂而喜乎文公曰得臣猶在困獸猶鬪及楚殺子玉而後喜項籍已亡韓彭既臣妾方內大定田橫越在海島勢無能為也而髙祖區區必欲招降之其㫖逺矣傳曰一日縱敵數世之患汜傕雖非子玉田橫之比然姦雄之徒日日幸亂而况驅之以為亂允上無以保君而天子適為强臣資下無以庇民而黔首為冦糧長安百雉巷無居人而袁紹曹操爭先挾帝以令諸侯其敝兆於汜傕汜傕之亂誰為之允為之則漢之統允絶之也然則曷為不罪允武侯論嘗怪劉先主以宏深之度推誠得士固曹孫之所不逮方其親屈將軍之貴三顧諸葛亮於草廬之中盡其所欲聞者得臣有如亮當時一國之才無出其右宜其破吳吞魏如唾手之易然而鼎峙六合終其身不能取中原此其故何哉為之深思逺慮然後如先主之用亮此其所以不可圖天下也蓋嘗聞之論大臣者有二有謀臣有輔臣謀臣以相濟而相資輔臣以相投而相合相濟如天地之升降日月之晝夜布而為雨凝而為霜瑞而為慶雲祥風然後可以成嵗相資如邪溪之鋌赤山之精鑄以火淬以水然後可以創物燕國之角荆山之幹液以春析以冬然後可以傷人此則為謀臣之效也相投如立乎大澤之陂脰鳴注鳴旁鳴者居其右翼鳴股鳴胸鳴者居其左則不過同於聲相合如植芝於蘭之側則不過同於香和膠於漆之中則不過同於固此則為輔臣之效也創業之君寧無輔臣不可以無謀臣若髙祖之有張子房此所謂謀臣也先主之氣愈沮而愈剛此其與髙祖無異然才髙而慮短志大而機不足機不足則未免於怯慮短則遂至於謀疏孔明雖有為之才然智無子房之竒故善於守正而拙於用權以拙於用權之臣而事慮短機不足之君故可以相合而不可以相濟可以相投而不可以相資也方漢之末曹已據中原孫已守江東先主方為荆州之游客悵然計不知其所從方是時為之始謀者孔明而已漢中巴蜀此髙祖所以因而王天下也足食足兵於西南之隅然後徐起而圖之則其謀固然矣孰謂孔明而不善於守正者乎惟先主之才髙故聽其言而能用惟先主之志大故決行其言而不疑然而不知孱弱之草不依託於盤根髙幹之木則不能伸其身此古今之常理也况先主孤奮於東漢之末欲有為於天下則曹孫之勢最可假以為託惜乎亮之拙於用權而不能借資於人也亮雖知曹公挾天子以令諸侯難與之爭鋒乃欲結好於權以為援而曾不知事吳不若事魏之為利也亮之不知事魏之為利者竊意其心徒以𤣥德漢室之胄可區區慕湯武之名以正征伐之由而不知湯武之先世惟積德取信於天下以無心得之此術不可施於漢末離散之際也惟孔明昧其名而失其實此所以不能事魏也惟先主聽用其言復不知審其是非行之不疑亦不能逺觀却顧於成敗未然之際此其慮短機不足致然也然則事魏之䇿奈何噫豈不見孫仲謀之能臣魏背蜀而保其國乎事魏之勢在仲謀可以謀國在備可以取天下仲謀之勢在外備之勢在內而亮卒不之悟也然仲謀雖知所以事魏而不知資魏以事漢至乃奉書稱臣以媚於操此所謂得其一而未得其二者也方操脅帝以制下先主以帝室之英勢有漢蜀武侯曷不為先主謀使盡夫尊事獻帝之禮仍通好於操無暴其罪僞推其勳明告天下曰吾今與孟德戮力除凶以奉漢宗廟操雖欲不吾從不可得矣吾屈身卑節以奉於操正朔號令以禀於操子女玉帛以歸於操使操欲絶我而不能伐我而不可漢天子將賴我以為固操將若之何於是修仁行義休息衣食乎漢蜀之民捐數十萬金奉口舌之士以乘操猜忌多疑之間踈隔其君臣之歡且吾跡就內附則凡謀皆易行假之數年可以得志是我外無犯漢之名陰有謀魏之實此為蜀之上計也亮既不能出此矣雖外結於權又不能終事之至於失荆州蜀之形勢不具嗟乎使先主曩事魏則豈得有曹仁于禁吕䝉陸遜之徒腹背以困吾雲長乎荆州為蜀之右臂為吳之咽喉為魏之南門魏始得之則以之拒吳而捍蜀蜀中用之則以之控魏而抑吳吳卒奪之則以之扼蜀而塞魏蓋荆州皆三國不可失之地也先主失荆州天下之大勢已去矣由是觀之武侯昔雖有命一上將出軍以向宛洛之策卒不得行所以終其身不能取天下也噫安得謀臣如張良者以佐先主之謀而使亮優處蕭何之任庶乎當其才也人才之難創業守成之君念之哉龎法擬魏臣論愚嘗觀陳夀書以龎統法正擬魏臣至於讀數子之傳而考其行事之迹乃知陳夀之言雖得其一二而猶有未盡也且以龎統之清雅荀彧荀攸之忠正各奮其能而任於一時愚請以智識才略論之法正之竒畫程昱郭嘉之智略規事建議而見信于主愚請以料敵䇿謀論之方龎士元挾知人之鑒而謂陛績顧劭有駑馬駑牛之任荀彧論袁紹之衆而謂其或剛而犯上或專而無謀而太祖嘗以為知人荀攸亦論吕布勇而無謀陳宫有智而遲非藻鑒足以見人之臧否固莫能及此則三子之智識竊相似也統有治中之才而先主之所器彧知軍國之事而太祖嘗與籌至於荀攸則亦有帷幄之謀而太祖見之則以為非常之人茍非宏才足以勝大任亦莫能及此則三子之才略竊相似也若夫法正度劉璋之終不能用鄭度以解先主之憂程昱料孫權之必不能殺劉備以申太祖之戒至于郭嘉則知談尚必鬪而果有冀州之爭謂胡不設備而卒有大破之變則法正之料敵固足以擬於程郭也正說先主討淵郃而廣拓境土昱說靳允殺泛薿而卒全三城至於郭嘉則臨敵制變達於事情觀太祖急攻吕布而終成大業則法正之䇿謀固足以擬於程郭也嗚呼龎之智識才略固足以擬攸彧而所不及者必以功法之料敵䇿謀固足以擬程郭而所不及者必以節何者君臣之際相遇為難古之人欲行其道而患不得其君既得其君而患不得其時荀逢時以行其道則施設注措而成不世之功易于反掌耳觀二荀之遇太祖也撫寧內外經達權變討袁紹擒吕布二子與有力焉此則時之可行故其功有足稱者矣方龎統為軍師畫三計以說先主其心亦欲致君平難以建萬世之功奈何不數年而為流矢所中則規謀建事未及成而亡矣此則不得其時而終其志故其功所以不及荀也且事君量而后入不入而后量昱知劉岱之不可與謀嘉度袁紹之難以共濟於是去而就魏以助太祖則其量君進身去就之節可謂美矣法正入蜀依劉璋不先度其可否而茍容其身至乎志意不得則因張松之說而歸先主反為辭說以勸劉璋之降則反覆之心固非事君之直矣此其節所以不及程郭也噫龎以早死而不得終其志故其功之不足者為可惜法以不能量君進身而反覆其心故其節之不全者為可鄙陳夀不能究其終始而徒以雅好人流與夫著見成敗之類論之烏足以盡人哉雖然大漢之末民方惟悴于虐政數子之幸逢魏蜀可謂千載之㑹矣不能舉明主於三代之盛而躋民于仁夀之域論其才智䇿謀則可矣言其道則未也鍾㑹論豫於鍾㑹伐蜀之事見文王之善用人也蓋㑹之為人有俊邁之機有經營指顧之略而其詭譎變詐亦足以熒惑愚衆傾敗國家而險危夫人然文王委之以西略付之以十萬之衆而曾不為疑者知其足以任之而度其足以制之也今夫烏頭堇蝎藥之至毒足以絶人之喉而潰其五內也然良醫用之以為藥材而能治之於濵死危殆之際者其故何哉以謂病之在顔色者可告而治也在腠理者可養而徐去也而至於腹心之疾膏肓之患則告之為不及養之為不足而非此不可以攻之矣然物之為毒其力足以殺人而亦足以治人非能知其畏惡反忌而有以制之則是速其死而已可以人之性命而嘗試其術哉當㑹之將西也西曹官屬固以為疑而密啓於王矣王卒遣之而為之一笑蓋㑹之才略與其變詐文王固已知之而拳握之中心術之內規摹措置有以逆之矣為㑹計者將何以致其毒哉蓋當是時以劉禪之庸而保區區之蜀謹其邊疆固其守禦撫其民人薄其稅斂以倔彊歲月之間為已甚矣而姜維用之以孔明當日之術今年出隴西明年出駱谷又明年出狄道驅其羸亡之餘起其困憊之卒以寇盜我邊疆䖍劉我民人者未嘗虛日則蜀之疲弊固可知也舉天下之全力而乘其雕喪之餘不啻如反掌然也而當時之臣猶以為畏豈足與共事哉蓋以其江漢之阻深數十年之為冦而豫怯其形也人心豫怯則智勇俱困智勇俱困則適為敵擒而已此文王所以獨遣鍾㑹歟故官兵一下而劒閣失守劒閣失守而鄧艾之徒足以搗其空虛而衝其腹心矣使文王聽邵悌之言而惑議者之過計則蜀無得而可取也㑹無得而可為也烏頭堇蝎力足以生人者亦不足以為藥材矣初夏侯霸之降蜀謂蜀人曰司馬公自作其門耳有鍾士季者管朝政吳蜀之憂也及㑹之有異圖先欲去艾以絶其手足然文王答書以出其不意而㑹亦震懼失其本謀則非㑹不足以定蜀而非文王有不足以用㑹矣愚故曰余於鍾㑹伐蜀之事見文王之善用人也知其足以任之而度其足以制之矣漢王之東非韓信不足以斃楚也雲夢之役非漢王不足以制信也他日間其所長曰陛下不善將兵而善將將此信之所以為陛下擒也嗚呼其猶鍾㑹伐蜀之事哉
