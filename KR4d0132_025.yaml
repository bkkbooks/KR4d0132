body:
  text: 跨鼇集卷二十五宋李新撰啓賀李都大加職啓伏審修覲嚴宸對天威於咫尺疏榮祕局聮仙館之清華賜服示於以庸躐資酬於不次併承異數益快羣情伏惟某官識造淵微氣全剛大卓著人倫之表深明吏道之端簡在上知總宣使指摘山而裕國用高值以空敵資利擅坤維大集富强之效種來西極增威中外之容登課甚優述職惟謹奉凝旒之肅穆頒品服之彰明德稱懋官名收出信平陟道山之選實為儒者之亨賞典再加朝纓知勸有功而恱式瞻四牡之來攬轡載驅復見皇華之遣行聞召節别貫華途某逖聼俞音悵拘逺職莫遂門墻之望空修竿牘之誠抃蹈滋深敷言難盡賀吕右司啓十行拜命一節趨朝聖神至明忠義咸勸伏以嗣皇上念積纍罔輕太平念慈宫攬萬幾之勞思神考正六官之意永惟天下之務悉總文昌之司吏益冗而兵益驕刑未清而禮未化蒼生疲力願輕户部之徭遊手逸居欲正工曹之役弊既已救法非不更豈求治之過耶何報效之遲也必願求助誰將閔豫思得老成共期平治既精僕射丞轄之選又慎尚書侍郎之官然而上承僕射丞轄之權俾無過失下副尚書侍郎之事使不稽遲中持華省之綱必在都公之任固宜遴擇首及忠良恭惟某官熙寧諫臣元祐御史道知可直頭不為人而低義實難輕仕非枉己以就吾幸未老弗敢愛身德固不回只知憂國雖在西南萬里之逺而有中外一心之誠宜簡在於宸衷遂彌綸於省闥民所望也僉曰宜哉某聞教一隅依墻數仞未遂趨庭之慶已先賀厦之誠賀周運判升運副啓伏審就膺成命進陟華資不移蜀使之星重賜周家之節久親仁庇彌切歡悰伏深慶慰恭惟某官性天髙爽器局恢宏嘗居禮樂之司從容待問繼奉絲綸之語左右轉輸美績登聞俞言僉允慮勤瓜代益增繡斧之光華幸託寶鄰猶借江河之潤澤瞻依有素欣躍無涯轉官謝賈安撫啓比奉細書獲遷顯秩爰作新於八寶䝉均慶於萬方草芥賤微本遂一瓢之樂祿綸光被濫叨五品之榮進居有限之官聮時冒非常之典禮退循僥幸積有夤緣此蓋某官許國惟忠偃藩以武登髙能賦下筆有神說禮敦詩威自宣於塞外輕裘緩帶氣已蓋於軍中五月渡瀘行通里閈二星在蜀良倚葭莩眷言寵數之來望賴親朋之助碧油紅斾尚阻逺於音塵毛穎陶泓略修文於竿牘賀宋宏父遷都運啓光膺宸命榮徙使權歡意胥同下情尤切登車在邇換印云初陜右占天自覺台躔之近邠公去國宛聞歸市之從載賡七月之詩未報三年之政計臺虛左裕國藉才允屬能臣實重他部治四州節度之鎮未究所長給六路諸侯之師正圖來效顧卿士以惟月曾郎官之應星初承細劄之訓辭復領先公之舊物錢流地上素知取豫之方食足關中妙得將明之指恭惟某官性資明偉器宇恢疏政嘗近民文已到古屈宋之作後世宜為騷人宗卿雲之章在處當有靈物護念統臨之部曲有流落之衣冠喜觀如綍之言欲簉曵裾之客取白而舍皇甫湜恐卞急之無堪樂蕭而苦張九齡尚徑正之可取儻許乘傳而諭蜀是為先國而後讐更䝉載客以入秦亦欲完壁而歸趙雖聞道成佛同古人之事何後恭前倨為識者之譏望舊瞻烏非謂有喬木止中乞食未免為鄉人某逖聼前音悵拘下職莫遂門闌之慶空修竿牘之誠抃蹈實深詞文難既謝京畿都運啓右某承尚書省劄子奉御筆令閣門引見上殿訖䝉恩除前件差遣者幕府備貟需頭剡薦清閒奉對獲瞻咫尺之顔渙汗疏恩叨被光華之選仰慙臨遣內省逾涯竊以士雖志於有為道固伸於知巳見信未篤乞憐固難明月夜光反貽按劍髙山流水或失知音至半塗而止者有之以一人而毁者多矣自非髙誼孰振古風待遇以始終不倦之誠成就以今昔非常之遇責不聞於求備譽或幾於過情用以所長勉其不至豈特教誨飲食之事曲盡卵翼生成之恩曠世未聞於今獨見恭惟盛德施及鮿生某也結約無奇顓愚有素盍各言志曾微平日之髙談無所取材固絶青雲之素望徒以登龍之舊每懷附驥之誠知遇攸深提撕加重西州帥幕已玷揄揚外計賔筵復從辟召漫殫夙夜何補涓埃空羞鼠技之多窮自是鉛刀之終鈍顧惟瘝曠方切驚惶豈期一鶚之飛章遽有九重之論薦主知素厚帝席為前惟言聽而計從故朝奏而暮召恭聞俞㫖入對清光仰承聖問之周詢實出公言之推重除書下逮器使過優分右蜀將漕之權付一路按臨之職資忠移孝固宜叱馭而行激濁揚清敢怠登車之志重惟冗散不稱選掄向匪提衡孰與為地此蓋伏遇某官公朝重器名世宗工忠嘉上簡於帝心聞望久諧於輿論至誠樂育敦先生長者之風登賢選能見君子成人之美圭璋特達金石不渝故於藻鑒之公必盡維持之力致叨忝冒出自薦揚某謹當祇奉詔條永肩趣操盡用平時之教誨庶幾異日之功名雖慚國士之知敢事衆人之報李運使逺迎啓細書顯被淵意妙臨甄教育之師儒畀將明之使事聮官有幸慕義滋深某官抱道而逰執經以守國子教三德忘意外之言筌行人為一書待帳中之心計髙風不替見之猶龍後進所推喜於為御姑輟詩書之訓式分宵旰之憂叱馭惟忠指山川之攸逺登車有志載禮樂之光華試均陸海之饒逾見雪山之重孚仁言而格物制國用以裕民春化筆端錢流地上成人小子自煩米廩之漸磨長者先生願接龍門之清賞臨箋甚喜望舄猶勞謝趙運使啓捧毛義檄已叨奬進之榮彈貢禹冠更切依歸之願與適未可與立所見弗逮所聞屢勤倒屣之迎輒致順風之請伏念某小智易測大愚弗靈敝帚千金立家四壁並老萊於戲綵約伯直以躬耕再潔其身過舞雩之童子三緘其口類周廟之金人俯為入幕之賔殊非稽古之力曾吹竽而被賞又搖尾以乞憐一鬼在傍笑伯龍之寒乞諸曹詢事知令綽之老成啓行元戎備貟跛傔愈風無檄覆瓿有書要所事者如晉公庶幾行道乃所願則學孔子然後成師全叨異恩終出選調兹蓋恩主運使龍圖先生性天超爽心地疏通長者先生禮樂盡在是正人端士朝廷無易公念太史雖滯於周南然伯樂已空於冀北尚容鈍吏不棄聾丞憐老馬而乞敝帷招郢人而歌白雪試閲上公啓事疊著隴西土人傷弓之禽姑求一飽而已副墨之子何取片言乎哉聲雖成文言不盡意到任謝兩府啓叨被綸言獲將使指知恩所自撫已何堪伏念某政術空疏性資凡近未能製錦幾廢於前功必學為箕每傷於墜緒愚無一得巧致百窮辱記芻蕘之言誤置籧篨之用儲囊錢而未匱大官何優奉計書而復來末路多躓偶從下列輒對清光初微尺寸之長得被西南之役夢回江國數異日之連檣耳接巴音識當時之流馬况爵祿馭海內之士惟弟兄受門下之知凡縻龜組之榮盡出爐錘之賜愚無述作莫紀象於太平逺有光華誠曲私於造化恭惟某官盛名蓋世厚德承天玩心乎幾微論道乎昭曠時惟神聖眷我父師斂時福以錫民體大鈞之播物豈兹凉薄亦預使令姑成叱馭之忠驟失掃門之職思圖後效不知蜀道之難欣遂外遊第覺泰階之逺賀陳户部移知東川啓伏審光膺明命榮徙巨藩印换鄉邦風生井絡恭惟某官學源深濬氣宇恢疏春生筆端言出塵表一室安能自掃四座從而數驚蘭省舊逰視圖察乎耗息皇華逺被攬轡志於澄清與時偕行而來者申也以道自重則我且直之既從事以獨賢雖不容而何病外更雄服簡在上心竹馬喜於再迎風俗為之一變江山不易父老猶存下車修庠對文翁之善化登髙能賦揖子昂之清風某叨薦公朝幸鄰德壤馳情每切趨慶末由賀李待制移延安府啓伏審就錫宸綸寵更帥節式重宿兵之地難辭渙汗之恩幕府初開輿情胥慶恭惟某官胸藏武庫議訂石經才應變而有餘功被知而逾顯關中足食已效陳陳之相因堂上出竒良見多多而益辦矧兹重寄實賴壯猷古稱北户之防今控西戎之要亟謀良帥果用洪儒奕世殊勳闢玉門之逺略千齡盛際上金城之永圖在一面之可當舉諸將而盡護忠孝兩得大闡乎家聲文武兼資增崇於國勢行攄逺業入贊鈞樞某受知最深去德滋久逖聞新命但欣大厦之成悵走遐方徒想髙牙之建回唐梓州賀正啓伏以一氣回元書重麟經之始三陽交泰卦符羲易之亨禮盛古今慶通遐邇恭惟某官才包經濟德合表儀重千古之髙名擅三長之逺業暫分侯服久報於政成順布王春亟乘於道長逢辰惟吉與物開端前思宣室之言即起潁川之召荐迎休應仰叶大來某欣對令時計司攸職第缺修容之慶姑勤頌德之誠謝舉官啓行間登第顧何取於決科外邑效官均無聞於蒞政誤當論薦彌積戰兢反身雖榮分量太過且以澤雷洊震特容尺蠖之伸驥尾將馳亦許蒼蠅之附世道不逺物情大同而觀頥多失於舍龜故入林未免乎逐鹿茍亡素養如羊質而虎皮更欲求官定麞頭而鼠目搖尾以乞憐者皆是磨牙而肆毒者有之至使刳腸何如曳尾與其吠客猶愈喪家果能緣木求魚無乃為蛇畫足况鼯鼠每窮於五技而鷦鷯不過於一枝自足而然分定故也何豹變然後見君子蓋雄飛謂之真丈夫雖惡居蚖肆之間誰致汝青雲之上未能奮擊祇益內慚如某者翰音不登羽翮未振辰將安在天莫我開聞道同於夏蟲適性幾乎野馬拚飛入洛已無馳譽之文俯首客梁徒有倦遊之意技止此耳孰為來哉在隂之鶴未鳴雄雞之尾先斷雉十步而一飲慮患固深蟹六跪而二螯寄身何所豈謂退飛之鷁得偕漸進之鴻偶登元禮之門遂逃㸃額輒入衛公之好俄許乘軒載揣愚衷實獲優幸此蓋伏遇某官妙語唾玊清才飲氷一意教人盡肖螟蛉之子片言取士不遺洛誦之孫致此顓䝉亦荷提拔食梟以椹定知懷我好音樂鶢用鐘不至自貽伊戚由是非池中物安能效轅下駒敢不慎守官針益堅素節誓言九泯懷報一生謝舉官啓腐儒學術世謂鮮通俗吏政經自知不敏誤承華剡益載厚顔進退居榮俯仰驚寵竊以池塘生草曾回鄒子之春宴寢凝香未報竇申之鵲方再濡於薦墨或崛起於訟書顧白壁之無疵何青蠅之劇集緣同列競進忌寸步或先張弧於前設穽在後引走卒於臥內推以腹心挽使者於道旁獻之竿牘搆成大獄肆為姦言若妖狐得夜以祥是醜婦入廬為妬雖即宴安懷鴆操心益危奈何笑語藏刀為患不細惟蝮蝎不知其毒如日月何傷於明况愚幸有二天知告者過也如彼不循三尺欲問以辨之殆未中其鼠機幾弗免於虎口求之正道叔孫惡李斯俱官比之匪人老子與韓非同傳䝉轉禍以為福惡以人而勝天謂能屈身池中當令出我門下如某者慮不周變才非適時因人而成為鬼所笑念故人招隱言欲與汝偕亡屬藻鑑求賢安能使豫不遇此蓋伏遇某官直道遊世誠心與人不食前言每借餘論憐其腰磬過乎三命循墻借之函書重於十部從事故兹庸妄復與採收果能草牘三千未嘗軋思要當除吏八百仍許備貟感恩曷窮報德無易謝席徽猷舉改官啓懼使乎之辱命方伻來以獻圖既叨開府之辟書又玷清秋之薦墨恩多數異感極涕零竊以物貴當時士伸知己敢勤三接必有一長使人持不倦之誠在古稱非常之遇然世有萬法而道無兩隆見彼是則此非欲前軒而後輊器車幾於無用舞馬疑其不祥抱空桑以求至音實枯臘而為真璞棄騏驥馭翻興長道之悲捨蘇合丸乃取蜣螂之轉髙山流水正待知音明月夜光易貽按劍再遊瀘水一識荆州愧無蹈道之資辱委成城之役雞鳴狗盜不足使於前與馬勃牛溲有以賤為貴者某也愚自天性學無醇師粥飯僧無所建明牛馬走不通問訊桑樞甕牖未嘗有顯者來簞食豆羮固不改回也樂荐䝉論薦難答寵私此蓋伏遇某官學植根深德機淵湛獨運潜神之計兼收闢國之功邁蕭氏八葉之傳類魏公三代之直薄海無不州縣通大夏豈邛竹之商白首不見甲兵置蜀人於華胥之國方圖舊而共政宜用夏以變夷何期譾薄之才獲與公忠之舉比居下座屢獲解顔富貴無忘疑傅說在版築之列功名難際恐英公惡薄命之人願殫犬馬之勞少報丘山之賜謝种帥舉升職啓涇河水靜未暇濯纓周廟雲閒方將吊古初息宵征之馭正如痛定之人不待搖尾以乞憐甫見入門而問諱亟從下座首薦公朝疑列子之適齊五漿先饋類淮隂之拜將一軍皆驚比至西陲幸虛樂地輒後來之居上不歷試於諸難號沒字碑徒有其表分士師鹿亦自無心好辨虞卿再見而輕萬户無情龍伯一釣而連六鼇名利至於兩忘文武是或一道啓行碧鸛導引諸曹獨自墊巾遨遊諸將豈復溺冠之辱盍勞衷甲之憂故宜譾薄之流或與公忠之舉此蓋某官簮纓華胄忠義大間模範願以為師風雨不改其度讀名將傳已知諸父之賢占處士星猶識終南之隱本自魯服終愛褒衣藉嘗用於白茅鳴必求於呦鹿堂上皆雅歌之奏入室無雄雞之冠新豐酒寒孰舍馬周之賤漁陽摻陋第容禰子之狂謹當恪守官針益親函丈歸數宋人之劵退求寢丘之田海內文章半屬晉公之幕客朝端將相誰非尚父之門生
