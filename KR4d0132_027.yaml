body:
  text: 跨鼇集巻二十七宋李新撰小簡與趙運使某皇悚再拜上啟運使朝奉先生冬曦比晴人意健利緬維行臺决事坐通神眀索智於嚢同水中月山川百靈佑我賢徳以為太平之基體力泰定日享如茨之福某客舍無聊不能出門户阻逺師席臨風馳情謹具手状候問不宣某皇悚再拜上啟再與趙運使某皇悚再啟候承台履庀在前幅禮文脱略恐懼惟甚三伏劇蒸恭惟道徳隆峻忠孝備全使事佚安上承天休某僻在支郡拘於猥藏未獲參侍台光伏乞加保樞要沖氣為和前膺延閣之拜某皇悚再啟再與趙運使某皇悚再拜霜序薄寒玉節逺使蚤暮有渡瀘之期行到水窮坐觀雲起䝉犯䟦履處從者良苦比辰興居如何自此以南氣候小異行厨盤餐要當及時祓除烟嵐杯中之物亦自有聖受命飲氷固古人之髙節而愛身為國亦人子之大本飲食次舍伏望崇祕惟先生属意毋忽此下吏區區之情某皇悚再拜再與趙運使某皇悚再啟蠻夷向化詩人歌之稽首願為州縣此太平盛事且闢國百里古以為異今夷䝤所獻幅員之廣何但百里耶主上遴擇忠智之士以寄此行盖體職不輕而先生首被委任是中足以立功報國昔唐䝉通夜郎國至驚巴蜀最後相如檄喻父老宣布天子威靈徳澤盡所以懐逺之意而西南卭筰冉駹斯榆之君皆請為臣妾方今聲教所暨薄海内外車書混同際天所覆彼西漢固不足道然開府求人正其端本得一士賢乎長城惟先生留情於兹某率易強聒安所逭罪某皇悚再啟再與趙運使某皇悚再啟自去秋徂冬厯今春度夏先生出入夜郎勞苦萬状某所親見聞主上眷倚之重先生不肯辭難築城純滋茂績昭著所仗忠孝雖山川險阻蟲蛇窟藪中天地神眀陰有騭相安樂無事如在燕閒後日陽報福祿綏之殆未始有艾也淯井戎南建築計在秋末須雨水定貼始可興工增秩賜章芸閣美名朝暮席拜行寄謁者之賀赩日方暴敢惟為道加䕶以垂福天下某皇悚再拜再與趙運使某頓首再拜前月末歸至普初三日已定割職事抱律書與俗吏議重輕欲文無害而已官况蕭條差厭不樂幸而際遇先生提㧞令簉與功賞秋冬間僥倖脱此以去實出望外椘阜之禽不飛不鳴乆矣飛而沖天鳴而驚人自今日始敢不砥礪後圗以荅知遇某頓首再拜再與趙運使某頓首再拜某元豐末居太學凡七年公私試補薄有聲稱既沗冒入仕謂功名唾手可取凡二十年宦學如退鷁歛板趨庭與参軍文學為伍俛首汗洽似不知命重念某起身白屋父死未塟母年七十餘萬一出選調可以鈎致一命以賁泉下之人為堂上晚景之光一身遭遇存歿受賜伏䝉先生憐其阨乆先衆人推挽差委職事試之煩難某禀賦拙直幸逃弛曠之罰而受奨與過實筆端春華㸃化腐敗起再生之榮言念此恩死不敢忘因書輙布干冒清視驚恧何窮某頓首再拜再與趙運使使堂貴集伏惟均受眀福令嗣機宜荆湖就親昨云六月已後歸来是時峡江方漲不可泝流僭率上覆仰乞照亮某皇恐再拜上問與瀘南安撫某皇恐頓首再拜安撫太尉先生舜絃横膝南風可歌一襟清微自堪解慍伏惟履兹炎序燕處超曠鎮撫百城萬靈眷佑保我師率日新之祉與瀘水並長下情欣慰某前月未到普此月初已交職事乍逺台範此心揺旌仰兾為道加䕶使相之拜可立而待謹具手状候問不備某皇恐頓首再拜再與瀘南安撫某再拜上啟某祗役新疆茍攝支邑實𨽻㢘按拙不更事但知有愛民而已既築純滋二州脱迹以歸一杯藜藿安樂清静始覺夏日之長回念前日勞苦正如痛定時愈逺台誨積有傾嚮曷勝馳情某再拜上啟再與瀘南安撫某皇恐再拜某還任一再旬遍體瘡痏捉筆不得以書未獲奉典謁之問慙恧可量投俗亡補日摠司空城旦書與牛吏議重輕辜負所學祗自羞靦何時侍師几紓此宛宛臨風不勝傾馳某皇恐再拜再與瀘南安撫某悚息再啟前月末提刑刑部過合江南溪兩處參集及過普慈甚欵曲頗䝉奨借自惟聲迹么麽不聞於時何以得此此必太尉先生吹嘘餘論所及至感至激然某止欠二削今冬當滿因吏更乞借片言之重俾遂凑合下半年得便了當脱去選調出自門下恩徳非淺也干冒台聴尚布照亮幸甚某悚息再啟上漕使某皇恐頓首再拜即日春和恭審某官導青陽之政使事依仁入奉几杖之歡承顔養志坐通神眀天監甚邇報以景福永錫難老有識者逆知其如此某初至武信阻趨函丈伏兾為道愛身報親與國區區敢畢下情不宣某皇恐頓首再拜再上漕使某皇恐再啟上百嘉向榮緬維臺府虚靚和樂飲酒登髙賦咏盡春臺之樂理財稱物以平為常列城十六共戴徳賜某今日祗服賤役正阻稱謝跂望恩閎不勝馳情某皇恐再啟上再上漕使某皇恐再啟某竊謂士有貴賤事親之心無貴與賤某淪胥十三年不遑将母覽西山之勝日哦陟岵之詩心揺若旌涕零如雨慈母嗟季留情故鄉今方肯来奉一杯藜藿其樂詎算仰惟先生以孝行髙世率俗純厚幸推愛親之心以及下士教其不逮貸其不敏函容保䕶俾若漸進之鴻自是以升則某桑榆之景拜先生錫類之賜尢不敢忘也某皇恐再拜與馮徳夫某再拜徳夫賢弟秋熱不耐亦蒸燠詎堪忍道人得安樂法自有清涼處長健利不某謫廢偶在善地僑寓義鄉禮域日親賢士聞所未聞鄰比巨族如依大水被廣蔭忘所為遷客遂神交道悟又有吾徳夫至於以所有資所無猶是末邉事三年逰從一日别去豈無情耶歸来山谷㡬半歳五窮百憂共卧起但老母康強飲酒食肉無一根齒揺落此樂不猒敝廬依山時時掖老母登髙指烟雲眀滅處正前日覊管所軒然一笑如舉夢中作幻相耳昨至錦官㑹鄭六送女犍為墓詞未取然已見楊祐夫許作䟦尾賦詩寄去竒老計安因燒香附問自馮博二大夫而下不曾有一字繼當馳一介行李布謝恩意王才卿到家否命壓人頭奈何奈何某當自吏部注差遣来若非山郡監征即村縣少府末由承集幸以道自牧順俗加䕶某借崇寧一席地掃洒藏拙養病安貧守分而已無可為人道者謹啟某再拜與馮徳夫某拜手啟初不知出脚至錦官覧清札佩意與義甚渥甚厚昭覺老子為人抵力抖藪前日掠虚一味實頭留取馮居士一兩重警化公案三十年後當為流通寮舍寒冷客況如何珍重某拜手啟與馮徳夫某再啟比附逓有書與王才卿計日今已到矣歸山貧甚無以報也慚負慚負遣一僕至彼批書可令託宿馬棧中數日向輟騎老馬歸跨㡬年矣以旋靨多終賣不行惟僧家不論此今送還似不順且宛轉為某謝之其他不較一切惟命馬無他損特膘稍落微磨破耳某再啟上與馮徳夫某再拜西風歘来殘暑自却北郭道人渉此商序氣韻益爽别㡬年寂子佛法又變否自愛自愛某再拜與馮徳夫某頓首朝瞰伏諦佳況曩辱命令撰尊夫人墓誌某詞尫罷不能發眀懿行謹專人上内不煩垂訪也謹硌與馮徳夫某頓首煩蒼頭徃来慚靦十倍恐有剪紙之疑始拜嘉命蜀契三十字已領須面重謝某再拜與馮徳夫某手啟復勤清牋徜徉難報更苛辭定致疑左右謹已祗受感媿并集後日賓客之懽不至破琴煮鶴矣餘待面謝謹硌某再拜與馮徳夫某頓首上别㡬月傾孤風髙節十倍於他人盾日横甚家居如何結衰足於一堂之上馳寸心於萬里之外閱租簿刷舊欠所得審多山僧乍住持小院城隍下人事佛法相半醯兩罌助調菜有骩集請疏示属發書無因縷細珍重某頓首上與馮徳夫某甞有函札修問顯道不知到否盖與徳夫書同日發也别後燕居諸況如何於道更精進否龜壁漸長成力教之趙徳孺學子如何才卿已到家目疾減否三舎復行吾弟入規矩中逰否陳太中無疑成貢不及上状致意某再啟上與馮徳夫徳夫承墨妙多謝意愛暑氣廹脅如酷吏猛虎道心清涼自是水晶國土山僧掃洒小院於天人無補梓人痛貧士子饒舌傷弓之禽聞弦墮地䝉教不到處感服感服摩登伽女随子見處枯木倚寒嵓猶是未了漢但請鑚龜打瓦畢竟團量不著珍重某再拜與鄭眀舉某拜啟驛嚢有書奉寄曾收否數百里音聲遼邈懐想無已秋老氣骨爽健否承集未期為道持䕶不宣某拜硌與鄭眀舉某再拜言某病狂易敢以亡母銘誌上累公正以締交有素公之銘吾母宜也不敢請之他人他人不宜銘亦不能銘無易公之銘吾母宜也是以有請今廹塟期石已礲矣書者和墨解衣磅礴以待工治器拱而竢之越月矣願早見賜當扶力詣謝某再拜言與李顯夫某皇恐頓首再拜監茶承議族叔某流浪乆為隴西士大夫之辱慚靦有負故書問屏斷借令盡禮亦相濡沫耳不若相忘於江湖也赩日暴甚興居如何舜絃横膝南吹可歌道人心源清涼便是水晶國土要且順序保千金軀謹啟某皇恐頓首再拜與李顯夫某再拜上唘隆暑如猛虎暴吏亡可逭避處堋口依山西嶺積雪亦几案上物奉承公餘燕處超然想見清涼登髙所賦能傾倒恵教否某再拜上唘與李顯夫某皇悚上覆某少意干叩伏望垂詧某前年為武信馮秀才作一墓表其文固俚俗馮生必欲得吾叔妙札為榮某亦欲託此以傳逺今數百里走人溷典謁幸吾叔借某餘光特為一揮以塞馮生之志甚大恵也碑材已有佳石敢吿留意幸甚某皇悚上覆與李顯夫某再唘上覆與吾叔漢上㑹遇良欵别後多難徃徃出意外但未死耳他皆不足為辭徃歲来錦官眀舉約逰西山固欲上謁竟為世諦事奪今無復如志也八年閒居筆硯未始廢繼當附確便請教次某再啟上與仙集休京師博士處時有安信美除臺閣可指期也潼川凡委一一乞疏示糖氷一􅤮輙凂清席直孺已到京矣收書否某再拜與仙集某頓首奉簡幐牛馬走尚未報命以拜教札之賜負暄承起居䝉福殘年強飯自愛不宣某頓首奉簡與仙集某頓首再拜老憊氣息惙惙不耐寒暑及秋初有生意閒居廪稍不繼琴書入臭子家矣今春獲麟遂絶椽筆命名奏雅頗岐嶷端麗不似厲之人時時閉闗弄雛䑛犢自有真樂廟記祗寄公一本極厭山城思跨一騾東去如何比辰佳否珍重某頓首再拜與陳子眀知縣某頓首啟子眀賢舊雨涼體力健不某初解驂小突未黔使節欵留城市未能掃地布席揚一觶以相酢今尚慙負字一雷土動多得能聲老昏疑信相半及親見之道路之謡真不欺人賦先期攷版籍無一錢逋負他邑所不逮者皆此類也未承集間珍重不宣某頓首唘與陳子眀某再唘小寺未經大風雨摧圮數處市少材料均煩諸邑若䝉應副使全家脱顛壓之禍子眀之恵豈小小者耶徑寸雖大無嫌條段以多為貴不罪初到便爾干擾皇恐之甚帛收受訖有紬更吿撥来趂起秦亭綱有委誨無外某再啟上與陳子眀辱牋之恵審聞清况王賦地征如役鬼神何其速也即時收矣更有州城委幸頥㫖某頓首啟與陳子眀材植早䝉指揮般至欲便修完一入秋則摧仆盡矣如子眀風力決不肯同俗人等第應副耳某再拜與陳子眀糾察至漢初發數事諸劉已到若送右獄徃徃煩公移治月餘或不欲即與直仲言之某再拜與陳子眀辱誨語諄勤感服無量暑極矣道人胷次自有清涼寳山比辰佳否縑纊即時收訖有城郭委集幸垂示不宣某頓首啟與陳子眀竹木前諸邑到更獲羨材何以報公但增感激漢初事已盈狴犴而巴川吿訐行充囹圄回視子眀百里真華胥國也皆宰字者平日恩威相濟使斯民遷善逺罪其效今見矣某再唘與陳子眀某頓首秋暑體力佳不前月五馬令本曹供諸邑地契稅虧額惟使邑欠最微判申漕司兩日前令鞫官吏不以財用為意如子眀賦輸皆先於他縣若一例被問是無神眀况所欠么麽耶可便收簇了足解来為佳公移紛紛正敗人清意耳某頓首與陳子眀荐䝉書誨仰見締交奨與之勤工徒如數十六日到凡七名更兩日放散矣十七日晚先撥前解匠四名歸小可興修全頼應副一任妥然避風雨皆大賜也地契稅不多了足申来為佳一被問即礙批書然合州文法不宻老堕者之便有委不外夕稍涼佳不謹唘某再拜與陳子眀某頓首連陰雨極不快有佳況不何時受代代者有来期不巴川已被劾新眀来權漢初銅梁歸任兩邑之民欲挽而歸欲借而留不知允叔何以得此合之才令尹何其多也要見錢糴利州米吿早津般至州餘惟自愛不宣某頓首與張無盡某祗肅再拜上唘某竊惟自漢以前蜀人之仕無可考獨何武入為三公已千餘歲今大丞相秉鈞澤及四海蜀人詎得而私之然泰階之光下燭岷峨蜀人之仕者灑然相慶先生首進必引類以同升西南英流不乆入氷鏡福莫長於薦士惟先生屬意無忘某祗肅再拜與何文縝舍人某頓首再拜逆旅湫隘如狗竇蝸殻神馳心焦㡬不可活延閣貴人已荷臣力豈不欲速成之但有未安不可強耳情廹急不得不強聒左右願為留念得貴人一言則黄閤章飛騰矣不宣某頓首再拜與子文某頓首子文學士比覽書席顧陶泓無佳者執事不謹亦敗人清意妙年渡蟇頥津有漁師示此石自言夕見光芒盺記其所得之以心從某逰三十年時能吐好語某不調辱之乆矣是物呈露固有所屬敬以奉之足下願吾友愛䕶之決能見百十中書公老而秃也兹石有用非真長二小山之比不靳數語作一段竒絶如何如何某頓首與飛聲某頓首啟飛聲議郎老兄潼川邂逅俱勤國事雖數相見未甞欵别後不審體力健不伏惟天祐賢徳日享如茨之福未縁承教伏乞為道加愛不宣某頓首唘與君接某祗肅再拜兩日前司馬平仲過普欵聚數日聞與君接兄數通信承知道力益健甚慰懐想尚留普慈活升斗空山寥落㡬無可與晤語者李中孚来此權安岳三四月近又解去風之斷蓬水之木偶彼此莫知其底止也餘俟見日併恙此懐某祗肅再拜與去病某頓首去病推官奉議友暖律孝履如何邑中數日之集䝉直諒多聞之誨甚多某到家丐罷上司未遂所請此亦命也致仕文字如未欲来專為辦集有委屬無外不宣某頓首上與縣宰某頓首唘近境問令尹知是吾錦官人叩姓氏廼知有事契晴暘健不某趨塵䝉垢願受振衣弹冠之賜若行衙未有要官占能假一宿否謹布覆不宣某頓首唘荅山水老人某頓首唘稚亨老友䝉牋何勤衰老惰欲今非昔形要山水詩他日當寄都㑹客冗復簡太踈熱甚倦否不宣某頓首啟
